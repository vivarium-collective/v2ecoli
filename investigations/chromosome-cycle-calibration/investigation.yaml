how_to_read:
- '**Acceptance criteria — current status:** five lifecycle checkpoints. D-period wiring (passed),
  v2ecoli↔vEcoli match (passed), multi-gen equilibration to declared τ (**failed**, upstream FBA
  gap), TF coverage audit (open, GlpR gap), glycerol medium added (passed). The failed criterion
  is the active research question — Study 4 (`dnaa-04-mechanistic-initiation`) is what closes it.'
- '**How the per-phase studies fit:** `chromosome-replication-plan.pdf` breaks this work into
  Studies 1-8 with a linear dependency chain. Study 1 (DnaA expression dynamics) is the active
  phase. Subsequent studies activate as each prerequisite closes its primary tests.'
- '**Where the heavy artifacts live:** Sim DBs (`out/acetate_apr24_test.db` 9.1 GB,
  `out/glycerol_stage1_1gen.db` 14 GB, `out/vecoli_acetate_compare_parquet/` 677 MB) are in this
  worktree only (~23 GB total). Not duplicated to v2ecoli-dashboard. See the Inputs tab for
  the full dataset catalog.'

glossary:
- term: D-period
  definition: The fixed-duration period after replication finishes during which the cell completes
    septation and divides. In v2ecoli, declared as 30 min for slow growth (matches vEcoli).
- term: C-period
  definition: The time taken to replicate the chromosome end-to-end. Declared as 70 min for slow
    growth.
- term: τ (tau)
  definition: Mass-doubling time for the medium. ABT minimal acetate τ=136 min (declared);
    ABT minimal glycerol τ=150 min (declared). Both currently observed to cycle ~80-120 min in
    practice on this branch.
- term: with_aa
  definition: A guard / condition variant in v2ecoli that supplies amino acids exogenously. Used
    as a sanity baseline (cycle ~45 min unfixed → 22.5 min once D-period is wired).
- term: RIDA
  definition: Regulatory Inactivation of DnaA. Hda + β-clamp drive DnaA-ATP → DnaA-ADP hydrolysis
    after replication, preventing re-initiation.
- term: DDAH
  definition: Intrinsic DnaA-ATP Hydrolysis (~0.046 /min). DnaA-ATP slowly self-hydrolyzes
    independently of RIDA.
- term: DARS1, DARS2
  definition: DnaA-Reactivating Sequences at two chromosomal loci. Exchange ADP→ATP on DnaA,
    counteracting RIDA + DDAH.
- term: MIX0-845
  definition: EcoCyc identifier for ABT minimal + 0.2% glycerol media (13 mM GLYCEROL). Newly
    added in this branch.
- term: upstream 0a3c36d
  definition: The reference commit on branch dnaa-replication-studies used for comparison. Our
    overrides (C/D periods, dnaA TE, DARS widening) are applied at a different pipeline stage than
    upstream.

question: >
  Does v2ecoli reproduce vEcoli chromosome cycle dynamics on slow conditions, and at
  what point in the simulator stack does the observed-vs-declared cycle-time gap originate?
hypothesis: >
  Confirmed today: v2ecoli reproduces vEcoli's acetate dynamics within ~15 uM ppGpp and
  ~3% charged-fraction across gen 1. The gap (observed ~80 min vs declared 136 min) is
  wcEcoli-inherited (FBA over-supplies AAs in early gen -> tRNA stays 97-98% charged ->
  SpoT degrades ppGpp -> ribosomes elongate fast). Rejected: multi-gen does NOT
  equilibrate to tau=136 (5-gen lineage cycles 42-82 min, no monotonic trend).
acceptance_criteria:
- behavior: d_period_division_trigger_wired
  status: passed
  note: Division step now uses MarkDPeriod.divide; with_aa cycle 45 -> 22.5 min, matching vEcoli.
- behavior: v2ecoli_matches_vecoli_acetate_dynamics
  status: passed
  note: ppGpp / charged-fraction / elongation rate / cell mass track vEcoli within 15% on gen 1.
- behavior: multi_gen_equilibrates_toward_declared_tau
  status: failed
  note: 5-gen lineage cycles 42 / 81 / 61 / 82 / 60 min. No trend toward 136. Upstream FBA gap is not transient.
- behavior: tf_coverage_audit
  status: open
  note: GlpR has fold-change entries but is not in tr.tf_ids 23-TF runtime set; regulation silently dropped.
- behavior: glycerol_medium_added
  status: passed
  note: MIX0-845 (AB + 0.2% glycerol), tau=150, CRP-cAMP active TF, C=70 / D=30 / dnaA TE=1.0 / DARS1+DARS2 widened.

biological_story: >
  E. coli MG1655 on ABT minimal glycerol (tau=150 min target per Fu/Xiao/Jun 2023 heuristic)
  and minimal acetate (tau=136 per condition_defs.tsv) is supposed to grow slowly with
  non-overlapping cell cycles. v2ecoli + vEcoli both run these conditions at ~80 min cycle
  with multi-fork replication (4 oriCs, 3 active forks at division for glycerol). Cause:
  FBA over-supplies amino acids in early gen -> tRNAs stay 97-98% charged -> SpoT degrades
  ppGpp -> ribosomes elongate at 21 aa/s -> mass grows ~3x in 80 min -> D-period trigger
  fires early. Multi-gen does not wash this out. The cell cycle bouncing is upstream of
  the v2ecoli port (wcEcoli-inherited) and downstream of the FBA biomass objective
  calibration.

