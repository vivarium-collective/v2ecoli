implementation_status: not_started
simulation_status: not_started
evaluation_status: not_started
gate_status: blocked
expert_review_status: not_requested
pipeline_gate:
  prerequisites:
    - study: pdmp-02-jump-processes
      condition: tests-passed
  enables:
    - pdmp-05-causal-discovery
  proceed_condition: |-
    Likelihood library covers all 4 modalities (RNA-seq, proteomics, growth, metabolomics) with dispersion CIs. Log-likelihood accumulator runs alongside the PDMP with zero underflows over 10⁴ test runs. ABC-SMC posterior recovery: SBC rank-histogram passes χ² uniformity (p > 0.05), 90% credible intervals achieve ≥85% empirical coverage.
study_card: |-
  Phase 3 — build the Bayesian inference substrate: per-modality observation likelihoods (negative binomial RNA-seq, log-normal proteomics, normal log-growth, normal/log-normal metabolomics), an incremental log-likelihood accumulator over PDMP segments + jump events, Vivarium observe/intervene algebraic effects (à la ChiRho), and a baseline ABC-SMC inference engine validated by Simulation-Based Calibration.
readouts: |-
  (1) Per-modality likelihood dispersion fits with 95% bootstrap CIs. (2) ABC-SMC convergence: ESS, proposal acceptance, ε-decay schedule. (3) SBC rank-histogram + 90% CI empirical coverage. (4) Fisher information matrix conditioning per inferred parameter.
