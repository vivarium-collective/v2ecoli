schema_version: 2
name: dnaa-replication
title: DnaA / Replication Initiation (succinate, fresh start 2026-05-29)
created: '2026-05-29'
status: planning

question: |
  Can v2ecoli reproduce DnaA-driven replication initiation in succinate at
  STEADY STATE — periodic oriC + cell-mass + DnaA dynamics across multiple
  generations — using ParCa's native succinate parameters with no imposed
  τ / C / D overrides?

hypothesis: |
  In succinate (τ ≈ 70–80 min, ParCa-default C = 40 min, D = 20 min,
  B = τ − C − D > 0), v2ecoli with a tuned dnaA RNA-synthesis probability
  (Mechanism A: sim_data.genetic_perturbations["TU00259[c]"] = 2e-3
  runtime overwrite) holds the DnaA monomer pool in the literature
  [300, 800] band across generations and produces a non-overlapping cell
  cycle that initiates replication exactly once per cycle. The cycle
  proceeds: cell starts with 1 oriC, replication initiates once near the
  end of B-period, oriC briefly doubles to 2, replication completes after
  C-period, D-period elapses, division fires, daughters start the same
  cycle again — never reaching 4 oriC simultaneously.

lead: |
  This investigation REPLACES the prior dnaa-replication work entirely.
  Prior context (Round 1–3.8 framing, glycerol cache, imposed τ/C/D,
  intrinsic-hydrolysis dnaa-02, RIDA mechanisms, etc.) is deliberately
  retired per the 2026-05-29 reviewer feedback (see
  feedback-2026-05-29-fresh-start/feedback.pdf). The fresh start uses
  succinate (which already has a saved ParCa sim_data state) and is
  gated study-by-study: dnaa-2..N stay blocked until dnaa-0 and dnaa-1
  pass.

executive:
  what_is_this: |
    Two-study foundation for v2ecoli + DnaA-driven chromosome
    replication initiation under the succinate growth condition.
    Each study has an explicit acceptance criterion expressed in
    biological observables (oriC periodicity, DnaA pool steady state).
    Subsequent studies (mechanism, box binding, extrinsic regulation)
    are out of scope for THIS round and will be added only after the
    first two pass.
  verdict: in-progress
  verdict_status: planning
  decisions_needed:
    - question: dnaa-0 succinate 10-generation run reaches per-cell periodic steady
        state with oriC oscillating 1 ↔ 2 (never 4) — pass or fail?
      context: |
        Initialization task per PDF: run ParCa with succinate as the growth
        condition, then run v2ecoli for 10 generations single_daughters and
        check convergence. Acceptance: after a few generations, oriC count
        in the followed daughter is periodic 1 → 2 → 1 → 2 with no
        re-initiation event (NEVER reaches 4). Cell mass is correspondingly
        periodic. If yes, save the gen-N state as the canonical succinate
        steady-state initial condition for subsequent simulations and
        unblock dnaa-1.
    - question: dnaa-1 RNA-synthesis-probability tuning lands DnaA monomer
        count in 300–800 band, stable across generations — what value works?
      context: |
        PDF hint (chart caption): set
        sim_data.genetic_perturbations["TU00259[c]"] = 2e-3 at runtime
        (Mechanism A — runtime overwrite of dnaA's per-promoter init_prob).
        Baseline unchanged: dnaA TE = 0.35, dnaA mRNA t½ = 1.9 min, DnaA
        protein t½ = 280 min. Acceptance: DnaA monomer count is in
        [300, 800] across all generations of a 7+ generation lineage and
        cross-generation variance is small. Validation plots required:
        (1) DnaA monomer count (all forms via monomer_counts listener),
        (2) DnaA concentration (count / cell_mass),
        (3) dnaA mRNA count,
        (4) dnaA mRNA initiation events.

scientific_argument:
  main_claim: |
    Under ParCa-default succinate, v2ecoli reaches a non-overlapping
    periodic cell cycle (oriC 1↔2, never 4) AND with the 2e-3 dnaA
    init_prob runtime overwrite, the DnaA monomer pool sits in the
    Schmidt 2016 / Mori 2021 [300, 800] band stably across generations.
  evidence_for:
    - To be populated as dnaa-0 and dnaa-1 runs complete.
  evidence_against:
    - To be populated.
  caveats:
    - 'This investigation is a FRESH START as of 2026-05-29. All prior
      Round 1–3.8 findings, prose, and decisions are retired (see
      feedback-2026-05-29-fresh-start/feedback.pdf for the directive).
      Anyone reading the prior dnaa-mock work (PR 59 on
      feat/dnaa-mock-investigation-start) should treat its content as
      historical reference only.'
    - RIDA mechanism is OUT of scope for this investigation. The
      extrinsic-regulation study (formerly dnaa-06) is removed entirely.
      Glossary entries for RIDA are likewise removed.
    - dnaa-2..N are BLOCKED until dnaa-0 and dnaa-1 reach passing
      verdicts. Do not author further studies in this directory tree
      until the first two are validated.
    - Round 3.7 D-period wiring fix (v2ecoli/steps/division.py +
      v2ecoli/composites/_helpers.py, commit 8b5d8cd on
      feat/dnaa-mock-investigation-start) is the one upstream artifact
      worth pulling forward. Under any media, the Division step needs
      to read MarkDPeriod's `divide` flag to enforce D. Cherry-pick or
      re-implement before running dnaa-0 — otherwise the 10-gen
      succinate run will fire division at the wrong time and the
      periodic-steady-state test will fail for the wrong reason.
  interpretation_ref: biological_story

biological_story: |
  In a real E. coli cell, the decision to start a new round of chromosome
  replication is made by the protein DnaA, gated by oriC site occupancy.
  Under fast growth (τ short relative to C+D), replication initiates
  multiple times before division and the cell can have 4+ oriC. Under
  slower growth (τ > C+D, the regime this investigation targets), each
  cell cycle has a free B-period where the cell isn't replicating; the
  cycle proceeds 1 oriC → initiation → 2 oriC → C-period replication →
  D-period delay → division → 1 oriC.

  This investigation pulls v2ecoli into the slower regime via succinate
  (ParCa fit: τ ≈ 82 min, C = 40 min, D = 20 min, B = 22 min) and asks
  two foundational questions before any mechanism is built on top:
  (1) does v2ecoli actually settle into the periodic regime succinate
  predicts, and (2) once it does, can the DnaA pool be held in the
  physiological literature band stably across generations?

  Step 1 — succinate steady state. Run for 10 generations with
  single_daughters tracking, check per-cell oriC and cell_mass are
  periodic in the followed daughter lineage. After ~3 generations the
  transient should decay; from generation 3 onwards, the lineage looks
  like the PDF's exemplar trace: cell mass sawtooths 600 → 1200 → 600
  fg per cycle, oriC steps 1 → 2 → 1 once per cycle. Save the gen-N
  state as the canonical succinate initial condition for subsequent
  studies.

  Step 2 — DnaA expression tuning. With the canonical initial condition
  in hand, apply Mechanism A (runtime overwrite of TU00259[c]'s
  per-promoter init_prob to 2e-3) and check the DnaA monomer count
  (sum across forms) lands in [300, 800] and stays stable across the
  7+ generation lineage.

at_a_glance:
  studies:
    - dnaa-0-parameter-foundation: succinate steady-state validation
        (10-generation single-daughters run; oriC periodicity ⇒ save
        canonical initial condition)
    - dnaa-1-expression-dynamics: DnaA monomer pool tuning via
        Mechanism A (runtime sim_data.genetic_perturbations overwrite)
        — gated on dnaa-0 passing
  blocked:
    - All further studies (mechanism, box binding, extrinsic
        regulation) are out of scope this round. Do not add until
        dnaa-0 and dnaa-1 are validated.

glossary:
  - term: B-period
    definition: |
      The portion of a cell cycle when no replication is in progress.
      B = τ − C − D. Under succinate (τ ≈ 82, C = 40, D = 20), B ≈ 22 min.
      Required > 0 for a non-overlapping cell cycle with single-shot
      replication initiation per generation.
  - term: C-period
    definition: |
      Replication elongation time — chromosome-completion duration from
      initiation. ParCa-default for succinate: 40 min.
  - term: D-period
    definition: |
      Post-replication-termination delay before division. ParCa-default:
      20 min. Enforced by MarkDPeriod + Division step (see Round 3.7
      D-period wiring fix on feat/dnaa-mock-investigation-start, commit
      8b5d8cd) — pull forward before running dnaa-0.
  - term: Mechanism A
    definition: |
      Runtime overwrite of dnaA's per-promoter init_prob via
      sim_data.genetic_perturbations["TU00259[c]"] = 2e-3. PDF feedback's
      working solution for dnaa-1; leaves baseline dnaA TE (0.35), mRNA
      t½ (1.9 min), and protein t½ (280 min) unchanged.
  - term: oriC
    definition: |
      Replication origin on the E. coli chromosome. Count goes 1 → 2 when
      replication initiates, returns to 1 at division when chromosomes
      segregate to daughters. Under steady-state succinate, oriC oscillates
      1 ↔ 2 (never 4 — that would mean re-initiation before division,
      indicating overlapping cycles).
  - term: steady state
    definition: |
      Per-cell observables (oriC, cell_mass, DnaA count) are periodic in
      the followed-daughter lineage — same value at the same phase of
      every cycle. Reached after a few generations of transient decay
      from the initial condition.
  - term: TU00259[c]
    definition: |
      The transcription unit identifier for the dnaA operon
      (dnaA-dnaN-recF) on the chromosome. Mechanism A targets this TU's
      per-promoter init_prob to tune dnaA mRNA synthesis rate.

studies:
  - dnaa-0-parameter-foundation
  - dnaa-1-expression-dynamics

acceptance_criteria:
  - {study: dnaa-0-parameter-foundation, behavior: succinate-10gen-oric-periodic-1-or-2-never-4}
  - {study: dnaa-0-parameter-foundation, behavior: succinate-10gen-cell-mass-periodic-after-gen-3}
  - {study: dnaa-1-expression-dynamics, behavior: dnaa-monomer-count-in-band-300-800-across-generations}
  - {study: dnaa-1-expression-dynamics, behavior: dnaa-concentration-stable-across-generations}
