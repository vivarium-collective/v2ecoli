name: dnaa-04-initiation-mechanism
created: '2026-05-16'
status: planning
phase: Design
embed_visualizations:
- name: dnaa-04 planning-phase preview (placeholders + expected shapes)
  url: /reports/dnaa_04_preview/index.html
  description: 'No runs yet — this preview shows the four PLANNED charts
    with the expected shape annotated on each: initiation-mass distribution
    (heuristic vs mechanism), inter-initiation CV, box-count titration
    scan, and growth-rate sweep. Will populate with real data once the
    DnaaInitiationMechanism Process + SeqA_v0 timer are implemented.'
biological_summary: |
  The current v2ecoli decides when to fire chromosome replication using
  a single rule: cell-mass-per-oriC must exceed a critical threshold
  (a ParCa-fit number). In a real cell, the decision is made by the
  DnaA mechanism we built up in dnaa-01 → 02 → 03: when enough oriC
  boxes are occupied by DnaA-ATP, the origin opens and replisomes
  assemble. This study replaces the mass-threshold heuristic with the
  mechanistic trigger, and ships a SeqA_v0 fixed-timer placeholder so
  the model doesn't immediately re-fire after each initiation
  (full SeqA methylation is dnaa-06, deferred).
study_card:
  goal: Replace the mass-threshold heuristic with a DnaA-driven mechanistic trigger.
  mechanism: 'New DnaaInitiationMechanism Process: fire when ≥3 high-affinity
    + ≥4 low-affinity oriC boxes are DnaA-ATP-occupied. SeqA_v0 fixed-timer
    refractory blocks re-fire for 10 min. Behind composite param
    initiation_mode = heuristic | dnaa_mechanism for 1:1 comparison.'
  why_before_next: 'This is the capstone study of the in-scope investigation.
    Downstream work (dnaa-05 RIDA/DDAH/DARS, dnaa-06 SeqA full model) is
    deferred to a follow-on investigation; this study''s placeholders
    must be working first.'
  expected_result: 'Mechanism reproduces heuristic''s mean initiation mass
    within ±5%; one initiation per generation; inter-initiation CV is
    wider than heuristic (no global trigger → more noise);
    halving the chromosomal box count shortens inter-initiation time
    (1/N titration scaling).'
  main_expert_question: 'How long should the SeqA_v0 refractory window be?
    Molecular_info doc cites ~10 min (one-third of a doubling time under
    rapid growth). Is 10 min the right slow-growth default, or should
    we tune to growth rate?'
literature_anchors:
- expectation: 'Exactly one replication initiation per cell generation on average'
  model_observable: 'replication_initiation events per generation'
  source: 'Hansen 1991 / Berger 2022 / Katayama 2017 (basic cell cycle fact)'
  status_in_v2ecoli: 'Heuristic baseline already passes this — need to show mechanism does too'
- expectation: 'Initiation mass is homeostatic (cells initiate at a characteristic mass per oriC)'
  model_observable: 'mean listeners.replication.initiation_mass across the run'
  source: 'Donachie 1968 / Berger 2022 / Hansen 1991'
  status_in_v2ecoli: 'Heuristic baseline produces this by construction; mechanism must match within ±5%'
- expectation: 'Replication time is narrow (C-period CV < 10%)'
  model_observable: 'CV of listeners.replication.c_period_min'
  source: 'Katayama 2017 (constant replisome speed approximation)'
  status_in_v2ecoli: 'Should hold with constant replication-speed assumption'
- expectation: 'Reducing chromosomal DnaA-box count shortens inter-initiation time (1/N titration scaling)'
  model_observable: 'mean inter-initiation time as a function of box count (50, 100, 200, 307)'
  source: 'Hansen 1991 / Berger 2022 / Olivi 2025'
  status_in_v2ecoli: 'Diagnostic perturbation — confirms titration buffer is causal, not decorative'
baseline:
- name: baseline-mechanism
  composite: v2ecoli.composites.baseline_recipes.dnaa_04_with_dnaa_initiation_trigger
  params:
    seed: 0
    cache_dir: out/cache
    initiation_mode: dnaa_mechanism
visualizations:
- name: dnaa_state
  address: local:DnaAStateVisualization
  config:
    title: dnaa-04 — DnaA pool drives the new initiation trigger
    sample_every: 10
- name: dnaa_box_occupancy
  address: local:DnaABoxOccupancyVisualization
  config:
    title: dnaa-04 — Box occupancy at oriC = trigger readout
    sample_every: 10
purpose:
  question: 'Can a DnaA-driven mechanistic initiation trigger (oriC fill + ATP-DnaA

    filament + DUE opening) replace v2ecoli''s mass-threshold heuristic

    and reproduce the observed initiation-mass distribution + 1/N

    titration scaling?

    '
  mechanism: 'Add a new initiation Process gated by oriC occupancy from dnaa-03.

    Toggle behind a composite param so heuristic-vs-mechanism can be

    compared 1:1. Add fork-passage release of DnaA from chromosomal

    boxes (returns the bound nucleotide form to free pool).

    '
  expected_outcome: 'Mechanism reproduces heuristic''s mean initiation mass within ±5%

    across seeds; one initiation per generation on average; inter-

    initiation CV widens vs heuristic (no global trigger → more noise);

    box-count reduction shortens inter-initiation time linearly.

    '
pipeline_gate:
  prerequisites:
  - dnaa-03-box-binding
  enables: []
  gate_status: blocked
  gate_status_summary: Not yet started — study scaffolded from PLAN-time spec; no runs yet.
  proceed_condition: 'one-initiation-per-generation + initiation-mass-mean-matches-heuristic

    both pass. Replication-time CV is narrow (<0.10).

    '
simulation_set:
- name: heuristic-vs-mechanism-multigeneration
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    kind: cross_baseline
    runs:
    - initiation_mode: heuristic
    - initiation_mode: dnaa_mechanism
  condition: M9-minimal-glucose
  duration_min: 240
  seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  readouts:
  - initiation_events
  - initiation_mass
  - c_period_min
  - time_between_initiations
  applies_tests:
  - one-initiation-per-generation
  - initiation-mass-mean-matches-heuristic
  - replication-times-narrow
  - inter-initiation-noisier-than-heuristic
  status: gated
  blocked_by_requirements:
  - req-1-mechanism-trigger
  - req-2-fork-passage-release
  - req-5-seqa-v0-fixed-timer
- name: growth-rate-sweep
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    media:
    - M9_glucose
    - baseline
    - LB
  condition: sweep
  duration_min: 240
  seeds:
  - 0
  - 1
  - 2
  - 3
  readouts:
  - initiation_mass
  - initiation_events
  applies_tests:
  - fast-growth-earlier-replication
  status: gated
  blocked_by_requirements:
  - req-1-mechanism-trigger
  - req-2-fork-passage-release
  - req-5-seqa-v0-fixed-timer
- name: box-count-titration
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    chromosomal_box_count:
    - 50
    - 100
    - 200
    - 307
  condition: sweep
  duration_min: 240
  seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
  readouts:
  - time_between_initiations
  - initiation_mass
  applies_tests:
  - reduced-box-count-shortens-inter-initiation
  status: gated
  blocked_by_requirements:
  - req-3-box-count-override
  - req-1-mechanism-trigger
- name: box-distribution-shift
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    chromosomal_box_distribution:
    - uniform
    - oriC_clustered
  condition: sweep
  duration_min: 240
  seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
  readouts:
  - initiation_mass
  - time_between_initiations
  applies_tests:
  - redistributed-boxes-shifts-timing
  status: gated
  blocked_by_requirements:
  - req-4-box-distribution-override
model_change:
  base_model: v2ecoli.composites.baseline.baseline
  new_processes:
  - name: DnaaInitiationMechanism
    kind: Process
    requirement_id: req-1-mechanism-trigger
  - name: SeqA_v0_FixedTimerRefractory
    kind: Step
    requirement_id: req-5-seqa-v0-fixed-timer
    rationale: 'dnaa-06 SeqA full model is deferred (out of scope for this
      investigation). Without ANY post-initiation reset, the mechanism trigger
      will fire repeatedly once oriC fills — so a placeholder fixed-timer
      refractory at oriC is required for "one initiation per generation"
      to be measurable in the four-study scope. Maps to the biology
      feedback''s "SeqA_v0 fixed timer" abstraction level.
      '
  new_parameters:
  - name: initiation_mode
    default: heuristic
    type: heuristic | dnaa_mechanism
  - name: chromosomal_box_count
    default: null
  - name: chromosomal_box_distribution
    default: uniform
  - name: media
    default: M9_glucose
  - name: seqa_v0_refractory_min
    default: 10.0
    units: min
    rationale: 'Fixed-timer post-initiation refractory at oriC. Molecular_info
      doc cites "~10 min, roughly one-third of a doubling time under rapid
      growth" for SeqA sequestration. 10 min is the slow-growth conservative
      default; tune with growth rate later.
      '
  new_listeners:
  - name: replication.initiation_events + initiation_mass + c_period_min + interinitiation_min
  modified_processes:
  - 'chromosome_initiation: gate by initiation_mode.'
  - 'chromosome_replication: on fork passage, call DnaaBoxBinding to release bound DnaA (correct nucleotide form).'
key_assumptions:
- Slow non-overlapping growth (single C-period 40 min, single D-period).
- Initiation fires when ≥3 high-affinity + ≥4 low-affinity oriC boxes are DnaA-ATP-occupied.
- Fork passage removes ALL DnaA from any chromosomal box it crosses; the bound form returns to free pool.
- Replication speed is constant (no DnaA feedback).
- 'Post-initiation oriC reset comes from TWO mechanisms in this scope:
  (a) fork-passage release of DnaA from oriC boxes (req-2),
  (b) SeqA_v0 fixed-timer refractory at oriC (req-5).
  Together they prevent immediate re-firing. dnaa-06 will eventually
  replace (b) with the methylation-based SeqA model.
  '
- 'Per molecular_info (Katayama 2017, Leonard 2015): the DnaA complex at
  oriC is RAPIDLY DISASSEMBLED after initiation, not maintained as an
  active orisome. Fork passage + helicase loading + SSB binding destabilize
  the DnaA-oriC complex. SeqA_v0 captures the resulting refractory window
  abstractly; the underlying biology is not yet modeled.
  '
readouts:
- name: initiation_events
  store_path: agents.0.listeners.replication.initiation_events
  units: events
  status: derived-needed
  blocked_by_requirements:
  - req-1-mechanism-trigger
- name: initiation_mass
  store_path: agents.0.listeners.replication.initiation_mass
  units: fg
  status: derived-needed
  blocked_by_requirements:
  - req-1-mechanism-trigger
- name: c_period_min
  store_path: agents.0.listeners.replication.c_period_min
  units: min
  status: derived-needed
- name: time_between_initiations
  store_path: agents.0.listeners.replication.interinitiation_min
  units: min
  status: derived-needed
behavior_tests:
- name: one-initiation-per-generation
  classification: primary
  description: Exactly one initiation per generation (in [0.9, 1.1] events/gen).
  measure:
    kind: event_count_per_window
    event: replication_initiation
    window_kind: generation
  pass_if:
    op: in_range
    low: 0.9
    high: 1.1
  units: events/generation
  requires_simulation: heuristic-vs-mechanism-multigeneration
  cites:
  - Hansen1991ResMicrobiol
  - Berger2022NatCommun
  - Katayama2017Frontiers
- name: initiation-mass-mean-matches-heuristic
  classification: primary
  description: Mechanism initiation-mass mean within ±5% of heuristic baseline.
  measure:
    kind: cross_run_ratio
    series:
      kind: listener_path
      path: listeners.replication.initiation_mass
    reduce: mean
  pass_if:
    op: in_range
    low: 0.95
    high: 1.05
  units: ratio
  requires_simulation: heuristic-vs-mechanism-multigeneration
  cites:
  - Berger2022NatCommun
  - Hansen1991ResMicrobiol
- name: replication-times-narrow
  classification: supporting
  description: C-period CV stays below 10%.
  measure:
    kind: cv_of_listener
    path: listeners.replication.c_period_min
  pass_if:
    op: at_most
    value: 0.1
  units: fraction
  requires_simulation: heuristic-vs-mechanism-multigeneration
  cites:
  - Katayama2017Frontiers
- name: inter-initiation-noisier-than-heuristic
  classification: supporting
  description: Inter-initiation CV ratio (mechanism / heuristic) ≥ 1.3 — mechanism is noisier.
  measure:
    kind: cross_run_cv_ratio
    path: listeners.replication.interinitiation_min
  pass_if:
    op: at_least
    value: 1.3
  units: ratio
  requires_simulation: heuristic-vs-mechanism-multigeneration
  cites:
  - Berger2023PRXLife
  - Olivi2025NatCommun
- name: fast-growth-earlier-replication
  classification: diagnostic
  description: Fast-growth media → mean initiation mass ≤ 0.95× slow-growth.
  measure:
    kind: cross_run_ratio
    series:
      kind: listener_path
      path: listeners.replication.initiation_mass
    reduce: mean
  pass_if:
    op: at_most
    value: 0.95
  units: ratio
  requires_simulation: growth-rate-sweep
  cites:
  - Mori2021MolSysBiol
  - Hansen1991ResMicrobiol
- name: reduced-box-count-shortens-inter-initiation
  classification: diagnostic
  description: Halving chromosomal box count to 100 → inter-initiation time ≤ 0.5× full-count (1/N titration scaling).
  measure:
    kind: cross_run_ratio
    series:
      kind: listener_path
      path: listeners.replication.interinitiation_min
    reduce: mean
  pass_if:
    op: at_most
    value: 0.5
  units: ratio
  requires_simulation: box-count-titration
  cites:
  - Hansen1991ResMicrobiol
  - Berger2022NatCommun
  - Olivi2025NatCommun
- name: redistributed-boxes-shifts-timing
  classification: diagnostic
  description: oriC-clustered box distribution shifts mean initiation mass by ≥10% vs uniform.
  measure:
    kind: cross_run_ratio
    series:
      kind: listener_path
      path: listeners.replication.initiation_mass
    reduce: mean
  pass_if:
    op: outside_range
    low: 0.9
    high: 1.1
  units: ratio
  requires_simulation: box-distribution-shift
  cites:
  - Olivi2025NatCommun
conclusion_logic:
  if_primary_tests_pass:
    implementation_status: DnaA-driven initiation mechanism matches the mass-threshold heuristic within tolerance.
    biological_validation: Reproduces once-per-generation timing + titration scaling per Hansen 1991 / Berger 2022.
    pipeline_unblocks:
    - dnaa-05-rida-ddah-dars
    - dnaa-06-seqa-sequestration
  if_primary_tests_fail:
    diagnose:
    - 'Mass-mismatch: oriC fill threshold or DnaA-ATP filament size is wrong.'
    - 'Multiple-per-gen or zero-per-gen: DnaA-box release on fork passage is broken.'
    - 'Wide C-period: replisome elongation rate is sensitive to DnaA-box density (shouldn''t be).'
    block_downstream: dnaa-05 + dnaa-06 require a working mechanism baseline.
limitations:
- Slow non-overlapping growth only; overlapping cycles (rich media, multi-fork) not validated.
- Constant C-period assumed; replisome speed feedback not modeled.
- Fork-passage release returns to free pool without distinguishing apo vs ATP vs ADP downstream effects.
- No SeqA sequestration (dnaa-06) — assumes oriC reset after initiation.
implementation_requirements:
- id: req-1-mechanism-trigger
  kind: process
  title: DnaaInitiationMechanism Process
  effort: L
  description: 'Replace mass-threshold heuristic with: trigger when ≥3 high-affinity

    + ≥4 low-affinity oriC boxes are DnaA-ATP-occupied. Gate behind

    composite param initiation_mode.

    '
  steps:
  - 'Composite param initiation_mode: ''heuristic'' | ''dnaa_mechanism'' = ''heuristic''.'
  - Create v2ecoli/processes/dnaa_initiation.py.
  - 'Hook into chromosome_initiation: dispatch on initiation_mode.'
  - 'Multi-seed test: mass distribution overlaps heuristic baseline within 5%.'
  unblocks:
  - all dnaa-04 behavior_tests
  - dnaa-05
  - dnaa-06
- id: req-2-fork-passage-release
  kind: step
  title: Fork-passage DnaA release + rebinding
  effort: M
  description: 'Each timestep, where replisomes advance, set DnaA_bound = False on

    crossed boxes and return the bound nucleotide-form to the free pool.

    After fork passage, newly synthesized boxes appear with empty

    occupancy.

    '
  steps:
  - Hook into chromosome_replication's fork-advance step.
  - On fork-cross-box, increment free-DnaA-<form> bulk count by 1.
  - 'Validate: multi-generation runs show stable DnaA pool + correct daughter inheritance.'
  unblocks:
  - primary + supporting tests in dnaa-04
- id: req-3-box-count-override
  kind: parameter_hook
  title: chromosomal_box_count override
  effort: S
  description: Composite-level int that subsamples the box catalog before binding.
  unblocks:
  - box-count-titration simulation
  - reduced-box-count-shortens-inter-initiation test
- id: req-4-box-distribution-override
  kind: parameter_hook
  title: chromosomal_box_distribution override
  effort: S
  description: '''uniform'' or ''oriC_clustered'' — controls how the box catalog is sampled.'
  unblocks:
  - box-distribution-shift simulation
- id: req-5-seqa-v0-fixed-timer
  kind: step
  title: SeqA_v0 fixed-timer refractory at oriC
  effort: S
  status: required-for-investigation-scope
  description: 'Placeholder for dnaa-06''s SeqA full model. On initiation,
    block any further initiation at oriC for `seqa_v0_refractory_min`
    minutes by gating the DnaaInitiationMechanism trigger.
    Implementation note: a Step that maintains a per-oriC "next_eligible_time"
    store. When the trigger Process queries oriC, it returns "blocked"
    until t >= next_eligible_time. Conceptually equivalent to a refractory
    period in neurobiology.
    '
  steps:
  - Create v2ecoli/steps/seqa_v0_refractory.py.
  - 'Composite param seqa_v0_refractory_min: float = 10.0 (slow-growth default).'
  - Wire so DnaaInitiationMechanism (req-1) consults the refractory store.
  - 'Behavior test: with seqa_v0_refractory_min=10 and a constantly-saturated
     oriC, observe exactly one initiation per 10-min window (not continuous).'
  - 'Diagnostic test: setting seqa_v0_refractory_min=0 should produce
     re-initiation immediately — confirms the gate is load-bearing.'
  unblocks:
  - tests.one-initiation-per-generation (without this, expected to fail)
  - tests.replication-times-narrow (without this, replication forks could
    pile up)
  scope_note: 'v0 (fixed timer) is the abstraction level implemented in this
    investigation. v1 (methylation-state) + v2 (cooperative SeqA-Dam)
    belong to the follow-on dnaa-06 study.
    '
