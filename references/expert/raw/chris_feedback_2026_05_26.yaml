  "study-mbp-01-time-varying-environment-tests":
    - ts: "2026-05-26T14:46:16.761Z"
      text: "The behavior tests bundle two structurally different kinds of check: plumbing verification (does the store→constraint propagation actually work) and biological-response verification (does v2ecoli's metabolism respond with the correct shape to environment changes). mbp-01's stated purpose is the former. The latter is a stronger claim that depends on what kinetic / FBA-bound model metabolism_redux implements internally — a question mbp-01 doesn't enhance.\n\n Three implementation cases for v2ecoli's GUR vs. [glucose]:\n  - Saturable MM-style transport with Km: real response is hockey-stick — flat at Vmax for the vast majority of the trajectory (PTS Km ~3–10 µM is ~3 orders of magnitude below the 5→0 g/L sweep range), sharp drop only near depletion.\n  - Constant bound when S > 0, zero at S = 0: flat-then-cliff.\n  - Linear scaling with concentration: smooth linear decline — unphysical.\n\n  The current uptake-flux-tracks-external-glucose test (Pearson ≥ 0.7) fails in the first two cases and passes only in the third (the unphysical one). The test signal doesn't reliably indicate either plumbing health or biological fidelity.\n\nSuggested scoping:\n  mbp-01 narrows to plumbing checks + qualitative extreme-case checks. Both are robust to the v2ecoli transport-kinetics functional form. Gradient-shape and quantitative biological-fidelity tests defer to a downstream study that's explicit about its transport-kinetics dependency — if metabolism_redux currently lacks\n  saturable transport, that becomes a candidate-future-study under mbp-06's gap analysis.\n\n The argument for qualitative-only at this phase: at the extremes (S = 0; S >> Km), all plausible implementations agree on what should happen. That's where qualitative-direction tests work — robust to functional-form uncertainty, cheap to author, biology-grounded. In the gradient regime between extremes, the functional form actually matters, and any quantitative test assumes one model over another. Save the quantitative tests for the study that takes the transport-kinetics question head-on.\n\n Recommended test set for mbp-01:\n\n  Plumbing (mechanism, no biology invoked):\n  - external_glucose_updates_propagate_within_one_step — external_glucose store update reflected in metabolism's\n  GLC[p] exchange constraint within one timestep. Direct wire check.\n  - cumulative-mass-balance-closes — already present, already in the right shape. Keep as-is.\n  - static-env-baseline-unchanged — already present, already in the right shape. Keep as-is.\n\n  Qualitative extreme-case (biology floor + ceiling, robust to functional form):\n\n  - zero-substrate-blocks-uptake — external_glucose held at 0 → glucose exchange flux ≈ 0 (numerical tolerance).\n  Same for DO: zero external DO → O2 exchange flux ≈ 0. Universal floor; also doubles as a plumbing confirmation.\n  - saturating-substrate-respects-vmax — external_glucose held at 50 g/L (~30,000× PTS Km) → glucose exchange flux\n   ≤ a published Vmax for E. coli glucose-PTS (~10–12 mmol/gDW/h; citation needed in claims.yaml). Catches the\n  unphysical linear-scaling case.\n  - plateau-across-saturating-range — two runs at 5 g/L and 50 g/L → GUR within a tight ratio tolerance (e.g.,\n  0.9–1.1). Both above Km, so saturable and constant-bound models predict matching GUR; linear scaling predicts\n  ~10× difference. Direct discriminator between physical and unphysical implementations.\n\n  Deferred to a transport-kinetics-fidelity study (not mbp-01):\n\n  - Gradient-shape test (whatever the right shape turns out to be — hockey-stick, step, or linear).\n  - Quantitative μ response to glucose decline near Km.\n  - Quantitative acetate flux shift at low DO (see issue below).\n\n  Specific issues with the current tests:\n\n  - uptake-flux-tracks-external-glucose (Pearson ≥ 0.7): assumes linear response between concentration and uptake;\n   biology is saturable. Replace with the three qualitative extreme/plateau tests above.\n  - low-do-clamp-reduces-o2-uptake (DO clamp at 0.005 mM = 5 µM): 5 µM is still 25–200× above terminal-oxidase Km\n  (cytochrome bd ~24 nM, bo3 ~200 nM). Biologically OUR shouldn't reduce at this clamp; the cited Vemuri 2006 supports the acetate flux rise under low DO, not OUR drop. The test and the claim it backs are mismatched. Two options: (a) pivot the measure to acetate flux — matches the citation, but moves toward biological-fidelity territory and is better placed in the deferred study; (b) lower the clamp to sub-µM to actually limit oxidase activity, and reframe as a zero-DO-blocks-O2-uptake qualitative extreme test.\n\n  Methodology-layer note\n\n  This plumbing-vs-biology conflation will recur on Henry's-law equilibrium tests, kLa response tests, and any\n  test of the form \"biological observable X responds to driver Y.\" Worth a study-scope-discipline rule: mechanism tests and biological-fidelity tests live in separate studies because they have different failure semantics and different remediation paths (fix the wire vs. enhance the model).\n\n  Within biological-fidelity testing: qualitative-direction tests are appropriate when the response shape is robust across plausible model variants (extremes); quantitative-range tests are appropriate only when the  functional form is known and citable. The current acceptance_form enum (qualitative_direction | quantitative_range) is exactly the right vocabulary — but the rule for picking between them should be regime-aware, not default-to-quantitative. A related framework extension: claims could carry a functional_form field (saturable / step / linear / threshold) that tests reference, so the right measure and pass_if shape can\n  be picked (or auto-checked at lint time)."
  "study-mbp-02-population-aggregation-summary":
    - ts: "2026-05-26T17:30:13.085Z"
      text: "The PopulationAggregator's mechanism describes a literal sum: population.total_biomass_gDW = sum(agents.*.cell_mass) × 1e-15, no scaling\n  factor, no cells_per_agent multiplier. This reads as a natural implementation choice but is actually a substantive architectural\n  commitment that propagates through every downstream coupled study. Worth raising as an explicit design decision rather than leaving\n  implicit.\n  \n  The implicit commitment in the current design: the aggregator treats the simulated cells as literally the entire reactor population. The\n  biomass concentration written to the reactor is simulated_mass / reactor_volume. At single-cell starting inoculation in a 1 L reactor,\n  this gives ~2.8e-13 g/L initial biomass — many orders of magnitude below any density where coupled reactor dynamics become measurable.\n  After 4 generations (16 cells), still ~5e-12 g/L.\n\n  The PR acknowledges high-density intractability (50–80 gDW/L Beulig regime → deferred to surrogate at mbp-06). But the same\n  intractability applies at modest densities (0.1–10 gDW/L, precisely the regime where batch dynamics get interesting), and that's not\n  addressed. As a consequence:\n\n  - mbp-03's cells-drop-do-below-saturation test asks whether DO drops when cells consume O2 — but with 1–16 simulated cells in 1 L, O2\n  consumption is at the limit of numerical resolution.\n  - mbp-04's regime-transition test asks whether the population's glucose consumption depletes the pool — but the population can't deplete\n  a 4 g/L pool in 240 min (or 240 days) at single-cell inoculation.\n  - mbp-05's batch-prefix comparison against Beulig assumes the simulated dynamics resemble Beulig's batch phase — but Beulig's batch phase\n   starts at densities the simulation cannot reach without external help.\n  \n  An alternative worth considering: representative-sampling × scale factor. Under the 0D well-mixed assumption (already a key_assumption),\n  every cell sees the same environment. The simulated lineage can legitimately stand in for a sampled subset of an N-cell population:\n\n  population.total_biomass_gDW = sum(agents.*.cell_mass) × cells_per_agent × 1e-15\n\n  where cells_per_agent is set such that n_simulated_agents × cells_per_agent ≈ target_population_density × reactor_volume. This isn't a\n  hack — under the well-mixed assumption, simulating N representative cells and scaling is mathematically equivalent to simulating M = N ×\n  scale cells. You've downsampled for compute tractability. The cost is that stochastic variance washes out at the bulk mean as N grows\n  (the simulation doesn't see the variance reduction), but at high density this is correct biology — population averages dominate over\n  per-cell variance.\n\n  This design would let v2ecoli's actual lineage engine drive reactor-scale dynamics directly, with the scaling factor as the explicit\n  tunable knob. The substitutability contract could reference the scaling discipline as part of the cell-side interface — engines either\n  operate at literal scale or declare an explicit cells_per_agent factor.\n\n  Suggested path forward:\n\n  1. Make the aggregator design choice explicit in purpose.mechanism or key_assumptions. Currently the \"literal sum\" reading is implicit; a\n   reader may reasonably assume some scaling is happening because at face value, no useful aggregator would not scale.\n  2. Weigh the representative-sampling alternative deliberately. If adopted, add cells_per_agent to model_change.new_parameters and update\n  the aggregator's outputs accordingly. The substitutability contract gets a parallel addition: cell-side engines declare how they\n  aggregate.\n  3. If literal-sum is the deliberate choice, the consequence needs to be acknowledged across mbp-03/04/05 — the coupled-dynamics tests in\n  those studies are not measurably resolvable at single-cell inoculation, and either need reframing (artificial clamping to inject signal)\n  or scoping to \"validates plumbing rather than coupled dynamics, with full-coupled validation deferred to the surrogate phase.\"\n\n  The current PR has option 3 implicit in the limitations sections of each study but doesn't acknowledge that \"literal sum\" is the\n  load-bearing choice driving those limitations across the entire investigation arc. Worth making explicit."
  "study-mbp-02-population-aggregation-tests":
    - ts: "2026-05-26T16:44:42.279Z"
      text: "mbp-02 has the same structural pattern as mbp-01 — plumbing checks (aggregator-correctness: does it faithfully\n  sum cell_mass and count agents) bundled with biology-calibration checks (doubling time ~60 min; μ ~0.5–0.7 1/h).\n   Per the plumbing/biology framing raised in the mbp-01 feedback, the cleanest separation would split these.\n\n  That said, this case may warrant an exception. v2ecoli's basal μ on M9 glucose is a strong prior — calibrated\n  against decades of E. coli literature, baked into the baseline composite. The acceptable band on doubling time\n  is narrow and well-supported, so entangling \"aggregator counts cells correctly\" with \"doubling time ≈ 60 min\"\n  carries less risk of ambiguous failures than the mbp-01 case (where saturation kinetics were the open variable).\n   If cell-count-doubles-per-generation fails, the most plausible cause is an aggregator bug, not a doubling-time\n  drift. The biology prior is strong enough to act as a fixed reference rather than the open variable.\n\n  Reasonable to keep cell-count-doubles-per-generation and total-biomass-grows-exponentially in their current\n  form, with an explicit note that they implicitly assume calibrated v2ecoli baseline μ as a fixed prior — and\n  that a future failure of either test would warrant first checking whether the baseline composite has drifted,\n  not just the aggregator.\n\n  A still-cleaner addition (not a replacement) would be a pure consistency check alongside the existing tests:\n  population.cell_count == len(agents.*) and population.total_biomass_gDW == \n  sum(agents.*.listeners.mass.cell_mass) × 1e-15 at every emit step. Pure aggregator-only checks, decoupled from\n  doubling time. Cheap to add, and they isolate aggregator bugs from biology drift if the calibration-dependent\n  tests ever start failing.\n\n  On OD600 specifically: the static od_to_gdw = 0.33 conversion is fine if OD600 is positioned as a cosmetic /\n  cross-referencing observable, not the primary biomass quantity. Suggested clarification: make\n  population.biomass_concentration_gL (or total_biomass_gDW) the canonical biomass observable, with\n  population.OD600 derived from it strictly for plotting and for comparisons against published OD-only data (e.g.,\n   Beulig 2025 OD traces where dry-weight may not be reported). Under that scoping, the static conversion is\n  acceptable — the regime-dependence concerns already flagged in limitations and the od-conversion-at-high-density\n   open question apply to interpretation of OD600 outputs, not to the model's internal biomass accounting. Worth\n  saying so explicitly in the readouts section or in model_change.notes so downstream studies don't reach for OD\n  as the primary biomass currency.\n\n  Minor: cell-count-doubles-per-generation cites od-to-gdw-conversion \"via OD600 derivation\" — but the test\n  measures cell_count directly, not OD600. Claim FK linkage looks miscategorized; harmless but worth catching."
  "study-mbp-03-bird-reactor-coupling-summary":
    - ts: "2026-05-26T16:59:56.598Z"
      text: "Option B (fork to BiRDTransportProcess) sounds cleaner on design grounds. A few top-level reasons without going\n  deep:\n\n  - Substitutability symmetry with the cell-side interface contract. The contract makes cell-side engines variable\n   while the reactor side stays fixed. Forking gives two reactor variants — one with internal biomass (use without\n   a coupled cell-side) and one without (use under the contract). The substitutability story becomes symmetric\n  across both sides of the coupling — a methodology-layer payoff in addition to code cleanliness.\n  - The flag name itself. bird_disable_internal_biomass is the kind of config parameter that usually signals\n  \"shouldn't be there in the first place\" rather than \"let users turn it off.\" Naming a config option \"disable X\"\n  is typically evidence that the cleaner shape is \"don't have X.\"\n  - Tested-vs-dead-code paths. With disable=true, the biomass-ODE code path still exists in the codebase but isn't\n   exercised under this configuration — so it's untested in this regime, with no signal if it later quietly\n  breaks. A fork eliminates the unused path entirely.\n\n  This feels like a natural opportunity to coordinate with the parallel pbg-bioreactor investigation arc — perhaps\n   a focused first study on that side, just on this one refactor, could unblock mbp-03 (and any future\n  cell-coupled investigation) by giving it the right primitive to consume. The \"candidate-future-study\" deferral\n  converts to a tracked cross-investigation dependency rather than a perpetual workaround.\n\n  Small caveat: B done well isn't \"copy BiRDReactorProcess and delete the ODE.\" It's an\n  extract-shared-transport-module path — kLa / Henry / Wilke-Chang in a shared module, with BiRDReactorProcess and\n   BiRDTransportProcess as two consumers — which preserves DRY while delivering the design benefit."
  "study-mbp-03-bird-reactor-coupling-tests":
    - ts: "2026-05-26T17:08:22.136Z"
      text: "The substantive testing issue here may collapse to a single question: is BiRD's 1-hour interval a structural constraint or just a default?\nIf the interval is tunable, dropping it to a few minutes (matching the kLa-driven timescale) would resolve several issues simultaneously:\n  \n  - The 60-min sim duration would now contain many BiRD update points; \"steady-state DO\" tests over window: second_half become meaningful.\n  Currently, the second half of a 60-min sim is pre-steady-state by construction — BiRD has at most 1–2 discrete update points across the\n  entire run, so cells-drop-do-below-saturation and higher-kla-raises-steady-state-do can't actually resolve the behaviors they claim to\n  check.\n  - The 1-hour coupler lag named in key_assumptions shrinks proportionally.\n  - The 5% tolerance on reactor-biomass-tracks-population (pass_if: in_range, low: 0.95, high: 1.05) can tighten to floating-point\n  precision. The description says \"within numerical tolerance\" but the band as set admits 5% drift, which suggests either over-tolerance or\n   an expected drift source not named in failure_modes.\n\n  If the interval IS structurally fixed at 1h, the test set needs to accommodate it explicitly: sim durations extended to 4–6h to span\n  multiple update points, \"steady-state\" framing replaced with \"post-final-tick,\" and tolerances chosen with the lag-induced drift named\n  explicitly as the failure-mode source.\n\nTwo test-coverage gaps that stand regardless of the timestep answer:\n  \n  CO2 dynamics are invisible at the test layer. O2 is thoroughly tested (DO, kLa response, Henry saturation, presence-vs-absence-of-cells),\n   but symmetric tests for CO2 don't exist. The coupler writes reactor.dissolved_co2 → \n  environment.external_concentrations.CARBON-DIOXIDE[p] per the mechanism description, and v2ecoli's metabolism emits CO2 exchange flux.\n  Symmetric tests worth adding:\n\n  - cells-raise-dissolved-co2-above-saturation (production drives dissolved CO2 above gas-equilibrium)\n  - higher-kla-lowers-steady-state-dissolved-co2 (better stripping reduces dissolved CO2)\n  - no-cells-co2-converges-to-henry-saturation (mirror of the present O2 test)\n  \n  If the CO2 leg of the coupling has a wiring bug, mbp-03 passes anyway and the defect surfaces downstream in mbp-04 or mbp-05.\n  \n  O2 mass balance not tested end-to-end. mbp-01 had cumulative-mass-balance-closes for glucose (integral of uptake = integral of external\n  decrement). The mbp-03 analog: cumulative O2 consumed by v2ecoli + dissolved-O2 change in the reactor ≈ kLa-driven gas-liquid transfer\n  integrated over the run. That's the four-way-coupling closure check — currently no test does this; the existing tests check directional\n  behaviors (DO drops, kLa raises DO) but not conservation.\n\n  ---\n  Minor sequencing note: bubble-column is the default geometry, and the limitations section notes \"stirred tank / airlift not validated\n  this phase.\" Worth being explicit somewhere that if mbp-05's Beulig comparison requires stirred-tank (Beulig 2025 used stirred-tank), a\n  geometry switch is queued between mbp-03 and mbp-05 with its own validation work. Either flip the default to stirred-tank now, or name it\n   as a sub-task in mbp-04/05's scope."
    - ts: "2026-05-26T17:15:48.747Z"
      text: "pipeline_gate.proceed_condition reads: \"Coupling direction tests pass... no-cells run reaches Henry equilibrium; one v2ecoli generation \n  completes without state divergence; mass-balance tests close.\" But there's no mass-balance test in the current set. Minor consistency\n  issue — the gate references a test that doesn't exist. Aligns with the recommendation to add an O2 mass-balance test. Could add as a\n  sentence: \"Note: pipeline_gate.proceed_condition already references 'mass-balance tests close,' suggesting the intent was there but the\n  test slipped through. Adding the O2 mass-balance check aligns the test set with the proceed-condition that's already named.\""
  "study-mbp-04-multigeneration-runs-tests":
    - ts: "2026-05-26T17:35:11.602Z"
      text: "The headline architectural concern (population-sparsity propagating through coupled studies) is captured in the mbp-02 comment on the\n  PopulationAggregator's design. Its mbp-04-specific consequence: the population-grows-then-flattens-at-substrate-limit test depends on\n  natural glucose depletion driving regime transition, but at single-cell inoculation in a 1 L reactor, ~16 cells after 4 generations\n  consume on the order of 10⁻¹¹ g of glucose in 240 min from a 4 g pool. The test's premise isn't resolvable in this configuration.\n  Resolution depends on the mbp-02 architectural choice — representative-sampling scaling factor → test works as written; literal-sum +\n  reframe → test becomes \"v2ecoli's μ responds appropriately when external glucose is artificially clamped low, separately from natural\n  depletion dynamics.\"\n\n  Independent of how the population-scaling question resolves, two test-design issues with the mass-balance audit itself:\n\n  MassBalanceAuditor needs CO2-carbon tracking as an explicit auditor requirement, not just a failure-mode candidate cause. The C-balance\n  tolerance is 2%; CO2-carbon is roughly half of glucose-carbon consumed in aerobic growth — missing it isn't a small error mode, it's a\n  guaranteed test failure. The failure_modes section names \"CO2 evolved by metabolism not bookkept (CO2-C lost)\" as a candidate cause, but\n  the auditor's design in implementation_requirements.req-1-mass-balance-auditor doesn't list CO2-C tracking as a required behavior.\n  Suggest making it explicit: auditor reads metabolism's CO2 exchange flux × biomass integrated, plus reactor's dissolved CO2 and gas-phase\n   CO2 (via BiRD), into the C-balance ledger.\n\n  Acetate-carbon (and other byproducts) the same. Vemuri 2006 (cited in mbp-01) is about aerobic acetate overflow at high growth rates.\n  v2ecoli's metabolism produces acetate; the C-balance needs to track it. Same fix: explicit auditor requirement rather than candidate\n  failure mode.\n\n  Nitrogen-balance pool definition needs spec. What's in the N-balance? Just NH4+, or all N-containing species (amino acids, peptides,\n  etc.)? The 2% N-balance tolerance is tractable if scope is limited; less so if every N-containing species needs explicit accounting. The\n  auditor's design should declare the N-pool definition.\n\n  Timestep mismatch inherited from mbp-03. Largely covered by the mbp-03 comment; with mbp-04's 240-min duration vs. 1h BiRD interval, the\n  sim spans ~4 BiRD ticks — better than mbp-03's 1-tick situation but still coarse for testing temporal dynamics. If the mbp-03\n  recommendation (reduce BiRD interval) is adopted, mbp-04 inherits the fix for free.\n\n  Minor: single-seed. Multi-seed worth running for the population dynamics (Division stochastics). Limitations section acknowledges this;\n  non-blocking."
  "study-mbp-05-palsson-benchmark-summary":
    - ts: "2026-05-26T17:58:03.300Z"
      text: "he current behavior tests pair an evaluation goal (compare against published data) with tolerance-based pass criteria (±15% on OD, ±15%\n  on time-to-target, ±30% on acetate shape). That framing has a structural problem: when a tolerance test fails, the AI agent (or human)\n  has an open-ended menu of things to adjust to make it pass — failure_modes literally enumerates the menu (calibration gap, OD conversion\n  factor, initial conditions, regime mismatch). Even with the \"no silent tuning\" discipline, the impulse to reach into v2ecoli mechanics is\n   structurally encoded in the test design. And given everything stacked against mbp-05 (population scaling unresolved per the mbp-02\n  comment; fed-batch deferred; v2ecoli calibrated at slow-growth single-cell M9 versus Beulig's high-density fed-batch regime), claiming\n  benchmark-level agreement was always going to be over-reaching.\n\n  Cleaner shape: mbp-05 as an evaluation phase, not a construction phase.\n\n  - No new model capability — model_change has no new processes or state variables.\n  - Deliverable is a structured comparison report: sim-vs-published overlays + categorized divergences + open questions, feeding mbp-06's\n  gap analysis as input.\n  - Pass criteria are about whether the comparison was executed and reported coherently — not whether biology matched within tolerance.\n  - All biological divergences go to mbp-06 unchanged for triage. The divergences-categorized-in-report-card test (already in the set)\n  becomes the load-bearing one; the other tests become its evidence-producing dependencies.\n\n  This separates construction (mbp-01..04 added capability) from evaluation (mbp-05 applies capability + reports findings), bounds the\n  AI-agent scope to \"execute and report\" rather than \"tune until match,\" and resolves the mbp-02 population-sparsity issue elegantly —\n  sparsity becomes one of the divergences mbp-06 categorizes, not a blocker for mbp-05 itself.\n\n  What changes in the test set:\n\n  - end-of-run-od-matches-published → end-of-run-od-comparison-rendered (process: was the overlay produced?)\n  - time-to-target-od-matches-published → time-to-target-od-comparison-rendered\n  - acetate-profile-matches-published-shape → acetate-profile-comparison-rendered\n  - divergences-categorized-in-report-card → stays as-is; already in the right shape; now load-bearing.\n\n  The current four-category divergence taxonomy in the YAML (v2ecoli metabolic deficiency / coupling-adapter limitation / experimental\n  uncertainty / placeholder-induced) is already aligned with feeding mbp-06.\n\n  Under the new framing, expand the measurables to align with Beulig's published trajectories.\n\n  The supplementary directory at references/papers/palsson-2025-supp/ has trajectories for OD, OTR, CTR, glucose, glucose uptake, glucose\n  consumption, acetate, ethanol, formate, lactate, pyruvate, succinate, melatonin, tryptophan, base addition, feed rate, stirrer speed.\n  Most of these are exchange fluxes already emitted by v2ecoli's metabolism Process — wire them all up for completeness.\n\n  Practical mapping (WT scope):\n\n  ┌─────────────────────┬──────────────────────────────────────────────────────────────────────────┬───────────────────────────┐\n  │  Beulig trajectory  │                              v2ecoli source                              │           Wiring           │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ OD600               │ population.OD600                                                         │ already wired              │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ glucose             │ environment.external_concentrations.GLC[p]                               │ already wired              │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ acetate             │ environment.external_concentrations.ACET[p]                              │ already wired              │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ dissolved O2        │ reactor.dissolved_o2                                                     │ already wired              │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ glucose uptake rate │ metabolism.external_exchange_fluxes.GLC[p] × biomass                     │ derived                    │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ lactate             │ environment.external_concentrations.LAC[p] (verify v2ecoli's identifier) │ new readout                │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ formate             │ environment.external_concentrations.FOR[p]                               │ new readout                │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ ethanol             │ environment.external_concentrations.ETOH[p]                              │ new readout                │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ pyruvate            │ environment.external_concentrations.PYR[p]                               │ new readout                │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ succinate           │ environment.external_concentrations.SUCC[p]                              │ new readout                │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ OTR                 │ derived: BiRD's kLa × (saturation - dissolved O2)                        │ derived from BiRD outputs  │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ CTR                 │ derived: BiRD's kLa × (dissolved CO2 - saturation)                       │ derived from BiRD outputs  │\n  ├─────────────────────┼──────────────────────────────────────────────────────────────────────────┼────────────────────────────┤\n  │ base addition       │ derived: cumulative integration of net acid production                   │ small bookkeeping addition │\n  └─────────────────────┴──────────────────────────────────────────────────────────────────────────┴────────────────────────────┘\n  \n  ~5 new exchange-flux readouts + ~3 derived quantities = ~8 new comparison surfaces. Each tests a specific biological assumption that the\n  current 4-test set doesn't probe: GUR shape ↔ transport kinetics (the mbp-01 backlog concern), mixed-acid byproducts ↔ fermentation\n  pathway wiring + regulation, OTR/CTR ↔ respiratory model + RQ, base addition ↔ high-density acid load integration. Each comparison either\n   matches Beulig and provides positive evidence, or diverges and seeds a specific mbp-06 gap finding. Under the report-comparison framing,\n   more surfaces = more information for low engineering cost — the opposite cost/benefit calculus from the tolerance-test framing where\n  more tests = more knobs to turn.\n\n  Out of WT scope (legitimately ignore for mbp-05):\n  - Melatonin (MEL strain only; heterologous, not in WT model)\n  - Tryptophan (TRP/TRPp strains over-produce; WT has only native low-level)\n  - Feed rate, stirrer speed (reactor inputs, not v2ecoli observables)\n \n  A small framework-layer note worth surfacing:\n\n  The comparison harness (req-2-comparison-harness) should be generic over a configurable trajectory inventory, not hardcoded to specific\n  overlays. Suggested shape: a comparison_overlays list in the study YAML, one entry per sim ↔ published trajectory pair:\n\n  comparison_overlays:\n    - sim_path: population.OD600\n      published_csv: references/papers/palsson-2025-supp/reactor_OD_data.csv\n      published_column: OD600   \n      overlay_label: \"Biomass (OD600)\"\n      units: OD600\n    - sim_path: agents.0.metabolism.external_exchange_fluxes.GLC[p]\n      published_csv: references/papers/palsson-2025-supp/reactor_gluc_upt_data.csv\n      published_column: GUR\n      overlay_label: \"Glucose uptake rate\"\n      units: mmol/(gDW·h)\n      aggregation: per_biomass\n    # ... one entry per trajectory in the inventory\n  \n  Harness iterates over the list, produces one overlay panel + derived metrics per entry, feeds them into the report. Adding a new\n  comparison = adding one YAML entry. Future investigations (mbp-06 follow-ons, fed-batch studies, other benchmark targets) reuse the same\n  harness with their own list. Generalizes cleanly.\n\n  Implication for investigation-level acceptance criteria:\n\n  The investigation's current acceptance_criteria include end-of-run-od-matches-published and acetate-profile-matches-published-shape from\n  mbp-05 as load-bearing checks. Under this reframing, those criteria shift from \"biology matched within tolerance\" to \"comparison was\n  executed and reported.\" Worth being explicit about that shift at the investigation level — the success definition becomes \"Palsson\n  comparison harness built and applied; structured gap inventory produced,\" not \"Palsson benchmark achieved.\" The latter framing was always\n   going to over-promise relative to what mbp-05 can honestly deliver given the constraints."
  "study-mbp-06-gap-analysis-summary":
    - ts: "2026-05-26T18:10:33.431Z"
      text: "Overall like this one quite a bit, it's consistent with several comments above. That said, a few things to think about:\n\n  1. Carried-forward priors aren't part of the synthesis design.\n\n  mbp-06's synthesis is structured as walk mbp-01..05 artifacts → enumerate gaps — discovery-from-this-investigation by construction. The\n  pre-seeded candidate_future_studies block acknowledges some gaps are obvious before mbp-01..05 even run, but it's narrow (three items,\n  all things this investigation touches). Known-prior gaps that weren't necessarily exercised by mbp-01..05 are at risk of going\n  undocumented.\n\n  Concrete examples that should appear regardless of what mbp-05's report turns up:\n\n  - v2ecoli transport kinetics (the mbp-01 backlog concern) — wouldn't necessarily show up as an mbp-05 divergence if the simulation never\n  reaches a glucose regime where it bites; invisible to the investigation but still load-bearing for the next iteration.\n  - v2ecoli mass-balance at low-GUR (Eran-identified, deferred from prior work). Not exercised by mbp-01..05 (no test specifically probes\n  low-GUR mass balance). Could go undocumented if nothing in the chain surfaces it.\n  - pbg-bioreactor fed-batch support — touched by mbp-05's batch-prefix scoping, but the gap itself exists in the upstream package;\n  mbp-06's discovery framing might position it as a Beulig-scope deferral rather than the upstream-contribution-needed it actually is.\n  \n  Suggested addition: a mandatory_findings_to_consider (or carried_priors) block at the top of mbp-06, pre-seeding known-prior gaps the\n  synthesis MUST address. Each entry: gap signature, source (where it came from outside this investigation), why it's still load-bearing,\n  what would resolve it. The synthesis either incorporates each prior with new evidence from this investigation, or explicitly justifies\n  dropping it.\n\n  Plus a provenance field on each gap entry: surfaced_by: this_investigation | carried_prior | external_input | expert_elicitation.\n  Priority assessed independently of provenance — a carried prior can be priority 1 even if mbp-05 didn't surface it fresh.\n\n  This pattern matters beyond this investigation: every gap analysis carries forward known priors, doesn't only discover from what\n  happened.\n\n  ---\n  2. Divergence-resolution categorization needs more vocabulary.\n  \n  The current candidate_resolution field is a single string. In practice, mbp-05 divergences (and other gaps) will split into at least\n  three categories with different recipients, decision processes, and durable artifacts:\n\n  - Model improvement — \"v2ecoli's Pta-AckA kinetics don't trigger overflow at the right DO threshold.\" Development task; v2ecoli PR;\n  calibration_log entry; assigned to metabolism Process maintainer.\n  - Scope decision — \"Resistance/persistence bistable expression requires regulatory dynamics not in v2ecoli's current model; we choose not\n   to model this.\" No development task; documented as an explicit non-modeling decision; decided by program-level authority.\n  - Upstream contribution — \"pbg-bioreactor needs fed-batch operations.\" Resolution lives in another repo; decided by whoever owns that\n  investigation.\n\n  The current schema collapses these. Suggested addition for each gap entry:\n  \n  resolution_type: model_improvement | scope_decision | upstream_PR | expert_elicitation | further_investigation\n  resolution_venue: <where the resolution work or decision lives>\n  decision_authority: <who decides — for scope decisions especially>\n  \n  This subsumes the in-repo / upstream-contribution / cross-investigation distinction the 5-axis taxonomy currently doesn't carry:\n  resolution_venue makes explicit whether a gap's resolution lives inside v2ecoli, upstream in pbg-bioreactor, in a sibling investigation,\n  or as a program-level decision.\n\n  And possibly a separate scope_decisions register at the investigation or workspace level — distinct from findings. Each entry: what\n  wasn't modeled, why (decision rationale), what comparison data showed divergence at this point, who decided. Durable artifact for the\n  program's overall scope discipline — \"what did we explicitly choose not to model and why.\"\n\n  Methodology-layer note worth raising: the upstream methodology concept pages currently don't have vocabulary for intentional non-modeling\n   as a first-class artifact. Neither a placeholder (implies later resolution), nor an open question (implies unresolved), nor a deferred\n  candidate-future-study (implies future work). Worth a concept-page addition over in the upstream methodology — \"scope decisions\" or\n  \"intentional non-modeling\" as a recognized artifact type alongside placeholders, open questions, and calibration logs.\n\n  ---\n  3. Pre-seeded candidate_future_studies should include two more items:\n \n  - BiRD biomass-as-input refactor → upstream PR to pbg-bioreactor. This is the cross-investigation coordination raised in the mbp-03\n  comment. Concrete, prioritizable (probably priority 1), resolution venue is the parallel pbg-bioreactor investigation. Pre-seeding makes\n  the dependency explicit rather than implicit.\n  - Population scaling architectural decision (the mbp-02 question). Foundational — mbp-08 (surrogate engine) presumes some resolution to\n  this. Pre-seeding makes the dependency explicit and surfaces that mbp-08's design depends on mbp-02's resolution.\n  \n  ---\n  4. study_kind: evaluation is a framework-layer schema extension.\n  \n  Currently introduced inline in this one study. The pbg-superpowers schema doesn't have this field yet (presumably); the linter would need\n   to know about it for study_kind-aware validation, and downstream tooling (dashboard rendering, status aggregation) could use it to\n  differentiate construction phases from evaluation phases. Worth acknowledging as a schema-update candidate for a pbg-superpowers PR.\n  Small propagation work; elevates study_kind from a one-off convention to a first-class framework concept.\n\n  ---\n  5. mbp-06 timing depends on upstream design resolutions.\n\n  mbp-02's architectural question (population scaling) and mbp-05's reframe (report-comparison vs. tolerance-tests) both materially change\n  what mbp-01..05 impl PRs will produce. mbp-06's prerequisites correctly list mbp-01..05, but the gate timing depends on those\n  architectural questions being resolved first — otherwise mbp-06 synthesizes against a baseline that's not what was intended. Worth naming\n   explicitly in gate_status_summary or key_assumptions.\n\n  ---\n  Smaller tactical items:\n\n  - findings: schema should be specified before impl. Behavior tests reference findings.entries and findings.summary.axis_X_count but the\n  schema isn't given. Structural-check predicates need shape to validate against.\n  - 8-gap lower bound is arbitrary. Better as a per-axis floor (e.g., axes A and D expected ≥ 3 each based on prior known limitations)\n  rather than a global count.\n  - every-gap-has-candidate-resolution placeholder detection should specify the banned-string list explicitly (\"TBD\", \"figure out later\",\n  \"to be determined\", etc.) so the predicate is auditable."
