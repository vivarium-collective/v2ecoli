<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="-apple-system,sans-serif" font-size="13">
<rect width="800" height="380" fill="white"/>
<text x="400.0" y="22" text-anchor="middle" font-weight="600" font-size="15" fill="#0f172a">SeqA sequestration timeline — oriC methylation cycle</text>
<text x="400.0" y="40" text-anchor="middle" fill="#64748b" font-size="11">After initiation, oriC is hemimethylated for ~10 min. SeqA binds GATC sites in hemimethylated form, blocking re-initiation.</text>
<text x="60" y="122.33333333333334" text-anchor="end" fill="#475569" font-weight="600">oriC methylation</text>
<rect x="70.0" y="90" width="11.666666666666671" height="56.66666666666667" fill="#16a34a" opacity="0.7"/>
<rect x="81.66666666666667" y="90" width="221.66666666666663" height="56.66666666666667" fill="#dc2626" opacity="0.7"/>
<rect x="303.3333333333333" y="90" width="466.6666666666667" height="56.66666666666667" fill="#16a34a" opacity="0.7"/>
<text x="192.5" y="122.33333333333334" text-anchor="middle" fill="white" font-weight="600">hemimethylated (~10 min after replication)</text>
<text x="536.6666666666666" y="122.33333333333334" text-anchor="middle" fill="white" font-weight="600">fully methylated</text>
<text x="60" y="204.00000000000003" text-anchor="end" fill="#475569" font-weight="600">SeqA bound</text>
<rect x="70.0" y="171.66666666666669" width="11.666666666666671" height="56.66666666666667" fill="#cbd5e1" opacity="0.7"/>
<rect x="81.66666666666667" y="171.66666666666669" width="221.66666666666663" height="56.66666666666667" fill="#2563eb" opacity="0.7"/>
<rect x="303.3333333333333" y="171.66666666666669" width="466.6666666666667" height="56.66666666666667" fill="#cbd5e1" opacity="0.7"/>
<text x="192.5" y="204.00000000000003" text-anchor="middle" fill="white" font-weight="600">YES (blocks re-initiation)</text>
<text x="536.6666666666666" y="204.00000000000003" text-anchor="middle" fill="#475569" font-weight="600">no</text>
<text x="60" y="285.6666666666667" text-anchor="end" fill="#475569" font-weight="600">re-initiation possible?</text>
<rect x="70.0" y="253.33333333333334" width="11.666666666666671" height="56.66666666666667" fill="#16a34a" opacity="0.5"/>
<rect x="81.66666666666667" y="253.33333333333334" width="221.66666666666663" height="56.66666666666667" fill="#dc2626" opacity="0.7"/>
<rect x="303.3333333333333" y="253.33333333333334" width="466.6666666666667" height="56.66666666666667" fill="#16a34a" opacity="0.5"/>
<text x="192.5" y="285.6666666666667" text-anchor="middle" fill="white" font-weight="600">NO (blocked)</text>
<text x="536.6666666666666" y="285.6666666666667" text-anchor="middle" fill="#0f172a" font-weight="600">YES (after Dam re-methylates)</text>
<line x1="70.0" y1="70" x2="70.0" y2="328" stroke="#0f172a" stroke-width="2" stroke-dasharray="4,3"/>
<text x="70.0" y="65" text-anchor="middle" fill="#0f172a" font-weight="700" font-size="12">initiation fires (t=0)</text>
<text x="70.0" y="342" text-anchor="middle" fill="#64748b">0 min</text>
<text x="186.66666666666666" y="342" text-anchor="middle" fill="#64748b">5 min</text>
<text x="303.3333333333333" y="342" text-anchor="middle" fill="#64748b">10 min</text>
<text x="420.0" y="342" text-anchor="middle" fill="#64748b">15 min</text>
<text x="536.6666666666666" y="342" text-anchor="middle" fill="#64748b">20 min</text>
<text x="653.3333333333334" y="342" text-anchor="middle" fill="#64748b">25 min</text>
<text x="770.0" y="342" text-anchor="middle" fill="#64748b">30 min</text>
<text x="400.0" y="360" text-anchor="middle" fill="#475569" font-weight="600" font-size="12">Implementation: add `sequestered_until: float` to oriC; SeqA-Step sets it on initiation; DnaABinder gate respects it.</text>
</svg>