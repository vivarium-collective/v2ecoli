schema_version: 1
name: multiscale-bioprocess
title: v2ecoli — Bioprocess Migration & Reactor Coupling
created: '2026-05-22'
status: planning

question: |
  Can v2ecoli be migrated and enhanced to operate inside a bench-scale
  bioreactor — specifically: a time-varying external environment hook, a
  population / OD-scale biomass aggregator, and a coupling adapter to
  `pbg-bioreactordesign`'s BiRDReactorProcess — and produce a coupled
  v2ecoli ↔ reactor trajectory that reproduces the batch (and ultimately
  fed-batch) fermentation behavior of the 2025 Palsson lab high-density
  E. coli study within per-metric tolerances?

hypothesis: |
  Yes. v2ecoli's existing Layer-1 Steps (`media_update`, `exchange_data`)
  already expose the environment-coupling surface; the metabolism Process
  already emits `external_exchange_fluxes`. The required enhancements are
  small and additive: (1) a time-varying-env hook over the existing
  static-medium plumbing, (2) a population aggregator that derives
  reactor-scale biomass / OD from per-cell mass listeners, (3) a
  ReactorCellCoupler Step that bridges to `pbg-bioreactordesign`'s
  BiRDReactorProcess (whose internal Monod biomass ODE is disabled in
  favor of v2ecoli's population). Each study's acceptance tests pass
  before the next in the chain begins; the multi-generation coupled run
  validates that no piece drifts over time; the Palsson benchmark
  validates against published trajectories.

description: |
  Investigation in the v2ecoli workspace migrating and enhancing v2ecoli
  for bench-scale bioprocess context, then coupling it to
  `vivarium-collective/pbg-bioreactordesign` for the physical reactor side.

  **Scope.** The work is INTERNAL v2ecoli upgrades, not a reactor wrapper
  built from scratch. v2ecoli gains a small set of additive features
  (time-varying environment, population aggregation, reactor coupler);
  reactor physics comes from `pbg-bioreactordesign` consumed as a
  dependency. Out of scope here: dynamic-FBA as the cell side (the upstream
  multiscale-bioprocess roadmap's choice — see references/expert/
  multiscale_bioprocess_roadmap.md); multi-cell colony composite as the
  primary path (deferred); CFD / spatial-mixing; WCM-internal mass-balance
  audits.

  **Fed-batch is deferred.** `pbg-bioreactordesign` does not yet expose
  fed-batch operations (feed schedules, dynamic volume). Until that lands
  upstream — or a v2ecoli-side feed Step is added — the mbp-05 Palsson
  benchmark scopes to the BATCH portion of the Palsson dataset; the spec
  PR makes that scope call explicit.

  **Reactor + coupling code lives in `v2ecoli/`** (planned packages:
  `v2ecoli.composites.baseline_time_varying_env`,
  `v2ecoli.composites.baseline_population`,
  `v2ecoli.composites.reactor_bird_coupled`). Cell-side composite stays
  `v2ecoli.composites.baseline` (single cell + Division Step).
  `pbg-bioreactordesign` is added as a workspace dependency in mbp-03.

  Studies, in dependency order:

  1. mbp-01-time-varying-environment — v2ecoli enhancement: media /
     environment becomes externally driven (time-varying nutrient pool
     consumed by the existing Layer-1 Steps).
  2. mbp-02-population-aggregation   — v2ecoli enhancement: aggregate
     per-cell mass into reactor-scale biomass / OD600 / cell-count.
  3. mbp-03-bird-reactor-coupling    — adapter to `pbg-bioreactordesign`'s
     BiRDReactorProcess: BiRD owns transport physics; v2ecoli owns biomass
     (BiRD's internal Monod ODE disabled). THE keystone coupling.
  4. mbp-04-multigeneration-runs     — sustained coupled run (≥ 3
     v2ecoli generations); mass-balance audit; regime transition into
     substrate-limited growth.
  5. mbp-05-palsson-benchmark        — quantitative validation against
     Palsson 2025 (batch-phase scope until fed-batch enhancement lands).

# Studies in this investigation, in suggested execution order.
# The DAG is computed from each study's `pipeline_gate.prerequisites`
# field at render time; this list determines visibility / grouping only.
studies:
  - mbp-01-time-varying-environment
  - mbp-02-population-aggregation
  - mbp-03-bird-reactor-coupling
  - mbp-04-multigeneration-runs
  - mbp-05-palsson-benchmark

# Expert docs supporting the investigation. Each name must match a
# `workspace.yaml.expert_docs[].name` entry. Both currently point at
# placeholder pages — fill in as the work progresses.
expert_docs:
  - multiscale_bioprocess_roadmap
  - palsson_2025_fed_batch

# Top-level success criteria. Each maps to a behavioral test in a
# constituent study; the investigation is "complete" when all pass.
