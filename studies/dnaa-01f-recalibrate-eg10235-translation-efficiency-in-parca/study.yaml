# Driven through Design → Decide during 2026-05-17 overnight investigation run.

schema_version: 3
name: dnaa-01f-recalibrate-eg10235-translation-efficiency-in-parca
created: '2026-05-16'
status: ran
phase: Decide
seeded_from:
  parent: dnaa-01-expression-dynamics
  followup_idx: 1
  followup_title: Recalibrate EG10235 translation_efficiency in ParCa
  kind: calibration_task

baseline:
- name: baseline
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache

purpose:
  question: |
    With the listener bug fixed, v2ecoli's median DnaA pool is ~115/cell.
    Literature (Sekimizu, Schmidt, Mori) reports 300-800. v2ecoli is ~5×
    too low. F-08 found 50× TE puts DnaA at 497 (in band) but breaks
    autorepression. F-10's TE-sweep showed no single multiplier passes
    both gates. This study finds the optimal single-knob TE multiplier
    AND surfaces a deeper architectural finding about the autorepression
    mechanism.
  mechanism: |
    Direct sweep of translation_efficiencies[3861] (EG10235 / dnaA
    monomer) at integer multiples of the ParCa-cached value (7.23e-5).
    5 seeds per multiplier × 10 min sim. Pool across seeds for
    autorepression Pearson r.
  expected_outcome: |
    Satisfies parent's follow_up_studies[1] acceptance criteria:
      - dnaa-01 re-run produces median DnaA in [300, 800]
      - bulk[MONOMER0-160[c]] (DnaA-ATP) reaches expected 200-500 free pool

pipeline_gate:
  prerequisites:
  - dnaa-01-expression-dynamics
  enables:
  - dnaa-02-atp-hydrolysis
  # ── Machine-readable gate signal (set by Decide phase) ──────────
  # open        — both primary tests PASS; downstream can start cleanly.
  # conditional — downstream CAN start, but inherits documented limitations.
  # hold        — work done, but a calibration question is outstanding;
  #               downstream can start at its own risk.
  # blocked     — no path forward; downstream MUST WAIT.
  gate_status: conditional
  gate_status_summary: |
    No single TE multiplier passes both gates, BUT the spawned joint-sweep
    follow-up (dnaa-01g-joint-te-fold-change-sweep) ALREADY found a
    working calibration at (TE=20×, fc=0.7) validated at 5 seeds.
    dnaa-02 can resume with that calibration; the permanent ParCa-cache
    promotion is the remaining cleanup.
  proceed_condition: |
    EITHER (a) a single-knob TE adjustment lands both primary gate tests
    PASS at 5 seeds; OR (b) we have a documented architectural finding
    that no single TE multiplier passes both, and have spawned the next
    follow-up to investigate the autorepression fold_change as a second
    knob.

