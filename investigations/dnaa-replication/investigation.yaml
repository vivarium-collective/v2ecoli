        (10-generation single-daughters run; oriC periodicity ⇒ save
        canonical initial condition)
    - dnaa-1-expression-dynamics: DnaA monomer pool tuning via
        Mechanism A (runtime sim_data.genetic_perturbations overwrite)
        — gated on dnaa-0 passing
  blocked:
    - All further studies (mechanism, box binding, extrinsic
        regulation) are out of scope this round. Do not add until
        dnaa-0 and dnaa-1 are validated.

glossary:
  - term: B-period
    definition: |
      The portion of a cell cycle when no replication is in progress.
      B = τ − C − D. Under succinate (τ ≈ 82, C = 40, D = 20), B ≈ 22 min.
      Required > 0 for a non-overlapping cell cycle with single-shot
      replication initiation per generation.
  - term: C-period
    definition: |
      Replication elongation time — chromosome-completion duration from
      initiation. ParCa-default for succinate: 40 min.
  - term: D-period
    definition: |
      Post-replication-termination delay before division. ParCa-default:
      20 min. Enforced by MarkDPeriod + Division step (see Round 3.7
      D-period wiring fix on feat/dnaa-mock-investigation-start, commit
      8b5d8cd) — pull forward before running dnaa-0.
  - term: Mechanism A
    definition: |
      Runtime overwrite of dnaA's per-promoter init_prob via
      sim_data.genetic_perturbations["TU00259[c]"] = 2e-3. PDF feedback's
      working solution for dnaa-1; leaves baseline dnaA TE (0.35), mRNA
      t½ (1.9 min), and protein t½ (280 min) unchanged.
  - term: oriC
    definition: |
      Replication origin on the E. coli chromosome. Count goes 1 → 2 when
      replication initiates, returns to 1 at division when chromosomes
      segregate to daughters. AT STEADY STATE under succinate (gen 3
      onwards), oriC oscillates 1 ↔ 2; reaching 4 there would mean
      re-initiation before division (overlapping cycles). NOTE: during the
      pre-steady-state transient (gens 1–2) a brief overshoot to 4 is
      expected and is the signature that the lineage has not yet settled
      onto the periodic attractor (Rashmi 2026-05-30) — it is not a
      failure of the succinate regime.
  - term: steady state
    definition: |
      Per-cell observables (oriC, cell_mass, DnaA count) are periodic in
      the followed-daughter lineage — same value at the same phase of
      every cycle. Reached after a few generations of transient decay
      from the initial condition.
  - term: TU00259[c]
    definition: |
      The transcription unit identifier for the dnaA operon
      (dnaA-dnaN-recF) on the chromosome. Mechanism A targets this TU's
      per-promoter init_prob to tune dnaA mRNA synthesis rate.

feedback_rounds:
  - date: '2026-05-29'
    reviewer: Rashmi
    artifact: feedback-2026-05-29-fresh-start/feedback.pdf
    summary: |
      Directed the fresh start — retire all prior Round 1–3.8 work, switch
      to succinate, gate the investigation to two studies (dnaa-0 steady
      state, dnaa-1 DnaA expression via Mechanism A), block everything else.
  - date: '2026-05-30'
    reviewer: Rashmi
    artifact: feedback-2026-05-30/feedback.yaml
    summary: |
      Inline chart review of the first report.
        dnaa-0: "this looks correct." The early-generation oriC overshoot
          to 4 is the expected pre-steady-state signature, NOT a failure
          (the prior "never 4" framing was wrong); periodicity emerges from
          gen 3, which is the state to use as the initial condition. Chart
          requests: lineage-separator lines, generation-number labels,
          x-axis in minutes, axis labels with units — all implemented.
        dnaa-1 (build): check whether the monomer_counts listener already
          provides DnaA counts in all forms; if so, use it directly.
        dnaa-1 (limitations): the PDF "target" is the biologically-expected
          RNA-synthesis rate; V=2e-3 → ≈1.01 events/min, close to it, and
          that is what put the DnaA counts in range. → acceptance reframed
          around the ≈1 event/min init rate as the primary target.
      Also surfaced while integrating: dnaa-1 had no valid run behind its
      "pass" (FBA SUC[p] failure, then a parquet emit-truncation bug). Root-
      caused the truncation to a division-time emitter partition-wipe
      (daughter cells' emitters deleting the parent generation's history),
      fixed it in v2ecoli/steps/division.py, and re-ran on real full-cycle
      data → dnaa-1 PASS (init rate 0.99/min, DnaA cycle-mean 706 in band,
      CV 7.2%, oriC periodic 1↔2). Verdict re-asserted on evidence.

