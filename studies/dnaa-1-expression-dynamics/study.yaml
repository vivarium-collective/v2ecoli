    kind: single-daughters-multigen-lineage
    status: ran
    base_model: v2ecoli.composites.baseline (Mechanism-A dill-patched cache, resume from dnaa-0 gen-3 init)
    duration_steps: 7200 s/gen cap × 7 gens
    seeds: [0]
    sweep: "TU00259[c] per-promoter init_prob ∈ {1.5e-3, 1.7e-3 (canonical), 2e-3}"
