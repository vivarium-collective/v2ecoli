  # 2026-05-29 new empirical evidence — landed AFTER the 2026-05-28
  # changeset above and shipped in commits a1b3f25..07e57f4. Surfaced
  # here so the report's headline panel reflects what's actually in the
  # per-study Charts tabs the reviewer will open next.
  new_empirical_evidence:
    - title: Multi-seed mbp-02 cpa-scaling sweep (3 cpa × 3 seeds = 9 runs)
      chart: studies/mbp-02-population-aggregation/charts/04_population-scaling-variance-bands.svg
      finding: |
        log-y population.total_biomass_gDW(t) mean ± std across seeds
        {0, 1, 2} at every cpa ∈ {1, 1e6, 1e9}. Ribbons are narrow on
        log-y at every cpa. Empirically answers the question implicit
        in Chris's 2026-05-28 §1.a confirmation: the perfect cpa
        scaling he validated at seed=0 holds across 3 stochastic
        replicates per cpa — robust, not coincidence.
      simulations: |
        aggregator-cpa{1,1e6,1e9}-seed{1,2}-multigen +
        aggregator-cpa{1,1e6,1e9}-multigen (seed=0). 9 runs at 60 sim-
        min each, 2 generations each, single_daughters; parquet hives
        under studies/mbp-02-population-aggregation/parquet-runs/.
    - title: First env-driven multigen trajectories (mbp-01)
      chart: studies/mbp-01-time-varying-environment/charts/01_driven-env-glc-trajectory.svg
      finding: |
        boundary.external.GLC(t) under two synthetic-trajectory specs.
        Demonstrates the EnvironmentDriver → EnvironmentMirror →
        boundary.external propagation chain (60cdbd3 unblock) running
        at multi-generation scale — Chris's 2026-05-28 review predated
        any env-driven trajectory; these are the first.
      simulations: |
        linear-decline-glc-multigen (GLC 5 mM → 0 over 60 sim-min) and
        zero-clamp-glc-multigen (GLC clamped at 0). Parquet hives
        under studies/mbp-01-time-varying-environment/parquet-runs/.
    - title: mbp-05 preliminary expectation-setting — empirical plateau diagnostic
      chart: studies/mbp-05-palsson-benchmark/charts/02_v2ecoli_vs_beulig_batch_actual.svg
      companion_charts:
        - studies/mbp-05-palsson-benchmark/charts/10_beulig_reference_batch_trajectories.svg
        - studies/mbp-05-palsson-benchmark/charts/00_preliminary_v2ecoli_vs_beulig_gap.svg
        - studies/mbp-05-palsson-benchmark/charts/01_preliminary_biomass_trajectories_vs_beulig.svg
      finding: |
        REFINED + EMPIRICALLY CONFIRMED 2026-05-29 after pulling the
        digitized Beulig batch trajectories from
        references/papers/palsson-2025-supp/ (req-1-palsson-ingestion
        fully resolved) and running v2ecoli cpa=1e9 for 175 sim-min
        (salvaged from a 6h run killed at the system's 128 GB memory
        ceiling — sufficient for the architectural diagnostic).

        Beulig BATCH phase peaks at ~9.6 g/L (max OD ~28 × 0.34) at
        ~13 h batch elapsed. The 50-80 g/L figure from the paper's
        abstract is the FED-BATCH endpoint, NOT the batch endpoint —
        the earlier charts 00 and 01 used that as their target band
        and have been demoted to companion-charts; chart 02 is now
        load-bearing.

        v2ecoli at cpa=1e9 PLATEAUS at ~4.3 mg/L. The biomass
        oscillates 1.17–4.31 mg/L following the division cycle
        (cell_mass 1097→2338 fg → halve at division) but does NOT
        accumulate across generations. The 175-min run confirmed this
        empirically. Gap to Beulig batch peak: 3.3 orders of magnitude,
        and DURATION CANNOT CLOSE IT — the single_daughters lineage
        convention caps total biomass at cell_mass × cpa for ONE
        lineage. Closing requires architectural moves: a population
        composite with counter-rather-than-single-daughters lineage
        tracking, OR a surrogate engine — both mbp-06 candidate-
        future-studies. mbp-05's comparison harness surfaces this
        diagnostically; it does NOT try to tune the gap away
        (Chris's 2026-05-26 §10 execute-and-report reframe).
      simulations: |
        v2ecoli: aggregator-cpa1e9-multigen (60 sim-min reference)
        + aggregator-cpa1e9-batch-prefix-multigen (175 sim-min
        salvaged at the memory ceiling). Beulig: 5 best-sampled
        batch reactors (DDB_PD_006_AMBR_R9 + others) from
        reactor_OD_data.csv.


