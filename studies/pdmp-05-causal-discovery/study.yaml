schema_version: 3
name: pdmp-05-causal-discovery
title: "Phase 5 — Causal Discovery and Functional Annotation"
status: planned
phase: Design

topic: pdmp
tags: [pdmp, phase-5, causal-discovery, gene-annotation, bayesian-model-comparison, russian-roulette, 
      active-inference, xarray-emitter]
created: '2026-05-24'

parent_studies:
  - {study: pdmp-03-inference, condition: tests-passed}
  - {study: pdmp-04-compilation, condition: tests-passed}

question: |
  Can the compiled, likelihood-equipped PDMP WCM support Bayesian
  model comparison for gene-function annotation — recovering known
  E. coli gene functions on a benchmark set with credible intervals
  that shrink with sample size, and driving an active causal-
  inference loop that selects in-silico interventions to maximally
  discriminate between candidate mechanisms?

hypothesis: |
  Framing gene-function annotation as Bayesian model comparison
  with marginal likelihoods estimated via Russian Roulette /
  doubly-intractable estimators, combined with active Bayesian
  causal inference that proposes targeted in-silico interventions
  (knockouts, overexpression) and selects experiments by expected
  information gain, recovers the known functions of a benchmark
  set of E. coli genes with credible-interval widths that decrease
  predictably as sample size grows, at a per-annotation compute
  cost that extrapolates to feasible genome-wide scaling.

objective: |
  Implement the marginal-likelihood estimator (Russian Roulette /
  doubly-intractable methods) on top of the Phase 3 likelihood
  accumulator and Phase 4 compiled runtime; build the active causal
  inference loop (propose intervention, predict outcomes under
  candidate mechanisms, score by expected information gain); curate
  a benchmark set of E. coli genes with well-established functions;
  measure posterior recovery rate, credible-interval width vs.
  sample size, and compute cost per annotation; produce a full
  resource estimate for genome-wide scaling.

description: |
  Phase 5 of the v2ecoli → PDMP roadmap. This is the payoff phase
  — the one that closes the loop on the DUF ARC original goal of
  simulation-based causal discovery in WCMs. It depends on every
  preceding phase: the PDMP for process likelihoods (Phase 2), the
  observation-likelihood library and accumulator (Phase 3), and the
  compiled high-throughput runtime to make marginal-likelihood
  estimation feasible (Phase 4).

  The Bayesian-model-comparison framing puts each candidate gene-
  function annotation in competition: each defines a different
  WCM, marginalize over parameters, and compare via marginal
  likelihoods. Russian Roulette estimators (Lyne et al. 2015)
  provide unbiased estimates of these otherwise intractable
  marginals.

  Active causal inference (Toth et al. 2022) closes the experiment-
  design loop: rather than passively observing, the agent proposes
  interventions whose outcomes will most sharply distinguish
  competing annotations. This converts annotation from
  pattern-matching to hypothesis-driven discovery, in the spirit of
  the DUF ARC vision.

  The benchmark gene set should contain ≥20 E. coli genes with
  literature-established functions across diverse mechanism
  classes (kinases, transcription factors, transporters, structural
  proteins, etc.) so that the validation isn't restricted to a
  single functional category.

  # Numerical considerations
  Marginal likelihood numerics. Russian Roulette (Lyne et al. 2015)
  produces unbiased estimators of intractable normalizing
  constants Z = ∫ p(D|θ) p(θ) dθ via a truncated geometric series
  with importance weights. The estimator can have unbounded
  variance — we monitor the empirical variance over batches and
  require an ESS-equivalent number of likelihood evaluations
  N_eff ≥ 100 per Z estimate. If N_eff < 100 the result is flagged
  and either (a) a tighter proposal is used, or (b) we fall back
  to thermodynamic integration / nested sampling with documented
  bias.

  Bayes factor confidence intervals. We report log Bayes factors
  with a 95% bootstrap CI from the RR variance bound, not point
  estimates. Conclusions ("annotation A vs B is supported") only
  fire if the CI sits entirely above the Jeffreys-scale threshold
  (|log BF| > 1, "substantial evidence").

  SBC at the model-comparison level. We extend SBC to model
  comparison itself: for K=500 synthetic datasets each generated
  under a known true annotation, the recovered posterior model
  probability should be uniform conditional on the true model
  index (Talts et al. 2018, Cook et al. 2006). A non-uniform
  rank histogram signals systematic miscalibration of the
  comparison pipeline before we trust it on novel annotations.

  Active inference numerics. Expected information gain (EIG) is
  estimated via nested Monte Carlo (outer over experiments, inner
  over (θ, y) pairs). Standard NMC has bias O(1/N_inner) — we use
  Donsker-Varadhan or DAD-MINE style variational lower bounds
  where computationally feasible, falling back to NMC with explicit
  bias bounds otherwise. Every intervention proposal carries its
  EIG estimate ± MCSE; the loop never selects an intervention
  whose EIG CI overlaps zero.

  False discovery control. On benchmark recoveries, we report
  per-annotation posterior probability AND a Benjamini-Hochberg
  FDR at the gene-set level — q-value ≤ 0.1 required before
  declaring a benchmark recovery successful.

  Convergence rate of credible-interval widths. The claim that
  credible interval widths shrink with sample size is only useful
  if the rate is reported. Sub-√n is the standard MCMC rate
  (variance of posterior mean ∝ 1/n_eff_samples); slower than
  n^{-1/2} indicates a problem (poor mixing, non-identifiability)
  and triggers diagnosis.

  # Emitter
  Each candidate-annotation run writes a zarr store containing
  (a) the marginal-likelihood RR estimator trajectory, (b) per-
  annotation posterior, (c) intervention-selection record + EIG
  estimates. The benchmark gene-set sweep aggregates per-gene
  zarr stores into a single zarr group per benchmark — readable
  via xarray.open_mfdataset() for the BH-FDR summary at the
  gene-set level.

expected_behavior:
  - name: annotation-bayes-model-compare
    en: Marginal likelihoods are estimated via Russian Roulette / doubly-intractable methods with quantified 
      variance bounds; the implementation passes published unit tests on simpler model-comparison benchmarks 
      before being applied to WCM candidates.
    given:
      condition: candidate-annotations
    measure:
      kind: observable-comparison
      observable: marginal-likelihood-estimator
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: active-causal-discovery-loop
    en: The active-inference loop proposes in-silico interventions (knockouts, overexpression) and selects 
      them by expected information gain over the candidate annotation set; the selection record shows the loop
      converges in expected number of interventions vs. random selection.
    given:
      condition: per-annotation
    measure:
      kind: observable-comparison
      observable: intervention-selection-record
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: benchmark-recovery-with-credible-intervals
    en: On a curated benchmark of ≥20 E. coli genes with established functions, the pipeline recovers the 
      correct annotation at the published credible level, with credible-interval widths that shrink 
      predictably as sample size grows. (Gating criterion for the whole investigation.)
    given:
      condition: e-coli-known-function-benchmark
    measure:
      kind: observable-comparison
      observable: posterior-recovery-rate
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: genome-wide-resource-estimate
    en: Per-annotation compute cost on the benchmark extrapolates to a defensible total compute estimate for 
      genome-wide scaling (≥4000 E. coli genes); the estimate identifies the binding constraint (compute time,
      memory, or convergence).
    given:
      condition: benchmark-results
    measure:
      kind: observable-comparison
      observable: compute-cost-extrapolation
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-rr-estimator-ess
    en: Russian Roulette marginal-likelihood estimates carry an ESS-equivalent N_eff; estimates with N_eff < 
      100 are flagged and either rerun with a tighter proposal or replaced by a documented-bias method (TI / 
      nested sampling).
    given:
      condition: per-marginal-likelihood
    measure:
      kind: observable-comparison
      observable: rr-estimator-N-eff
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-bayes-factor-CIs
    en: log BF reported with 95% bootstrap CI. Annotation calls only fire when the CI lies entirely above the 
      Jeffreys |log BF| > 1 threshold ("substantial evidence").
    given:
      condition: per-pairwise-comparison
    measure:
      kind: observable-comparison
      observable: log-bayes-factor-with-95-CI
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-sbc-at-model-comparison-level
    en: 'Extended SBC over K=500 synthetic datasets from known true annotations: rank histogram of true-model posterior
      probability passes χ² uniformity (p > 0.05). Required before trusting the pipeline on real annotations.'
    given:
      condition: K500-synthetic-datasets
    measure:
      kind: observable-comparison
      observable: model-posterior-rank-uniformity
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-eig-MCSE-nonzero
    en: Every intervention proposal carries an EIG estimate ± MCSE; proposals whose EIG CI overlaps zero are 
      not selected. NMC bias bound reported, or DV/DAD variational lower bound used where feasible.
    given:
      condition: per-intervention-proposal
    measure:
      kind: observable-comparison
      observable: expected-information-gain-with-MCSE
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-fdr-on-benchmark-recoveries
    en: Recoveries on the benchmark gene set are reported with BH-adjusted q-values; success claim requires q 
      ≤ 0.1 at the gene-set level, not just per-gene posterior probability.
    given:
      condition: benchmark-gene-set
    measure:
      kind: observable-comparison
      observable: benjamini-hochberg-q-value
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-credible-interval-shrinkage-rate
    en: Credible-interval-width-vs-N curves are fit on a log-log scale; expected slope -1/2 for 
      well-identified parameters. Slopes shallower than -0.4 trigger MCMC mixing diagnostics and 
      identifiability re-check.
    given:
      condition: per-parameter
    measure:
      kind: observable-comparison
      observable: ci-width-vs-sample-size
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
baseline:
  - name: pdmp-annotation-comparison-tbd
    composite: v2ecoli_pdmp.composites.annotation.bayes_model_compare
    params: &id001
      emitter: xarray
      estimator: russian-roulette
    _placeholder: true
    _note: Runs candidate-annotation marginal-likelihood comparisons + active-inference loop on top of the 
      Phase 4 compiled runner.
variants:
  - name: russian-roulette-marginal-likelihood
    description: RR estimator (Lyne et al. 2015) for the marginal-likelihood ratio between candidate 
      gene-function annotations. ESS-equivalent N_eff ≥ 100 per Z estimate.
    params: &id002
      estimator: russian-roulette
      n_eff_floor: 100
  - name: active-causal-inference-loop
    description: 'Active Bayesian causal inference (Toth et al. 2022): propose targeted in-silico interventions
      (knockouts, overexpression), score by expected information gain (EIG) with MCSE-bounded estimates.'
    params: &id003
      intervention_menu:
        - knockout
        - overexpression
        - promoter-swap
  - name: benchmark-gene-set
    description: ≥20 E. coli genes with literature-established functions across diverse mechanism classes 
      (kinases, TFs, transporters, structural). The validation target.
    params: &id004
      n_genes: 20
      classes:
        - kinase
        - TF
        - transporter
        - structural
  - name: sbc-at-model-comparison-level
    description: Extended SBC over K=500 synthetic datasets generated under known true annotations; verify 
      uniformity of posterior model probability ranks.
    params: &id005
      K: 500
