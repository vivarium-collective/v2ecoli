  n_steps: '30 particles × 3 rounds = 90 forward sims (~66s wall)'
  details: 'PILOT 2026-05-25. scripts/run_abc_smc_pilot.py runs minimal ABC-SMC on Millard with
    known-truth parameters. Setup: take 2 Millard kinetic parameters (PTS_4.kF, ENO.Vmax), generate
    "observations" by running Millard at default values, hide the true parameters, sample log-uniform
    priors around default ±50%, run 3 SMC rounds with top-25% acceptance. Round-by-round threshold:
    1.8e-4 → 1.8e-4 → 4.3e-5 (narrowing). Final-round min distance 5.5e-6. Viz at
    reports/figures/pdmp-03/abc_posterior_{shrinkage_real, 2d}.html. SCAFFOLD because: only 2 parameters,
    only 30 particles, only 3 rounds — full target is 100s of parameters + 1000s of particles + ≥8
    rounds. But the machinery works end-to-end + populates posterior-shrinks-with-data primary test
    with real data.'
