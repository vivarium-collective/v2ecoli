schema_version: 3
name: mbp-05-palsson-benchmark
created: '2026-05-22'
phase: Design

design_status: drafted
implementation_status: not_started
simulation_status: not_run
evaluation_status: not_evaluated
expert_review_status: not_requested

baseline:
- name: palsson-matched-coupled
  composite: v2ecoli.composites.reactor_bird_coupled
  params: {seed: 0, cache_dir: out/cache}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Configured with operating conditions matched to the 2025 Palsson lab
    high-density E. coli study, does the v2ecoli ↔ pbg-bioreactordesign
    coupled model reproduce the published batch (or, if fed-batch
    enhancement lands, fed-batch) trajectory on end-of-run optical
    density, time-to-target-OD, and acetate-accumulation profile within
    per-metric tolerances, and are residual divergences interpretable
    and categorized?
  mechanism: |
    The benchmark paper is Beulig et al. 2025 (mSystems 10(7),
    doi:10.1128/msystems.00323-25; senior author B. Palsson), titled
    "Trade-off between resistance and persistence in high cell density
    cultures." Open access, PDF at
    `references/papers/Beulig_2025_mSystems_high_cell_density.pdf`;
    extracted metadata + scope notes at
    `references/expert/palsson_2025_fed_batch.md`.

    Two-stage batch → fed-batch fermentation to 50–80 gDW/L in parallel
    well-controlled bioreactors; exponential feeding after batch-to-fed-
    batch transition (t=0 h); >470 transcriptomic samples across five
    strain groups (WT BW25113, 31 SGKO, TRP, TRPp, MEL) and four
    fermentation phases (I–IV).

    For mbp-05, scope is WT only and (until fed-batch lands in
    pbg-bioreactordesign) the BATCH PHASE PREFIX. Configure the mbp-03/04
    coupled composite to the published operating profile (reactor geometry,
    aeration, medium, initial conditions). Run; overlay simulated vs.
    published trajectories; compute end-of-run OD, time-to-target-OD, and
    acetate-profile comparison metrics. The phase report card is dominated
    by overlay plots and quantitative comparison metrics. Divergences are
    categorized in the report card (v2ecoli metabolic deficiency /
    coupling-adapter limitation / experimental uncertainty / placeholder-
    induced).

    Transcriptional-state matching against the >470 transcriptomes is a
    natural extension (v2ecoli outputs transcript counts) — out of mbp-05
    scope; flagged as a candidate-future-study.
  expected_outcome: |
    End-of-run OD matches the published value within a per-metric tolerance
    (placeholder ±15% until the spec PR sets the real band). Time-to-
    target-OD matches published timing within tolerance. Acetate-profile
    matches qualitatively (shape) and within a magnitude band. If the
    Palsson dataset is fed-batch only and pbg-bioreactordesign still lacks
    fed-batch support at this point, the study scopes to the BATCH-only
    portion of the Palsson dataset (e.g. the initial batch phase before
    feed onset) — the spec PR makes that scope call explicitly.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - mbp-04-multigeneration-runs
  enables: []   # terminal study of the investigation
  gate_status_summary: |
    Blocked on mbp-04 (multi-generation stability). Benchmark citation
    confirmed (Beulig 2025 mSystems; PDF in references/papers/);
    structured extraction of operating profile + trajectories from the
    paper is a req-1 prerequisite. Terminal acceptance gate of the
    investigation.
  proceed_condition: |
    End-of-run-OD and acetate-profile quantitative tests pass within
    tolerances set in the spec PR; divergences categorized in the
    report card. If a coupling-adapter or v2ecoli-metabolism deficiency
    blocks an in-scope test, default is defer-and-proceed (record
    placeholder + candidate-future-study); halt-and-amend only if the
    deficiency makes the phase objective unattainable.


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

- name: palsson-matched-batch
  base_model: v2ecoli.composites.reactor_bird_coupled
  perturbation: {operating_profile: palsson_2025_batch_only}
  condition: palsson-2025-batch
  duration_min: 480     # placeholder — refit to published batch duration
  seeds: [0]
  readouts:
    - population_OD600
    - population_total_biomass_gDW
    - reactor_glucose_gL
    - reactor_acetate_gL
    - reactor_dissolved_o2
  applies_tests:
    - end-of-run-od-matches-published
    - time-to-target-od-matches-published
    - acetate-profile-matches-published-shape
    - divergences-categorized-in-report-card
  status: planned


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: v2ecoli.composites.reactor_bird_coupled
  new_state_variables: []
  new_processes: []
  new_parameters:
    - {name: operating_profile,           default: palsson_2025_batch_only, units: "—"}
    - {name: published_trajectory_path,   default: references/papers/palsson-2025/trajectories.csv, units: "—"}
  modified_processes: []
  notes: |
    No new capability — configures the mbp-03/04 coupled composite to
    Palsson-matched conditions and adds a comparison harness. Knowledge
    ingestion (raw PDF + structured extraction) is prerequisite work,
    tracked under the expert doc placeholder.


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "Published trajectories are digitizable / available at sufficient resolution to overlay."
  - "OD600 ↔ gDW conversion factor (od_to_gdw, default 0.33) holds at Palsson's cell-density regime, or is refit from the paper."
  - "If Palsson is fed-batch only, this study scopes to the batch-phase prefix until pbg-bioreactordesign gains fed-batch (deferred enhancement)."
  - "0D well-mixed assumption holds at the paper's reactor scale (bench)."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:
- {name: population_OD600,             store_path: population.OD600,                    units: OD600, status: planned}
- {name: population_total_biomass_gDW, store_path: population.total_biomass_gDW,        units: gDW,   status: planned}
- {name: reactor_glucose_gL,           store_path: "environment.external_concentrations.GLC[p]", units: mM, status: planned}
- {name: reactor_acetate_gL,           store_path: "environment.external_concentrations.ACET[p]", units: mM, status: planned}
- {name: reactor_dissolved_o2,         store_path: reactor.dissolved_o2,                units: mg/L,  status: planned}


behavior_tests:

- name: end-of-run-od-matches-published
  classification: primary
  description: "End-of-run OD matches the Palsson 2025 published value within tolerance (placeholder ±15% until spec PR; replace once citation lands)."
  measure: {kind: series, path: population.OD600, reduce: final, window: full}
  pass_if: {op: relative_to_reference, reference: palsson_2025_final_OD, tolerance: 0.15}
  units: OD600
  requires_simulation: palsson-matched-batch
  cites: [Beulig2025mSystems]

- name: time-to-target-od-matches-published
  classification: primary
  description: "Time to reach the published target OD matches within tolerance."
  measure: {kind: time_to_threshold, path: population.OD600, threshold: palsson_2025_target_OD}
  pass_if: {op: relative_to_reference, reference: palsson_2025_time_to_target, tolerance: 0.15}
  units: min
  requires_simulation: palsson-matched-batch
  cites: [Beulig2025mSystems]

- name: acetate-profile-matches-published-shape
  classification: primary
  description: "Simulated acetate-accumulation profile matches the published trajectory qualitatively (shape) and within a magnitude band."
  measure: {kind: trajectory_compare, series: "environment.external_concentrations.ACET[p]", reference: palsson_2025_acetate_profile}
  pass_if: {op: shape_match_within_band, band: 0.3}
  units: g/L
  requires_simulation: palsson-matched-batch
  cites: [Beulig2025mSystems]

- name: divergences-categorized-in-report-card
  classification: supporting
  description: "Divergences categorized in the report card (v2ecoli metabolic deficiency / coupling-adapter limitation / experimental uncertainty / placeholder-induced) — the comparison is interpretable."
  measure: {kind: qualitative_review, artifact: report.md}
  pass_if: {op: review_complete}
  units: "—"
  requires_simulation: palsson-matched-batch
  cites: [Beulig2025mSystems]


# ─── 6. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "Single benchmark study; not a multi-dataset validation."
  - "Tolerances are placeholders until the spec PR sets them against the digitized data."
  - "Fed-batch operations remain a deferred enhancement (pbg-bioreactordesign has no fed-batch yet); if Palsson is fed-batch only, this study scopes to the batch-phase prefix."
  - "v2ecoli's calibration is slow-growth M9-glucose; high-density regime may stress-test."


# ─── 7. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-palsson-ingestion
  kind: knowledge
  title: Beulig 2025 structured ingestion
  effort: S
  description: |
    PDF + bib entry + expert-doc metadata already in place
    (references/papers/Beulig_2025_mSystems_high_cell_density.pdf;
    references/papers.bib @Beulig2025mSystems;
    references/expert/palsson_2025_fed_batch.md). REMAINING: digitize /
    extract per-strain (WT) trajectories — OD600, biomass, glucose,
    acetate, dissolved O2 over the fermentation phases — into a structured
    CSV under references/papers/palsson-2025-supp/. Source: paper figures
    + supplementary data (open access).
  unblocks: [all mbp-05 behavior_tests]

- id: req-2-comparison-harness
  kind: tooling
  title: Sim-vs-published comparison harness
  effort: S
  description: |
    Overlay simulated vs. published trajectories; compute end-of-run-OD,
    time-to-target-OD, and acetate-shape comparison metrics; render the
    overlay plots that dominate the report card.
  unblocks: [end-of-run-od-matches-published, acetate-profile-matches-published-shape]


bibliography:
  expert: [multiscale_bioprocess_roadmap, palsson_2025_fed_batch]
  bib_keys: [Beulig2025mSystems]


runs: []


tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
