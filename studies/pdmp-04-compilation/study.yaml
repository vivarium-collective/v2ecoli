tests:
- name: jax-compiled-throughput-10x
  classification: primary
  description: JAX + Diffrax compilation of the Phase 3 PDMP achieves ≥10× wall-clock throughput vs the v2ecoli Python+glpk
    baseline on a single CPU, for the canonical 600-step M9-glucose trajectory. Floor for HPC viability.
  measure:
    source: scripts/benchmark_compiled.py --backend jax
    observable: wall_seconds_per_trajectory
    reduce: v2ecoli_baseline_seconds / jax_seconds
  pass_if:
    operator: greater-than
    threshold: 10.0
    field: speedup_ratio
  requires_simulation: phase4-jax-benchmark
  cites:
  - bradbury2018
  - kidger2021
- name: numerical-equivalence-with-phase3
  classification: primary
  description: JAX-compiled trajectory and Phase 3 reference trajectory at the same seed agree on all interface observables
    to L∞ error < 1e-4 after one full doubling cycle. Confirms the compilation didn't introduce numerical drift.
  measure:
    source: compare jax vs python-reference trajectories at seed=0
    observable: all interface observables(t)
    reduce: L_inf relative error
  pass_if:
    operator: less-than
    threshold: 0.0001
    field: L_inf_error
  requires_simulation: phase4-equivalence-test
  cites: []
- name: memory-fits-1024-cells-per-node
  classification: supporting
  description: Steady-state RAM footprint of N=1024 cells × full PDMP state stays under 256 GB on a single HPC node. Currently
    projected from per-cell sizing in colonies-01; Phase 4 must verify directly with a 1024-cell ensemble.
  measure:
    source: scripts/profile_memory.py --n-cells 1024
    observable: RSS at end of 600-step run
    reduce: GB
  pass_if:
    operator: less-than
    threshold: 256.0
    field: RSS_GB
  requires_simulation: phase4-memory-1024
  cites: []
