biological_role: 'Adds the EXTRINSIC reset network deferred from dnaa-02: RIDA (Hda-mediated DnaA-ATP hydrolysis
  at the replisome) + datA (DnaA-ATP inactivation via the datA locus during S phase) + DARS1/DARS2 (DnaA-ADP → apo
  reactivation). Together these reset DnaA-ATP each cycle so the next initiation can fire on schedule.'
dependency_rationale: Final mechanism layer — needs the dnaa-01 → dnaa-04 chain stable first, since RIDA reads replisome
  count from chromosome_replication and the datA/DARS rates are tuned to the steady-state ATP fraction the other
  studies produce.
mechanism_replaced: Replaces the dnaa-02 ATP-fraction CLAMP stand-in with real extrinsic reset mechanisms. RIDA
  reads active_replisome count. datA runs as constitutive backup hydrolysis. DARS1/DARS2 run as first-order ADP→apo
  conversion (which then feeds back to ATP via the existing equilibrium).
primary_claim: With the full reset network (RIDA + datA + DARS1/2), DnaA-ATP fraction stays in the [0.2, 0.5] band
  across the cycle — confirming that the network reproduces the physiological band that intrinsic hydrolysis alone
  (dnaa-02) cannot reach.
primary_visualization: 'DnaA-ATP fraction trajectory with the [0.2, 0.5] band, showing intrinsic-only baseline (~1.0,
  failing) → RIDA-only (mid-band) → full reset network (in-band). Companion: ATP/ADP conversion fluxes panel showing
  the RIDA / DARS balance.'
scope_boundary: Constitutive datA + DARS rates (no IHF / Fis cell-cycle gating). Hda-ADP is assumed always available
  (no Hda nucleotide state). Simple first-order rates throughout.
deferred_biology: IHF-gated DDAH (datA inactivation kinetics depend on IHF presence). Fis modulation of DARS2 (FBS1,
  FBS2-3 binding sites). Hda nucleotide-state cycling (currently assumed always-ADP). Cell-cycle dependence of DARS2
  (currently constant rate).

post_run_scripts:
- path: scripts/render_chromosome_timeline.py
  args: [ '--study', 'dnaa-06-extrinsic-regulation', '--spec', 'v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis', '--steps', '600',]
  timeout_s: 1800
