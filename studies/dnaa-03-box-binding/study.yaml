tests_config:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
biological_role: Adds the DnaA-box landscape — 307 chromosomal consensus boxes + 11 oriC boxes (3 high-affinity
  R1/R2/R4 + 8 low-affinity cooperative) + 7 dnaA-promoter boxes. The 307 chromosomal boxes act as a titration BUFFER
  soaking up DnaA so oriC doesn't fire too early.
dependency_rationale: Must precede dnaa-04 (initiation trigger). The initiation gate reads oriC low-affinity occupancy;
  if box binding isn't wired the gate has no signal.
mechanism_replaced: Adds an equilibrium DnaA-box binding Step that reads DnaA-ATP/ADP free counts and computes per-site
  occupancy via Kd. Replaces the implicit "all DnaA is available for initiation" assumption with the actual titration
  biology.
primary_claim: 'Chromosomal boxes (titration buffer) saturate BEFORE the low-affinity oriC boxes start to fill,
  producing the load-and-trigger pattern: high-tier oriC saturates fast (R1/R2/R4 at ~1 nM Kd), low-tier oriC fills
  slowly as DnaA-ATP accumulates.'
primary_visualization: 'DnaA-box landscape on the circular chromosome with bound (green) vs unbound (grey) coloring,
  region-coded (oriC / dnaA-promoter / chromosomal background). Companion: oriC tier-split timeseries (high vs low
  affinity occupancy curves with ceilings at 3 and 8).'
scope_boundary: Stage-1 box catalog (307 + 11 + 7 = 325 active sites). Independent per-site equilibrium with cooperative
  gradient for low-affinity oriC (50→1 nM Kd; Stage-1 expert input). No kinetic loading delay; binding is instantaneous
  each tick.
deferred_biology: Per-position motif preferences (TTWTNCACA position-3 A>T bias). Explicit DnaA filament loading
  kinetics (ordered C1→I3→C2→C3 on the right arm). DnaA-ATP filament-anchor cooperativity beyond the simple Kd gradient.
  Position-specific Hda recruitment.

