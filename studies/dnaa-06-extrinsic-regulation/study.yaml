  - {key: Boesen2024PNAS, note: "DnaA-ATP fraction physiological band [0.2, 0.5]"}
  - {key: Katayama2017Frontiers, note: DnaA cycling — RIDA/datA/DARS review}
  - {key: Kasho2023IJMS, note: datA/DARS regulation of the DnaA cycle}
