schema_version: 3
name: dnaa-06-seqa-sequestration
created: '2026-05-16'
status: planned
question: |
  Does SeqA sequestration of newly replicated, hemimethylated oriC
  (~10 min window driven by Dam re-methylation kinetics) prevent
  reinitiation within the same cell cycle, and does it buffer the
  dnaA-promoter transient activity spike caused by locus duplication?
hypothesis: |
  With SeqA active, the number of oriC reinitiation events per cell cycle
  is zero across seeds. With SeqA off (knockout variant), ≥50% of cells
  reinitiate before division. The dnaA-promoter activity spike that
  follows locus duplication is dampened by ≥40% (peak height) when SeqA
  is bound transiently at the hemimethylated dnaAp GATC cluster.
objective: |
  Add SeqA-mediated post-replication sequestration at oriC (and modulation
  at the dnaA promoter): transient binding of SeqA to hemimethylated GATC
  sites prevents DnaA rebinding to newly replicated oriC for ~10 min.
description: |
  Phase 6 of the multi-phase replication-initiation plan
  (references/expert/chromosome_replication_plan.pdf, Study 6).
  Required to prevent reinitiation within the same cell cycle.

  Mechanism summary (from expert doc):
    - Dam methyltransferase methylates GATC adenines on both strands.
    - After replication, oriC + dnaAp are transiently hemimethylated.
    - SeqA binds >10 GATC sites in newly replicated oriC and multimerizes,
      sequestering oriC for ~10 min (≈1/3 of doubling time at rapid growth).
    - SeqA also buffers the transient dnaA gene-dosage doubling.

baseline:
- name: baseline
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache

variants:
- name: no-SeqA
  description: |
    Knockout SeqA — expect rapid reinitiation at oriC, runaway DnaA at
    dnaAp post-replication.
  params:
    seqa_active: false

- name: short-sequestration
  description: |
    Reduce sequestration window to ~3 min; partial-knockout phenotype.
  params:
    seqa_sequestration_min: 3.0

- name: long-sequestration
  description: |
    Extend sequestration window to ~20 min; expect delayed reinitiation.
  params:
    seqa_sequestration_min: 20.0

observables:
- name: oric_sequestered
  store_path: agents.0.listeners.seqa.oric_sequestered_bool
- name: oric_hemimethylated_fraction
  store_path: agents.0.listeners.seqa.oric_hemimethylated_fraction
- name: dnaap_sequestered
  store_path: agents.0.listeners.seqa.dnaap_sequestered_bool
- name: initiation_events
  store_path: agents.0.listeners.replication.initiation_events
- name: time_between_initiations
  store_path: agents.0.listeners.replication.interinitiation_min
- name: dnaA_protein_concentration
  store_path: agents.0.listeners.concentrations.DnaA

visualizations:
- name: sequestration-window
  address: local:TimeSeriesPlot
  config:
    title: "oriC sequestered + hemimethylated fraction around initiation"
    observables: [oric_sequestered, oric_hemimethylated_fraction]
- name: reinitiation-prevention
  address: local:TimeSeriesPlot
  config:
    title: "DnaA + initiation events — WT vs no-SeqA"
    observables: [dnaA_protein_concentration, initiation_events]
    overlay_variants: [baseline, no-SeqA]

tasks:
- Track GATC methylation state at oriC + dnaAp (fully / hemi-methylated).
- Add SeqA-multimer binding to hemimethylated GATC clusters.
- Add Dam re-methylation kinetics (re-methylation -> SeqA dissociates).
- Block DnaA binding at sequestered loci.

expected_behavior:

- name: seqa-sequestration-lasts-10-minutes
  en: "After replication initiation, oriC stays SeqA-sequestered for approximately 10 minutes (8-12 min window)."
  given:  {run: baseline, window: post_initiation_30min}
  measure:
    kind: event_duration
    event_start: oriC_sequestered_true
    event_end:   oriC_sequestered_false
    reduce: median
  expect: {op: in_range, low: 480.0, high: 720.0}   # seconds
  status: gated
  requires:
    - listener: seqa.oric_sequestered_bool
    - upstream: dnaa-06 SeqA implementation

- name: no-seqa-causes-reinitiation
  en: "Without SeqA (knockout variant), ≥50% of cells reinitiate before division (vs zero in wildtype)."
  given:  {run: variant, variant: no-SeqA, window: per_cycle}
  measure:
    kind: event_count_per_window
    event: replication_initiation
    window_kind: generation
  expect: {op: at_least, value: 1.5}    # >1 initiation per generation
  status: gated
  requires:
    - variant_hook: seqa_active

- name: wildtype-zero-reinitiation
  en: "With SeqA active, exactly one initiation per cell cycle on average (no premature reinitiation)."
  given:  {run: baseline, window: full}
  measure:
    kind: event_count_per_window
    event: replication_initiation
    window_kind: generation
  expect: {op: in_range, low: 0.95, high: 1.05}
  status: gated
  requires:
    - listener: seqa.oric_sequestered_bool

- name: dnaap-sequestration-dampens-tx-spike
  en: "Post-replication transient SeqA at dnaAp dampens the transcription-rate spike from gene dosage by ≥40% (peak height) vs no-SeqA."
  given:  {run: variant, variant: no-SeqA, window: post_initiation_10min, compare_to: baseline}
  measure:
    kind: cross_run_ratio
    series: {kind: listener_sum, path: "listeners.rnap_data.rna_init_event"}
    reduce: max
  expect: {op: at_least, value: 1.4}    # no-SeqA peak ≥1.4× wildtype peak
  status: gated
  requires:
    - listener: seqa.dnaap_sequestered_bool
    - variant_hook: seqa_active

- name: long-sequestration-delays-reinitiation
  en: "Long-sequestration variant (20 min) delays the second initiation by ≥10 min vs baseline (10 min sequestration)."
  given:  {run: variant, variant: long-sequestration, window: full, compare_to: baseline}
  measure:
    kind: cross_run_delta
    series: {kind: listener_path, path: "listeners.replication.interinitiation_min"}
    reduce: mean
  expect: {op: at_least, value: 10.0, units: "minutes"}
  status: gated
  requires:
    - variant_hook: seqa_sequestration_min

expert_questions:
- Is SeqA cooperativity (multimerization across multiple GATC sites) needed
  at this level of detail, or sufficient to model as a Hill-shaped on/off?
- What's the right Dam re-methylation rate? Should it scale with cell volume?

bibliography:
  expert: [replication_initiation_molecular_info]
  bib_keys: [Katayama2017Frontiers, Leonard2015FrontMicrobiol, Kasho2023IJMS]
  claims: [dnaa.seqa.post-initiation-sequestration]

runs: []
conclusion: null
parent_studies: [dnaa-04-initiation-mechanism]
