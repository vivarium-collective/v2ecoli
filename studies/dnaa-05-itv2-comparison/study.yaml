# dnaa-05: Three-way comparison of replication-initiation models.
#
# Compares:
#   1. The Fu/Xiao/Jun (2023) initiator-titration model v2 (ITv2) —
#      a clean analytical mean-field model implemented as a standalone
#      bigraph Process in this workspace.
#   2. The current v2ecoli baseline composite (whole-cell, default ParCa
#      parameters).
#   3. The same v2ecoli composite with model_settings retuned to the
#      values reported in FuXiaoJun2023 (the "expert-document parameters").
#
# Aim: validate v2ecoli's DnaA mechanism against an analytical reference
# AND a parameter-tuned variant that should reproduce the analytical
# predictions if the underlying biology is captured.

schema_version: 4
name: dnaa-05-itv2-comparison
created: '2026-05-18'

report:
  title: "ITv2 analytical-reference comparison"
  verdict: preliminary
  confidence: low
  evidence_quality: exploratory
  objective: >-
    Validate v2ecoli's DnaA mechanism against the Fu/Xiao/Jun (2023) ITv2
    analytical model - initiation mass, ATP/ADP oscillation, and 1/N synchrony -
    at matched parameters.
  conclusion: >-
    Inconclusive with one clear negative: the default-parameter v2ecoli DnaA-ATP
    fraction (~0.94) sits far above [0.2, 0.5], and the ITv2 initiation-mass
    match has no data (emit/path gap).
  main_insight: >-
    v2ecoli should converge to the analytical prediction once parameters are
    matched; the default-parameter run diverges as expected (~115 DnaA/cell,
    roughly 5x below the paper's anchor).
  caveat: >-
    The ITv2 initiation-mass observable was not captured
    (listeners.itv2.initiation_mass emit/path gap), so the headline match cannot
    be judged - it needs a re-run with the path emitted.
  lit_match: "Fu-Xiao-Jun 2023 ITv2 (not yet validated)"
  key_metrics:
  - {label: "v2ecoli baseline ATP fraction", value: "~0.94", status: fail}
  - "band [0.2, 0.5]"
  - {label: "ITv2 mass match", value: "no data", status: warn}
  purpose: >-
    Validate v2ecoli's whole-cell DnaA mechanism against the Fu/Xiao/Jun (2023)
    initiator-titration model v2 (ITv2) analytical reference, testing whether
    v2ecoli reproduces the analytical initiation mass, DnaA-ATP/ADP oscillation
    amplitude, and 1/N synchrony scaling at matched parameters — and whether a
    default-parameter divergence closes once model_settings are retuned to the
    FXJ paper's values.
  setup: >-
    Three-way comparison against the standalone ITv2 analytical model (WT, paper
    canonical parameters, RIDA enabled) as baseline: the ITv2 standalone run, the
    v2ecoli baseline composite at default ParCa parameters, and the v2ecoli
    baseline+dnaa-02 nucleotide-cycle composite with model_settings retuned to
    FXJ values (DnaA into the [300,800] band, intrinsic hydrolysis 0.046/min,
    ATP-fraction clamp toward [0.2,0.5], rida-v0 mechanism).
  result: >-
    Ran in coordinated generation gen-20260522T003700Z-9fcb58. Of the three
    primary tests: (1) the ITv2 initiation-mass match has NO DATA — the
    observable listeners.itv2.initiation_mass was not captured for the itv2 run
    (a path/emit gap), so it cannot be evaluated; (2) the v2ecoli-baseline
    DnaA-ATP-fraction convergence test FAILED — the default-parameter v2ecoli
    baseline sits at ~0.94, well outside the Boesen 2024 [0.2, 0.5] band; and
    (3) the ITv2-vs-v2ecoli initiation-mass agreement is a cross-run-compare
    measure the scalar evaluator cannot auto-verdict, so its verdict refresh is
    pending. The three comparative figures (cell volume vs time, DnaA-ATP count
    vs time, and DnaA-ATP fraction vs time with the Boesen 2024 [0.2,0.5] band
    marked) all rendered with data.
  interpretation: >-
    If v2ecoli's mechanism captures the biology, it should converge to the
    analytical prediction once parameters are matched; the default-parameter
    v2ecoli is expected to diverge because it produces ~115 DnaA/cell, roughly 5x
    below the paper's c_I=600/µm³ anchor, while the parameter-tuned variant
    should close that gap. Any residual divergence after parameter matching points
    at structural/mechanism differences worth flagging for expert review.
  decision: >-
    Inconclusive on validation, with one clear negative. The v2ecoli baseline
    DnaA-ATP fraction (~0.94) sits far above the physiological [0.2, 0.5] band,
    confirming the default-parameter mechanism does not reproduce the expected
    nucleotide-cycle balance. The ITv2 initiation-mass match cannot be judged
    until the listeners.itv2.initiation_mass observable is captured, and the
    cross-run initiation-mass agreement awaits an evaluator that can verdict a
    cross_run_compare measure. No overall pass can be claimed until the
    capture/evaluation gaps are closed.
  next_action: >-
    No follow_up_studies are recorded yet; this study itself is the follow-up to
    dnaa-04-initiation-mechanism, validating that mechanism against the external
    analytical reference at matched parameters.

# ─── QUESTION ───────────────────────────────────────────────────────────
question: |
  Does v2ecoli's whole-cell DnaA mechanism reproduce the analytical predictions
  of the Fu/Xiao/Jun (2023) initiator-titration model v2 — specifically the
  initiation mass v_i = (1/c_I)(α·N_B + n_B), the cell-cycle-stable
  DnaA-ATP/ADP oscillation amplitude, and the 1/N synchrony scaling — at
  matched parameter settings? And if v2ecoli at default parameters diverges
  from the analytical reference, does it converge once we tune
  model_settings to the FXJ paper's values?

# ─── ASSUMPTIONS ────────────────────────────────────────────────────────
assumptions:
- text: The initiator-titration model v2 is a faithful low-resolution analogue of E. coli DnaA-driven initiation. Its initiation mass + cell-cycle synchrony predictions are validated against single-cell data in the paper.
  cites: [FuXiaoJun2023]
  verified_in_v2ecoli: false
  note: This is the model-validation reference. We treat it as the analytical baseline.
- text: At matched parameters, v2ecoli's DnaA mechanism should produce initiation events at the same mean cell volume (initiation mass) as ITv2 within ±10%.
  cites: [FuXiaoJun2023, Boesen2024PNAS]
  verified_in_v2ecoli: false
- text: v2ecoli's default ParCa-fitted DnaA parameters produce DnaA at 8.6th percentile of the proteome (~115 / cell), 5× below the FXJ paper's c_I = 600/µm³ assumption. The retuned variant uses the paper's value.
  cites: [Schmidt2016, Mori2021]
  verified_in_v2ecoli: true
  note: See dnaa-01 chart 04_te_percentile for the root-cause analysis.

# ─── CONDITIONS ─────────────────────────────────────────────────────────
conditions:
  # The "baseline" of this study is the FXJ analytical model — the
  # reference against which the two v2ecoli variants are compared.
  baseline:
    composite: v2ecoli.composites.initiator_titration_v2.initiator_titration_v2
    params:
      tau_min: 60.0          # M9-glucose slow growth (paper Fig. 3c)
      C_min: 40.0            # paper §IIB
      D_min: 20.0
      N_B: 300               # paper canonical
      n_B: 10                # paper canonical
      c_I_per_um3: 600.0     # paper Schmidt2016 anchor
      nu_intrinsic_per_min: 0.046
      nu_rida_per_min: 0.20  # WT — RIDA active
      seed: 0

  variants:
    - name: itv2-standalone-wt
      composite: v2ecoli.composites.initiator_titration_v2.initiator_titration_v2
      description: |
        The analytical reference. Wild-type ITv2 with paper canonical
        parameters; RIDA enabled. Expected: stable periodic initiation
        with v_i ≈ (N_B + n_B)/c_I ≈ 310/600 ≈ 0.52 µm³ at τ=C+D=60min.
      params:
        seed: 0

    - name: v2ecoli-baseline-default
      composite: v2ecoli.composites.baseline.baseline
      description: |
        v2ecoli's current whole-cell composite at default ParCa
        parameters. The ~115 DnaA/cell shortfall from dnaa-01 means
        this run is unlikely to reach the FXJ-predicted initiation mass.
        Documents the default-parameter divergence.
      params:
        seed: 0

    - name: v2ecoli-with-fxj-params
      composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis
      description: |
        v2ecoli baseline + dnaa-02 nucleotide cycle, with model_settings
        retuned to the FXJ paper values (translation efficiency boost to
        bring DnaA into the [300, 800] band, intrinsic hydrolysis at
        0.046/min, ATP-fraction clamp targeting [0.2, 0.5]). Mechanism
        = rida-v0 to mirror ITv2's replication-dependent hydrolysis.
      params:
        seed: 0
        mechanism: rida-v0

  # Knobs the modeller can tune — for ITv2, these match the paper's
  # mechanistic parameters. For the v2ecoli variants they map onto the
  # corresponding study yamls' model_settings (dnaa-01 translation
  # efficiency, dnaa-02 hydrolysis rate).
  model_settings:
  - name: tau_min
    description: |
      Mass-doubling time τ in minutes. Sets λ = ln(2)/τ. Slow growth
      (τ > C+D) reproduces the n=0 regime; fast growth (τ < C) tests
      multifork stability. Paper Fig. 3c sweeps C/τ across 0 → 4.
    type: number
    default: 60.0
    current: 60.0
    gate: optional
    range: [10.0, 180.0]
    cites: [FuXiaoJun2023]
  - name: c_I_per_um3
    description: |
      Target DnaA concentration in copies / µm³. Paper anchors to
      Schmidt 2016 mass-spec at ~600/µm³. The default-parameter
      v2ecoli baseline produces ~115/µm³ (5× below) — see dnaa-01
      chart 04 for the proteome-percentile root cause.
    type: number
    default: 600.0
    current: 600.0
    gate: optional
    range: [100.0, 1500.0]
    cites: [FuXiaoJun2023, Schmidt2016, Mori2021]
  - name: nu_rida_per_min
    description: |
      RIDA hydrolysis rate (per minute) when ≥1 fork is active. WT
      should be ~0.2; the Δ4 mutant condition (RIDA + DARS + DDAH
      disabled) is recovered by setting this to 0. Per paper Fig. 5c,
      WT is stable, Δ4 shows oscillatory initiation in C/τ > 1.
    type: number
    default: 0.20
    current: 0.20
    gate: optional
    range: [0.0, 1.0]
    cites: [FuXiaoJun2023, Katayama2017Frontiers]

# ─── TESTS ──────────────────────────────────────────────────────────────
tests:
- name: itv2-initiation-mass-matches-analytical
  classification: primary
  question: Does the standalone ITv2 run produce initiation mass within ±5% of the analytical prediction?
  measure:
    kind: listener_median
    path: listeners.itv2.initiation_mass
    window: second_half
  pass_if:
    op: in_range
    low: 0.49        # 0.52 * 0.95
    high: 0.55       # 0.52 * 1.06
  status: no-data
  verdict: >-
    No data — observable not captured. listeners.itv2.initiation_mass was not
    emitted for the itv2 run in gen-20260522T003700Z-9fcb58 (path/emit gap), so
    this test cannot be evaluated.
  cites: [FuXiaoJun2023]
  run_ids: []

- name: v2ecoli-baseline-dnaa-atp-fraction-converges
  classification: primary
  question: Does the v2ecoli baseline DnaA-ATP fraction settle in the Boesen 2024 band [0.2, 0.5]?
  measure:
    kind: listener_median
    path: listeners.dnaA_cycle.atp_fraction
    window: second_half
  pass_if:
    op: in_range
    low: 0.2
    high: 0.5
  status: fail
  verdict: >-
    FAIL — measured ~0.94 in gen-20260522T003700Z-9fcb58, outside the Boesen
    2024 band [0.2, 0.5]. The default-parameter v2ecoli baseline holds DnaA-ATP
    far above the physiological fraction.
  cites: [Boesen2024PNAS, FuXiaoJun2023]
  run_ids: []

- name: itv2-vs-v2ecoli-initiation-mass-agreement
  classification: primary
  question: At matched parameters, do the analytical model and v2ecoli-with-fxj-params produce initiation masses within ±10% of each other?
  measure:
    kind: cross_run_compare
    paths:
      reference: listeners.itv2.initiation_mass
      candidate: listeners.cell.volume_at_initiation
    window: second_half
  pass_if:
    op: relative_diff_at_most
    value: 0.10
  status: verdict-refresh-pending
  verdict: >-
    Verdict refresh pending — this is a cross_run_compare measure that the
    scalar evaluator cannot auto-verdict. Needs a cross-run-capable evaluator
    before a pass/fail can be recorded.
  cites: [FuXiaoJun2023]
  run_ids: []

# ─── COMPARATIVE VISUALIZATIONS ─────────────────────────────────────────
# Per-study comparative charts: overlay the baseline run + every variant
# run from THIS study's runs.db onto one chart. Rendered by the
# /api/investigation-run-unblocked worker after the last variant lands;
# the HTML files are written to studies/dnaa-05-itv2-comparison/viz/
# where the per-study viz auto-discovery surfaces them on the study's
# Visualizations tab and in the downloadable report.
#
# ``sim_name`` matches the ``simulations.name`` column in runs.db —
# the value pbg_runner records as the run's label. For variants it's
# the variant's own name; the baseline is recorded as the study slug
# itself per _post_study_run_baseline_for_test conventions.
comparative_visualizations:
  - name: cell-volume-vs-time
    title: Cell volume over time — baseline vs variants
    observable_path: listeners.itv2.volume
    y_label: cell volume (µm³)
    runs:
      - {sim_name: dnaa-05-itv2-comparison,    label: Baseline (ITv2 WT)}
      - {sim_name: itv2-standalone-wt,          label: ITv2 standalone (WT)}
      - {sim_name: v2ecoli-baseline-default,    label: v2ecoli default}
      - {sim_name: v2ecoli-with-fxj-params,     label: v2ecoli + FXJ params}

  - name: dnaa-atp-count-vs-time
    title: DnaA-ATP count over time — baseline vs variants
    observable_path: listeners.itv2.dnaa_atp_count
    y_label: DnaA-ATP (molecules / cell)
    runs:
      - {sim_name: dnaa-05-itv2-comparison,    label: Baseline (ITv2 WT)}
      - {sim_name: itv2-standalone-wt,          label: ITv2 standalone (WT)}
      - {sim_name: v2ecoli-baseline-default,    label: v2ecoli default}
      - {sim_name: v2ecoli-with-fxj-params,     label: v2ecoli + FXJ params}

  - name: dnaa-atp-fraction-vs-time
    title: DnaA-ATP fraction over time — baseline vs variants
    observable_path: listeners.itv2.dnaa_atp_fraction
    y_label: DnaA-ATP / total
    target_band: [0.2, 0.5]
    target_band_label: physiological band (Boesen 2024)
    runs:
      - {sim_name: dnaa-05-itv2-comparison,    label: Baseline (ITv2 WT)}
      - {sim_name: itv2-standalone-wt,          label: ITv2 standalone (WT)}
      - {sim_name: v2ecoli-baseline-default,    label: v2ecoli default}
      - {sim_name: v2ecoli-with-fxj-params,     label: v2ecoli + FXJ params}

# ─── STATUS ─────────────────────────────────────────────────────────────
status: ran-inconclusive  # ran in gen-20260522T003700Z-9fcb58; 1 fail, 1 no-data, 1 verdict-refresh-pending

