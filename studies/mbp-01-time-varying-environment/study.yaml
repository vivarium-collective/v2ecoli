schema_version: 3
name: mbp-01-time-varying-environment
created: '2026-05-22'
phase: Build

# Multi-axis status (Pass A, canonical).
# Advanced to Build phase 2026-05-26 (post chris_feedback_2026_05_26 §3 reframe):
# spec edits committed, EnvironmentDriver Step + baseline_time_varying_env
# composite + tests scaffolded with TODO markers, all behavior tests skipped
# with reason "Build-phase scaffold — EnvironmentDriver wire-up TODO" until
# the actual wire-up lands.
design_status: drafted
implementation_status: in_progress
simulation_status: not_run
evaluation_status: not_evaluated
expert_review_status: not_requested

baseline:
- name: time-varying-env-baseline
  composite: v2ecoli.composites.baseline_time_varying_env   # TODO — see implementation_requirements
  params: {seed: 0, cache_dir: out/cache}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Can v2ecoli's `media_update` / `exchange_data` Layer-1 Steps consume an
    externally-driven, time-varying nutrient pool — instead of the static
    media configuration baked into ParCa — such that metabolic exchange
    fluxes and growth rate respond correctly to declining glucose, declining
    DO, and other dynamic external concentrations?
  mechanism: |
    v2ecoli's baseline composite currently treats the external environment as
    a constant medium definition (constrained / unconstrained exchange sets
    parameterized at composite-build time, see v2ecoli/steps/media_update.py
    and metabolism's `exchange_data_from_media` method). For reactor
    coupling, the external pool must be a TIME-VARYING store that external
    physics writes into each timestep. This study introduces an
    `EnvironmentDriver` Step (or a thin extension to `media_update`) that
    reads from an `environment.external_concentrations` store (`map[float]`,
    mM) and updates the constraints feeding metabolism each step. Reactor /
    BiRD coupling (mbp-03) writes to that store; this study verifies the
    plumbing in isolation by driving it with synthetic trajectories.
  expected_outcome: |
    **mbp-01 is a PLUMBING study only** (per chris_feedback_2026_05_26 §3
    + investigation `discipline.scope_discipline`). It verifies that the
    store→constraint wire works under extreme/saturating inputs that are
    robust to v2ecoli's internal transport-kinetics functional form
    (saturable MM / constant-bound / linear). Quantitative biological-
    fidelity (gradient shape, μ response to glucose decline near Km,
    acetate flux shift at sub-Vmax DO) is DEFERRED to a downstream
    `transport-kinetics-fidelity` study — a candidate-future-study under
    mbp-06 axis A.

    Concretely under this study:
      - External-concentration changes propagate to metabolism's exchange
        constraint within one timestep (plumbing wire).
      - Cumulative mass balance closes (no leakage in the env-driver wire).
      - With external glucose held at 0, glucose exchange flux ≈ 0. Same
        for DO at zero. Universal biological floor; plumbing-confirming.
      - With external glucose at 5 g/L vs 50 g/L (both far above PTS Km),
        glucose uptake plateaus within ratio 0.9–1.1 (discriminates
        physical saturable/constant-bound implementations from unphysical
        linear scaling).
      - With external glucose at saturating 50 g/L, glucose uptake ≤
        published Vmax ceiling for E. coli glucose-PTS (~10–12 mmol/gDW/h).
      - Static-medium regression unchanged.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites: []
  enables:
    - mbp-03-bird-reactor-coupling
  gate_status_summary: |
    First v2ecoli-enhancement study; no upstream dependencies. Gates the
    reactor-coupling work — until the environment hook exists, BiRD's
    dissolved O2 cannot drive v2ecoli's metabolism.
  proceed_condition: |
    All plumbing tests pass (external_glucose_updates_propagate_within_one_step;
    cumulative-mass-balance-closes; static-env-baseline-unchanged) AND all
    qualitative-extreme tests pass (zero-substrate-blocks-uptake;
    saturating-substrate-respects-vmax; plateau-across-saturating-range).
    Gradient-shape / quantitative-biology tests are explicitly OUT of scope
    (deferred to `transport-kinetics-fidelity` candidate-future-study).


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
# Per chris_feedback_2026_05_26 §3: linear-glucose-decline and do-clamp-low
# REMOVED. Their tests assumed a transport-kinetics functional form (linear
# response, sub-µM DO clamp below terminal-oxidase Km) that v2ecoli does not
# necessarily provide. Replaced with extreme/saturating-input sims that are
# robust to whichever form metabolism_redux implements internally.
simulation_set:

- name: zero-substrate-clamp
  base_model: v2ecoli.composites.baseline_time_varying_env
  perturbation:
    external_glucose_clamp_gL: 0.0
    external_DO_clamp_mmolL:   0.0
  condition: glucose-minimal
  duration_min: 30
  seeds: [0]
  readouts:
    - external_glucose
    - external_DO
    - metabolism_glucose_uptake_flux
    - metabolism_o2_uptake_flux
  applies_tests:
    - zero-substrate-blocks-uptake
  status: planned

- name: saturating-glucose-low
  base_model: v2ecoli.composites.baseline_time_varying_env
  perturbation:
    external_glucose_clamp_gL: 5.0   # ~28 mM, well above PTS Km ~3-10 µM
  condition: glucose-minimal
  duration_min: 30
  seeds: [0]
  readouts:
    - external_glucose
    - metabolism_glucose_uptake_flux
  applies_tests:
    - saturating-substrate-respects-vmax
    - plateau-across-saturating-range   # joint with saturating-glucose-high
  status: planned

- name: saturating-glucose-high
  base_model: v2ecoli.composites.baseline_time_varying_env
  perturbation:
    external_glucose_clamp_gL: 50.0   # ~280 mM, ~30,000x PTS Km
  condition: glucose-minimal
  duration_min: 30
  seeds: [0]
  readouts:
    - external_glucose
    - metabolism_glucose_uptake_flux
  applies_tests:
    - saturating-substrate-respects-vmax
    - plateau-across-saturating-range   # joint with saturating-glucose-low
  status: planned

- name: linear-glucose-decline
  base_model: v2ecoli.composites.baseline_time_varying_env
  perturbation:
    external_glucose_trajectory: linear_decline
    glucose_start_gL: 5.0
    glucose_end_gL:   0.0
  condition: glucose-minimal
  duration_min: 60
  seeds: [0]
  readouts:
    - external_glucose
    - metabolism_glucose_uptake_flux
    - cell_mass
  applies_tests:
    - external_glucose_updates_propagate_within_one_step
    - cumulative-mass-balance-closes
  status: planned

- name: static-env-regression
  base_model: v2ecoli.composites.baseline_time_varying_env
  perturbation: null   # use static medium config; same as plain baseline
  condition: M9-minimal-glucose
  duration_min: 60
  seeds: [0]
  readouts: [cell_mu_per_h, dnaA_protein_count]
  applies_tests:
    - static-env-baseline-unchanged
  status: planned


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: v2ecoli.composites.baseline
  new_state_variables:
    - "environment.external_concentrations (map[float], mM) — populated by external physics each timestep"
  new_processes:
    - {name: EnvironmentDriver, kind: Step, requirement_id: req-1-env-driver}
  new_parameters:
    - {name: env_driver_mode, default: external_store, units: "{static|external_store|synthetic_trajectory}"}
    - {name: env_driver_trajectory_spec, default: null, units: "—"}
  modified_processes:
    - "media_update / exchange_data: read external_concentrations (when env_driver_mode != static) instead of static media config. Backward-compatible default."
  notes: |
    Internal v2ecoli enhancement — the smallest viable hook that lets
    external physics drive v2ecoli's metabolism. Implementation must keep
    the static-medium path untouched for existing baseline regressions
    (verified by the static-env-regression sim above).


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "v2ecoli's metabolism Process can re-read environment constraints every step (it already does via `exchange_data_from_media`)."
  - "External concentrations are well-mixed (single value per species across all agents in this single-cell study)."
  - "No timestep mismatch handled this phase — env updates and metabolism updates run on the same timebase."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:
- {name: external_glucose,               store_path: "environment.external_concentrations.GLC[p]",           units: mM,           status: planned}
- {name: external_DO,                    store_path: "environment.external_concentrations.OXYGEN-MOLECULE[p]", units: mM,         status: planned}
- {name: metabolism_glucose_uptake_flux, store_path: "agents.0.metabolism.external_exchange_fluxes.GLC[p]",  units: "mmol/(gDW·h)", status: planned}
- {name: metabolism_o2_uptake_flux,      store_path: "agents.0.metabolism.external_exchange_fluxes.OXYGEN-MOLECULE[p]", units: "mmol/(gDW·h)", status: planned}
- {name: metabolism_acetate_flux,        store_path: "agents.0.metabolism.external_exchange_fluxes.ACET[p]", units: "mmol/(gDW·h)", status: planned}
- {name: cell_mu_per_h,                  store_path: agents.0.listeners.mass.instantaneous_growth_rate,    units: "1/h",        status: planned}
- {name: cell_mass,                      store_path: agents.0.listeners.mass.cell_mass,                    units: fg,           status: planned}
- {name: dnaA_protein_count,             store_path: agents.0.listeners.monomer_counts.monomerCounts,      index_by: {type: monomer_id, value: "PD03831[c]"}, units: molecules/cell, status: available}


behavior_tests:

# Plumbing (mechanism, no biology invoked) — these tests verify the
# store→constraint wire works. They do NOT make claims about v2ecoli's
# internal transport-kinetics functional form.

- name: external_glucose_updates_propagate_within_one_step
  classification: primary
  acceptance_form: qualitative_direction
  description: "An external_glucose store update is reflected in metabolism's GLC[p] exchange constraint within one timestep. Direct wire check — replaces the removed `uptake-flux-tracks-external-glucose` Pearson test (which assumed linear response between concentration and uptake; v2ecoli's PTS is saturable)."
  measure: {kind: one_step_propagation, source_path: "environment.external_concentrations.GLC[p]", sink_path: "agents.0.metabolism.exchange_constraints.GLC[p]"}
  pass_if: {op: propagates_within, value: 1}
  units: timesteps
  requires_simulation: linear-glucose-decline
  cites: []

- name: cumulative-mass-balance-closes
  classification: primary
  acceptance_form: quantitative_range
  description: "Cumulative external-glucose decrease (integral over the run) matches cumulative v2ecoli glucose-uptake flux integral within numerical tolerance — the environment hook is wired without leakage."
  measure: {kind: derived_ratio, numerator: cumulative_uptake_mmol, denominator: cumulative_external_drop_mmol}
  pass_if: {op: in_range, low: 0.9, high: 1.1}
  units: fraction
  requires_simulation: linear-glucose-decline
  cites: []

- name: static-env-baseline-unchanged
  classification: primary
  acceptance_form: quantitative_range
  description: "With env_driver_mode=static, the composite produces the same baseline trajectory (e.g. DnaA count, growth rate) as the unmodified v2ecoli.composites.baseline. Regression guard."
  measure: {kind: trajectory_match, reference: "v2ecoli.composites.baseline:default-run", series: [dnaA_protein_count, cell_mu_per_h]}
  pass_if: {op: numerical_match, tolerance: 0.01}
  units: "—"
  requires_simulation: static-env-regression
  cites: []

# Qualitative extreme-case (biology floor + ceiling, robust to functional
# form). At the extremes (S = 0; S >> Km), all plausible transport
# implementations agree on what should happen. That's where these tests
# work — robust to functional-form uncertainty, cheap to author,
# biology-grounded.

- name: zero-substrate-blocks-uptake
  classification: primary
  acceptance_form: qualitative_direction
  description: "external_glucose held at 0 → glucose exchange flux ≈ 0 (numerical tolerance). Same for DO: zero external DO → O2 exchange flux ≈ 0. Universal biological floor; also confirms plumbing."
  measure: {kind: multi_path_max_abs, paths: ["agents.0.metabolism.external_exchange_fluxes.GLC[p]", "agents.0.metabolism.external_exchange_fluxes.OXYGEN-MOLECULE[p]"], window: full}
  pass_if: {op: at_most, value: 0.01}
  units: "mmol/(gDW·h)"
  requires_simulation: zero-substrate-clamp
  cites: []

- name: saturating-substrate-respects-vmax
  classification: primary
  acceptance_form: quantitative_range
  description: "external_glucose held at 50 g/L (~30,000× PTS Km) → glucose exchange flux ≤ published Vmax for E. coli glucose-PTS (~10–12 mmol/gDW/h). Catches the unphysical linear-scaling implementation case."
  measure: {kind: series, path: "agents.0.metabolism.external_exchange_fluxes.GLC[p]", reduce: max_abs, window: full}
  pass_if: {op: at_most, value: 12.0}
  units: "mmol/(gDW·h)"
  requires_simulation: saturating-glucose-high
  cites: []   # TODO claims.yaml: glucose-pts-vmax-ecoli (~10-12 mmol/gDW/h)

- name: plateau-across-saturating-range
  classification: primary
  acceptance_form: quantitative_range
  description: "Two runs at 5 g/L and 50 g/L (both far above PTS Km) → GUR within a tight ratio tolerance. Both above Km, so saturable and constant-bound models predict matching GUR; linear scaling would predict ~10× difference. Direct discriminator between physical and unphysical implementations."
  measure: {kind: cross_run_ratio, runs: [saturating-glucose-low, saturating-glucose-high], path: "agents.0.metabolism.external_exchange_fluxes.GLC[p]", reduce: mean, window: full}
  pass_if: {op: in_range, low: 0.9, high: 1.1}
  units: fraction
  requires_simulation: saturating-glucose-low   # joint with saturating-glucose-high
  cites: []


# ─── 5b. REQUIRED KNOWLEDGE ─────────────────────────────────────────────────
# Claims (from references/claims.yaml) whose `regime` matches this study and
# whose provenance backs the behavior_tests above. The biological-BDD loop
# reads: this study EXPECTS these claims to hold under its conditions, and
# its acceptance tests are the operational check.
required_knowledge:
  claims:
    # Note (chris_feedback_2026_05_26 §3): mbp-01 is plumbing-only. Claims
    # about transport kinetics (saturable PTS, terminal-oxidase Km, acetate-
    # overflow-at-low-DO) are not backed by mbp-01 tests — they back the
    # downstream `transport-kinetics-fidelity` candidate-future-study.
    - id: glucose-pts-vmax-ecoli   # TODO add to claims.yaml; ~10-12 mmol/gDW/h
      backs: [saturating-substrate-respects-vmax]
    - id: substrate-floor-zero-blocks-uptake   # TODO add to claims.yaml; mass-action floor at S=0
      backs: [zero-substrate-blocks-uptake]
    - id: saturable-transport-plateau   # TODO add to claims.yaml; Michaelis-Menten-style transport saturates above ~10x Km
      backs: [plateau-across-saturating-range]
  open_questions:
    - id: env-driver-cadence
      question: |
        Is per-timestep external_concentrations update fast enough, or does
        metabolism need a longer "constant medium" window (e.g. 1 min) to
        avoid solver-instability artifacts in v2ecoli's FBA inner solve?
      blocks: [linear-glucose-decline implementation]
      asked_to: unassigned
      status: open
    - id: static-env-default-key
      question: |
        Should env_driver_mode default to `static` (preserves existing
        baseline behavior, opt-in to time-varying) or `external_store`
        (opt-out)? Preference is `static` for backward compatibility but
        confirm with v2ecoli baseline maintainer.
      blocks: [req-2-time-varying-composite spec]
      asked_to: unassigned
      status: open
    - id: functional-form-metadata-on-claims
      question: |
        Should claims carry a `functional_form` field (saturable / step /
        linear / threshold) so tests can pick the right measure shape and
        lint-time validation can flag mismatched bindings? Raised in
        chris_feedback_2026_05_26 §2 as a pbg-superpowers schema extension.
        Tracked as an upstream PR candidate via mbp-06 axis-E.
      blocks: [pbg-superpowers PR scope]
      asked_to: pbg-superpowers maintainer
      status: open


# ─── 5c. FAILURE MODES ──────────────────────────────────────────────────────
# What might go wrong during impl, and what to check.
failure_modes:
  - signature: "uptake-flux-tracks-external-glucose fails with r ~ 0"
    candidate_causes:
      - "EnvironmentDriver Step writes external_concentrations BEFORE media_update reads (ordering bug)"
      - "media_update caches the medium definition past one timestep"
      - "exchange_data constraints recomputed from a stale media object"
    checks:
      - "Sample external_glucose and metabolism flux at the same timepoint; both should track monotonic decline"
      - "Debug listener on metabolism.exchange_data_from_media's output set; verify it updates each step"
  - signature: "static-env-baseline-unchanged FAILS"
    candidate_causes:
      - "EnvironmentDriver runs even with env_driver_mode=static and overwrites the constant medium"
      - "Composite-build wiring changes Layer-1 Step ordering"
    checks:
      - "Diff per-cell observables vs an unmodified baseline run at seed 0 — should be byte-identical"
      - "Verify EnvironmentDriver short-circuits in static mode"
  - signature: "cumulative-mass-balance-closes off by >10%"
    candidate_causes:
      - "EnvironmentDriver writes concentrations in different units than metabolism reads (mM vs mmol/L vs g/L)"
      - "Per-cell uptake flux not multiplied by cell mass to get total mmol uptaken"
      - "Volume not held constant in the batch run"
    checks:
      - "Print unit annotations on each store write"
      - "Verify the integrand: total_uptake = sum_t(flux × cell_mass × dt)"


# ─── 5d. REGRESSION ────────────────────────────────────────────────────────
# Tests from earlier studies that MUST continue to pass once this study's
# impl PR merges (every accepted study's tests join the permanent regression
# suite — see investigation.yaml.discipline.regression).
regression_tests:
  inherits_from: []   # First study in the chain — no upstream tests yet.


# ─── 6. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "PLUMBING-ONLY scope (per chris_feedback_2026_05_26 §3). Gradient-shape and quantitative-biological-fidelity tests (e.g. μ response to glucose decline near Km, acetate flux shift at sub-Vmax DO, GUR-vs-[glucose] curve) are deferred to a `transport-kinetics-fidelity` candidate-future-study under mbp-06 axis A."
  - "REMOVED tests with rationale (kept here so future agents don't re-add them by reflex): `uptake-flux-tracks-external-glucose` (Pearson ≥ 0.7 assumed linear response; real PTS is saturable, ~3 orders of magnitude above the sweep range — test fails on every realistic implementation). `low-do-clamp-reduces-o2-uptake` (5 µM DO clamp is 25-200× above cytochrome bd/bo3 Km, so OUR shouldn't reduce at this clamp; Vemuri 2006 supports acetate-RISE under low DO, not OUR-drop — citation/test mismatch). `mu-drops-when-glucose-depletes` (kinetics-dependent; defer to transport-kinetics-fidelity study)."
  - "Single cell only; population aggregation is mbp-02's job."
  - "Reactor physics (kLa, gas transport) not coupled here — that is mbp-03."
  - "Time-varying-medium support assumes the same exchange-molecule set as static medium; new species require ParCa regeneration."


# ─── 7. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-env-driver
  kind: process
  title: EnvironmentDriver Step
  effort: S
  description: |
    PBG Step that, each timestep, writes to environment.external_concentrations
    from either (a) an external source store (default for reactor coupling),
    or (b) a synthetic trajectory function (for unit testing this phase).
    Hooks the existing media_update to read from this store when
    env_driver_mode != static.
  unblocks: [linear-glucose-decline, do-clamp-low, all primary tests]

- id: req-2-time-varying-composite
  kind: composite
  title: v2ecoli.composites.baseline_time_varying_env
  effort: XS
  description: |
    Thin wrapper around v2ecoli.composites.baseline that injects
    EnvironmentDriver and the environment.external_concentrations store.
    Backward-compatible default: env_driver_mode=static.
  unblocks: [all mbp-01 simulations]


bibliography:
  expert: [multiscale_bioprocess_roadmap, chris_feedback_2026_05_26]
  bib_keys: []   # Vemuri2006 removed — backed only the deleted low-DO-clamp test


runs: []


tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
