schema_version: 1
name: colonies
title: Colony Composite — HPC Scaling Readiness
created: '2026-05-16'
status: in_progress

question: |
  How many whole-cell E. coli agents can we fit per HPC node, and at
  what per-cell wall-time cost, so that a colonies-on-HPC workload is
  realistic to plan against? More fundamentally: does the multi-cell
  colony composite (each cell embedding the full 55-process WCM via
  EcoliWCM) actually support clean parallel growth + division at
  scale, or are there per-cell-cost or per-cell-RAM cliffs that show
  up only at N > 1?

hypothesis: |
  After fixing daughter-process hydration, the colony composite scales
  linearly with N (per-cell wall ≈ constant, per-cell RAM ≈ constant)
  on a single machine for N up to at least 8, and the dominant cost
  is the inner EcoliWCM (not pymunk or scheduler). HPC sizing is then
  a function of (RAM_per_node / RAM_per_cell, cores_per_node /
  cells_per_process_at_realtime). The single bottleneck visible at
  laptop scale will be the Python GIL — process-bigraph composites
  are single-threaded by design, so HPC scaling means scaling
  processes, not cells per process.

description: |
  Two-study investigation to certify the colony composite for HPC
  deployment.

  Study 1 — colonies-01-hpc-readiness (this study):
    Build phase: fix daughter-process hydration so structural _add
    instantiates daughter EcoliWCMs through the composite engine.
    Decide phase: N-sweep (N ∈ {1, 2, 4, 8}) on one machine to
    extract per-cell wall-time + RSS scaling and identify the
    bottleneck. Produces a recommended cells/process and
    cells/HPC-node budget.

  Study 2 — colonies-02-hpc-deployment (planned):
    Cross-node validation of the projected sizing. Run the
    recommended cells-per-process count across many processes on
    one HPC node, then across multiple nodes; confirm per-cell wall
    stays within ±20% of the laptop projection and that biology is
    consistent between distributed configurations.

studies:
  - colonies-01-hpc-readiness
  # - colonies-02-hpc-deployment   # added when scaffolded

acceptance_criteria:
