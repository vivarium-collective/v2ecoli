schema_version: 3
name: mbp-02-kla-gas-transport
created: '2026-05-22'
status: planned
phase: Design

baseline:
- name: batch-with-kla
  composite: multiscale_bioprocess.composites.batch_reactor_kla   # TODO: not yet built
  params: {seed: 0}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Does adding kLa-driven Henry's-law gas-liquid transport for O2 and CO2
    make dissolved-O2 dynamics emerge from the balance of aeration-driven
    transfer and cell consumption — dropping below saturation under demand,
    rising toward saturation with higher kLa, and converging to Henry
    equilibrium when cells are absent?
  mechanism: |
    Gas-liquid transfer rate OTR = kLa·(C* − C), with the saturation
    concentration C* from Henry's law given gas-phase composition and
    aeration. kLa correlations are lifted from prior art (Higbie penetration /
    Wilke-Chang diffusivity lineage; pbg-bioreactordesign / BiRD) with
    attribution. Dissolved O2 is now dynamic state (the Phase 1 fixed
    parameter is removed); CO2 produced by cells partitions to the gas phase
    under aeration. Reactor remains well-mixed; the cell side is still the
    Phase 1 Monod placeholder.
  expected_outcome: |
    With cells consuming O2, dissolved O2 falls below saturation; raising kLa
    raises steady-state dissolved O2. With cells absent, DO trajectories
    converge to Henry-law saturation. CO2 produced by cells partitions to the
    gas phase. No-consumption equilibrium concentrations match published Henry
    constants within tolerance.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - mbp-01-batch-reactor-scaffold
  enables:
    - mbp-03-dfba-substitution
  gate_status: hold
  gate_status_summary: |
    Blocked on mbp-01: needs the well-mixed reactor composite and its
    dissolved-phase state stores. Adds the transport layer the dFBA phase
    relies on for the low-DO overflow regime.
  proceed_condition: |
    Henry-equilibrium and kLa-direction acceptance tests pass; the
    no-consumption equilibrium matches published Henry constants within the
    tolerance set by the spec PR.


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

- name: no-cells-henry-equilibrium
  base_model: multiscale_bioprocess.composites.batch_reactor_kla
  perturbation: {cells_present: false}
  condition: aerated-no-cells
  duration_min: 120
  seeds: [0]
  readouts: [dissolved_O2, dissolved_CO2, henry_saturation_O2]
  applies_tests:
    - no-consumption-do-converges-to-henry-saturation
    - henry-equilibrium-matches-published-constants
  status: planned

- name: kla-sweep-with-cells
  base_model: multiscale_bioprocess.composites.batch_reactor_kla
  perturbation:
    kLa_per_h: [50.0, 150.0, 400.0]
  condition: glucose-minimal-batch-aerated
  duration_min: 600
  seeds: [0]
  readouts: [dissolved_O2, dissolved_CO2, biomass_gL]
  applies_tests:
    - consuming-cells-drop-do-below-saturation
    - higher-kla-raises-steady-state-do
    - cell-co2-partitions-to-gas-phase
  status: planned


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: multiscale_bioprocess.composites.batch_reactor_kla
  new_state_variables:
    - "reactor.gas_phase_O2, reactor.gas_phase_CO2 (mole fraction or partial pressure)"
  new_processes:
    - {name: GasLiquidTransport, kind: Process, requirement_id: req-1-kla-transport}
  new_parameters:
    - {name: kLa_O2_per_h, default: 150.0, units: "1/h"}
    - {name: kLa_CO2_per_h, default: 130.0, units: "1/h"}
    - {name: aeration_rate_vvm, default: 1.0, units: "vvm"}
    - {name: henry_O2, units: "mol/(L·atm)"}
    - {name: henry_CO2, units: "mol/(L·atm)"}
  modified_processes:
    - "WellMixedBatchReactor (mbp-01): dissolved O2/CO2 become dynamic state driven by transport + consumption; remove the fixed-DO parameter."


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "Well-mixed liquid and gas phases; no spatial gradients (CFD deferred)."
  - "Henry's law sets equilibrium saturation; kLa is a lumped volumetric coefficient."
  - "CO2–pH coupling is out of scope unless the spec PR pulls it in."
  - "Cell side is still the Monod placeholder; dFBA arrives in Phase 3."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:
- {name: dissolved_O2,        store_path: reactor.dissolved_O2,        units: mmol/L, status: planned}
- {name: dissolved_CO2,       store_path: reactor.dissolved_CO2,       units: mmol/L, status: planned}
- {name: henry_saturation_O2, store_path: reactor.diagnostics.O2_sat,  units: mmol/L, status: planned}
- {name: gas_phase_CO2,       store_path: reactor.gas_phase_CO2,       units: atm,    status: planned}


behavior_tests:

- name: consuming-cells-drop-do-below-saturation
  classification: primary
  description: "With cells consuming O2, steady-state dissolved O2 sits below Henry saturation."
  measure: {kind: derived_difference, a: reactor.dissolved_O2, b: reactor.diagnostics.O2_sat, reduce: mean, window: second_half}
  pass_if: {op: at_most, value: 0.0}
  units: mmol/L
  requires_simulation: kla-sweep-with-cells
  cites: [GardenGarciaOchoa2009BiotechAdv]

- name: higher-kla-raises-steady-state-do
  classification: primary
  description: "Across the kLa sweep, steady-state dissolved O2 increases monotonically with kLa."
  measure: {kind: cross_run_trend, x: kLa_per_h, y: dissolved_O2_steady}
  pass_if: {op: positive_monotonic}
  units: mmol/L
  requires_simulation: kla-sweep-with-cells
  cites: [GardenGarciaOchoa2009BiotechAdv]

- name: no-consumption-do-converges-to-henry-saturation
  classification: primary
  description: "With cells absent, dissolved O2 converges to the Henry-law saturation concentration."
  measure: {kind: derived_difference, a: reactor.dissolved_O2, b: reactor.diagnostics.O2_sat, reduce: final, window: full}
  pass_if: {op: abs_at_most, value: 0.01}
  units: mmol/L
  requires_simulation: no-cells-henry-equilibrium
  cites: [Sander2015AtmosChemPhys]

- name: cell-co2-partitions-to-gas-phase
  classification: supporting
  description: "CO2 produced by cells appears in the gas phase under aeration (gas-phase CO2 rises above its inlet value)."
  measure: {kind: series, path: reactor.gas_phase_CO2, reduce: max, window: full}
  pass_if: {op: at_least, value: 0.0004}   # > ~atmospheric inlet; refine in spec PR
  units: atm
  requires_simulation: kla-sweep-with-cells
  cites: [Sander2015AtmosChemPhys]

- name: henry-equilibrium-matches-published-constants
  classification: primary
  description: "No-consumption equilibrium dissolved O2/CO2 match published Henry constants within tolerance (tolerance set by spec PR; ±10% placeholder)."
  measure: {kind: derived_ratio, numerator: dissolved_O2_equilibrium, denominator: henry_predicted_O2}
  pass_if: {op: in_range, low: 0.9, high: 1.1}
  units: fraction
  requires_simulation: no-cells-henry-equilibrium
  cites: [Sander2015AtmosChemPhys]


# ─── 6. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "Lumped kLa; no impeller/sparger geometry or power-input correlations."
  - "Well-mixed gas phase; no headspace mixing dynamics."
  - "No CO2–carbonate–pH chemistry unless pulled in by the spec PR."


# ─── 7. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-kla-transport
  kind: process
  title: GasLiquidTransport Process
  effort: M
  description: |
    OTR = kLa·(C* − C) for O2 and CO2; C* from Henry's law given gas-phase
    composition + aeration. Lift kLa/Higbie/Wilke-Chang correlations from
    pbg-bioreactordesign / BiRD with attribution. Wire dissolved O2/CO2 as
    dynamic reactor state.
  unblocks: [all mbp-02 behavior_tests]


bibliography:
  expert: [multiscale_bioprocess_roadmap]
  bib_keys: [Sander2015AtmosChemPhys, GardenGarciaOchoa2009BiotechAdv]


runs: []

parent_studies:
  - {study: mbp-01-batch-reactor-scaffold, condition: tests-passed}

tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
