decision_log:
- step: 1
  phase: Discovery
  what_we_did: Validated D-period division trigger fix; ran v2ecoli + vEcoli acetate side-by-side; ran Stage 1 glycerol sim with C=70 / D=30 / dnaA-TE=1.0 / DARS-widening overrides; ran 5-gen acetate lineage to test multi-gen equilibration.
  findings_produced:
  - D-period trigger wired (with_aa cycle 45 -> 22.5 min).
  - v2ecoli matches vEcoli on acetate within ~15%.
  - Acetate cycle 81 min vs declared 136 min; FBA over-supply mechanism.
  - Multi-gen does NOT equilibrate (5 gens, no trend).
  - TF coverage gap (GlpR has data but not in 23-TF runtime set).
  - Glycerol medium added; setup compared to upstream 0a3c36d.
  feedback_source: null

