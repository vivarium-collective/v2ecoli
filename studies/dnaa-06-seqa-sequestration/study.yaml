evaluation_status: not_run
gate_status: pending
expert_review_status: pending
objective: Add SeqA sequestration at oriC and the dnaA promoter. SeqA cooperatively binds hemimethylated
  GATC sites (immediately after replication passes oriC) and prevents re-initiation for ~10 minutes. Same
  mechanism damps dnaAp activity post-replication.
description: Adds the eclipse-period regulator that prevents back-to-back initiations on the newly-replicated
  oriC. SeqA tetramers bind hemimethylated GATC sites cooperatively. Stub-level per the plan PDF (only
  "Cooperativity" listed under Required knowledge) — full design happens when this study activates.
purpose:
  question: Does adding SeqA sequestration prevent the back-to-back re-initiation events that Study 4
    / 5 might otherwise allow at fast growth rates?
  mechanism: SeqA tetramer cooperative binding to hemimethylated GATC sites at oriC + dnaAp. Bound state
    blocks DnaA-box accessibility. Slow dissociation (~10 min effective eclipse period).
  expected_outcome: Pending — when this study activates. Likely — eclipse period of ~10 min after each
    initiation; dnaAp activity drops post-initiation.
seeded_from:
  study: dnaa-05-rida-ddah-dars
  proposal_id: chromosome-replication-plan-study-6
