- title: "Investigate v2ecoli's lack of dnaA autorepression signature"
  kind: new
  effort: L
  status: open
  why: |
    With tf_binding's heavy listener populated AND DnaA-specific TF-axis
    slicing in place (req-6, done), the autorepression-correlation test
    yields Pearson r = +0.197 — weak POSITIVE correlation, not the
    strong negative predicted by literature (Speck 1999, Saggioro 2013).
    This is a real biology gap, not an infrastructure issue.
  hypothesized_mechanism: |
    Three candidates, in priority order:
    (1) The Y axis is still too coarse — summing all 3277 TU init events
        instead of slicing to the dnaA promoter's TU index. dnaA init
        events are a tiny fraction of cell-wide events, so cell-wide Y
        is dominated by other transcription.
    (2) The autorepression model in v2ecoli (tf_binding's dnaA→EG10235
        fold change) may not be strong enough to register over the noise.
    (3) The 10-minute window may be too short — autorepression operates
        on cell-cycle timescales (~60 min). Try multi-generation runs.
  unblocks:
  - autorepression-correlation may flip PASS once Y is dnaA-specific
  - Validates / falsifies v2ecoli's autorepression model
  acceptance:
  - Y axis sliced to dnaA TU index (needs sim_data mRNA_TU_ids lookup)
  - Re-evaluate; if still positive, escalate to expert review of fold_changes.tsv parameter for dnaA→EG10235

