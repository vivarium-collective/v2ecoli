tests:
- name: sbc-calibration-uniform-rank
  classification: primary
  description: 'ABC-SMC posterior of kinetic-ODE parameters is calibrated under Simulation-Based Calibration (Talts 2018):
    the rank-histogram of true parameter values within posterior draws is uniform (Cramér–von Mises p > 0.05) across L=200
    synthetic experiments. The fundamental check that the inference machinery is correct — deviations diagnose specific failure
    modes.'
  measure:
    source: scripts/run_sbc.py
    observable: rank of θ_true within N=100 posterior draws, repeated L=200 times
    reduce: Cramér-von Mises test of rank histogram vs Uniform(0, N)
  pass_if:
    operator: greater-than
    threshold: 0.05
    field: CvM_p_value
  requires_simulation: sbc-L200-N100
  cites:
  - talts2018
  - cook2006
- name: posterior-shrinks-with-data
  classification: primary
  description: Posterior 95% interval width monotonically decreases with the size of the observed dataset (1, 10, 100, 1000
    observation points). Asymptote at <30% of the prior width with 1000 points — confirms the data is informative for the
    posterior. Constant width = inference is ignoring the data.
  measure:
    source: scripts/run_abc_smc.py --vary-data-size
    observable: posterior 95% interval width per parameter
    reduce: ratio to prior width
  pass_if:
    operator: less-than
    threshold: 0.3
    field: shrinkage_at_N=1000
  requires_simulation: abc-data-scaling
  cites:
  - beaumont2010
- name: ppc-coverage-95-pct
  classification: supporting
  description: 'Posterior predictive check: ≥95% of held-out Phase 0 ensemble observations fall within the posterior predictive
    95% interval. Higher = overconfidence; lower = underconfidence.'
  measure:
    source: scripts/run_ppc.py
    observable: held-out observation coverage by posterior predictive 95% CI
    reduce: fraction
  pass_if:
    operator: within-band
    lower: 0.9
    upper: 0.99
    field: coverage
  requires_simulation: ppc-heldout-100
  cites:
  - gelman2013
