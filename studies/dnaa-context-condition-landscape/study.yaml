key_assumptions:
- Stage 1 PDF's stated reason for choosing ABT minimal glycerol ("to guarantee non-overlapping
  cell cycle, which avoids synchronization issue") is the dispositive rationale, not the τ value
  itself. Any future condition swap (e.g. another slow medium) must preserve the non-overlapping
  invariant.
- Acetate's role as the v2ecoli ↔ vEcoli reference rests on it being the slowest of the established
  v2ecoli conditions AND having an established vEcoli implementation we can compare against. If
  vEcoli adds glycerol natively at some point, that reference role can move.
- C and D are global scalars in v2ecoli (same across all conditions). The Stage 1 PDF's C=70 /
  D=30 prescription applies uniformly when the glycerol cache is built — it does NOT mean the
  other conditions get the same C/D values in production.
