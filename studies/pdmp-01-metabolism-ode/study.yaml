report:
  confidence: design-stage
  evidence_quality: first-run-confirmed
  conclusion: 'First run confirmed (2026-05-24): Millard 2017 SBML loads + simulates via pbg-copasi and recovers the published
    reference steady state for central carbon + energy metabolites (G6P, F6P, FDP, PEP, PYR, ATP/ADP, NADH/NADPH, MAL, AKG
    all match BioModels MODEL1505110000 initial values to solver tolerance). FBA-bridge composite and LQR control layer not
    yet built; Phase 0 ensemble comparison pending the v2ecoli baseline run.'
  main_insight: pbg-copasi gives us the published Millard model as a first-class PB process without re-deriving rate laws
    — Phase 1 effort goes to the LQR + FBA-bridge, not to ODE re-implementation.
  caveat: LQR reference trajectory must not reintroduce a teleonomic parameter in disguise; the causal/teleonomic partition
    is enforced per-parameter and audited via FIM conditioning (κ < 10⁸) before the model is declared inference-ready.
  lit_match: Millard et al. 2017 (PLOS Comp Biol)
  key_metrics:
  - label: Millard ODE standalone (pbg-copasi)
    status: pass
  - label: FBA-bridge composite
    status: stub
  - label: W₂ vs Phase-0 ensemble
    status: stub
    value: ≤ 5σ MC
  - label: FIM κ on causal params
    status: stub
    value: < 10⁸
visualizations:
- name: millard-atp-drain
  address: file:reports/figures/pdmp-01/millard_atp_drain.html
  description: 'Millard 2017 ATP-drain perturbation experiment: steady-state baseline (t=0–500s) → ATP cut to 30% of steady
    state at t=500s → recovery transient. 4-panel matplotlib chart: nucleotides (ATP/ADP/AMP), glycolysis intermediates (G6P/F6P/FDP/GAP/PEP/PYR),
    TCA cycle (CIT/ICIT/AKG/SUCCOA/FUM/MAL/OAA), and redox cofactors (NAD/NADH/NADP/NADPH). Demonstrates the Millard model
    recovers ATP to within 1% of steady-state within ~50 s after a 70% drain — fast because of the tight coupling between
    glycolytic flux and adenylate energy charge.'
- name: phase1-w2-interface-fidelity
  address: file:reports/figures/planned-comparisons/phase1_w2_interface_fidelity.html
  description: PLANNED — W₂(Millard ODE, Phase 0 v2ecoli) per central-metabolism intermediate. Green = within tolerance; amber
    = discuss; red = reject.
