  - {study: dnaa-01-expression-dynamics, behavior: dnaa-concentration-stable-within-10pct}
  - {study: dnaa-02-atp-hydrolysis,      behavior: dnaa-atp-fraction-in-physiological-range}
  - {study: dnaa-03-box-binding,         behavior: oric-stays-unoccupied-until-chromosome-saturates}
