# from 2026-05-27) were deleted from .pbg/composite-runs.db on 2026-05-28
# as part of the everything-parquet migration. Git history preserves the
# full audit trail; the entries below reflect what's actually findable
# post-migration.
runs:
  - simulation:      aggregator-cpa1-multigen
    simulation_id:   c0e3a175-25fc-49cf-8d72-b6168c2db9b1
    seed:            0
    cells_per_agent: 1.0
    started_at:      '2026-05-27 19:37:50'
    sim_seconds:     7200
