# ── Decide conclusion ──────────────────────────────────────────────────────
conclusion: |
  Phase = Decide. PIPELINE-OPEN to colonies-02-hpc-deployment with the
  caveats below.

  ──────────────────────────────────────────────────────────────────────
  Build phase fixes that were required to get here:

  1. viva-munk apply_updates_with_realize unpacked 2 values from
     bigraph_schema.core.realize, which now returns 3 (escape_merges).
     Every structural `_add` crashed before this was fixed. Patched.
     (See viva-munk branch rename-multi-cell-to-viva-munk, commit
     "fix: handle 3-tuple return from bigraph_schema core.realize".)
  2. v2ecoli/colony.py wired only `mass`/`volume`/`exchange` outputs on
     initial cells. `_handle_division` writes to `agents`, but with no
     `agents` wire on initial cells, the update had nowhere to land —
     mothers stayed put. Fixed by mirroring the full daughter wiring
     (`agent_id`/`location`/`angle` inputs, `length`/`agents` outputs).
  3. v2ecoli/bridge.py `_handle_division` hard-coded
     `interval=self.config.get('interval', 60.0)` for daughters; but
     `interval` is not in `config_schema`, so the fallback always won
     and daughters ticked once per 60s instead of inheriting the
     mother's 1s cadence. Fixed by passing `interval` through.

  After all three fixes: pure-WC N=2 colony with both initial cells
  force-divided produces 4 hydrated daughters that all advance.

  ──────────────────────────────────────────────────────────────────────
  Perf findings (steady-state, N ∈ {1, 2, 4, 8}, 60-tick window):

  - Per-cell wall is FLAT at 70-74 ms across N=1..8 (slight DECREASE
    with N — Python/import overhead amortizes). The
    per-cell-cost-within-2x-reference test passes at all N.
  - pymunk is essentially free (<0.2 ms/tick even at N=8). All cost
    is in the inner EcoliWCM composite (55 biological steps × N cells,
    walked sequentially in one Python thread).
  - RSS grows ~450 MB per added cell, atop a ~1 GB Python baseline.

  Bottleneck (at scale): the GIL. Process-bigraph composites are
  single-threaded by design; one process can use ~1 CPU core regardless
  of how many cells it holds. Scaling to many cells means scaling
  processes, not cells-per-process.

  ──────────────────────────────────────────────────────────────────────
  HPC node sizing (64-core / 256 GB target):

  - RAM-limited cell ceiling per node: 256 GB / 0.45 GB ≈ 570 cells
    (purely RAM-bound, single process — not practical at speed).
  - CPU-limited realtime ceiling per process: ~13 cells (13 × 73 ms ≈
    950 ms, ~realtime sim).
  - Practical recommendation: 8 cells/process × 64 processes = 512
    cells per node, RAM use 64 × (1 GB + 8 × 0.45 GB) = ~290 GB —
    just over the budget. Drop to 6 cells/process × 64 = 384 cells per
    node fits in 256 GB with ~10% headroom. Per-process tick wall is
    ~440 ms (~2× realtime).

  ──────────────────────────────────────────────────────────────────────
  What this study does NOT validate (handed to colonies-02):

  - Cross-node scaling, distributed environment field
  - Process-bigraph composite parallelism within a single process
    (not currently supported — would require engine work)
  - Multi-generation drift in per-tick cost (daughters' internal
    composites may bloat over many divisions; not tested here)
  - Per-cell ParCa cache contention if processes share cache_dir

followup_proposals:
- id: colonies-02-hpc-deployment
  status: seeded
  seeded_study: colonies-02-hpc-deployment
  title: Cross-node HPC deployment of the colony composite
  motivation: |
    Build acceptance and N-sweep both PASS on one machine. Per-cell cost
    is flat, pymunk is free, RAM grows linearly. Single-process is the
    right starting shape on HPC; orchestration is the remaining design.
  hypothesized_mechanism: |
    Per-cell wall matches single-machine projection within ±20% when
    cells/process is held at 6-8 and we scale across processes/nodes;
    biology is consistent across distributed configurations modulo RNG.
  seed:
    takes_as_input:
    - per_cell_ms = 73 ms (RAM-warm, post-warmup)
    - per_cell_rss = 450 MB (steady-state, single colony)
    - recommended cells/process = 6-8 (CPU-bound, ~2× realtime)
    pipeline_gate:
      prerequisites: [colonies-01-hpc-readiness]
      proceed_condition: |
        colonies-01-hpc-readiness.gate_status == passed AND
        per_cell_ms and per_cell_rss recorded.
    behavior_tests:
    - name: hpc-per-cell-within-20pct-of-projection
      classification: primary
    - name: cross-node-biology-consistency
      classification: primary

- id: multi-gen-perf-drift
  status: proposed
  title: Multi-generation perf drift study
  motivation: |
    The N-sweep here uses N initial cells held static. Real HPC workloads
    will have growing colonies (each division doubles N). We need to know
    whether per-cell wall stays at 73 ms or drifts as daughter EcoliWCM
    internal composites accumulate history / fragment caches / etc.
  hypothesized_mechanism: |
    Per-cell wall drifts ≤ 20% across gens 0-4 of a natural-division
    colony (~10000s sim). If drift > 20%, the inner composite is
    accumulating dead nodes or growing per-tick allocations.
  linked_finding: F-06-rss-growth-over-time
  seed:
    simulation_set:
    - name: gen-drift-1cell-4div
      perturbation: {n_cells: 1}
      duration_min: 180
      seeds: [0]
    behavior_tests:
    - name: per-cell-wall-drift-within-20pct
      classification: primary

- id: parca-cache-contention
  status: proposed
  title: Per-cell ParCa cache contention
  motivation: |
    All cells in this study share `out/cache`. If HPC processes also share
    cache, file-system contention may show up at scale and silently
    degrade per-cell perf. If per-process caches are needed, each cell
    adds ~the full ParCa cache footprint to RAM/disk.
  seed:
    behavior_tests:
    - name: shared-vs-per-process-cache-perf
      classification: primary

- id: gil-aware-engine-research
  status: proposed
  title: Make process-bigraph composite engine GIL-aware (research)
  motivation: |
    Every process in a composite ticks on one thread. For embarrassingly-
    parallel composites (independent cells), free parallelism is on the
    table if the engine supports concurrent process invocations
    (multiprocessing or thread-per-process with GIL-friendly bodies).
    Engine-level question that won't unblock colonies-02 but is worth
    scoping.
  linked_finding: F-02-gil-bottleneck
  seed:
    unblocks:
    - Single-process scaling beyond ~10 cells

findings:
- id: F-01-per-cell-wall-flat
  kind: computational
  status: confirms
  statement: |
    Per-cell wall time is flat at 70–74 ms across N ∈ {1, 2, 4, 8} (slight
    DECREASE with N as Python/import overhead amortizes). Composite scales
    linearly on one machine.
  evidence:
    from_runs: [nsweep-n1, nsweep-n2, nsweep-n4, nsweep-n8]
    from_test: per-cell-cost-within-2x-reference
    observed: {n1: 78, n2: 77, n4: 77, n8: 75}
    units: ms/tick/cell
  expected:
    summary: per-cell wall stays within 2× of the N=1 reference; flat is the
      strongest pass condition.
  provenance:
    run_ids: [3, 4, 5, 6]
    model_commit_hash: 2f950d9
    raw_data_artifact: studies/colonies-01-hpc-readiness/runs.db
    analysis_script: studies/colonies-01-hpc-readiness/sims/run.py
    random_seeds: [0]
  next_action: |
    Use 73 ms/tick/cell as the projection input for colonies-02-hpc-deployment.

- id: F-02-gil-bottleneck
  kind: computational
  status: novel
  statement: |
    The GIL is the dominant bottleneck at colony scale. Process-bigraph
    composites are single-threaded by design — one process uses ~1 CPU core
    regardless of how many cells it holds. Scaling means more processes, not
    more cells/process.
  evidence:
    from_run: nsweep-n8
    observed: pymunk_step_ms ≈ 0.1 ms/tick (free); ecoli_ms grows linearly with N
    units: ms/tick
  explanation: |
    All 55 inner WCM steps are walked sequentially in one Python thread.
    pymunk is free even at N=8, so any super-linear cost would have to be in
    the EcoliWCM update — but per-cell stays flat. The only ceiling visible
    is total wall vs realtime per process, which crosses ~1.0 around N≈13.
  provenance:
    run_ids: [6]
    model_commit_hash: 2f950d9
    raw_data_artifact: studies/colonies-01-hpc-readiness/runs.db
  next_action: |
    Seed gil-aware-engine-research follow-up.

- id: F-03-per-cell-rss
  kind: computational
  status: confirms
  statement: |
    Steady-state per-cell RSS is ~450 MB, atop a ~1 GB Python baseline
    (ParCa + WCM imports + cached numpy arrays).
  evidence:
    from_run: nsweep-n8
    from_test: per-cell-cost-within-2x-reference
    observed: {n1_mb: 1508, n2_mb: 2013, n4_mb: 2946, n8_mb: 4713}
    slope_mb_per_cell: 450
    units: MB
  expected:
    summary: |
      Linear in N up to N=8 within one process. Sets the per-node cell
      ceiling on HPC: 6 cells/process × 64 processes = ~290 GB on a 256 GB
      node; drop to 5-6 cells/process for headroom → ~384 cells/node.
  provenance:
    run_ids: [3, 4, 5, 6]
    model_commit_hash: 2f950d9
    raw_data_artifact: studies/colonies-01-hpc-readiness/runs.db

- id: F-04-pymunk-negligible
  kind: computational
  status: confirms
  statement: |
    pymunk 2D physics is essentially free at the N values we tested
    (≤ 0.2 ms/tick at N=8). All wall-time cost is the inner EcoliWCM.
  evidence:
    from_run: nsweep-n8
    observed: pymunk_step_ms ≤ 0.2
    units: ms/tick
  provenance:
    run_ids: [6]
    model_commit_hash: 2f950d9

- id: F-05-build-phase-bugs
  kind: methodological
  status: novel
  statement: |
    Three independent bugs blocked daughter hydration through the engine
    and had to be fixed before the Decide phase could run.
  explanation: |
    (1) viva-munk apply_updates_with_realize unpacked 2 values from
    bigraph_schema.core.realize, which now returns 3 (escape_merges) —
    every structural _add crashed.
    (2) v2ecoli/colony.py wired only mass/volume/exchange outputs on
    initial cells; _handle_division writes to `agents` with no wire,
    so mother updates had nowhere to land.
    (3) v2ecoli/bridge.py _handle_division hard-coded `interval=60.0` for
    daughters; `interval` is not in config_schema, so daughters ticked
    once per 60s instead of inheriting the mother's 1s cadence.
  evidence:
    from_run: build-smoke-n2
    from_test: daughters-hydrated
    observed: After all three fixes, pure-WC N=2 force-divided to 4 hydrated
      daughters that all advance on the next tick.
  provenance:
    run_ids: [2]
    model_commit_hash: 2f950d9
    raw_data_artifact: studies/colonies-01-hpc-readiness/runs.db

- id: F-06-rss-growth-over-time
  kind: computational
  status: novel
  statement: |
    RSS grows continuously during a single long N=1 run at ~5 MB/sim-second
    (1126 MB at tick 0 → 7016 MB by tick 1050, before division). Indicates
    either accumulating state in the EcoliWCM internal composite or a leak;
    visible only in long runs, not in the 60s N-sweep windows.
  evidence:
    from_run: bio-1cell-natural-division
    observed: rss_mb climbs monotonically across the pre-division window
    units: MB/sim-second
  next_action: |
    Folded into multi-gen-perf-drift follow-up — quantify drift over
    natural divisions and isolate the source (cache, history, fragmentation).
  provenance:
    run_ids: [7]
    model_commit_hash: 9addea3
    raw_data_artifact: studies/colonies-01-hpc-readiness/runs.db

