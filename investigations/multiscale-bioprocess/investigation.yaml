  - cell_side_interface_contract         # substitutability discipline (NEW)
  - palsson_2025_fed_batch               # Beulig 2025 mSystems summary

# Top-level success criteria.
#
# Per chris_feedback_2026_05_26 §1: criteria are split into
# `investigation_terminal` (gate the entire investigation; mbp-06's terminal
# checks, which by construction subsume mbp-01..05 having shipped) and
# `per_study_gating` (each study's tests gate its own impl PR but are not
# investigation-success conditions). The investigation success definition is
# now "comparison harness built and applied; structured gap inventory
# produced," NOT "Palsson benchmark achieved" (mbp-05 was reframed to an
# evaluation phase — see chris_feedback_2026_05_26 §10).
acceptance_criteria:

  # Terminal — these gate "investigation complete." mbp-06's two checks
  # subsume the upstream studies (mbp-06 cannot pass without mbp-01..05
  # having shipped their impl PRs and populated findings/limitations).
  investigation_terminal:
    - {study: mbp-06-gap-analysis, behavior: all-five-axes-covered}
    - {study: mbp-06-gap-analysis, behavior: every-gap-has-candidate-resolution}
    - {study: mbp-05-palsson-benchmark, behavior: divergences-categorized-in-report-card}

  # Per-study gating — each test gates its own study's impl PR. Listed here
  # for visibility but NOT load-bearing for investigation success (the
  # terminal block above is). All renamed from biology-tolerance to
  # comparison-rendered for mbp-05 (per §10).
  per_study_gating:
    - {study: mbp-01-time-varying-environment, behavior: external_glucose_updates_propagate_within_one_step}
    - {study: mbp-01-time-varying-environment, behavior: cumulative-mass-balance-closes}
    - {study: mbp-01-time-varying-environment, behavior: zero-substrate-blocks-uptake}
    - {study: mbp-01-time-varying-environment, behavior: saturating-substrate-respects-vmax}
    - {study: mbp-01-time-varying-environment, behavior: plateau-across-saturating-range}
    - {study: mbp-02-population-aggregation,   behavior: cell-count-doubles-per-generation}
    - {study: mbp-02-population-aggregation,   behavior: per-cell-observables-unchanged-vs-baseline}
    - {study: mbp-02-population-aggregation,   behavior: population_count_equals_len_agents}
    - {study: mbp-02-population-aggregation,   behavior: total_biomass_equals_sum_cell_mass_times_scale}
    - {study: mbp-03-bird-reactor-coupling,    behavior: one-generation-completes-without-divergence}
    - {study: mbp-03-bird-reactor-coupling,    behavior: cells-drop-do-below-saturation}
    - {study: mbp-03-bird-reactor-coupling,    behavior: higher-kla-raises-steady-state-do}
    - {study: mbp-03-bird-reactor-coupling,    behavior: cells-raise-dissolved-co2-above-saturation}
    - {study: mbp-03-bird-reactor-coupling,    behavior: o2-mass-balance-closes}
    - {study: mbp-04-multigeneration-runs,     behavior: population-grows-then-flattens-at-substrate-limit}
    - {study: mbp-04-multigeneration-runs,     behavior: carbon-mass-balance-closes-over-3-generations}
    - {study: mbp-05-palsson-benchmark,        behavior: end-of-run-od-comparison-rendered}
    - {study: mbp-05-palsson-benchmark,        behavior: acetate-profile-comparison-rendered}
