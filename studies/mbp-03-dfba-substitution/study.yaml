schema_version: 3
name: mbp-03-dfba-substitution
created: '2026-05-22'
status: planned
phase: Design

baseline:
- name: batch-with-dfba
  composite: multiscale_bioprocess.composites.batch_reactor_dfba   # TODO: not yet built
  params: {seed: 0}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    When the Phase 1 Monod placeholder is replaced by a dynamic-FBA cell
    process under the same exchange-flux interface — reactor composite
    otherwise unchanged — does the model reproduce a qualitatively matching
    batch growth trajectory, an aerobic μ_max in the literature range, and the
    overflow-metabolism signature (acetate accumulation under low DO,
    reconsumption after glucose depletion)?
  mechanism: |
    Drop-in swap of the cell-side process: dFBA owns biomass, takes biomass +
    substrate concentrations as input, and emits exchange-flux deltas
    (glucose, O2, CO2, NH4-or-equivalent, candidate byproducts incl. acetate)
    as output — the contract Phase 1 established and the reactor (with Phase 2
    kLa transport) consumes unchanged. dFBA target: iML1515 or a curated
    reduced model (spec PR selects + justifies). This phase is the first
    operational validation of the substitutability story.
  expected_outcome: |
    Batch trajectory qualitatively matches the Phase 1 Monod baseline (growth
    phase, glucose depletion). Under low dissolved O2, growth rate drops and
    acetate accumulates; after glucose depletion (with sufficient O2) an
    acetate-reconsumption phase appears. Aerobic batch μ_max on glucose
    minimal medium falls in 0.6–0.7 1/h.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - mbp-01-batch-reactor-scaffold
    - mbp-02-kla-gas-transport
  enables:
    - mbp-04-fed-batch-operations
  gate_status: hold
  gate_status_summary: |
    Blocked on mbp-01 (interface contract + reactor) and mbp-02 (kLa transport,
    needed for the low-DO overflow regime). The keystone phase: validates that
    the cell-side process is genuinely swappable.
  proceed_condition: |
    μ_max quantitative test passes; the qualitative swap-equivalence and
    overflow-metabolism direction tests pass. dFBA-specific parameter
    calibration (ATP maintenance, biomass composition, exchange bounds) is
    recorded in the calibration log — no silent tuning.


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

- name: aerobic-batch-dfba
  base_model: multiscale_bioprocess.composites.batch_reactor_dfba
  perturbation: null
  condition: glucose-minimal-batch-aerobic
  duration_min: 600
  seeds: [0]
  readouts: [biomass_gL, glucose_gL, mu_per_h, acetate_gL, dissolved_O2]
  applies_tests:
    - dfba-swap-matches-monod-baseline-shape
    - aerobic-glucose-mu-max-in-literature-range
    - acetate-reconsumption-after-glucose-depletion
  status: planned

- name: low-do-overflow
  base_model: multiscale_bioprocess.composites.batch_reactor_dfba
  perturbation:
    kLa_O2_per_h: 25.0   # O2-transfer-limited → low DO
  condition: glucose-minimal-batch-low-do
  duration_min: 600
  seeds: [0]
  readouts: [mu_per_h, acetate_gL, dissolved_O2, glucose_gL]
  applies_tests:
    - low-do-induces-acetate-overflow
    - low-do-reduces-growth-rate
  status: planned


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: multiscale_bioprocess.composites.batch_reactor_dfba
  new_state_variables:
    - "reactor.acetate_gL (g/L) — wired as a dFBA exchange byproduct"
  new_processes:
    - {name: DynamicFBACell, kind: Process, requirement_id: req-1-dfba-cell}
  new_parameters:
    - {name: fba_model_id, default: iML1515, units: "—"}
    - {name: atp_maintenance, units: "mmol-ATP/(gDW·h)"}
    - {name: glucose_uptake_bound, units: "mmol/(gDW·h)"}
    - {name: o2_uptake_bound, units: "mmol/(gDW·h)"}
  modified_processes:
    - "Cell side: MonodCell (mbp-01) → DynamicFBACell under the same exchange-flux interface; reactor composite UNCHANGED (this is the substitutability test)."
  notes: |
    Lift the spatio-flux DynamicFBA pattern (biomass-as-input,
    exchange-flux-deltas-as-output) with attribution. Exchange-flux wiring
    (glucose, O2, CO2, NH4, acetate) is part of this phase. dFBA-side
    parameter calibration is in-phase work, every tweak in calibration_log.yaml.


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "Quasi-steady-state FBA inner solve each reactor timestep (dFBA convention)."
  - "iML1515 (or curated reduced model) captures glucose/acetate overflow under O2 limitation."
  - "Reactor composite is unchanged from mbp-02 — only the cell-side process is swapped."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:
- {name: biomass_gL,   store_path: reactor.biomass_gL,        units: g/L,  status: planned}
- {name: glucose_gL,   store_path: reactor.glucose_gL,        units: g/L,  status: planned}
- {name: acetate_gL,   store_path: reactor.acetate_gL,        units: g/L,  status: planned}
- {name: mu_per_h,     store_path: reactor.diagnostics.mu,    units: "1/h", status: planned}
- {name: dissolved_O2, store_path: reactor.dissolved_O2,      units: mmol/L, status: planned}


behavior_tests:

- name: dfba-swap-matches-monod-baseline-shape
  classification: primary
  description: "Drop-in dFBA swap produces a batch growth trajectory qualitatively matching the Phase 1 Monod baseline (growth phase + glucose depletion present)."
  measure: {kind: trajectory_shape_match, reference: mbp-01-batch-reactor-scaffold:batch-baseline, series: biomass_gL}
  pass_if: {op: qualitative_match}
  units: "—"
  requires_simulation: aerobic-batch-dfba
  cites: [Monk2017NatBiotechnol]

- name: aerobic-glucose-mu-max-in-literature-range
  classification: primary
  description: "Aerobic batch maximum specific growth rate on glucose minimal medium is 0.6–0.7 1/h (literature consensus; tolerance set in spec PR)."
  measure: {kind: series, path: reactor.diagnostics.mu, reduce: max, window: exponential_phase}
  pass_if: {op: in_range, low: 0.6, high: 0.7}
  units: "1/h"
  requires_simulation: aerobic-batch-dfba
  cites: [Monk2017NatBiotechnol, Fong2003JBacteriol]

- name: low-do-induces-acetate-overflow
  classification: primary
  description: "Under low dissolved O2, acetate accumulates (overflow metabolism)."
  measure: {kind: series, path: reactor.acetate_gL, reduce: max, window: full}
  pass_if: {op: at_least, value: 0.5}
  units: g/L
  requires_simulation: low-do-overflow
  cites: [Vemuri2006ApplEnvironMicrobiol, Basan2015Nature]

- name: low-do-reduces-growth-rate
  classification: supporting
  description: "Low-DO run shows a lower peak μ than the aerobic baseline run."
  measure: {kind: cross_run_delta, series: {kind: listener_path, path: reactor.diagnostics.mu}, reduce: max}
  pass_if: {op: negative}
  units: "1/h"
  requires_simulation: low-do-overflow
  cites: [Vemuri2006ApplEnvironMicrobiol]

- name: acetate-reconsumption-after-glucose-depletion
  classification: supporting
  description: "After glucose depletion, with sufficient O2, accumulated acetate is reconsumed (acetate falls)."
  measure: {kind: series, path: reactor.acetate_gL, window: post_glucose_depletion}
  pass_if: {op: monotonic_decreasing}
  units: g/L
  requires_simulation: aerobic-batch-dfba
  cites: [Enjalbert2017SciRep]


# ─── 6. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "dFBA quasi-steady-state assumption breaks under fast transients."
  - "iML1515 biomass composition is a fixed objective; no condition-dependent reallocation."
  - "Calibration of ATP maintenance / exchange bounds is in-phase and provisional."


# ─── 7. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-dfba-cell
  kind: process
  title: DynamicFBACell Process
  effort: L
  description: |
    Wrap an FBA solver (iML1515 / curated reduced model) as a PBG cell process
    following the spatio-flux DynamicFBA pattern. Biomass-as-input,
    exchange-flux-deltas-as-output; wire glucose/O2/CO2/NH4/acetate exchanges
    to the reactor's shared stores. Substitutes for MonodCell under the
    unchanged interface contract.
  unblocks: [all mbp-03 behavior_tests]


bibliography:
  expert: [multiscale_bioprocess_roadmap]
  bib_keys: [Monk2017NatBiotechnol, Fong2003JBacteriol, Vemuri2006ApplEnvironMicrobiol, Basan2015Nature, Enjalbert2017SciRep]


runs: []

parent_studies:
  - {study: mbp-02-kla-gas-transport, condition: tests-passed}

tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
