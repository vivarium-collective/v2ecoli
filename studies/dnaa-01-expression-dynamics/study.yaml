- title: Recalibrate EG10235 translation_efficiency in ParCa
  kind: calibration_task
  effort: M
  status: resolved
  why: 'RESOLVED: against gen-20260522T003700Z-9fcb58 the Stage-1 transcription/

    translation chain produces a DnaA count of 357, inside the literature

    [300, 800] band (Sekimizu, Schmidt, Mori). The earlier ~115/cell, 5×-low

    figure was a stale run/old params and no longer applies. Remaining open

    question worth ruling out: whether literature numbers include chromosome-

    bound DnaA that the listener sums back in (see expert question below).

    '
  unblocks:
