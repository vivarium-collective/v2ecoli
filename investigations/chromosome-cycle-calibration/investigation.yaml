schema_version: 1
name: chromosome-cycle-calibration
title: v2ecoli chromosome cycle-time calibration on slow-growth conditions (acetate + glycerol)
status: running
description: >
  Carefree investigation tracking v2ecoli chromosome dynamics on slow-growth media.
  Validates the architectural port (PartitionedProcess -> layered process-bigraph) against
  vEcoli on acetate, surfaces the upstream FBA-over-supply calibration gap (observed
  ~80 min cycle vs declared 136 min on acetate), and scaffolds the new glycerol medium
  (MIX0-845, tau=150 min, CRP-cAMP active). Lives on feat/aim2-dnaa-oric @ b8d0d1e.
studies: []
question: >
  Does v2ecoli reproduce vEcoli chromosome cycle dynamics on slow conditions, and at
  what point in the simulator stack does the observed-vs-declared cycle-time gap originate?
hypothesis: >
  Confirmed today: v2ecoli reproduces vEcoli's acetate dynamics within ~15 uM ppGpp and
  ~3% charged-fraction across gen 1. The gap (observed ~80 min vs declared 136 min) is
  wcEcoli-inherited (FBA over-supplies AAs in early gen -> tRNA stays 97-98% charged ->
  SpoT degrades ppGpp -> ribosomes elongate fast). Rejected: multi-gen does NOT
  equilibrate to tau=136 (5-gen lineage cycles 42-82 min, no monotonic trend).
acceptance_criteria:
- behavior: d_period_division_trigger_wired
  status: passed
  note: Division step now uses MarkDPeriod.divide; with_aa cycle 45 -> 22.5 min, matching vEcoli.
- behavior: v2ecoli_matches_vecoli_acetate_dynamics
  status: passed
  note: ppGpp / charged-fraction / elongation rate / cell mass track vEcoli within 15% on gen 1.
- behavior: multi_gen_equilibrates_toward_declared_tau
  status: failed
  note: 5-gen lineage cycles 42 / 81 / 61 / 82 / 60 min. No trend toward 136. Upstream FBA gap is not transient.
- behavior: tf_coverage_audit
  status: open
  note: GlpR has fold-change entries but is not in tr.tf_ids 23-TF runtime set; regulation silently dropped.
- behavior: glycerol_medium_added
  status: passed
  note: MIX0-845 (AB + 0.2% glycerol), tau=150, CRP-cAMP active TF, C=70 / D=30 / dnaA TE=1.0 / DARS1+DARS2 widened.

biological_story: >
  E. coli MG1655 on ABT minimal glycerol (tau=150 min target per Fu/Xiao/Jun 2023 heuristic)
  and minimal acetate (tau=136 per condition_defs.tsv) is supposed to grow slowly with
  non-overlapping cell cycles. v2ecoli + vEcoli both run these conditions at ~80 min cycle
  with multi-fork replication (4 oriCs, 3 active forks at division for glycerol). Cause:
  FBA over-supplies amino acids in early gen -> tRNAs stay 97-98% charged -> SpoT degrades
  ppGpp -> ribosomes elongate at 21 aa/s -> mass grows ~3x in 80 min -> D-period trigger
  fires early. Multi-gen does not wash this out. The cell cycle bouncing is upstream of
  the v2ecoli port (wcEcoli-inherited) and downstream of the FBA biomass objective
  calibration.

