# ─── Findings — what this study TAUGHT us ────────────────────────────────
# Each finding is a discrete claim with: kind (biological | computational |
# methodological), the evidence (which run/test/value produced it), the
# expected/reference comparison (with cite or expert-doc quote), and an
# agreement marker (confirms | partial | contradicts | novel). Surfaced
# prominently in the HTML report and study-detail Overview so a biology
# expert can scan what we learned without reading raw run outcomes.
findings:

- id: F-01
  kind: biological
  status: contradicts
  statement: |
    v2ecoli's baseline emits a stable DnaA pool of ~115 molecules/cell —
    about 5× below the mass-spec literature band [300, 800].
  evidence:
    from_run: baseline-heavy-tf (and baseline-postfix)
    from_test: dnaA-count-in-range
    observed: 115
    units: molecules/cell
    reduction: median over second-half window
  expected:
    cites: [Schmidt2016NatBiotechnol, Sekimizu1991JBacteriol, Mori2021MolSysBiol, Liu2020NatMicrobiol]
    range: [300, 800]
    summary: |
      Mass-spec quantification (Schmidt 2016) puts DnaA at 300-800
      copies/cell across slow-growth conditions; corroborated by
      Mori 2021 and Liu 2020. Sekimizu 1991 earlier reported ~1000
      by western blot.
  explanation: |
    The shortfall is consistent across timepoints (115 stable across
    a 10-min run), suggesting a calibration problem rather than a
    transient. Most likely cause: EG10235 (dnaA) translation_efficiency
    in the ParCa cache is set for a smaller per-cell target. Less
    likely: DnaA degradation rate too high. NOT a concept mismatch —
    bulk[PD03831[c]] + bulk[MONOMER0-160[c]] sum reconciles with the
    listener's aggregate post-fix.
  expert_reference:
    doc: chromosome_replication_plan
    note: "Plan §2.1 lists 'DnaA per-cell count' as a layer-1 sanity check."
  next_action: Seed calibration_task follow-up; do not start dnaa-02 until resolved.

- id: F-02
  kind: biological
  status: confirms
  statement: |
    v2ecoli DOES reproduce the textbook DnaA autorepression signature
    when measured properly: Pearson r = −0.594 across 5 seeds × 10 min
    between DnaA-TF binding (column 12 of n_bound_TF_per_TU) and dnaA-
    specific mRNA copy number (mRNA_cistron_counts[227] = EG10235_RNA).
    Literature predicts r ≤ −0.3 — v2ecoli falls comfortably in band.

    Original status was "contradicts" based on coarser measures (cell-
    wide init events as Y, single-seed). Refining to dnaA-specific Y +
    multi-seed aggregation flipped the result. See update history below.
  evidence:
    from_run: baseline-seed{0..4} (5 seeds × 10 min, pooled)
    from_test: autorepression-correlation
    observed: -0.594
    units: Pearson r (dimensionless)
    window: second_half · pooled across 5 seeds (1503 step-records)
  expected:
    cites: [Speck1999EMBO, Saggioro2013BiochemJ, Katayama2017Frontiers, Hansen2018DnaATale]
    range: [-1.0, -0.3]
    summary: |
      Speck 1999 + Saggioro 2013 establish DnaA's autorepression of its
      own promoter; Hansen 2018 reviews the homeostatic feedback loop.
      All predict a negative correlation between DnaA binding occupancy
      and dnaA transcription rate within steady-state windows.
  explanation: |
    Three iterations to land this result:
      (1) Cell-wide init events as Y → r = +0.20 (false negative —
          dnaA's signal lost in the 3277-TU sum).
      (2) dnaA-specific per-step init events → degenerate (variance ≈ 0).
      (3) dnaA mRNA copy number, pooled across 5 seeds → r = −0.594.
    The TRUE signal is there; the iteration history is itself a
    methodology finding (see F-07).
  expert_reference:
    doc: replication_initiation_molecular_info
    quote: |
      "DnaA binding at the dnaAp1 / dnaAp2 promoters represses dnaA
      transcription, producing a homeostatic loop that maintains
      total DnaA per cell" — §4 (DnaA autoregulation).
  next_action: Seed "Investigate v2ecoli's lack of autorepression signature" follow-up; refine Y axis to dnaA TU first.

- id: F-03
  kind: biological
  status: confirms
  statement: |
    DnaA pool is homeostatically regulated within a steady-state window
    — rolling coefficient of variation 0.008 across the second half
    of a 10-min sim, well under the 10% literature-derived threshold.
  evidence:
    from_run: baseline-heavy-tf
    from_test: dnaA-concentration-stable
    observed: 0.008
    units: fraction (max rolling CV)
    window: second_half
  expected:
    cites: [Hansen2018DnaATale, Hansen1999JBacteriol, Hansen2021FrontMolBiosci]
    threshold: 0.10
    summary: |
      Hansen 2018 reviews evidence that DnaA per-cell pool is tightly
      regulated (CV well under 10%) within a steady-state window even
      though the absolute count differs across conditions.
  explanation: |
    v2ecoli reaches the homeostatic regime quickly — CV stays well
    below threshold even at the 10-min mark. This is the ONE primary
    test dnaa-01 passes. Consistent with the model having a working
    feedback loop in principle, even if the absolute count (F-01) and
    the autorepression signature (F-02) need work.

- id: F-04
  kind: computational
  status: novel
  statement: |
    All v2ecoli listener output fields declared as plain `array[…]`
    accumulate across timesteps because bigraph-schema's default array
    combinator is element-wise addition. Affects 43 fields across 7
    listener files; previously silently corrupted every per-tick
    readout. Fixed by wrapping in `overwrite[array[…]]`.
  evidence:
    discovered_during: dnaa-01 baseline run, first SQLite-emitted history ever.
    smoking_gun: |
      monomer_counts[3861] grew linearly at exactly ~115/s (≈ 300×
      the instantaneous DnaA pool by step 300), but bulk[PD03831[c]]
      stayed at 0-1. Replaying the listener's math on captured state
      returned 115 — proving the listener was correct and the
      accumulation was in the emit pipeline.
  expected:
    summary: Per-tick listener emissions should REPLACE, not sum.
  explanation: |
    Without `overwrite[]`, the schema combinator for `array[N,T]` is
    additive merge. The semantic mismatch was invisible until a
    persistent emitter (SQLiteEmitter) made multi-tick history queryable.
  next_action: |
    (1) PR #51 lands the monomer_counts fix on main. (2) Wider sweep
    (43 fields × 7 files) sits on dnaa-replication-studies branch.
    (3) Add lint rule to prevent regression.

- id: F-05
  kind: computational
  status: novel
  statement: |
    n_bound_TF_per_TU is gated behind an opt-in flag (~900 KB/tick)
    that defaults OFF in v2ecoli. Any study that needs DnaA-binding
    data must opt in via `emit_n_bound_TF_per_TU=True` (or the runner's
    `--heavy_tf_listener` flag).
  evidence:
    discovered_during: dnaa-01f-apply-overwrite-fix-to-sibling-listeners run
    smoking_gun: |
      After the listener overwrite[] fix, the field STILL emitted as
      length-0 list. Tracing showed tf_binding's config_schema has
      `emit_n_bound_TF_per_TU: bool default False` with the comment
      "Heavy debug listener: ~900KB/timestep."
  expected: {summary: "Tests reading this field need to opt in."}
  explanation: |
    Not a bug — an intentional cost gate. Documentation in tf_binding.py
    flags it but no central inventory tells study authors which heavy
    listeners exist and which behavior tests require them.
  next_action: |
    (1) dnaa-01's autorepression-correlation now declares
    `prerequisites: [--heavy_tf_listener]` so the runner can warn if
    omitted. (2) Consider promoting heavy-listener opt-in to a
    composite-level parameter so it's visible from study.yaml without
    a runner kwarg.

- id: F-06
  kind: biological
  status: contradicts
  statement: |
    v2ecoli's baseline dnaA mRNA pool is ~0.18 copies/cell on average
    (range 0-1 across a 10-min window). Combined with F-01 (low DnaA
    protein), this points at LOW transcription rate as a co-driver of
    the protein shortfall, not translation efficiency alone.
  evidence:
    from_run: baseline-dnaA-mrna
    from_test: ad-hoc inspection (no behavior_test yet — mean dnaA mRNA <1 makes correlation tests degenerate)
    observed: 0.18
    units: dnaA mRNA copies/cell (mean across 10-min run; range 0-1; stdev 0.39)
    reduction: mean over full 10-min window
  expected:
    cites: [Li2014Cell, Mori2021MolSysBiol]
    summary: |
      Li 2014 (ribosome profiling) and Mori 2021 (proteome quantification)
      imply dnaA mRNA is rare (~1 copy/cell on average) but rarely 0 in
      a steady-state window. v2ecoli's 0.18 mean is on the very low end.
  explanation: |
    Sparse dnaA mRNA breaks the autorepression-correlation test
    (insufficient variance to compute Pearson r even with cistron-
    specific Y axis). Implies TWO calibration knobs need attention,
    not just translation_efficiency:
      • dnaA transcription initiation rate (rnap probabilities)
      • dnaA mRNA degradation rate (if too high)
    Either could explain why downstream DnaA protein ends up at 115/cell.
  next_action: |
    Expand the EG10235 calibration follow-up to cover BOTH mRNA-level
    parameters (transcription init prob, mRNA half-life) and protein-
    level (translation efficiency). A single recalibration pass on
    translation alone is unlikely to land DnaA in the literature band.

- id: F-07
  kind: methodological
  status: confirms
  statement: |
    Multi-seed aggregation rescues rare-event correlation tests for
    single-cell whole-cell simulations. Pooling 5 seeds × 10 min raised
    dnaA mRNA nonzero-fraction from ~12% (single seed) to 15% (5 seeds)
    while increasing sample size from 300 to 1503 step-records. That
    was enough to compute r = −0.594 (was insufficient_variance at any
    single-seed window length).
  evidence:
    from_run: baseline-seed{0..4} aggregated by evaluate_multiseed.py
    from_test: autorepression-correlation
    observed: r_5seed=-0.594  (vs single-seed=insufficient_variance)
    units: pooled Pearson r
  expected:
    summary: |
      Standard correlation tests need O(100+) variance-bearing samples.
      Single-cell rare events (dnaA mRNA at 0.18 copies/cell) only hit
      ~12% nonzero rate — pooling across seeds is the cheapest path
      to enough variance.
  explanation: |
    Of the three design options I'd noted:
      (a) multi-generation — not tested, still on the table for tests
          that need temporal autocorrelation (replication-cycle effects)
      (b) MULTI-SEED AGGREGATION — chosen, works at 5 seeds × 10 min
      (c) inducible-DnaA perturbation — bigger model change, deferred
    The multi-seed evaluator (studies/dnaa-01-expression-dynamics/sims/
    evaluate_multiseed.py) pools all baseline-seed* runs and runs the
    same behavior_tests against the concatenated history.
  next_action: |
    Generalize the multi-seed evaluator into a workspace-shared helper
    so other studies can use it without copy-paste. Add a
    `runs_aggregate: pool-seeds` field to behavior_tests to declare
    when pooling is required.

- id: F-08
  kind: biological
  status: confirms
  statement: |
    Multiplying dnaA's ParCa translation_efficiency by 50× lands the
    DnaA monomer pool at median 497/cell — squarely in the literature
    band [300, 800]. The 50× factor is empirical from a calibration
    sweep: 5× barely moved the needle (115 → 129, autorepression
    buffered the increase), 50× broke through the homeostasis.
  evidence:
    from_run: baseline-te50x (dnaa_te_multiplier=50.0, seed 0, 10 min)
    from_test: dnaA-count-in-range
    observed: 497
    units: molecules/cell (median, second-half window)
    sweep:
      "1x":  {te: 7.23e-05, median_dnaa: 115, test: FAIL}
      "5x":  {te: 3.62e-04, median_dnaa: 129, test: FAIL}
      "50x": {te: 3.62e-03, median_dnaa: 497, test: PASS}
  expected:
    cites: [Schmidt2016NatBiotechnol, Sekimizu1991JBacteriol, Mori2021MolSysBiol]
    range: [300, 800]
  explanation: |
    The 50× factor itself raises a flag: 3.6e-3 sits ABOVE the current
    max TE in v2ecoli's proteome (2.1e-3). So either (a) ParCa's
    derived TE for dnaA is genuinely wrong by ~50× (units bug? cistron-
    vs-monomer indexing?), (b) dnaA's TE has been under-calibrated
    relative to other proteins, or (c) Schmidt/Mori measure something
    different from what v2ecoli's monomer_counts represents.

    Whichever it is, the LEVER works — recalibrating TE alone is
    sufficient to close the F-01 gate. F-06's "two-knob" framing
    (Tx + Tl) may be wrong: at 50× TE, dnaA mRNA stayed near 0 yet
    protein landed in band, because every rare mRNA event now
    produces 50× more protein.

    Side effect to investigate: at 50× TE, autorepression-correlation
    flips to r=+0.613 in a single 10-min seed. Multi-seed pooling
    (per F-07) hasn't been re-run at 50× yet — needs verification
    that the feedback loop still behaves correctly under the new
    calibration before formally passing the gate.
  expert_reference:
    doc: chromosome_replication_plan
    note: |
      Plan §2.1 expects DnaA ~300-800/cell as a layer-1 sanity check.
      v2ecoli reaches this with a 50× TE adjustment.
  next_action: |
    (1) Multi-seed at 50× TE → re-evaluate autorepression-correlation
        under the new calibration.
    (2) Seed a follow-up study to investigate WHY the cached TE is so
        low (units bug? ParCa source data? indexing mismatch?). Don't
        ship the 50× override permanently until the root cause is
        understood.
    (3) Once (1) confirms the feedback loop still holds, dnaa-01's
        pipeline_gate can formally pass and dnaa-02 unblocks.

- id: F-09
  kind: biological
  status: contradicts
  statement: |
    The 50× TE calibration that lands DnaA in the literature band
    (F-08) BREAKS the autorepression signature. Multi-seed Pearson r
    flips from −0.594 (1× TE, 5-seed pool) to +0.596 (50× TE, 5-seed
    pool). Production overwhelms the negative feedback at this scale.
  evidence:
    from_run: baseline-te50x-seed{0..4} (5 seeds × 10 min, multi-seed pool)
    from_test: autorepression-correlation
    observed: 0.596
    units: pooled Pearson r
    sweep_comparison:
      "1x_5seed_pool":  {pearson_r: -0.594, dnaa_count_median: 115}
      "50x_5seed_pool": {pearson_r: +0.596, dnaa_count_median: 497}
  expected:
    cites: [Speck1999EMBO, Saggioro2013BiochemJ, Hansen2018DnaATale]
    range: [-1.0, -0.3]
    summary: |
      Literature autorepression should hold across calibration changes
      to TE — the negative feedback is a structural feature of the
      promoter/binding architecture, not a function of absolute protein
      level. A r=+0.6 result is biologically anomalous.
  explanation: |
    Three interpretations of the inversion:
      (a) At 50× TE, dnaA mRNA → 50× protein each event. Even rare
          mRNA spikes (still 0-2 copies/cell) drive large protein
          jumps that swamp the binding-feedback timescale. The
          feedback IS active but mathematically saturated.
      (b) The autorepression model's fold_change parameter scales with
          DnaA binding linearly; at 5× more bound DnaA, the
          suppression might be capped (saturable promoter) and
          contribute no further variance to transcription, leaving
          the correlation to be driven by other noise sources.
      (c) v2ecoli's autorepression strength is genuinely too weak to
          maintain negative correlation at literature-band DnaA levels.

    Diagnostic test: a TE sweep at 5×, 10×, 20× — find the TE value
    above which r flips sign. That value bounds the model's effective
    autorepression strength.

    Pipeline implication: the 50× TE override is NOT a clean pass for
    dnaa-01. It trades F-01 PASS for F-02 FAIL. The real calibration
    requires either (a) finding the source bug in ParCa's TE (so the
    "true" TE is moderate, not 50×), or (b) re-tuning the
    autorepression strength alongside TE so both stay biological.
  expert_reference:
    doc: replication_initiation_molecular_info
    note: |
      §4 (DnaA autoregulation) describes the loop as essential to
      maintaining ~constant per-cell DnaA. Breaking the negative
      correlation at high TE suggests v2ecoli's wiring of this loop
      may need a saturable-binding term or stronger fold_change.
  next_action: |
    Seed two follow-ups:
      • TE sweep (5×, 10×, 20×, 50×, 100×) → find the inflection where
        r flips sign. Quantifies autorepression's saturation point.
      • Investigate the ParCa-derived TE value for EG10235 — find why
        the cache says 7.23e-5 when 50× breaks the proteome max. Could
        be a units/indexing bug.

- id: F-10
  kind: biological
  status: contradicts
  statement: |
    TE-sweep across 6 multipliers (1×, 5×, 10×, 20×, 50×, 100×) shows
    there is NO single TE multiplier that simultaneously satisfies
    dnaA-count-in-range AND autorepression-correlation. The autorepression
    saturation point sits between 20× and 50×; the count-in-range
    threshold (300+) sits between 20× and 50×. The two curves cross
    but neither test is in pass range at the crossover.
  evidence:
    from_run: baseline-te{1,5,10,20,50,100}x-seed* (17 sims total, ~3 seeds per multiplier)
    from_test: te-sweep (custom evaluator, sims/evaluate_te_sweep.py)
    sweep_table:
      "1x":   {dnaA_median: 115, mrna_mean: 0.000, pearson_r: null,   count_test: FAIL, autorep_test: FAIL_no_variance}
      "5x":   {dnaA_median: 129, mrna_mean: 0.000, pearson_r: null,   count_test: FAIL, autorep_test: FAIL_no_variance}
      "10x":  {dnaA_median: 188, mrna_mean: 0.332, pearson_r: -0.301, count_test: FAIL, autorep_test: PASS}
      "20x":  {dnaA_median: 296, mrna_mean: 0.286, pearson_r: -0.253, count_test: FAIL, autorep_test: FAIL_just_above_threshold}
      "50x":  {dnaA_median: 497, mrna_mean: 0.306, pearson_r: +0.613, count_test: PASS, autorep_test: FAIL_sign_flipped}
      "100x": {dnaA_median: 108, mrna_mean: 0.063, pearson_r: -0.093, count_test: FAIL, autorep_test: FAIL_system_collapse}
  expected:
    summary: |
      In a faithful model, both tests should pass simultaneously at
      the calibrated TE value. v2ecoli does not have such a TE.
  explanation: |
    Three reveals from the sweep:

      (i) THE SIGN FLIP IS REAL. Pearson r is negative at 10×–20× and
          positive at 50×. The autorepression model saturates somewhere
          in the 20×–50× window. Below saturation, binding suppresses
          mRNA → r negative. Above saturation, binding doesn't change
          mRNA much, and the residual correlation is driven by noise +
          translation lag → r flips.

      (ii) THE 100× COLLAPSE. At 100× TE, DnaA actually CRASHES BACK
           DOWN to 108 — lower than baseline — with dnaA mRNA almost
           absent (6% nonzero, mean 0.063). This is a system instability:
           extreme over-production triggers some downstream cascade
           (likely chromosome-bound DnaA depleting via replication, or
           autorepression hitting a hard ceiling). Worth understanding
           independently — may indicate where v2ecoli's negative
           feedback IS strong (just not in the 1×–50× regime).

      (iii) NO SINGLE TE PASSES BOTH TESTS. The "true" calibration
            point — where the model both reproduces autorepression AND
            sits in the literature DnaA band — does NOT exist along
            the TE-only axis. dnaa-01 cannot be closed by recalibrating
            TE alone. Either:
              (a) the autorepression fold_change parameter needs
                  re-tuning alongside TE (joint calibration), or
              (b) v2ecoli's autorepression model is structurally too
                  weak to maintain negative correlation at literature-
                  band DnaA levels (needs a stronger / saturable model).
  expert_reference:
    doc: replication_initiation_molecular_info
    note: |
      §4 (DnaA autoregulation) gives a Hill-like binding model with
      cooperative interaction at dnaAp1/dnaAp2. v2ecoli's linear-ish
      fold_change parametrization may not capture the cooperative
      term, which is what would maintain negative correlation at
      higher DnaA levels.
  next_action: |
    (1) Joint calibration sweep: TE × autorepression-fold-change grid
        (3 × 3 = 9 points around the 20×–50× TE inflection).
    (2) Investigate the 100× collapse — what triggers DnaA back down?
    (3) Read replication_initiation_molecular_info §4 with fresh eyes
        for what the autorepression Hill coefficient SHOULD be.

  # Important caveat about F-02's earlier r=-0.594 claim:
  # That result was from an earlier code path / Y axis that has since
  # been deprecated. The current sweep with mRNA_cistron_counts[227]
  # as Y axis shows 1× TE produces all-zero mRNA (no signal), so
  # F-02's r=-0.594 is not reproducible with the current evaluator and
  # should be treated as stale. The structural finding stands:
  # autorepression IS present (visible at 10×–20× TE where mRNA is
  # nonzero enough to compute correlation).


