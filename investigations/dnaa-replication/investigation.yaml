schema_version: 2
name: dnaa-replication
title: DnaA / Replication Initiation (succinate, fresh start 2026-05-29)
created: '2026-05-29'
status: active   # 2026-05-31: dnaa-0, dnaa-1 PASS (run provenance now recorded; dnaa-1 V re-tuned 2e-3→1.7e-3); dnaa-2 Steps 1-2 done, canonical seed 0, Step 3 blocked on Haochen

question: |
  Can v2ecoli reproduce DnaA-driven replication initiation in succinate at
  STEADY STATE — periodic oriC + cell-mass + DnaA dynamics across multiple
  generations — using ParCa's native succinate parameters with no imposed
  τ / C / D overrides?

hypothesis: |
  In succinate (τ ≈ 70–80 min, ParCa-default C = 40 min, D = 20 min,
  B = τ − C − D > 0), v2ecoli with a tuned dnaA RNA-synthesis probability
  (Mechanism A: sim_data.genetic_perturbations["TU00259[c]"] = 2e-3
  runtime overwrite) holds the DnaA monomer pool in the literature
  [300, 800] band across generations and produces a non-overlapping cell
  cycle that initiates replication exactly once per cycle. The cycle
  proceeds: cell starts with 1 oriC, replication initiates once near the
  end of B-period, oriC briefly doubles to 2, replication completes after
  C-period, D-period elapses, division fires, daughters start the same
  cycle again — never reaching 4 oriC simultaneously.

lead: |
  This investigation REPLACES the prior dnaa-replication work entirely.
  Prior context (Round 1–3.8 framing, glycerol cache, imposed τ/C/D,
  intrinsic-hydrolysis dnaa-02, RIDA mechanisms, etc.) is deliberately
  retired per the 2026-05-29 reviewer feedback (see
  feedback-2026-05-29-fresh-start/feedback.pdf). The fresh start uses
  succinate (which already has a saved ParCa sim_data state) and is
  gated study-by-study: dnaa-2..N stay blocked until dnaa-0 and dnaa-1
  pass.

executive:
  what_is_this: |
    Two-study foundation for v2ecoli + DnaA-driven chromosome
    replication initiation under the succinate growth condition.
    Each study has an explicit acceptance criterion expressed in
    biological observables (oriC periodicity, DnaA pool steady state).
    Subsequent studies (mechanism, box binding, extrinsic regulation)
    are out of scope for THIS round and will be added only after the
    first two pass.
  verdict: pass
  verdict_status: round-complete
  verdict_detail: |
    Both foundational studies PASS. dnaa-0: v2ecoli reaches the succinate
    periodic steady state (oriC 1↔2 from gen 3, transient 4 in gens 1–2;
    reviewer-confirmed). Both acceptance tests re-verified from the parquet
    (2026-05-31, scripts/verify_dnaa0_acceptance.py): oriC max ≤2 from gen 3,
    cell_mass CV birth 0.021 / peak 0.045. dnaa-1: Mechanism A (TU00259[c])
    lands the dnaA mRNA init rate near ≈1 event/min and holds the DnaA pool
    cycle-mean in band [300,800] while preserving the oriC cycle.
    The two-study foundation for succinate DnaA-driven replication
    initiation is established; mechanism / box-binding / extrinsic studies
    can now be designed on top in a future round.

    2026-05-31 reviewer round (Rashmi): (1) dnaa-0 + dnaa-1 now carry explicit
    `runs:` provenance + canonical 6-axis status, so the report shows them as
    ran/evaluated/passed rather than "pending" (they previously declared
    completion but recorded no runs — a derive-on-read status gap, now also
    guarded by a new report-linter check). (2) dnaa-1's RNA-synth probability
    re-tuned 2e-3 → 1.7e-3 to reduce the pre-division DnaA peak overshoot
    (~28% → ~10–15% over the 800 ceiling), CV 7.2% → 2.3%, oriC still clean;
    the residual peak excursion is intrinsic (the DnaA pool doubles per cycle).
    (3) dnaa-2 canonical lineage pinned to seed 0 — seed 2 showed a within-cycle
    reinitiation at its 4th generation (oriC 1→2→4); seeds 0 & 3 stay clean.

    dnaa-2 (DnaA-ATP/ADP nucleotide equilibria + intrinsic hydrolysis) was
    added on top and is IN PROGRESS — Steps 1-2 done, Step 3 blocked on
    Haochen. Result: across a 4-seed × 4-gen workflow sweep (resumed from
    dnaa-0's saved succinate steady state, mechA cache), the DnaA-ATP
    fraction is pinned at ~0.997 (0.9970 ± 0.0039 over 13 complete
    lineage-generations; within-gen CV <0.7%, across-seed ±0.0001) — FAR
    above the Boesen 2024 biological band [0.2, 0.5]. Adding Haochen's
    intrinsic hydrolysis at k=0.046/min (verified ON vs a k=0 control) does
    NOT move it: the binding equilibrium re-binds ATP far faster than
    hydrolysis drains it. The deviation is therefore a ROBUST property of
    the stated parameter set, not noise or a single-seed artifact —
    reconciling it requires revising one of {K_d, cellular [ATP]:[ADP],
    expected fraction}, which is Haochen's call (see decisions_needed).
    Six-panel trajectory figures (Step 1 k=0 + Step 2 ×3 seeds) in
    studies/dnaa-2-atp-hydrolysis/charts/.
  decisions_needed:
    - question: dnaa-2 — at v2ecoli's current cellular [ATP]:[ADP] (≈20) and
        Haochen's K_d's (≈30 nM ATP, ≈100 nM ADP), the DnaA-ATP fraction is
        ~0.997, not the expected [0.2, 0.5]. Which of {K_d(ATP/ADP), cellular
        [ATP]:[ADP], expected fraction} should be revised to reconcile them?
      status: OPEN — blocks dnaa-2 Step 3 (parameter tuning); needs Haochen.
      context: |
        Confirmed robust across 4 seeds × 13 complete lineage-generations and
        unchanged by intrinsic hydrolysis (k=0.046/min vs k=0 control). The
        three stated quantities are mutually inconsistent; tuning K_d's before
        Haochen picks the lever would be premature. Secondary observations to
        resolve alongside: (a) DnaA concentration drifts UP over the lineage
        (not equilibrated from the resume-init; the "concentration CV<10%"
        criterion is unmet on the 4-gen window); (b) one stochastic lineage
        (seed 1) hits a base-model allocator NegativeCountsError(PROTON[c] -3)
        entering gen 3 — unrelated to DnaA, but a model-robustness edge case.
    - question: dnaa-0 succinate run reaches per-cell periodic steady state with
        oriC oscillating 1 ↔ 2 at steady state (transient overshoot to 4 in
        early gens allowed) — pass or fail?
      status: RESOLVED 2026-05-30 — PASS (Rashmi review)
      context: |
        Initialization task per PDF: run ParCa with succinate as the growth
        condition, then run v2ecoli single_daughters and check convergence.
        RESOLUTION (Rashmi 2026-05-30, "this looks correct"): the followed
        daughter's oriC is periodic 1 → 2 → 1 → 2 FROM GENERATION 3 ONWARDS
        (the steady state). The brief overshoot to oriC = 4 in the early
        generations is the expected NOT-YET-STEADY-STATE signature, not a
        failure — the prior "never reaches 4" framing was corrected. Cell
        mass is correspondingly periodic. The generation-3 state is saved as
        the canonical succinate steady-state initial condition
        (out/steady_state_inputs/succinate_default_gen3_start.dill) and
        dnaa-1 is unblocked.
    - question: dnaa-1 RNA-synthesis-probability tuning lands the dnaA mRNA
        INITIATION RATE near the biologically-expected ≈1 event/min (with the
        DnaA monomer pool in 300–800 as the consequence) — does V=2e-3 work?
      status: RESOLVED 2026-05-30 — PASS (after fixing an emitter bug; real full-cycle data)
      context: |
        PDF hint (chart caption): set
        sim_data.genetic_perturbations["TU00259[c]"] = 2e-3 at runtime
        (Mechanism A — runtime overwrite of dnaA's per-promoter init_prob).
        Baseline unchanged: dnaA TE = 0.35, dnaA mRNA t½ = 1.9 min, DnaA
        protein t½ = 280 min.
        REFRAMED ACCEPTANCE (Rashmi 2026-05-30): the PDF "target" is the
        BIOLOGICALLY-EXPECTED dnaA RNA-synthesis rate; V=2e-3 produced
        ≈1.01 events/min, close to it, and THAT is what brought the DnaA
        counts into range. So the PRIMARY criterion is the init rate near
        ≈1 event/min; the in-band [300, 800], cross-generation-stable DnaA
        monomer pool is the downstream consequence.
        STATUS: the earlier "pass" had no valid run behind it (FBA SUC[p]
        failure, then a 1-row/gen flush bug); a full-series re-run
        (dnaa1-mechA-7gen-2026-05-30) is underway.
        Validation plots required:
        (1) DnaA monomer count (all forms via monomer_counts listener —
            verify the listener already sums all DnaA forms),
        (2) DnaA concentration (count / cell_mass),
        (3) dnaA mRNA count,
        (4) dnaA mRNA initiation events (per minute, vs the ≈1/min target).

scientific_argument:
  main_claim: |
    Under ParCa-default succinate, v2ecoli reaches a non-overlapping
    periodic cell cycle (oriC 1↔2 at steady state, from gen 3 onwards —
    a transient overshoot to 4 in the first generations marks the
    pre-steady-state relaxation) AND, with the 2e-3 dnaA init_prob
    runtime overwrite, the dnaA mRNA initiation rate lands near the
    biologically-expected ≈1 event/min, which in turn holds the DnaA
    monomer pool in the Schmidt 2016 / Mori 2021 [300, 800] band stably
    across generations.
  evidence_for:
    - 'dnaa-0 (CONFIRMED 2026-05-30, Rashmi "this looks correct"):
      succinate single-daughters lineage is periodic from gen 3 onwards —
      oriC 1↔2, cell mass sawtooth, every division fires with
      d_period_elapsed=True and chromosomes=2 at the split (Round 3.7
      D-period fix in place). The early-generation oriC overshoot to 4 is
      the expected pre-steady-state transient. Gen-3 state saved as the
      canonical succinate initial condition.'
    - 'dnaa-1 (PASS 2026-05-30, real full-cycle data,
      dnaa1-mechA-7gen-pristine, all 7 gens clean): Mechanism A
      (TU00259[c]=2e-3) lands the dnaA mRNA initiation rate at median 0.99
      events/min — on the biological ≈1/min target (Rashmi exemplar
      1.01/min) — and, as the consequence, holds the DnaA monomer pool
      cycle-mean in band [300,800] (mean 706, cross-gen CV 7.2% over gens
      3–7). oriC stays periodic 1↔2 (never 4)
      under the lifted expression, so the cell cycle from dnaa-0 is
      preserved. (Required fixing a division-time parquet-emitter
      partition-wipe bug — daughters were deleting the parent generation''s
      history; see dnaa-1 report + v2ecoli/steps/division.py.)'
  evidence_against:
    - 'Within each cycle the DnaA pool OSCILLATES above the [300,800] band
      at its pre-division peak (≈1000) before halving at division — so the
      band holds for the cycle-MEAN, not every instantaneous tick. This is
      the expected accumulate-then-divide behaviour, not a contradiction,
      but worth stating: "in band" here means cycle-typical, not a hard cap.'
  caveats:
    - 'This investigation is a FRESH START as of 2026-05-29. All prior
      Round 1–3.8 findings, prose, and decisions are retired (see
      feedback-2026-05-29-fresh-start/feedback.pdf for the directive).
      Anyone reading the prior dnaa-mock work (PR 59 on
      feat/dnaa-mock-investigation-start) should treat its content as
      historical reference only.'
    - RIDA mechanism is OUT of scope for this investigation. The
      extrinsic-regulation study (formerly dnaa-06) is removed entirely.
      Glossary entries for RIDA are likewise removed.
    - dnaa-2..N are BLOCKED until dnaa-0 and dnaa-1 reach passing
      verdicts. Do not author further studies in this directory tree
      until the first two are validated.
    - Round 3.7 D-period wiring fix (v2ecoli/steps/division.py +
      v2ecoli/composites/_helpers.py, commit 8b5d8cd on
      feat/dnaa-mock-investigation-start) is the one upstream artifact
      worth pulling forward. Under any media, the Division step needs
      to read MarkDPeriod's `divide` flag to enforce D. Cherry-pick or
      re-implement before running dnaa-0 — otherwise the 10-gen
      succinate run will fire division at the wrong time and the
      periodic-steady-state test will fail for the wrong reason.
  interpretation_ref: biological_story

biological_story: |
  In a real E. coli cell, the decision to start a new round of chromosome
  replication is made by the protein DnaA, gated by oriC site occupancy.
  Under fast growth (τ short relative to C+D), replication initiates
  multiple times before division and the cell can have 4+ oriC. Under
  slower growth (τ > C+D, the regime this investigation targets), each
  cell cycle has a free B-period where the cell isn't replicating; the
  cycle proceeds 1 oriC → initiation → 2 oriC → C-period replication →
  D-period delay → division → 1 oriC.

  This investigation pulls v2ecoli into the slower regime via succinate
  (ParCa fit: τ ≈ 82 min, C = 40 min, D = 20 min, B = 22 min) and asks
  two foundational questions before any mechanism is built on top:
  (1) does v2ecoli actually settle into the periodic regime succinate
  predicts, and (2) once it does, can the DnaA pool be held in the
  physiological literature band stably across generations?

  Step 1 — succinate steady state. Run for 10 generations with
  single_daughters tracking, check per-cell oriC and cell_mass are
  periodic in the followed daughter lineage. After ~3 generations the
  transient should decay; from generation 3 onwards, the lineage looks
  like the PDF's exemplar trace: cell mass sawtooths 600 → 1200 → 600
  fg per cycle, oriC steps 1 → 2 → 1 once per cycle. Save the gen-N
  state as the canonical succinate initial condition for subsequent
  studies.

  Step 2 — DnaA expression tuning. With the canonical initial condition
  in hand, apply Mechanism A (runtime overwrite of TU00259[c]'s
  per-promoter init_prob to 2e-3) and check the DnaA monomer count
  (sum across forms) lands in [300, 800] and stays stable across the
  7+ generation lineage.

