schema_version: 3
name: dnaa-02-atp-hydrolysis
created: '2026-05-16'
status: planned
question: |
  Does an exponential intrinsic DnaA-ATP -> DnaA-ADP hydrolysis (k ≈ 0.046/min,
  Sekimizu et al. 1987) paired with tight ATP / ADP binding produce the
  physiological DnaA-ATP / total-DnaA fraction of 0.2-0.5 (Boesen et al.
  2024) under the steady DnaA expression baseline from dnaa-01?
hypothesis: |
  Without any extrinsic conversion, the system equilibrates near the lower
  end of the band (~0.2) because ATP-binding rate roughly balances
  hydrolysis at physiological [ATP]. The no-intrinsic-hydrolysis variant
  drives DnaA-ATP fraction up toward 1.0 monotonically; the
  10× hydrolysis variant pushes it below 0.1. The apo-DnaA pool stays
  small (<5% of total) at physiological [ATP].
objective: |
  Model DnaA-ATP intrinsic hydrolysis to DnaA-ADP as a first-order decay,
  and DnaA-ATP/DnaA-ADP binding such that DnaA is predominantly
  nucleotide-bound at steady state.
description: |
  Phase 2 of the multi-phase replication-initiation plan
  (references/expert/chromosome_replication_plan.pdf, Study 2).
  Builds on the steady DnaA expression baseline from dnaa-01. Adds the
  apo-DnaA/DnaA-ATP/DnaA-ADP three-state nucleotide cycle with intrinsic
  hydrolysis rate ~0.046/min (50% in 15 min; Sekimizu et al. 1987).

baseline:
- name: baseline
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache

variants:
- name: no-intrinsic-hydrolysis
  description: |
    Set the intrinsic hydrolysis rate to 0 — DnaA-ATP should accumulate.
  params:
    dnaA_intrinsic_hydrolysis_rate_per_min: 0.0

- name: fast-intrinsic-hydrolysis
  description: |
    10x intrinsic hydrolysis — DnaA-ATP fraction should fall below 0.2.
  params:
    dnaA_intrinsic_hydrolysis_rate_per_min: 0.46

- name: heuristic-clamp
  description: |
    If the ratio drifts outside the expected band, hold DnaA-ATP/total in
    [0.2, 0.5] heuristically so downstream studies can proceed.
  params:
    dnaA_atp_fraction_clamp: [0.2, 0.5]

observables:
- name: dnaA_atp_count
  store_path: agents.0.bulk.DnaA_ATP
- name: dnaA_adp_count
  store_path: agents.0.bulk.DnaA_ADP
- name: dnaA_apo_count
  store_path: agents.0.bulk.DnaA_apo
- name: dnaA_atp_fraction
  store_path: agents.0.listeners.dnaA_cycle.atp_fraction
- name: atp_pool
  store_path: agents.0.bulk.ATP[c]
- name: adp_pool
  store_path: agents.0.bulk.ADP[c]

visualizations:
- name: dnaa-nucleotide-states
  address: local:TimeSeriesPlot
  config:
    title: "DnaA nucleotide states over time"
    observables: [dnaA_atp_count, dnaA_adp_count, dnaA_apo_count]
- name: dnaa-atp-fraction
  address: local:TimeSeriesPlot
  config:
    title: "DnaA-ATP / total DnaA"
    observables: [dnaA_atp_fraction]
    reference_band: { y_min: 0.2, y_max: 0.5, label: "PNAS 2024" }
- name: background-nucleotide-pools
  address: local:TimeSeriesPlot
  config:
    title: "Background ATP / ADP pools"
    observables: [atp_pool, adp_pool]

tasks:
- Add apo-DnaA + DnaA-ATP + DnaA-ADP species and ATP/ADP-binding kinetics.
- Add intrinsic first-order DnaA-ATP -> DnaA-ADP hydrolysis (~0.046/min).
- Optionally expose a clamp so dnaA-03/04 can run before extrinsic
  conversion (RIDA/DDAH/DARS) is implemented.

# ── Concrete gaps ───────────────────────────────────────────────────────────
gaps:
- id: gap-1
  title: Split DnaA bulk into ATP / ADP / apo species
  effort: M
  why: |
    Today MONOMER0-160[c] is a single bulk species (legacy "DnaA_ATP_complex"
    label, used as total DnaA). All dnaa-02 behaviors require the three-state
    split to compute fractions.
  approach: |
    Add three bulk IDs (DnaA_ATP, DnaA_ADP, DnaA_apo) and migrate the
    initial-state seeding to distribute MONOMER0-160[c]'s initial count
    among them at the equilibrium fraction.
  steps:
    - "Add bulk IDs in v2ecoli/library/sim_data.py (or wherever bulk IDs are registered)."
    - "Initial-state seeder: split existing total DnaA across the three species at the equilibrium fraction (~30% ATP-bound under physiological [ATP])."
    - "Audit every existing reference to MONOMER0-160[c]: either keep as the SUM (computed listener) or rewire to the new species explicitly."
    - "Behavioral test: assert sum(DnaA_apo + DnaA_ATP + DnaA_ADP) ≈ historical MONOMER0-160[c] count."
  unblocks:
    - dnaa-02 all 5 behaviors
    - dnaa-05 DnaA-ATP-fraction observables

- id: gap-2
  title: Intrinsic DnaA-ATP → DnaA-ADP hydrolysis Step
  effort: S
  why: |
    First-order hydrolysis at ~0.046/min (Sekimizu 1987). The decay term
    in the nucleotide cycle.
  approach: |
    A Step that reads DnaA_ATP count + timestep, transfers a Poisson
    or deterministic fraction to DnaA_ADP each step. Rate is a
    composite parameter so variants can perturb it.
  steps:
    - "Create v2ecoli/steps/dnaa_intrinsic_hydrolysis.py."
    - "Add composite param dnaA_intrinsic_hydrolysis_rate_per_min: float = 0.046."
    - "Wire into baseline composite after the nucleotide-binding equilibrium step."
    - "Behavioral test: no-hydrolysis variant → DnaA-ATP fraction monotonic increasing."
  unblocks:
    - dnaa-02 no-hydrolysis-variant-accumulates-atp-form
    - dnaa-02 fast-hydrolysis-variant-suppresses-atp-form

- id: gap-3
  title: dnaA_atp_fraction listener
  effort: XS
  why: Plot DnaA-ATP / total fraction time course (the central readout).
  approach: A Step emitting listeners.dnaA_cycle.atp_fraction at each timestep.
  steps:
    - "Read DnaA_apo + DnaA_ATP + DnaA_ADP from bulk; compute ATP / sum."
    - "Emit at agents.<id>.listeners.dnaA_cycle.atp_fraction."
    - "Hook into the same composite Step layer as gap-2."
  unblocks:
    - dnaa-02 apo-dnaa-fraction-is-small, dnaa-atp-fraction-in-physiological-range
    - dnaa-05 dnaa-atp-fraction-oscillates, dnaa-atp-anti-correlated-with-replisomes

- id: gap-4
  title: Optional ATP-fraction clamp
  effort: XS
  why: |
    If the unforced cycle drifts outside [0.2, 0.5], a clamp lets
    downstream studies (dnaa-03, dnaa-04) proceed without waiting for
    dnaa-05's extrinsic conversion to stabilize the fraction.
  approach: |
    A Step that, when enabled, redistributes ATP / ADP each timestep to
    keep ATP/total in a user-specified band.
  steps:
    - "Add composite params dnaA_atp_fraction_clamp: list[float] | None = None (e.g. [0.2, 0.5])."
    - "Step runs AFTER hydrolysis; rebalances if outside band."
    - "Behavioral test: assert atp_fraction stays in the band when clamp is set."
  unblocks:
    - allows dnaa-03 / dnaa-04 to proceed before dnaa-05 lands

# ── Interventions ───────────────────────────────────────────────────────────
interventions:

- name: steady-state-nucleotide-cycle
  description: |
    Baseline run; capture the steady-state DnaA-ATP / ADP / apo split and
    the background ATP / ADP pools. Establishes the physiological
    reference fractions (Boesen 2024) that all hydrolysis variants
    compare against.
  variant: null
  protocol:
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests:
    - apo-dnaa-fraction-is-small
    - dnaa-atp-fraction-in-physiological-range
    - atp-pool-much-greater-than-adp
  key_observables:
    - dnaA_atp_count
    - dnaA_adp_count
    - dnaA_apo_count
    - dnaA_atp_fraction
    - atp_pool
    - adp_pool
  requires:
    - listener: dnaA_apo
    - listener: dnaA_ATP
    - listener: dnaA_ADP

- name: knockout-intrinsic-hydrolysis
  description: |
    Zero the intrinsic DnaA-ATP → ADP hydrolysis rate. DnaA-ATP fraction
    should monotonically climb (no decay sink). Confirms the
    intrinsic-only baseline depends on this term.
  variant: no-intrinsic-hydrolysis
  protocol:
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests:
    - no-hydrolysis-variant-accumulates-atp-form
  key_observables:
    - dnaA_atp_fraction
  requires:
    - variant_hook: dnaA_intrinsic_hydrolysis_rate_per_min

- name: boost-intrinsic-hydrolysis-10x
  description: |
    10× the intrinsic hydrolysis rate (0.46/min). DnaA-ATP fraction
    should fall below 0.1, confirming hydrolysis is rate-limiting.
  variant: fast-intrinsic-hydrolysis
  protocol:
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests:
    - fast-hydrolysis-variant-suppresses-atp-form
  key_observables:
    - dnaA_atp_fraction
  requires:
    - variant_hook: dnaA_intrinsic_hydrolysis_rate_per_min

expected_behavior:

- name: apo-dnaa-fraction-is-small
  en: "At steady-state, the apo-DnaA fraction stays below 5% of total DnaA (nucleotide is tightly bound)."
  given:  {run: baseline, window: second_half}
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_apo, reduce: median}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: median}
    units: "fraction (apo / total DnaA)"
  expect: {op: at_most, value: 0.05}
  status: gated
  requires:
    - listener: dnaA_apo                # NEW bulk species (dnaa-02 implementation)
    - listener: dnaA_ATP
    - listener: dnaA_ADP
  cites:
    - Sekimizu1987Cell           # tight ATP / ADP binding affinities measured
    - Kawakami2006MolMicrobiol   # AAA+ sensor-1 motif explains tight affinity

- name: dnaa-atp-fraction-in-physiological-range
  en: "DnaA-ATP / total-DnaA is between 0.2 and 0.5 (Boesen et al. 2024 PNAS)."
  given:  {run: baseline, window: second_half}
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_ATP, reduce: median}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: median}
    units: "fraction (DnaA-ATP / total)"
  expect: {op: in_range, low: 0.2, high: 0.5}
  status: gated
  requires:
    - listener: dnaA_ATP
    - listener: dnaA_ADP
  cites:
    - Boesen2024PNAS             # 0.2-0.5 measured in Delta4 cells

- name: atp-pool-much-greater-than-adp
  en: "Background ATP >> ADP from metabolism (ratio > 10× at steady state)."
  given:  {run: baseline, window: second_half}
  measure:
    kind: ratio_of_bulks
    numerator:   {id: "ATP[c]"}
    denominator: {id: "ADP[c]"}
    reduce: median
    units: "ratio ([ATP] / [ADP])"
  expect: {op: at_least, value: 10.0}
  status: implemented   # ATP/ADP pools already exist in v2ecoli baseline
  cites:
    - Boesen2024PNAS             # physiological [ATP]/[ADP] context

- name: no-hydrolysis-variant-accumulates-atp-form
  en: "In the no-intrinsic-hydrolysis variant, DnaA-ATP fraction monotonically rises (no decay sink)."
  given:  {run: variant, variant: no-intrinsic-hydrolysis, window: full}
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_ATP, reduce: series}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: series}
    units: "fraction (DnaA-ATP / total)"
  expect: {op: monotonic_increasing, allow_dip_pct: 5}
  status: gated
  requires:
    - variant_hook: dnaA_intrinsic_hydrolysis_rate_per_min
  cites:
    - Sekimizu1987Cell           # intrinsic hydrolysis is THE decay sink

- name: fast-hydrolysis-variant-suppresses-atp-form
  en: "The 10× hydrolysis variant pushes DnaA-ATP fraction below 0.1 at steady state."
  given:  {run: variant, variant: fast-intrinsic-hydrolysis, window: second_half}
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_ATP, reduce: median}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: median}
    units: "fraction (DnaA-ATP / total)"
  expect: {op: at_most, value: 0.1}
  status: gated
  requires:
    - variant_hook: dnaA_intrinsic_hydrolysis_rate_per_min
  cites:
    - Sekimizu1987Cell
    - Kawakami2006MolMicrobiol

expert_questions:
- Confirm the apo-DnaA pool size assumption (negligible at physiological [ATP]).
- Confirm whether ATP/ADP binding kinetics differ enough to matter at this
  resolution, or whether equilibrium fractionation is sufficient.

bibliography:
  expert: [replication_initiation_molecular_info]
  bib_keys: [Sekimizu1987Cell, Kawakami2006MolMicrobiol, Boesen2024PNAS]
  claims: [dnaa.intrinsic-hydrolysis.0p046-per-min, dnaa.atp-adp-binding.tight, dnaa.atp-fraction.0p2-to-0p5]

runs: []
conclusion: null
parent_studies:
  - {study: dnaa-01-expression-dynamics, condition: tests-passed}
