study_card:
  goal: 'Phase 3 — build the Bayesian inference substrate: per-modality observation likelihoods (negative binomial RNA-seq,
    log-normal proteomics, normal log-growth, normal/log-normal metabolomics), an incremental log-likelihood accumulator over
    PDMP segments + jump events, Vivarium observe/intervene algebraic effects (à la ChiRho), and a baseline ABC-SMC inference
    engine validated by Simulation-Based Calibration.'
  why_before_next: This asks whether the new model can assign probabilities to observations, which is what makes parameter
    fitting and Bayesian inference possible.
