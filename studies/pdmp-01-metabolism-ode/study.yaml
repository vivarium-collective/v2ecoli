variants:
- name: millard-with-lqr
  description: 'Millard 2017 ODE via pbg-copasi, wrapped with an outer LQR

    controller that drives growth rate toward a reference

    trajectory. Replaces v2ecoli''s FBA biomass-production objective.

    '
- name: millard-fba-bridge
  description: 'Coupled composite — Millard 2017 ODE (pbg-copasi) for

    central carbon + v2ecoli''s multi-objective FBA

    (`wholecell.utils.modular_fba`) for the rest of the metabolic

    network; transitional configuration during the incremental

    handover.

    '
- name: millard-standalone
  description: Standalone Millard 2017 ODE via pbg-copasi CopasiUTCProcess on the published SBML — no coupling, no LQR. Steady-state
    recovery confirmed 2026-05-24.
  params: &id002
    model_source: v2ecoli/models/sbml/millard2017_central_metabolism.xml
    time: 100.0
    intervals: 10
- name: millard-atp-drain-perturbation
  description: ATP drained to 30% of steady state at t=500s (ADP gains the difference, mass-balanced). Tests transient response
    across all coupled subsystems; ran 2026-05-24.
  params: &id003
    perturbation: ATP→0.3×SS at t=500s
    duration: 3000
- name: millard-fba-bridge-3-conditions
  description: FBA-bridge composite under M9-glucose, M9-acetate, M9-glucose+aa. Tests interface fidelity across the same
    conditions as Phase 0.
  params: &id004
    conditions:
    - M9-glucose
    - M9-acetate
    - M9-glucose+aa
