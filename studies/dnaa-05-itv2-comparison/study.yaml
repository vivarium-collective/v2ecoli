# ─── BIOLOGICAL CONTEXT ────────────────────────────────────────────────
biological_summary: |
  Three-way comparison study: the Fu/Xiao/Jun (2023) mean-field analytical
  model, the v2ecoli whole-cell baseline at default parameters, and v2ecoli
  with parameters retuned to the FXJ paper's values. The analytical model
  serves as a clean reference: it predicts initiation mass, DnaA-ATP/ADP
  cycling, and 1/N synchrony scaling from three mechanistic control
  parameters (DnaA expression level, DnaA-ATP/ADP ratio, DnaA-box count).
  If v2ecoli's mechanism captures the biology, it should converge to the
  analytical prediction once parameters are matched. The default-parameter
  v2ecoli is expected to diverge (it produces ~115 DnaA/cell — 5× below
  the paper's c_I=600/µm³ anchor); the parameter-tuned variant should
  close that gap. Any residual divergence after parameter matching points
  at structural/mechanism differences worth flagging for expert review.
