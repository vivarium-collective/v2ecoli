# (architectural decision from chris_feedback_2026_05_26 §4). Each variant
# ran the full 120 sim-min through 2 generations under the workspace-default
# parquet emitter; hive partitioned per ParquetEmitter convention under
# studies/<study>/parquet-runs/.
#
