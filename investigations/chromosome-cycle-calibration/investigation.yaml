- path: Parameters for WCM (Stage 1_ heuristic values) - Stage 1.pdf
  kind: parameter_table
  description: Stage 1 heuristic parameters. ABT minimal glycerol MG1655 wildtype. tau=150, C=70, D=30, replication speed 66.31 kbp/min, DnaA TE=1, DnaA Kd_ATP=30 nM, DnaA Kd_ADP=100 nM, DARS1+DARS2 locations.

