# ─── Runs / Tests config (v3 dashboard-compatibility) ──────────────────────
# NOTE: the field `tests:` (dict) is the dashboard's v4 RESERVED config —
# don't put behavior tests here. Behavior test definitions live under
# `behavior_tests:` above.
runs:
- simulation: baseline-steady-state
  seed: 0
  duration_s: 600
  started_at: '2026-05-16T19:44Z'
  wall_seconds: 72
  rows: 601
  db: studies/dnaa-01-expression-dynamics/runs.db
  outcomes:
    dnaA-count-in-range:        {result: FAIL, value: 51781, expected: '[300, 800]', note: 'pre-bugfix — listener missing overwrite[]'}
    dnaA-concentration-stable:  {result: PASS, max_rolling_cv: 0.005}
    autorepression-correlation: {result: FAIL, reason: 'n_bound_TF_per_TU empty — listener not populated in baseline composite'}

- simulation: baseline-steady-state
  seed: 0
  duration_s: 600
  started_at: '2026-05-16T20:09Z'
  wall_seconds: 71
  rows: 601
  db: studies/dnaa-01-expression-dynamics/runs.db
  note: 'After monomer_counts_listener overwrite[] fix.'
  outcomes:
    dnaA-count-in-range:        {result: FAIL, value: 115,   expected: '[300, 800]', note: 'true biological calibration shortfall, ~5× low'}
    dnaA-concentration-stable:  {result: PASS, max_rolling_cv: 0.008}
    autorepression-correlation: {result: FAIL, reason: 'n_bound_TF_per_TU empty — req-6 underlying data missing'}

conclusion: |
  Phase=Decide outcome: PIPELINE-GATED on translation-efficiency calibration.
  • Test framework works end-to-end (baseline → SQLite emitter → evaluator).
  • Discovered + fixed an infrastructure bug: monomer_counts_listener output
    type lacked the overwrite[] wrapper, causing every timestep to ADD onto
    the previous value. Top monomers were emitting in the tens of millions.
    After fix, top monomers are in 10^5 (physiological).
  • dnaA-concentration-stable PASSES (rolling CV 0.008 << 0.10) — v2ecoli's
    DnaA pool IS homeostatically regulated.
  • dnaA-count-in-range FAILS — v2ecoli emits 115 DnaA/cell vs literature's
    [300, 800]. The pre-stated divergence_alarm_factor of 10× is NOT
    triggered (4.8× divergence is below the alarm), but the test still
    fails its hard band. This is a real calibration question.
  • autorepression-correlation BLOCKED on n_bound_TF_per_TU populating —
    suspect the same overwrite[] bug pattern in rna_synth_prob_listener.
  Recommend: hold dnaa-02 pending expert review of EG10235's
  translation_efficiency in ParCa, then re-run dnaa-01.


# ─── Follow-up studies / decisions ────────────────────────────────────────
# Concrete next steps derived from running this study. Each entry is a
# decision the next person (or future-you) needs to make. Mix of:
#   • existing downstream studies in the pipeline (kind: existing)
#   • new studies this run uncovered as needed (kind: new)
#   • non-study follow-ups (infrastructure fixes, expert questions, calibration tasks)
#
# Reasons should cite the run outcome that motivated them, so the
# follow-up isn't ungrounded.
follow_up_studies:

- title: "Apply overwrite[] fix to sibling listeners (rna_synth_prob, replication_data)"
  kind: infrastructure_fix
  effort: S
  why: |
    The monomer_counts_listener bug pattern (plain array[] output without
    overwrite[] wrapper) likely exists in rna_synth_prob_listener and
    replication_data_listener. This explains why n_bound_TF_per_TU stays
    empty in the emit, which blocks autorepression-correlation here AND
    dnaa-03's DnaA-box-occupancy readouts.
  unblocks:
    - tests.autorepression-correlation in dnaa-01
    - dnaa-03's box-occupancy readouts
  acceptance:
    - After fix, listeners.rna_synth_prob.n_bound_TF_per_TU is populated each tick
    - After fix, listeners.replication_data.* fields update each tick

- title: "Recalibrate EG10235 translation_efficiency in ParCa"
  kind: calibration_task
  effort: M
  why: |
    With the listener bug fixed, v2ecoli's median DnaA pool is ~115/cell.
    Literature (Sekimizu, Schmidt, Mori) reports 300-800. v2ecoli is ~5×
    too low. Most likely cause: translation_efficiency for EG10235 in the
    ParCa cache. Other candidates worth ruling out: DnaA degradation rate;
    whether literature numbers include chromosome-bound DnaA that the
    listener might not be summing back in.
  unblocks:
    - tests.dnaA-count-in-range in dnaa-01 (passing the gate)
    - all of dnaa-02..06 (a realistic DnaA pool is the baseline they depend on)
  acceptance:
    - dnaa-01 re-run produces median DnaA in [300, 800]
    - bulk[MONOMER0-160[c]] (DnaA-ATP) reaches the expected 200-500 free pool fraction

