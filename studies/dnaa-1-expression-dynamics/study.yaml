      initial_state_path: out/steady_state_inputs/succinate_default_gen3_start.dill
      perturbations:
        "TU00259[c]": 1.7e-3   # Mechanism A: dnaA per-promoter init_prob.
        # Re-tuned 2026-05-31 from 2e-3 → 1.7e-3 (Rashmi): lowers the
