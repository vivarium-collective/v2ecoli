schema_version: 3
name: mbp-03-bird-reactor-coupling
created: '2026-05-22'
phase: Design

design_status: drafted
implementation_status: not_started
simulation_status: not_run
evaluation_status: not_evaluated
expert_review_status: not_requested

baseline:
- name: bird-coupled-baseline
  composite: v2ecoli.composites.reactor_bird_coupled   # TODO — see implementation_requirements
  params: {seed: 0, cache_dir: out/cache}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Can v2ecoli (with the mbp-01 time-varying-env hook and mbp-02 population
    aggregator) be coupled to `pbg-bioreactordesign`'s BiRDReactorProcess —
    via a thin adapter that resolves the biomass-ownership conflict between
    the two — such that BiRD supplies dissolved O2, kLa, gas-phase physics,
    and v2ecoli supplies population biomass and exchange-flux demand,
    producing a physically consistent coupled trajectory in a 0D
    well-mixed bench-scale reactor?
  mechanism: |
    pbg-bioreactordesign's `BiRDReactorProcess` provides 0D well-mixed
    reactor physics (Higbie kLa, temperature-dependent Henry's law,
    Wilke-Chang diffusivity, gas-holdup) but ALSO carries an internal
    biomass ODE driven by its own Monod kinetics. v2ecoli owns biomass
    via per-cell mass and Division.

    **Option-B resolution (adopted 2026-05-26 per chris_feedback_2026_05_26
    §5 + §11; Eran's decision).** Rather than disabling BiRD's internal
    biomass ODE behind a `bird_disable_internal_biomass=true` flag, fork
    upstream a new `BiRDTransportProcess` that omits the biomass equation
    entirely. Rationale:
      - Substitutability symmetry: the cell-side interface contract makes
        cell-side engines variable while the reactor side stays fixed;
        forking gives two reactor variants (with internal biomass for
        standalone use; without it under the contract). Story symmetric
        across both sides.
      - Naming: a `disable X` flag signals "shouldn't be there in the first
        place" rather than "let users turn it off."
      - Tested-vs-dead-code paths: with `disable=true` the biomass-ODE code
        path exists but isn't exercised under this configuration; untested
        in this regime, no signal if it later quietly breaks.

    Done well, Option B is NOT "copy `BiRDReactorProcess` and delete the
    ODE." It's extract-shared-transport-module — kLa / Henry / Wilke-Chang
    in a shared module, with `BiRDReactorProcess` and `BiRDTransportProcess`
    as two consumers (preserves DRY while delivering the design benefit).

    **Cross-investigation dependency:** the fork lives upstream in
    `vivarium-collective/pbg-bioreactordesign`. mbp-03 entering Build phase
    is BLOCKED on `pbg-bioreactor-transport-fork` (pre-seeded as a
    candidate-future-study in mbp-06; effectively a hard prereq, see
    pipeline_gate.prerequisites below).

    Coupling actions, given `BiRDTransportProcess`:

      (1) **Drive BiRDTransportProcess's biomass-input port with v2ecoli's
          aggregated population** via a `ReactorCellCoupler` Step that
          writes `reactor.biomass = population.biomass_concentration_gL`
          each step.
      (2) **Drive v2ecoli's environment with BiRD's dissolved-phase**:
          coupler writes BiRD's `dissolved_o2` / `dissolved_co2` into
          v2ecoli's `environment.external_concentrations.OXYGEN-MOLECULE[p]`
          / `CARBON-DIOXIDE[p]` (units conversion mg/L → mM).
      (3) **Drive BiRD's O2 demand with v2ecoli's metabolism**: coupler
          aggregates v2ecoli's `external_exchange_fluxes.OXYGEN-MOLECULE[p]`
          across agents × biomass and writes it as BiRD's `o2_uptake_rate`
          input.
      (4) **Drive BiRD's CO2 demand with v2ecoli's metabolism**: symmetric
          to (3) — `external_exchange_fluxes.CARBON-DIOXIDE[p]` →
          `co2_production_rate`.

    Result: BiRDTransportProcess = transport-only physics; v2ecoli =
    biology + biomass. The coupling is the minimal adapter on the v2ecoli
    side; reactor-side cleanup is upstream.
  expected_outcome: |
    DO drops below saturation as v2ecoli's population consumes O2; raising
    kLa raises steady-state DO. Reactor biomass concentration tracks
    v2ecoli's population growth. With cells removed (population aggregator
    returning zero), DO converges to BiRD's Henry-saturation. Coupled run
    completes one v2ecoli generation (~60 min) without state divergence.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - mbp-01-time-varying-environment
    - mbp-02-population-aggregation
    - pbg-bioreactor-transport-fork   # upstream PR; see chris_feedback_2026_05_26 §5
  enables:
    - mbp-04-multigeneration-runs
  gate_status_summary: |
    Blocked on mbp-01 (env hook so BiRD's DO can drive v2ecoli), mbp-02
    (population aggregator so v2ecoli's biomass can drive BiRD), AND the
    upstream `pbg-bioreactor-transport-fork` PR landing in
    pbg-bioreactordesign (Option-B decision per chris_feedback_2026_05_26
    §5; Eran's choice 2026-05-26). The keystone study: this is where
    v2ecoli ↔ reactor coupling becomes real.
  proceed_condition: |
    Coupling direction tests pass (DO drops with cells, dissolved CO2
    rises with cells, higher kLa lifts DO and lowers dissolved CO2);
    no-cells runs reach Henry equilibrium for both O2 and CO2; one
    v2ecoli generation completes without state divergence; O2 mass-balance
    test closes (previously referenced by the gate but not actually
    implemented in the test set — chris_feedback_2026_05_26 §7 consistency
    fix).


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

# Sim durations default to 240 min (4 h) per chris_feedback_2026_05_26 §6:
# at BiRD's default 1-h update interval, a 60-min sim contains at most
# 1-2 discrete BiRD update points across the whole run — so any
# "steady-state DO" or "steady-state CO2" test over `window: second_half`
# is testing pre-steady-state behavior. 4 h gives 4+ BiRD ticks; meaningful
# second-half window. Open question coupler-timestep-tunability tracks
# whether BiRD's interval is structural or just a default.

- name: one-generation-coupled
  base_model: v2ecoli.composites.reactor_bird_coupled
  perturbation: null
  condition: M9-minimal-glucose-aerated
  duration_min: 240   # 4 BiRD ticks at default 1-h interval
  seeds: [0]
  readouts:
    - reactor_dissolved_o2
    - reactor_dissolved_co2
    - reactor_kla_o2
    - reactor_kla_co2
    - reactor_o2_saturation
    - reactor_co2_saturation
    - reactor_biomass_gL
    - population_cell_count
    - cell_mu_per_h
    - metabolism_o2_uptake_flux
    - metabolism_co2_production_flux
    - cumulative_o2_consumed_mmol
    - cumulative_o2_transferred_mmol
  applies_tests:
    - one-generation-completes-without-divergence
    - cells-drop-do-below-saturation
    - cells-raise-dissolved-co2-above-saturation
    - reactor-biomass-tracks-population
    - o2-mass-balance-closes
  status: planned

- name: kla-sweep-coupled
  base_model: v2ecoli.composites.reactor_bird_coupled
  perturbation:
    gas_flow_rate_Lpm: [0.5, 2.0, 5.0]   # drives kLa via BiRD's Higbie
  condition: M9-minimal-glucose-aerated
  duration_min: 240
  seeds: [0]
  readouts: [reactor_dissolved_o2, reactor_dissolved_co2, reactor_kla_o2, reactor_kla_co2, cell_mu_per_h]
  applies_tests:
    - higher-kla-raises-steady-state-do
    - higher-kla-lowers-steady-state-dissolved-co2
  status: planned

- name: no-cells-henry-equilibrium
  base_model: v2ecoli.composites.reactor_bird_coupled
  perturbation: {force_zero_population: true}
  condition: aerated-no-cells
  duration_min: 240
  seeds: [0]
  readouts: [reactor_dissolved_o2, reactor_dissolved_co2, reactor_o2_saturation, reactor_co2_saturation]
  applies_tests:
    - no-cells-do-converges-to-henry-saturation
    - no-cells-co2-converges-to-henry-saturation
  status: planned


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: v2ecoli.composites.baseline_population   # + baseline_time_varying_env
  new_state_variables:
    - "reactor.* (all BiRDTransportProcess output ports — dissolved_o2, dissolved_co2, kla_o2, kla_co2, gas_holdup, …)"
    - "reactor.diagnostics.cumulative_o2_consumed_mmol (integral of metabolism O2 uptake × biomass × dt)"
    - "reactor.diagnostics.cumulative_o2_transferred_mmol (integral of BiRD kLa × (saturation - dissolved) × volume × dt)"
  new_processes:
    - {name: BiRDTransportProcess, kind: Process, requirement_id: req-1-bird-transport-dep, provenance: "pbg-bioreactordesign (forked via pbg-bioreactor-transport-fork PR)"}
    - {name: ReactorCellCoupler,   kind: Step,    requirement_id: req-2-cell-coupler}
  new_parameters:
    - {name: bird_reactor_config, default: "{reactor_type: bubble_column, volume_L: 1.0, gas_flow_rate_Lpm: 2.0, temperature_K: 310.15}"}
    # bird_disable_internal_biomass REMOVED — Option B (fork) means
    # BiRDTransportProcess has no internal biomass ODE to disable.
  modified_processes:
    - "v2ecoli baseline (with mbp-01 + mbp-02 enhancements): reactor_volume_L parameter now read from reactor.volume_L store (BiRD owns volume)."
  notes: |
    pbg-bioreactordesign added as a workspace dependency at the version
    that ships `BiRDTransportProcess` (Option-B fork; pinned to the PR
    branch until merged upstream). The flag-based disable approach is
    explicitly REJECTED here per chris_feedback_2026_05_26 §5:
      - Symmetric substitutability story.
      - No "disable X" naming smell.
      - No tested-vs-dead-code paths.
    If the upstream fork is blocked, fall back to the flag-based path as
    a documented downgrade — log to scope_decisions when that happens.


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "0D well-mixed reactor; bubble column geometry as the default for mbp-03 (per BiRD's default). Stirred-tank may be required for mbp-05 Beulig matching — see open_question reactor-geometry-for-beulig."
  - "BiRDTransportProcess (Option-B fork) has no internal biomass ODE; v2ecoli's population is the SOLE source of biomass truth — by construction, not by flag."
  - "v2ecoli's per-cell μ from metabolism — when aggregated by cells_per_agent — captures the same physics BiRD's Monod would have approximated."
  - "Timestep: sim duration 240 min (4 BiRD ticks at 1-h default) chosen so 'second-half steady-state' windows are meaningful. If BiRD's interval is tunable in the fork (open_question coupler-timestep-tunability), drop to ~minutes and tighten tolerances."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:
- {name: reactor_dissolved_o2,           store_path: reactor.dissolved_o2,                    units: mg/L,   status: planned}
- {name: reactor_dissolved_co2,          store_path: reactor.dissolved_co2,                   units: mg/L,   status: planned}
- {name: reactor_kla_o2,                 store_path: reactor.kla_o2,                          units: "1/h",  status: planned}
- {name: reactor_kla_co2,                store_path: reactor.kla_co2,                         units: "1/h",  status: planned}
- {name: reactor_o2_saturation,          store_path: reactor.o2_saturation,                   units: mg/L,   status: planned}
- {name: reactor_co2_saturation,         store_path: reactor.co2_saturation,                  units: mg/L,   status: planned}
- {name: reactor_biomass_gL,             store_path: reactor.biomass,                         units: g/L,    status: planned}
- {name: population_cell_count,          store_path: population.cell_count,                   units: cells,  status: planned}
- {name: population_total_biomass_gDW,   store_path: population.total_biomass_gDW,            units: gDW,    status: planned}
- {name: cell_mu_per_h,                  store_path: agents.0.listeners.mass.instantaneous_growth_rate, units: "1/h", status: planned}
- {name: metabolism_o2_uptake_flux,      store_path: "agents.0.metabolism.external_exchange_fluxes.OXYGEN-MOLECULE[p]", units: "mmol/(gDW·h)", status: planned}
- {name: metabolism_co2_production_flux, store_path: "agents.0.metabolism.external_exchange_fluxes.CARBON-DIOXIDE[p]", units: "mmol/(gDW·h)", status: planned}
- {name: cumulative_o2_consumed_mmol,    store_path: reactor.diagnostics.cumulative_o2_consumed_mmol,    units: mmol, status: planned}
- {name: cumulative_o2_transferred_mmol, store_path: reactor.diagnostics.cumulative_o2_transferred_mmol, units: mmol, status: planned}


behavior_tests:

- name: one-generation-completes-without-divergence
  classification: primary
  acceptance_form: qualitative_direction
  description: "Coupled sim runs for one v2ecoli doubling time (60 min) without state divergence (no NaN; DO stays in [0, saturation]; cell_count ≥ 1)."
  measure: {kind: completion_check, checks: [no_nan, do_in_range, cell_count_at_least_one]}
  pass_if: {op: all_pass}
  units: "—"
  requires_simulation: one-generation-coupled
  cites: []

- name: cells-drop-do-below-saturation
  classification: primary
  acceptance_form: qualitative_direction
  description: "With v2ecoli cells consuming O2, steady-state dissolved O2 sits below BiRD's Henry-law saturation."
  measure: {kind: derived_difference, a: reactor.dissolved_o2, b: reactor.o2_saturation, reduce: mean, window: second_half}
  pass_if: {op: at_most, value: 0.0}
  units: mg/L
  requires_simulation: one-generation-coupled
  cites: [GardenGarciaOchoa2009BiotechAdv]

- name: reactor-biomass-tracks-population
  classification: primary
  acceptance_form: quantitative_range
  description: "reactor.biomass equals population.biomass_concentration_gL within NUMERICAL tolerance — coupling is wired without drift. Tightened from ±5% to ±1% per chris_feedback_2026_05_26 §6: any wider band reveals a coupling bug, not an expected lag."
  measure: {kind: derived_ratio, numerator: reactor.biomass, denominator: population.biomass_concentration_gL}
  pass_if: {op: in_range, low: 0.99, high: 1.01}
  units: fraction
  requires_simulation: one-generation-coupled
  cites: []

# ─── CO2 symmetric tests (chris_feedback_2026_05_26 §7) ───
# If the CO2 leg of the coupling has a wiring bug, mbp-03 passes anyway
# and the defect surfaces downstream in mbp-04 or mbp-05.

- name: cells-raise-dissolved-co2-above-saturation
  classification: primary
  acceptance_form: qualitative_direction
  description: "With v2ecoli cells producing CO2, steady-state dissolved CO2 sits ABOVE BiRD's Henry-law saturation (production drives dissolved CO2 above gas-equilibrium)."
  measure: {kind: derived_difference, a: reactor.dissolved_co2, b: reactor.co2_saturation, reduce: mean, window: second_half}
  pass_if: {op: at_least, value: 0.0}
  units: mg/L
  requires_simulation: one-generation-coupled
  cites: []

- name: higher-kla-lowers-steady-state-dissolved-co2
  classification: primary
  acceptance_form: qualitative_direction
  description: "Across the gas-flow sweep, better gas stripping (higher kLa) reduces steady-state dissolved CO2 monotonically."
  measure: {kind: cross_run_trend, x: reactor.kla_co2, y: reactor.dissolved_co2}
  pass_if: {op: negative_monotonic}
  units: mg/L
  requires_simulation: kla-sweep-coupled
  cites: []

- name: no-cells-co2-converges-to-henry-saturation
  classification: supporting
  acceptance_form: quantitative_range
  description: "With force_zero_population=true (no cells producing CO2), dissolved CO2 converges to BiRD's Henry-law saturation. Mirror of the O2 test."
  measure: {kind: derived_difference, a: reactor.dissolved_co2, b: reactor.co2_saturation, reduce: final, window: full}
  pass_if: {op: abs_at_most, value: 0.2}
  units: mg/L
  requires_simulation: no-cells-henry-equilibrium
  cites: [Sander2015AtmosChemPhys]

# ─── O2 mass-balance closure (chris_feedback_2026_05_26 §7) ───
# The four-way-coupling closure check. mbp-01 has cumulative-mass-balance-
# closes for glucose; this is the mbp-03 analog. proceed_condition above
# already referenced this test — the test was missing from the set
# (consistency fix).

- name: o2-mass-balance-closes
  classification: primary
  acceptance_form: quantitative_range
  description: "Cumulative O2 consumed by v2ecoli (∫ metabolism O2 flux × biomass × dt) + dissolved-O2 change in the reactor ≈ kLa-driven gas-liquid transfer integrated over the run (∫ kLa × (saturation - dissolved) × volume × dt). Four-way closure check across BiRDTransportProcess + coupler + metabolism + EnvironmentDriver."
  measure: {kind: derived_ratio, numerator: cumulative_o2_consumed_mmol, denominator: "cumulative_o2_transferred_mmol - delta_dissolved_o2_mmol"}
  pass_if: {op: in_range, low: 0.95, high: 1.05}
  units: fraction
  requires_simulation: one-generation-coupled
  cites: []

- name: higher-kla-raises-steady-state-do
  classification: primary
  acceptance_form: qualitative_direction
  description: "Across the gas-flow sweep (which drives kLa via BiRD's Higbie correlation), steady-state DO increases monotonically with kLa."
  measure: {kind: cross_run_trend, x: reactor.kla_o2, y: reactor.dissolved_o2}
  pass_if: {op: positive_monotonic}
  units: mg/L
  requires_simulation: kla-sweep-coupled
  cites: [GardenGarciaOchoa2009BiotechAdv]

- name: no-cells-do-converges-to-henry-saturation
  classification: supporting
  acceptance_form: quantitative_range
  description: "With force_zero_population=true (population aggregator returns 0 cells), DO converges to BiRD's Henry-law saturation."
  measure: {kind: derived_difference, a: reactor.dissolved_o2, b: reactor.o2_saturation, reduce: final, window: full}
  pass_if: {op: abs_at_most, value: 0.2}
  units: mg/L
  requires_simulation: no-cells-henry-equilibrium
  cites: [Sander2015AtmosChemPhys]


# ─── 5b. REQUIRED KNOWLEDGE ─────────────────────────────────────────────────
required_knowledge:
  claims:
    - id: mu-max-m9-glucose-aerobic
      backs: []                                # informational — sets the regime expectation but mbp-03 has no μ_max test (intentional; mbp-04 does)
    - id: doubling-time-m9-glucose
      backs: [one-generation-completes-without-divergence]
    - id: acetate-overflow-low-do
      backs: []                                # informational
    - id: henry-law-equilibrium-o2-co2
      backs: [no-cells-do-converges-to-henry-saturation]
    - id: kla-do-monotonic
      backs: [higher-kla-raises-steady-state-do]
    - id: v2ecoli-calibration-regime
      backs: []                                # informational — tolerance band on μ in mbp-04 reflects this
    - id: bird-biomass-ownership-conflict
      backs: [reactor-biomass-tracks-population, cells-drop-do-below-saturation]
  interface_contract:
    document: references/expert/cell_side_interface_contract.md
    role: |
      This study is the first impl PR to wire a real engine (v2ecoli baseline)
      under the cell-side interface contract. The substitutability story stands
      or falls here.
  open_questions:
    # bird-disable-vs-fork RESOLVED 2026-05-26 — Option B (fork to
    # BiRDTransportProcess) adopted per chris_feedback_2026_05_26 §5 +
    # Eran's decision. Upstream PR tracked as candidate-future-study
    # `pbg-bioreactor-transport-fork` (now a hard prereq above).
    - id: coupler-timestep-tunability
      question: |
        Is BiRD's 1-hour update interval a structural constraint of the
        underlying physics implementation, or just a default? If tunable
        in the BiRDTransportProcess fork, dropping to a few minutes
        (matching the kLa-driven timescale) would resolve several test-
        design issues at once: 60-min "steady-state" tests would become
        meaningful at standard mbp-03 durations rather than requiring 4-h
        sims; the coupler lag in key_assumptions shrinks proportionally;
        the reactor-biomass-tracks-population tolerance could tighten to
        floating-point precision. Decide as part of the upstream fork
        scope.
      blocks: [BiRDTransportProcess interval spec]
      asked_to: pbg-bioreactordesign maintainer (Chris) — bundle with fork PR
      status: open
    - id: o2-uptake-units-conversion
      question: |
        v2ecoli's metabolism emits external_exchange_fluxes in mmol/(gDW·h).
        BiRD expects o2_uptake_rate in mg_O2/(g_X·h). Conversion factor
        (32 g/mol O2 × population biomass) — is the coupler the right
        place for this, or should it be a Step in the interface contract?
      blocks: [coupler implementation]
      asked_to: unassigned
      status: open
    - id: reactor-geometry-for-beulig
      question: |
        bubble-column is the mbp-03 default; limitations note "stirred-tank
        / airlift not validated this phase." If mbp-05's Beulig comparison
        requires stirred-tank (Beulig 2025 used stirred-tank), a geometry
        switch is queued between mbp-03 and mbp-05 with its own validation
        work — either flip the default to stirred-tank now, or name it as
        a sub-task in mbp-04/05's scope.
      blocks: [mbp-05 reactor geometry selection]
      asked_to: Chris on next sync (confirm Beulig methods reactor type)
      status: open


# ─── 5c. FAILURE MODES ──────────────────────────────────────────────────────
failure_modes:
  - signature: "one-generation-completes-without-divergence fails (NaN / unbounded)"
    candidate_causes:
      - "Units mismatch on a coupler write (mg/L vs mM, mmol/(gDW·h) vs mg_O2/(g_X·h))"
      - "BiRD's internal biomass ODE not actually disabled — competing with v2ecoli's biomass"
      - "Coupler reads stale BiRD state immediately after BiRD's first tick"
      - "DO going below zero because uptake rate exceeds physical limit (no clamp)"
    checks:
      - "Add a hard clamp on dissolved_o2 ≥ 0 in the coupler (with a warning if hit)"
      - "Confirm BiRDReactorProcess config.max_growth_rate_per_h == 0 at boot"
      - "Print first 10 emit rows of every coupler-touched store"

  - signature: "reactor-biomass-tracks-population diverges over time"
    candidate_causes:
      - "Coupler writes reactor.biomass at a different cadence than BiRD's internal update"
      - "Unit drift between gDW/L (population side) and g/L (BiRD's biomass port)"
      - "BiRD's biomass ODE re-enabled by some default in a sub-call"
    checks:
      - "Plot reactor.biomass vs population.biomass_concentration_gL — should overlay"
      - "Inspect BiRD's internal ODE state directly via its _state attribute"

  - signature: "higher-kla-raises-steady-state-do FAILS (no trend or reversed)"
    candidate_causes:
      - "Gas flow rate not driving BiRD's Higbie kLa correlation as expected"
      - "Cell O2 uptake also scaling with gas flow (shouldn't be)"
      - "Steady state not reached within sim duration"
    checks:
      - "Print BiRD's kla_o2 output across the sweep; confirm monotonic in gas_flow_rate"
      - "Check second-half DO variance — should be small if at steady state"

  - signature: "no-cells-do-converges-to-henry-saturation FAILS"
    candidate_causes:
      - "force_zero_population didn't actually zero out cells (aggregator returning >0)"
      - "Coupler still writing a non-zero o2_uptake_rate to BiRD"
      - "Initial DO set far from saturation + sim too short to converge"
    checks:
      - "Print population.cell_count and reactor.o2_uptake_rate — should both be 0"
      - "Compare reactor.dissolved_o2 to reactor.o2_saturation final values"


# ─── 5d. REGRESSION ────────────────────────────────────────────────────────
regression_tests:
  inherits_from:
    - study: mbp-01-time-varying-environment
      tests:
        - external_glucose_updates_propagate_within_one_step
        - cumulative-mass-balance-closes
        - zero-substrate-blocks-uptake
        - saturating-substrate-respects-vmax
        - plateau-across-saturating-range
        - static-env-baseline-unchanged
    - study: mbp-02-population-aggregation
      tests:
        - cell-count-doubles-per-generation
        - per-cell-observables-unchanged-vs-baseline
        - single-cell-aggregation-matches-cell-mass


# ─── 6. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "Uses BiRDTransportProcess from the upstream `pbg-bioreactor-transport-fork` PR — until that lands and is pinned, mbp-03 cannot enter Build phase."
  - "Single v2ecoli generation only (or, in chris_feedback_2026_05_26 §6 terms, 4 BiRD ticks); multi-generation stability is mbp-04's scope."
  - "Bubble column geometry default; stirred tank / airlift not validated this phase. May need switch for Beulig matching (open_question reactor-geometry-for-beulig)."
  - "Fed-batch operations not supported (pbg-bioreactordesign has no fed-batch yet) — flagged as a deferred enhancement; mbp-05 may stress this."
  - "Coupler timestep mismatch (BiRD ~1 h default, v2ecoli ~1 s): the coupler holds last-known BiRD state between BiRD ticks. Mitigated to acceptable by 240-min default sim duration (4 ticks). Open_question coupler-timestep-tunability tracks the path to BiRD-interval-as-tunable in the upstream fork."


# ─── 7. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-bird-transport-dep
  kind: dependency
  title: Add pbg-bioreactordesign (with BiRDTransportProcess) as a workspace dependency
  effort: XS   # in v2ecoli; the upstream fork itself is the heavy lift
  description: |
    Install pbg-bioreactordesign at the version that ships
    `BiRDTransportProcess` (transport-only sibling of BiRDReactorProcess
    with no internal biomass ODE; chris_feedback_2026_05_26 §5 Option B).
    Until the upstream `pbg-bioreactor-transport-fork` PR is merged, this
    requires pinning to the PR branch. Register BiRDTransportProcess via
    the core registry. Confirm tests pass against the installed dep.

    **Blocked-on-upstream:** this req cannot complete until the upstream
    PR lands. See pipeline_gate.prerequisites and mbp-06
    candidate_future_studies entry `pbg-bioreactor-transport-fork`.
  unblocks: [all mbp-03 behavior_tests]

- id: req-2-cell-coupler
  kind: process
  title: ReactorCellCoupler Step
  effort: M
  description: |
    PBG Step running each emit cycle. Reads:
      - `population.biomass_concentration_gL` → writes `reactor.biomass` (BiRD biomass input)
      - `reactor.dissolved_o2`, `reactor.dissolved_co2` (mg/L) → converts to mM and writes
        `environment.external_concentrations.{OXYGEN-MOLECULE[p],CARBON-DIOXIDE[p]}`
      - aggregated `agents.*.metabolism.external_exchange_fluxes.OXYGEN-MOLECULE[p]`
        × population.total_biomass_gDW → writes `reactor.o2_uptake_rate` (BiRD input)
    Holds last-known reactor state between BiRD ticks (BiRD typically on 1 h interval).
  unblocks: [all mbp-03 behavior_tests]

- id: req-3-reactor-bird-composite
  kind: composite
  title: v2ecoli.composites.reactor_bird_coupled
  effort: S
  description: |
    Composite combining v2ecoli.composites.baseline_population +
    baseline_time_varying_env + BiRDTransportProcess + ReactorCellCoupler.
    No "disable internal biomass" step required — BiRDTransportProcess
    has no biomass ODE by construction.
  unblocks: [all mbp-03 simulations]


bibliography:
