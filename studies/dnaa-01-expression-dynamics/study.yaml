# ─── Runs / Tests config (v3 dashboard-compatibility) ──────────────────────
# NOTE: the field `tests:` (dict) is the dashboard's v4 RESERVED config —
# don't put behavior tests here. Behavior test definitions live under
# `behavior_tests:` above.
runs:
- simulation: baseline-steady-state
  seed: 0
  duration_s: 600
  started_at: '2026-05-16T19:44Z'
  wall_seconds: 72
  rows: 601
  db: studies/dnaa-01-expression-dynamics/runs.db
  outcomes:
    dnaA-count-in-range:        {result: FAIL, value: 51781, expected: '[300, 800]'}
    dnaA-concentration-stable:  {result: PASS, max_rolling_cv: 0.005}
    autorepression-correlation: {result: FAIL, reason: 'n_bound_TF_per_TU empty — listener not populated in baseline composite'}

conclusion: |
  Phase=Decide outcome: PIPELINE-GATED on calibration question.
  • Test framework works end-to-end (baseline → SQLite emitter → evaluator).
  • dnaA-concentration-stable PASSES (max rolling CV 0.005 << 10%).
  • dnaA-count-in-range FAILS by 64× — divergence_alarm_factor=10 triggered;
    pre-stated diagnostic in conclusion_logic.if_primary_tests_fail applies:
    "likely concept mismatch (monomer_counts vs bulk vs complex form)".
  • autorepression-correlation BLOCKED on n_bound_TF_per_TU being empty in
    the current baseline composite output (req-6 underlying data missing).
  Recommend: do NOT auto-unblock dnaa-02. Resolve the DnaA-count concept
  question with expert review first; then re-run dnaa-01 and re-evaluate.

parent_studies: []     # superseded by pipeline_gate.prerequisites; kept for dashboard back-compat

tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
