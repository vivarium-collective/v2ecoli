runs:
  # NB: the report reads the LAST run's `outcomes:` for the test pills, so the
  # canonical Step-3 mechanism run is placed last and carries the per-test results.
  - name: dnaa2-step1-k0
    status: completed
    kind: single-seed-multigen-lineage
    description: |
      Step-1 control — mechanism OFF (DNAA_INTRINSIC_HYDROLYSIS_RATE=0),
      verified 0 hydrolysis events; 3 generations, seed 0.
    parquet: studies/dnaa-2-atp-hydrolysis/parquet-runs/dnaa2-step1-k0/parquet
    seeds: [0]
    result: 0 hydrolysis events; %DnaA-ATP 0.9978 (vs Step-2 0.9970).
  - name: dnaa2-multiseed-v2
    status: completed
    kind: multiseed-multigen-lineage
    description: |
      Step-2 (PRE-mechanism-fix) multiseed: V-tuned + intrinsic hydrolysis with
      DnaA-ADP still at FAST equilibrium. 4 seeds × 4 gens, one subprocess per
      seed. Seeds 0,2,3 completed; seed 1 hit allocator.NegativeCountsError at
      gen 3 (base-model edge case).
    parquet: studies/dnaa-2-atp-hydrolysis/parquet-runs/dnaa2-multiseed-v2/parquet
    seeds: [0, 1, 2, 3]
    result: |
      DnaA-ATP fraction pinned ~0.997 across all seeds — the fast-equilibrium
      artefact Haochen identified. Superseded as the verdict-bearing run by
      dnaa2-step3-mechanism below.
  - name: dnaa2-step3-mechanism
    status: completed
    kind: multiseed-multigen-lineage
    canonical: true
    canonical_seed: 0   # seeds 0,3 clean; seed 2 dropped (gen-3 reinitiation + DnaA-total runaway)
    description: |
      Step 3 — Haochen's NON-equilibrium DnaA-ADP fix (2026-05-31): slow
      DnaaAdpRelease (k_r via DNAA_ADP_RELEASE_RATE=0.03/min) + MONOMER0-4565_RXN
      zeroed in the equilibrium cache (cache-succinate-mechA-1.7e-3-adpkinetic),
      so DnaA-ADP is formed only by hydrolysis and drained only by the slow
      release. Run via the v2ecoli workflow meta-composite, one isolated
      subprocess per seed (scripts/run_dnaa2_multiseed_isolated.py,
      env-parameterized); seeds 0,2,3 × 5 gens, resumed from dnaa-0's gen-3
      succinate steady state.
    parquet: studies/dnaa-2-atp-hydrolysis/parquet-runs/dnaa2-step3-mechanism/parquet
    seeds: [0, 2, 3]
    result: |
      DnaA-ATP fraction settles in the Boesen [0.2,0.5] band on the clean seeds:
      seed 0 gens 1-4 = 0.469/0.451/0.446/0.427; seed 3 = 0.527/0.456/0.467/0.433
      (gen 0 ~0.62 is the resume ramp). ~0.997 → ~0.45 vs the Step-2 run above.
      DnaA total in [300,800] for the clean seeds; doubling 87.8±14.6 min. Seed 2
      is non-steady (gen-3 fraction bump 0.630 + DnaA-total runaway to 975) and
      is dropped per Rashmi's reinitiation criterion; canonical = seed 0.
    outcomes:
      dnaa-atp-fraction-in-band-0.2-0.5:
        result: PASS
        detail: |
          Clean seeds 0 & 3 settle at ~0.43–0.47 across gens 1–4 (in [0.2,0.5],
          no undershoot). Haochen's non-equilibrium DnaA-ADP mechanism resolves
          the prior ~0.997 pin.
      total-dnaa-in-band-300-800:
        result: PASS
        detail: |
          Clean seeds in [300,800] (seed 0 ~245→517, seed 3 ~136→619); no V
          re-tune needed (no overshoot). Seed 2's runaway to 975 is the dropped
          non-steady lineage.

simulation_set:
  - name: dnaa2-step2-multiseed
    kind: multiseed-multigen-lineage
    status: ran
    base_model: v2ecoli.composites.baseline (features=[ppgpp_regulation, dnaa_nucleotide])
    duration_steps: 7200 s/gen cap × 4 gens
    seeds: [0, 1, 2, 3]
    metrics: [DnaA-ATP fraction, total DnaA, oriC count, doubling time]
    pass_fail_tests: [dnaa-atp-fraction-in-band-0.2-0.5, total-dnaa-in-band-300-800]
  - name: dnaa2-step1-k0-control
    kind: single-seed-multigen-lineage
    status: ran
    base_model: v2ecoli.composites.baseline (features=[ppgpp_regulation, dnaa_nucleotide], k_hyd=0)
    duration_steps: 7200 s/gen cap × 3 gens
    seeds: [0]
    metrics: [DnaA-ATP fraction, intrinsic_hydrolysis_events]
    pass_fail_tests: [dnaa-atp-fraction-in-band-0.2-0.5]

tests:
  - name: dnaa-atp-fraction-in-band-0.2-0.5
    classification: primary
    question: Is the DnaA-ATP fraction in [0.2, 0.5], stable across the lineage?
    measure:
      kind: range_check_per_generation
      path: DnaA-ATP / (apo + DnaA-ATP + DnaA-ADP)
    pass_if:
      op: in_range_every_generation
      low: 0.2
      high: 0.5
    status: passed
    result: |
      PASS via Haochen's Step-3 mechanism (dnaa2-step3-mechanism): clean seeds
      0 & 3 settle at ~0.43–0.47 across gens 1–4, in [0.2,0.5]. (Step-2,
      pre-fix: ~0.997 — FAILED.)
    notes: |
      The original ~0.997 pin was the fast-equilibrium artefact, NOT a K_d /
      [ATP]:[ADP] / expected-fraction parameter error. Haochen (2026-05-31):
      DnaA-ADP unbinding is slow (k_r≈1e-7/s) and NOT at equilibrium; v2ecoli's
      ecoli-equilibrium integrated it to steady state each tick, instantly
      reverting hydrolysis-made DnaA-ADP → DnaA-ATP. Modelling DnaA-ADP release
      as a slow kinetic step (DnaaAdpRelease) + removing it from the fast
      equilibrium (MONOMER0-4565_RXN zeroed) drops the fraction to ~0.45 across
      the clean seeds, matching Haochen's own simulations. Seed 2 dropped
      (gen-3 reinitiation + DnaA-total runaway — non-steady).

  - name: total-dnaa-in-band-300-800
    classification: secondary
    question: Does total DnaA stay in [300, 800] (dnaa-1 result preserved)?
    measure:
      kind: range_check_per_generation
      path: apo + DnaA-ATP + DnaA-ADP
    pass_if:
      op: in_range_every_generation
      low: 300
      high: 800
    status: passed
    result: |
      PASS on the Step-3 clean seeds: DnaA total in [300,800] (seed 0 ~245→517,
      seed 3 ~136→619); no overshoot, so no V re-tune needed (Rashmi's point).
    notes: |
      Under the non-equilibrium mechanism the clean seeds (0,3) hold total DnaA
      in band. Seed 2's runaway to ~975 is the dropped non-steady lineage, not a
      tuning issue. (Step-2 pre-fix birth-snapshot totals straddled 800; the
      Step-3 trajectory resolves it.)

prerequisites:
  - dnaa-1-expression-dynamics must pass (V-tuned lineage is the starting point).

