  interpretation_ref: biological_story
biological_story: "In a real E. coli cell, the decision to start a new round of chromosome\nreplication is made\
  \ by the protein DnaA. The cycle goes like this:\n\n1. DnaA is continuously produced from its own gene (the dnaA\
  \ gene).\n   It autoregulates — when DnaA gets high, it represses its own promoter.\n2. DnaA binds ATP or ADP.\
  \ Only the ATP-bound form can drive replication\n   initiation. The cell keeps DnaA-ATP in a tight physiological\
  \ band\n   (~20-50% of total DnaA).\n3. DnaA-ATP loads onto DnaA-box sites scattered across the chromosome.\n\
  \   Most of these sites act as a *titration buffer* — they soak up DnaA\n   so it doesn't fire at oriC too soon.\n\
  4. As DnaA accumulates, the chromosomal sites fill, then DnaA-ATP starts\n   loading onto the 11 boxes at oriC.\n\
  5. When enough oriC boxes are loaded, the origin opens (the \"DUE\n   opening\") and replisomes assemble. Replication\
  \ fires.\n6. After firing, several mechanisms (RIDA, datA, SeqA) reset the system\n   so it can't fire again until\
  \ next cell cycle.\n\nThis investigation ports steps 1-5 into v2ecoli, replacing the current\nheuristic (\"cell\
  \ mass per oriC ≥ critical mass\") with the actual\nDnaA-driven mechanism. Step 6's reset mechanisms (RIDA / DDAH\
  \ / DARS for\nATP recycling, SeqA for sequestration) are deferred to a follow-on\ninvestigation; this scope ships\
  \ *placeholders* (an ATP-fraction clamp\nand a fixed-timer refractory at oriC) so the four studies still produce\n\
  closed-cycle behavior.\n\nWhy the order matters: you cannot test DnaA-box titration (step 3)\nbefore you have\
  \ a steady DnaA pool (step 1) AND a way to split DnaA into\nATP/ADP forms (step 2). And you cannot test the mechanistic\
  \ initiation\ntrigger (step 5) before titration works. So the studies stack:\n\n    dnaa-01 (DnaA expression)\n\
  \      ↓\n    dnaa-02 (DnaA-ATP/ADP/apo nucleotide cycle)\n      ↓\n    dnaa-03 (DnaA-box titration: 307 chromosomal\
  \ + 11 oriC + 7 dnaAp)\n      ↓\n    dnaa-04 (initiation trigger driven by oriC occupancy)\n"
question: 'Can a DnaA-driven mechanistic model of replication initiation in v2ecoli

  reproduce the observed once-per-generation timing, initiation-mass

  homeostasis, and ATP-fraction oscillations while staying within ±5% of

  the mass-threshold heuristic baseline under slow non-overlapping growth?

  '
hypothesis: 'Yes. The four staged studies (expression → ATP/ADP cycle → DnaA-box

  binding → mechanism-driven initiation) compose into a model that

  recapitulates the core DnaA cycle through the initiation event itself.

  Each study''s behavioral tests pass before the next study in the chain

  is started; the final mechanism baseline matches the heuristic''s

  initiation-mass distribution within ±5%. Extrinsic conversion

  (RIDA/DDAH/DARS) and post-initiation SeqA sequestration are out of

  scope for this investigation.

  '
lead: 'This investigation replaces v2ecoli''s current heuristic

  ("cell mass per oriC ≥ critical mass") with the actual **DnaA-driven**

  mechanism by which *E. coli* decides to initiate chromosome replication.

  We port the cycle into v2ecoli across four sequential studies — each a

  discrete, gated implementation phase whose behavioral tests must pass

  before downstream studies can build on it. Extrinsic ATP recycling

  (RIDA/DDAH/DARS) and SeqA methylation-state sequestration are deferred

  to a follow-on investigation; this scope ships two **stand-ins**

  (an ATP-fraction clamp in dnaa-02 and a fixed-timer oriC refractory in

  dnaa-04) so the four studies still produce closed-cycle behavior.

  '
description: 'Multi-phase port of DnaA / replication initiation into v2ecoli. Four

  gated studies replace the mass-threshold heuristic with a DnaA-driven

  mechanism. See `lead` for the human summary, `at_a_glance` for the

  study roster, `how_to_read` for evaluator orientation, and `glossary`

  for jargon. Detailed mechanism in `biological_story`.

  '
at_a_glance:
- study: dnaa-00-parameter-foundation
  role: Composite foundation — defines the baseline + Stage 1-parameterised variant every other study calibrates
    against; catalogs the Fu/Xiao/Jun (2023) parameter table with v2ecoli wiring status.
- study: dnaa-01-expression-dynamics
  role: Establish that v2ecoli already maintains a steady DnaA pool with autorepression — the foundation everything
    else builds on.
- study: dnaa-02-atp-hydrolysis
  role: Split DnaA into ATP / ADP / apo nucleotide forms and confirm intrinsic hydrolysis keeps the ATP fraction
    in the physiological band.
- study: dnaa-02f-equilibrium-cleanup
  role: Parallel follow-up — decompose the pre-existing MONOMER0-160 ATP-complex pool so the dnaa-02 split is biologically
    clean.
- study: dnaa-03-box-binding
  role: Add the 307 chromosomal + 11 oriC + 7 dnaAp DnaA-box sites and verify titration keeps oriC empty until late
    in the cycle.
- study: dnaa-04-initiation-mechanism
  role: Replace the mass-threshold heuristic with a DnaA-occupancy trigger and match the heuristic's initiation-mass
    distribution within ±5 %.
- study: dnaa-05-itv2-comparison
  role: Three-way comparison — standalone Fu/Xiao/Jun (2023) analytical model, v2ecoli at default parameters, and
    v2ecoli with parameters retuned to the FXJ paper. Validates v2ecoli's DnaA mechanism against an external mean-field
    reference.
how_to_read:
- Start with the **DAG below** — it shows the four studies in dependency order. Each card carries a status pill
  that summarises whether the gate has cleared.
- Read the studies **top-down**. A downstream study assumes everything above it has passed; reading dnaa-04 before
  dnaa-01 will feel like cheating because the calibration context is missing.
- Every study has the same **5-section header**: question → assumptions → conditions (baseline + variants + expert
    inputs) → tests → status. The tests are the only place where pass/fail is decided.
- Charts can come from **two sources**. A `live` chart is rendered from the latest run.db; a chart marked **"Drawn
  from workspace default-baseline"** means the study hasn't run yet and we're showing the pre-execution baseline
  as a "before" reference.
- The `💬` icons in the downloadable report let an offline evaluator leave inline feedback on any section. "Generate
  feedback report" packages everything into a single yaml file that comes back via `pbg-feedback-import`.
glossary:
- term: DnaA
  definition: The replication-initiator protein. When ATP-bound and clustered at oriC, it triggers origin opening
    and replisome assembly.
- term: DnaA-ATP fraction
  definition: Fraction of total DnaA in the active (ATP-bound) form. The cell holds this in a narrow band (~0.2-0.5
    in slow growth). dnaa-02 owns the readout.
- term: oriC
  definition: The single chromosomal origin of replication. Carries 11 DnaA-binding boxes; once enough are occupied
    by DnaA-ATP, the origin fires.
- term: DnaA box / DUE
  definition: Short DNA motif (TT(A/T)TNCACA) that DnaA recognises. Boxes scattered across the chromosome titrate
    DnaA away from oriC. The DUE (DnaA-unwinding element) is the strand-separation site at oriC opened during firing.
- term: RIDA / DDAH / DARS
  definition: The three extrinsic mechanisms that reset DnaA-ATP after firing — RIDA (replisome-coupled hydrolysis),
    DDAH (datA-dependent), DARS1/DARS2 (reactivation). Deferred to a follow-on investigation; we ship a clamp stand-in.
- term: SeqA / refractory period
  definition: Post-initiation sequestration of newly-replicated oriC, preventing immediate re-initiation. Deferred;
    we ship a v0 fixed-timer stand-in (10 min) in dnaa-04.
- term: Initiation mass
  definition: The cell mass at which replication fires. Used as the canonical aggregate metric for matching the
    heuristic baseline within ±5 %.
- term: Gate / pass-fail
  definition: A study is **gated** if its dependents may not run until its primary behavioral tests pass. The DAG
    renders gate status on each card.
guidelines:
- title: Stage 1 parameter values (Fu / Xiao / Jun 2023)
  summary: 'The authoritative heuristic parameter set this investigation calibrates against. Values are literature-anchored
    where available (Sekimizu 1987, Kawakami 2006, Hansen & Atlung 2018) and artificial-setup placeholders for the
    RIDA/DDAH/DARS network. Growth condition throughout: ABT minimal glycerol, MG1655, slow non-overlapping cell
    cycle. Every study cites this via the `wcm_stage1_parameters` doc slug; dnaa-00 catalogs the v2ecoli wiring
    status per parameter.

