<text x="585.0" y="91" text-anchor="middle" fill="white" font-weight="700">AFTER (proposed)</text>
<text x="422" y="120" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="12"># Read oriC binding state from</text>
<text x="422" y="138" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="12"># dnaa-03 DnaA_bound + dnaa-02 ATP pool</text>
<text x="422" y="156" fill="#e0e7ff" font-family="ui-monospace,monospace" font-size="12">n_bound_at_oriC = sum_oriC_bound(</text>
<text x="422" y="174" fill="#e0e7ff" font-family="ui-monospace,monospace" font-size="12">    states["DnaA_boxes"],</text>
<text x="422" y="192" fill="#e0e7ff" font-family="ui-monospace,monospace" font-size="12">    states["oriCs"]</text>
<text x="422" y="210" fill="#e0e7ff" font-family="ui-monospace,monospace" font-size="12">)</text>
<text x="422" y="228" fill="#e0e7ff" font-family="ui-monospace,monospace" font-size="12"></text>
<text x="422" y="246" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="12"># Trigger: DnaA-occupancy cooperative filament</text>
<text x="422" y="264" fill="#fbbf24" font-family="ui-monospace,monospace" font-size="12">if n_bound_at_oriC &gt;= 11:  # 11 oriC sites</text>
<text x="422" y="282" fill="#e0e7ff" font-family="ui-monospace,monospace" font-size="12">    requests["bulk"].append(...)</text>
<text x="400.0" y="390" text-anchor="middle" fill="#475569" font-weight="600">The mechanism is biological, not heuristic — replication starts when enough DnaA-ATP is loaded at oriC.</text>
<text x="400.0" y="410" text-anchor="middle" fill="#64748b" font-size="11">Implementation hooks: chromosome_initiation.DnaABinder.update() (currently empty stub)</text>
