# ─── v4 tests[] (hand-authored 2026-05-28) ────────────────────────────────
# Schema-version 4 declares first-class `tests:` with `measure.path` so
# the dashboard's render_v4_test_charts pipeline can render per-test
# charts directly from the parquet hive (read paths flattened with the
# ParquetEmitter `__` separator).
#
# These 2 entries are hand-curated representatives of the load-bearing
# claims in `behavior_tests:` above — NOT a wholesale auto-projection
# (the no-machine-projected-tests rule applies). The behavior_tests
# block remains the authoritative spec; this block is what the
# dashboard renders to surface the trajectory + criterion in the
# Charts tab.

tests:
  - name:           cell-mass-monotone-pre-division
    classification: primary
    description:    "Per-cell cell_mass must grow monotonically through
                    the first generation under env_driver_mode=static.
                    Validates that the static-mode env-driver is a
                    no-op against the unmodified baseline."
    measure:
      path:         listeners__mass__cell_mass
      source:       static-env-baseline-multigen parquet hive
      observable:   per-cell dry mass over the lineage trajectory (fg)
      units:        fg
    pass_if:
      operator:     in-range
      low:          400.0     # smallest legitimate cell_mass at the
      high:         1500.0    # M9-glucose seed; bracket covers division
    requires_simulation: static-env-baseline-multigen
    cites: []
    backs:
      # Cross-reference to the v3 behavior_test this surfaces.
      behavior_test: static-env-baseline-unchanged

  - name:           growth-rate-positive
    classification: supporting
    description:    "Instantaneous growth rate stays positive throughout
                    the run — confirms metabolism is producing mass
                    under the static env driver."
    measure:
      path:         listeners__mass__instantaneous_growth_rate
      source:       static-env-baseline-multigen parquet hive
      observable:   per-cell μ instantaneous from mass listener
      units:        '1/s'
    pass_if:
      operator:     greater-than
      threshold:    0.0
      field:        min_value
    requires_simulation: static-env-baseline-multigen
    cites: []
    backs:
      behavior_test: static-env-baseline-unchanged

  - name:           glc-declines-under-linear-decline-driver
    classification: primary
    description:    "Under env_driver_mode=synthetic_trajectory with a
                    linear_decline spec (GLC 5 mM → 0 over 60 sim-min),
                    boundary.external.GLC at the cell tracks the driver
                    trajectory monotonically downward. Multi-tick
                    counterpart to the 1-tick
                    test_external_glucose_updates_propagate_within_one_step
                    plumbing assertion — proves propagation persists
                    across generations and division boundaries."
    measure:
      path:         boundary__external__GLC
      source:       linear-decline-glc-multigen parquet hive
      observable:   boundary.external.GLC at the agent over time (mM)
      units:        mM
    pass_if:
      operator:     in-range
      low:          0.0
      high:         5.0
    requires_simulation: linear-decline-glc-multigen
    cites: []
    backs:
      behavior_test: external_glucose_updates_propagate_within_one_step

  - name:           glc-stays-zero-under-zero-clamp-driver
    classification: primary
    description:    "Under env_driver_mode=synthetic_trajectory with a
                    clamp_to_value=0 spec for GLC, boundary.external.GLC
                    is held at 0 throughout the run. Multi-tick
                    counterpart to test_zero_substrate_blocks_uptake."
    measure:
      path:         boundary__external__GLC
      source:       zero-clamp-glc-multigen parquet hive
      observable:   boundary.external.GLC at the agent over time (mM)
      units:        mM
    pass_if:
      operator:     in-range
      low:          0.0
      high:         1.0e-6
    requires_simulation: zero-clamp-glc-multigen
    cites: []
    backs:
      behavior_test: zero-substrate-blocks-uptake

