    A v2ecoli investigation putting the single-cell whole-cell model into
    a bench-scale bioreactor: time-varying environment hook (mbp-01),
    population aggregation with representative-sampling scaling (mbp-02),
    BiRD reactor coupling (mbp-03), multigeneration coupled runs (mbp-04),
    a structured sim-vs-Beulig comparison report (mbp-05, EVALUATION
    phase), and gap analysis feeding the next iteration (mbp-06).

  verdict: |
    **Build phase complete for mbp-01 and mbp-02; ready for Evaluate
    tooling.** Reviewer feedback through 2026-05-28 has been processed
    end-to-end (digest + raw export under `references/expert/`); all 9
    inline cleanup items closed in source, the §11 framework root cause
    seeded as an upstream pbg-superpowers gap, and the two architectural
    blockers Chris's first-pass review left open (env-store-topology +
    env-driver-molecule-id) resolved 2026-05-29 by the EnvironmentMirror
    Step (commit `60cdbd3`). mbp-01 went from 1 passing / 5 skipped to
    **6 passing / 0 skipped**.

