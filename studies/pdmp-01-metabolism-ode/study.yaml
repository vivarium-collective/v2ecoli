tests:
- name: millard-published-ref-state-reproduced
  classification: primary
  description: Running the standalone Millard 2017 SBML (BioModels MODEL1505110000) via pbg-copasi's CopasiUTCProcess from
    t=0 to steady-state (~10⁴ s simulated) reproduces the published Fig 2 reference concentrations within 5% relative error
    across all 17 central-carbon metabolites (ATP, ADP, NAD, NADH, NADP, NADPH, G6P, F6P, FDP, PEP, PYR, AKG, CIT, MAL, FUM,
    COA, ACCOA). Without this, every Phase 1 result is suspect.
  measure:
    source: v2ecoli.composites.millard2017_metabolism (long run)
    observable: species_concentrations at steady-state
    reduce: max relative-error vs Millard 2017 Fig 2 table
    units: fraction (dimensionless)
    reference: references/papers.bib#millard2017
  pass_if:
    operator: less-than
    threshold: 0.05
    field: max_rel_error
  requires_simulation: millard-standalone-steady-state
  cites:
  - millard2017
- name: fba-bridge-round-trip-residual
  classification: primary
  description: The FBABridge unit conversion (mM concentration → molecule count → back to mM) preserves the value within machine
    precision (residual < 1e-9 mM) across all 25 shared central-carbon metabolites. Verified by tests/test_fba_bridge.py::test_mM_count_roundtrip
    — currently green.
  measure:
    source: tests/test_fba_bridge.py::test_mM_count_roundtrip
    observable: '|mM -> count -> mM residual|'
    reduce: max across {ATP, NAD, G6P, PEP, FUM} at concentrations {0.001, 0.1, 1.0, 2.5, 100.0}
    units: mM
  pass_if:
    operator: less-than
    threshold: 1.0e-09
    field: max_residual_mM
  requires_simulation: none (pure-function test)
  cites: []
- name: fba-bridge-coupled-pilot-runs
  classification: primary
  description: 'millard_fba_bridge composite runs for 100 model-seconds without COPASI emitting NaN. ATP[c] (Millard side)
    stays within ±20% of the published 2.57 mM, and the v2ecoli bulk pool receives the bridge-pushed ATP[c] count within the
    same tolerance. Currently FAILING — bridge fires before Millard initializes, COPASI hits ''invalid state at t=0.2s'';
    follow-up: convert FBABridge Step→Process with explicit interval.'
  measure:
    source: v2ecoli.composites.millard_fba_bridge
    observable: central_metabolites.ATP at t=100
    reduce: '|simulated - 2.57|/2.57'
    units: fraction
  pass_if:
    operator: less-than
    threshold: 0.2
    field: rel_err_ATP
  requires_simulation: millard-fba-bridge-pilot
  cites:
  - millard2017
- name: lqr-growth-rate-tracking
  classification: primary
  description: Outer LQR controller drives Millard's biomass-production rate toward a reference growth-rate trajectory (Phase
    0's mean μ(t) under M9-glucose) with RMS tracking error < 10% across the full doubling cycle. Tests whether the kinetic-ODE
    + LQR composite can replace v2ecoli's multi-objective FBA biomass objective without sacrificing growth-rate control.
  measure:
    source: v2ecoli.composites.millard_lqr
    observable: biomass_production_rate(t)
    reduce: RMS(simulated - reference) / mean(reference)
    units: fraction
  pass_if:
    operator: less-than
    threshold: 0.1
    field: rms_tracking_error
  requires_simulation: lqr-tracking-3-conditions
  cites:
  - millard2017
  - kwakernaak1972
- name: interface-statistics-match-phase0-W2
  classification: primary
  description: After Phase 1 substitution, the W₂ (2-Wasserstein) distance per interface observable between Phase 1's N=64
    ensemble and Phase 0's reference ensemble stays below 5% of the inter-condition effect size for ≥3 environmental conditions.
    Gating criterion for Phase 2.
  measure:
    source: compare .pbg/runs/phase0-reference vs .pbg/runs/phase1-millard
    observable: all interface observables
    reduce: W2_distance / inter_condition_effect_size
    units: fraction
  pass_if:
    operator: less-than
    threshold: 0.05
    field: max_W2_ratio
  requires_simulation: millard-fba-bridge-3-conditions
  cites:
  - villani2008
