schema_version: 4
name: pdmp-03-inference
title: 'Phase 3 — Inference Infrastructure: Likelihoods and Bayesian Interface'
status: planned
phase: Design
topic: pdmp
tags:
- pdmp
- phase-3
- likelihoods
- bayesian
- abc-smc
- observe
- intervene
- algebraic-effects
- chirho
- xarray-emitter
created: '2026-05-24'
parent_studies:
- study: pdmp-02-jump-processes
  condition: tests-passed
question: 'Can the Phase 2 PDMP support well-formed observation likelihoods

  for the dominant cell-biology measurement modalities (RNA-seq,

  proteomics, growth rate, metabolomics) and recover posteriors

  via ABC-SMC on synthetic data — establishing the inference-

  ready substrate that motivated the DUF rescoping?

  '
hypothesis: '(a) Per-modality observation likelihoods — negative binomial for

  RNA-seq, log-normal for proteomics, normal-on-log-growth for

  growth rate, normal/log-normal for metabolite abundances — admit

  a likelihood accumulator that runs alongside the PDMP and

  computes log-likelihood contributions incrementally from ODE

  segments and jump events. (b) Extending Vivarium''s algebraic

  effect system with observe(variable, likelihood) and

  intervene(variable, value) effects (the ChiRho primitives) gives

  a tractable interface for inference workflows. (c) A baseline

  ABC-SMC engine using growth rate, mean mRNA/protein abundances,

  and metabolite concentrations as summary statistics recovers

  known parameter values on synthetic data within published

  precision targets.

  '
objective: 'Specify and implement an observation likelihood library covering

  the four modalities; build a likelihood accumulator that hooks

  the Phase 2 PDMP runner; extend Vivarium''s algebraic effects

  with observe / intervene; implement a structured-population layer

  above the single-cell PDMP for population-level omics likelihoods;

  deploy ABC-SMC as the baseline inference engine; demonstrate

  posterior recovery on synthetic data with a published

  uncertainty target.

  '
description: "Phase 3 of the v2ecoli → PDMP roadmap. With the PDMP in place\nfrom Phase 2, every simulation trajectory is\
  \ a sample from a\nwell-defined process measure with a constructible likelihood.\nThe inference-stack additions in this\
  \ phase make that likelihood\nobservable, computable, and tractable for downstream Bayesian\nworkflows.\n\nChiRho (BasisResearch,\
  \ 2024) is the reference for the algebraic-\neffect interpretation of observe / intervene. The Vivarium API\nanalysis in\
  \ the DUF report Sec. 4.2.2 noted that Vivarium can be\nunderstood as a domain-specific algebraic effect system for\ndiscrete-event\
  \ simulation, opening a clear path to extending it\ntoward a PPL.\n\nABC-SMC is the baseline inference engine because it\
  \ is robust to\nhighly nonlinear, partially observed dynamics — appropriate for\na first pass before more efficient gradient-based\
  \ methods are\nattempted in Phase 5. The structured-population layer addresses\nthe practical fact that omics data come\
  \ from bulk cultures, not\nsingle cells; bulk observables are expectations over the single-\ncell PDMP measure.\n\n# Numerical\
  \ considerations\nLikelihood library. Each modality's likelihood is parameterized\nwith its dispersion / overdispersion\
  \ / noise scale, fit on\ncalibration data, and the fit reported with its 95% CI:\n - RNA-seq: NegBin(μ, φ), φ MLE'd on a\
  \ held-out calibration\n   dataset; expect φ ∈ [0.1, 1.0] for E. coli.\n - Proteomics: LogNormal(μ, σ²), σ from technical-replicate\n\
  \   spread (typical σ_log ≈ 0.2 for SILAC/iBAQ).\n - Growth: Normal(log μ, σ_μ²) — log-scale because growth\n   rates are\
  \ bounded below by 0 and dispersion scales\n   multiplicatively.\n - Metabolomics: Normal/LogNormal per-metabolite depending\
  \ on\n   dynamic range; explicit per-metabolite choice recorded.\n\nAccumulator numerics. Log-likelihood contributions are\
  \ summed\nin log space throughout to avoid underflow (typical full-run\nlog-likelihood is ≪ -10³). Mixture-likelihood contributions\n\
  (e.g., zero-inflated NegBin) use log-sum-exp with the standard\nshift trick. Pairwise / Kahan summation order for cross-cell\n\
  population reductions so the result is independent of trajectory\nordering and reproducible across hardware.\n\nABC-SMC\
  \ schedule. ε-decay set adaptively at the quantile q=0.5\nof the previous population's distance, with a minimum population\n\
  size N=1000 and a terminating ESS < 0.5·N (resample) or wall-\nclock cap. Distance: Mahalanobis on a hand-picked summary\
  \ vector\n(growth rate, mean log-mRNA per high-coverage gene, mean\nlog-protein per high-coverage gene, key metabolite log-conc).\n\
  We report posterior ESS and the proposal acceptance rate at\nevery SMC step.\n\nPosterior calibration. Simulation-Based\
  \ Calibration (Talts et\nal. 2018): for K=1000 SBC draws of (θ*, y*) from the prior +\nforward model, run ABC-SMC and record\
  \ the rank of θ* in the\nposterior sample. The rank histogram must pass a χ² uniformity\ntest (p > 0.05) and 90% credible\
  \ intervals must achieve ≥85%\nempirical coverage. SBC at K=1000 has rank-resolution of 1/(K+1)\n≈ 10⁻³, fine enough for\
  \ typical posterior diagnostics.\n\nIdentifiability. We re-run the Phase 1 Fisher-information check\nfor any new parameters\
  \ introduced here (likelihood dispersions,\npopulation-layer parameters) and flag non-identifiable\ncombinations explicitly.\n\
  \n# Emitter\nABC-SMC iterates ~10⁶ PDMP runs; we use XArrayEmitter in a\n\"summary-only\" mode that writes only the predeclared\
  \ summary-\nstatistic vector per trajectory (zarr group 'summary'), skipping\nfull time-series capture. Posterior particles,\
  \ per-SMC-step\nε, ESS, and proposal-acceptance trajectories also written to\nzarr ('posterior'/'diagnostics' groups). SBC\
  \ runs (K=1000)\nproduce a separate zarr store keyed by SBC iteration for\npost-hoc rank-histogram analysis.\n"
expected_behavior:
- name: likelihoods-per-modality
  en: Each measurement modality has a documented observation likelihood (neg-binom, log-normal, normal-on-log-growth, normal/log-normal)
    with explicit dispersion / noise parameters and references to the calibration literature.
  given:
    condition: rna-seq AND proteomics AND growth AND metabolomics
  measure:
    kind: observable-comparison
    observable: likelihood-library
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: accumulator-runs-alongside-pdmp
  en: The likelihood accumulator computes log-likelihood contributions from ODE segments (continuous-measurement likelihoods)
    and jump events (discrete-event likelihoods) incrementally during a single PDMP run.
  given:
    condition: per-segment AND per-jump
  measure:
    kind: observable-comparison
    observable: log-likelihood-trace
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: observe-intervene-effects
  en: The Vivarium runner supports observe(variable, likelihood) and intervene(variable, value) as first-class algebraic effects,
    with the same surface area as ChiRho's primitives.
  given:
    condition: pdmp-runner
  measure:
    kind: observable-comparison
    observable: vivarium-algebraic-effect-set
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: abc-posterior-recovery-on-synthetic
  en: 'On synthetic data generated from known parameters, ABC-SMC recovers posteriors that cover the ground truth at the published
    credible level using summary statistics: growth rate, mean mRNA/protein abundances, metabolite concentrations. (Gating
    criterion.)'
  given:
    condition: synthetic-truth-data
  measure:
    kind: observable-comparison
    observable: posterior-recovery-metric
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: uq-likelihood-dispersion-fit-with-ci
  en: Per-modality dispersion / noise parameters (NegBin φ for RNA-seq, σ for log-normal proteomics, σ_μ for growth, per-metabolite
    σ for metabolomics) are MLE-fit on calibration data and reported with 95% bootstrap CIs.
  given:
    condition: per-modality
  measure:
    kind: observable-comparison
    observable: dispersion-parameters-with-95-CI
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: uq-accumulator-numerical-stability
  en: Log-likelihood accumulation maintains log-space throughout; no underflows recorded across N=10⁴ test runs. log-sum-exp
    shift used in all mixture terms. Pairwise/Kahan summation in population reductions; result invariant to trajectory ordering.
  given:
    condition: full-run
  measure:
    kind: observable-comparison
    observable: log-likelihood-underflow-rate
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: uq-abc-ess-and-acceptance
  en: ABC-SMC reports posterior ESS and proposal acceptance rate at every SMC step; runs are terminated cleanly when ESS falls
    below 0.5·N (resample) or wall-clock cap is hit. No silent degeneracy.
  given:
    condition: per-smc-iteration
  measure:
    kind: observable-comparison
    observable: ess-and-acceptance-per-step
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: uq-sbc-coverage
  en: 'Simulation-Based Calibration (K=1000): rank histogram passes χ² uniformity test (p > 0.05); 90% credible intervals
    achieve ≥85% empirical coverage. Hard requirement before claiming "inference-ready" for Phase 5.'
  given:
    condition: K1000-sbc-draws
  measure:
    kind: observable-comparison
    observable: sbc-rank-histogram AND credible-interval-coverage
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
- name: uq-mahalanobis-distance-justified
  en: Mahalanobis distance uses the empirical summary-statistic covariance from N≥200 PDMP runs at the prior mean. Condition
    number of the covariance reported; if κ > 10⁶ the summary vector is reduced (drop near-collinear summaries).
  given:
    condition: abc-distance-function
  measure:
    kind: observable-comparison
    observable: summary-statistic-covariance
  expect:
    op: within-tolerance
    note: Tolerance / target gate to be defined when this study moves Design → Build.
  status: stub
baseline:
- name: pdmp-with-likelihood-accumulator-tbd
  composite: v2ecoli_pdmp.composites.inference.pdmp_with_likelihood
  params: &id001
    emitter: xarray
    summary_only: true
  _placeholder: true
  _note: Composite wires the Phase 2 PDMP runner to a likelihood-accumulator step + observe/intervene effects + ABC-SMC driver.
variants:
- name: likelihood-library-4-modalities
  description: 'Per-modality observation likelihoods: NegBin(μ,φ) RNA-seq, log-normal proteomics, normal-on-log-growth, normal/log-normal
    metabolomics. φ MLE''d on held-out calibration data with 95% bootstrap CIs.'
  params: &id002
    modalities:
    - rna-seq
    - proteomics
    - growth
    - metabolomics
- name: likelihood-accumulator
  description: Incremental log-likelihood accumulator running alongside the PDMP, log-sum-exp for mixtures, pairwise/Kahan
    summation for cross-cell population reductions.
  params: &id003
    underflow_protection: log-space + log-sum-exp
- name: observe-intervene-effects
  description: 'Vivarium algebraic-effect extensions: observe(variable, likelihood) and intervene(variable, value) — the ChiRho
    primitives, lifted into Vivarium''s discrete-event runtime.'
  params: &id004
    effect_runtime: vivarium-algebraic-effects
- name: abc-smc-baseline
  description: 'ABC-SMC as the baseline inference engine: adaptive ε-decay at q=0.5 of previous-population distance, N=1000
    particles, terminate on ESS < 0.5·N or wall-clock cap.'
  params: &id005
    n_particles: 1000
    epsilon_schedule: adaptive-quantile
- name: sbc-validation-K1000
  description: 'Simulation-Based Calibration (Talts 2018): K=1000 synthetic (θ*, y*) draws from prior + forward model, verify
    uniformity of rank histogram and 90% CI empirical coverage ≥ 85%.'
  params: &id006
    K: 1000
    n_bins: 20
    ci_coverage_target: 0.85
