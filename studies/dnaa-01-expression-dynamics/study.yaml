schema_version: 3
name: dnaa-01-expression-dynamics
created: '2026-05-16'
status: ran
phase: Decide
last_run: 2026-05-16T21:30Z
baseline:
- name: baseline-steady-state
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache
purpose:
  question: 'Does the v2ecoli baseline produce a steady, realistic DnaA pool with

    working autorepression at the dnaA promoter?

    '
  mechanism: "Uses the EXISTING v2ecoli transcript_initiation + tf_binding chain\n\
    driven by the dnaA \u2192 EG10235_RNA fold change. No new processes added\nin\
    \ this study \u2014 it certifies the layer-1 (total-pool) baseline that\ndownstream\
    \ studies build on.\n"
  expected_outcome: 'Steady DnaA monomer count within an order of magnitude of the

    Sekimizu / Schmidt / Mori mass-spec value (300-800/cell, target band);

    concentration coefficient-of-variation < 10% over the second half

    of one doubling time; bound DnaA at promoters anti-correlated with

    dnaA tx-init events.

    '
pipeline_gate:
  prerequisites: []
  enables:
  - dnaa-02-atp-hydrolysis
  - dnaa-03-box-binding
  # ── Machine-readable gate signal ──────────────────────────────────────
  # open | conditional | hold | blocked  (see docs/concepts/study-spec.md)
  gate_status: conditional
  gate_status_summary: |
    Single-knob 1× baseline FAILS dnaA-count-in-range (115 vs [300, 800]),
    but the 2026-05-17 overnight joint sweep validated (TE=20×, fc=0.7)
    at 5 seeds (DnaA 707, r=-0.521 — BOTH pass). dnaa-02 unblocks with
    that calibration; permanent ParCa-cache promotion is the remaining
    cleanup. See dnaa-01f-recalibrate-eg10235-translation-efficiency-in-parca
    and dnaa-01g-joint-te-fold-change-sweep.
  proceed_condition: 'All primary tests pass; the supporting autorepression-correlation

    test passes; calibration discrepancies (if any) are annotated and

    expert-reviewed.

    '
  blocks_until_resolved: "If the DnaA-count primary test fails because v2ecoli's simulated\n\
    count is far outside the literature band, downstream studies should\nNOT start\
    \ \u2014 dnaa-02's hydrolysis rates etc. are tuned against a\nrealistic baseline\
    \ pool. Resolution choices: (a) recalibrate\ntranslation_efficiency for dnaA,\
    \ (b) widen the test band with\nexpert sign-off, (c) reinterpret the test concept\
    \ (free pool vs\ntotal).\n"
simulation_set:
- name: baseline-steady-state
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: null
  condition: M9-minimal-glucose
  duration_min: 60
  seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
  readouts:
  - dnaA_protein_count
  - dnaA_mrna_count
  - dnaA_tx_init_events
  - dnaA_bound_to_promoters
  - dnaa_atp_complex_bulk
  applies_tests:
  - dnaA-count-in-range
  - dnaA-concentration-stable
  - autorepression-correlation
  status: ready
- name: stop-dnaA-synthesis
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    translation_efficiency_override:
      EG10235: 0.0
  condition: M9-minimal-glucose
  duration_min: 60
  seeds:
  - 0
  - 1
  - 2
  readouts:
  - dnaA_protein_count
  applies_tests:
  - stop-synthesis-30pct-drop
  - stop-synthesis-monotonic
  status: gated
  blocked_by_requirements:
  - req-2-translation-override-hook
- name: gene-dosage-distal-promoter
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dnaA_locus_relative_to_oric: 0.5
  condition: M9-minimal-glucose
  duration_min: 120
  seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  readouts:
  - dnaA_tx_init_events
  - dnaA_protein_count
  applies_tests:
  - post-initiation-tx-spike
  status: gated
  blocked_by_requirements:
  - req-4-locus-relocation
  - req-5-initiation-event-detector
- name: autorepression-strength-sweep
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dnaap_autorepression_multiplier:
    - 0.1
    - 1.0
    - 3.0
  condition: M9-minimal-glucose
  duration_min: 60
  seeds:
  - 0
  - 1
  - 2
  readouts:
  - dnaA_protein_count
  - dnaA_bound_to_promoters
  applies_tests: []
  status: gated
  blocked_by_requirements:
  - req-3-autorepression-multiplier
model_change:
  base_model: v2ecoli.composites.baseline.baseline
  new_processes: []
  new_state_variables: []
  new_parameters: []
  modified_processes: []
  new_listeners:
  - name: DnaaConcentrationListener
    emits:
    - agents.<id>.listeners.dnaa.protein_uM
    - agents.<id>.listeners.dnaa.mrna_uM
    status: optional
    requirement_id: req-1-concentration-listener
  notes: 'All identifiers and listeners used here ALREADY exist in v2ecoli''s

    baseline composite (verified 2026-05-16; see investigation

    walkthrough notes). This study is a no-code-change certification.

    '
key_assumptions:
- Steady-state slow growth (M9-glucose, doubling time ~60 min).
- Total DnaA pool is the right concept for this study; ATP/ADP/apo split is dnaa-02's
  job.
- "Autorepression at dnaAp goes through tf_binding's existing dnaA\u2192EG10235_RNA\
  \ fold change."
- Cell-birth-to-division covers one doubling; pre-existing v2ecoli initial state seeds
  124 DnaA monomers.
readouts:
- name: dnaA_protein_count
  description: "Aggregate DnaA monomer count via monomer_counts_listener\n(re-aggregates\
    \ bulk + complexation_stoich; \u2248 total DnaA in\nthe cell). Index 3861 in monomer_ids\
    \ = \"PD03831[c]\" = DnaA\n(467 aa, matches Schmidt 2016 protein length).\n"
  store_path: agents.0.listeners.monomer_counts.monomerCounts
  index_by:
    type: monomer_id
    value: PD03831[c]
  units: molecules/cell
  status: available
- name: dnaA_mrna_count
  description: 'Aggregate dnaA mRNA count via RNA_counts_listener.

    EG10235_RNA is the transcript ID; idx = mRNA_TU_ids.index("EG10235_RNA").

    '
  store_path: agents.0.listeners.rna_counts.mRNA_counts
  index_by:
    type: rna_id
    value: EG10235_RNA
  units: molecules/cell
  status: available
- name: dnaA_tx_init_events
  description: 'Per-step transcription-initiation events on EG10235_RNA from

    rnap_data listener. Sums to the total init events when reduced.

    '
  store_path: agents.0.listeners.rnap_data.rna_init_event
  index_by:
    type: tu_id
    value: EG10235_RNA
  units: events/step
  status: available
- name: dnaA_bound_to_promoters
  description: "DnaA molecules currently bound at promoters, via\nrna_synth_prob.n_bound_TF_per_TU\
    \ (n_TU \xD7 n_TF matrix); sum over TUs\nalong the DnaA-TF axis. Coarse autorepression\
    \ proxy \u2014 broader than\njust dnaAp.\n"
  store_path: agents.0.listeners.rna_synth_prob.n_bound_TF_per_TU
  index_by:
    type: tf_axis_id
    value: PD03831[c]
  units: molecules
  status: derived-needed
  blocked_by_requirements:
  - req-6-tf-axis-aggregation
- name: dnaa_atp_complex_bulk
  description: 'Bulk count of MONOMER0-160[c] (the DnaA-ATP complex form in

    molecule_ids.py). Currently populated to ~100 at end of single

    cell sim. Will become a primary readout in dnaa-02 once the

    nucleotide-state split is in place.

    '
  store_path: agents.0.bulk
  index_by:
    type: bulk_id
    value: MONOMER0-160[c]
  units: molecules/cell
  status: available
- name: dnaA_protein_concentration
  description: "Volume-normalised DnaA in uM. Requires the DnaaConcentrationListener\n\
    Step (req-1) \u2014 without it, the test falls back to count-based CV.\n"
  store_path: agents.0.listeners.dnaa.protein_uM
  units: uM
  status: derived-needed
  blocked_by_requirements:
  - req-1-concentration-listener
behavior_tests:
- name: dnaA-count-in-range
  classification: primary

  # ── Biology-review schema additions (dnaa_biology_feedback, 2026-05-17) ──
  # These fields are first-class bigraph-schema types registered in
  # v2ecoli/types/biology.py; invalid values are rejected at composite-build.
  target_class: biological_validation   # NOT regression_compatibility — calibration vs literature
                                         # requires perturbation panel below to fully validate.
  measurement_mapping:
    literature_observable:
      name: total cellular DnaA per cell
      biological_pool: total           # apo + ATP-bound + ADP-bound + DNA-bound + complexed
      condition: 'M9 + glucose, exponential growth, doubling ~30 min'
      statistic: median across population
      source_ids: [Schmidt2016NatBiotechnol, Sekimizu1991JBacteriol, Mori2021MolSysBiol, Liu2020NatMicrobiol]
    model_observable:
      listener_path: listeners.monomer_counts
      state_path: 'bulk[PD03831[c]] + bulk[MONOMER0-160[c]] + bulk[MONOMER0-4565[c]]'
      molecular_pool: total
      units: molecules/cell
      includes_bound_species: false    # CAVEAT: chromosomal-DnaA-bound population not yet in pool
    transformation:
      formula: 'median(sum_three_forms over t in [duration/2, duration])'
      time_window: second_half
      aggregation: median across seeds
    caveats:
    - 'v2ecoli does not yet sum chromosomally DNA-bound DnaA into monomer_counts[3861]. If Schmidt 2016 mass-spec includes that fraction, the model count understates by an unknown amount (literature suggests ~10-30% during S phase).'
    - 'Schmidt 2016 mass-spec excludes DnaA bound during fixation washouts — extraction efficiency uncertain.'
    - 'Sekimizu 1991 used radioactive label decay (DnaA half-life proxy) — assumes no replisome-bound subpopulation.'
  failure_cause_candidates:            # if FAIL, narrow to these per P2-4
  - observable_mismatch                # the pool definition above might explain part of the 4.8× gap
  - miscalibration                     # ParCa TE for EG10235 may be wrong (see dnaa-01g-parca-te-derivation-audit)
  requires_perturbations:              # P1-5 — no biological_validation without these
  - dnaA-overexpression
  - dnaA-knockdown
  - autorepression-ablation
  # ──────────────────────────────────────────────────────────────────────────

  description: 'Median DnaA monomer count over the second half of the run lies

    within the literature band [300, 800] reported by Sekimizu 1991,

    Schmidt 2016, Mori 2021, and Liu 2020.

    '
  measure:
    kind: monomer_count
    id: PD03831[c]
    reduce: median
    window: second_half
  pass_if:
    op: in_range
    low: 300
    high: 800
  units: molecules/cell
  requires_simulation: baseline-steady-state
  calibration_anchor:
    v2ecoli_observed: 115
    literature_target: 550
    divergence_alarm_factor: 10
    divergence_observed: 4.8
    notes: "Two-stage finding from the 2026-05-16 walkthrough:\n\nSTAGE 1 \u2014 Infrastructure\
      \ bug (discovered + fixed):\nFirst 10-min run emitted monomer_counts[DnaA] =\
      \ 51,781 (and ALL top\nmonomers in the tens-of-millions). Root cause: the\n\
      monomer_counts_listener's output type was declared as a plain\n`array[N,integer]`\
      \ without an `overwrite[]` wrapper, so each timestep\nADDED to the previous\
      \ value instead of replacing it. Fixed by\nwrapping the output type. Re-run\
      \ gave physiological values.\n(Sibling listeners rna_synth_prob / replication_data\
      \ have the same\npattern and likely the same bug \u2014 flagged for follow-up.)\n\
      \nSTAGE 2 \u2014 Real calibration finding:\nWith the bug fixed, v2ecoli emits\
      \ a stable median DnaA = 115 per\ncell over the second-half window. Literature\
      \ target is [300, 800]\n(Sekimizu / Schmidt / Mori / Liu). So v2ecoli is ~5\xD7\
      \ too LOW, not\n300\xD7 too high. This is a tractable calibration question,\
      \ not a\nconcept mismatch. Likely causes \u2014 to evaluate with expert:\n \
      \ (a) translation_efficiency for EG10235 is set too low in\n      ParCa-cache\
      \ for slow-growth media;\n  (b) DnaA half-life / degradation rate is too short;\n\
      \  (c) The literature numbers include chromosome-bound DnaA (DnaA\n      boxes,\
      \ replisome) which v2ecoli stores in `unique` and would\n      need to be summed\
      \ back in \u2014 but the listener already accounts\n      for unique-molecule\
      \ subunit contributions, so this is unlikely\n      to explain a 5\xD7 gap.\n\
      Recommend re-checking ParCa's translation_efficiency for EG10235\nbefore kicking\
      \ off dnaa-02.\n"
  cites:
  - Sekimizu1991JBacteriol
  - Schmidt2016NatBiotechnol
  - Mori2021MolSysBiol
  - Liu2020NatMicrobiol
  - Boesen2024PNAS
- name: dnaA-concentration-stable
  classification: primary
  description: "DnaA count (proxy for concentration when uM listener unavailable)\n\
    has rolling 5-step CV \u2264 10% over the second half. Confirms the\nhomeostatic\
    \ loop reached steady state.\n"
  measure:
    kind: monomer_count
    id: PD03831[c]
    reduce: series
    window: second_half
  pass_if:
    op: rolling_cv_at_most
    window_steps: 5
    threshold: 0.1
  units: fraction
  requires_simulation: baseline-steady-state
  cites:
  - Hansen2018DnaATale
  - Hansen1999JBacteriol
  - Hansen2021FrontMolBiosci
- name: autorepression-correlation
  classification: supporting

  # \u2500\u2500 Biology-review schema additions (dnaa_biology_feedback, 2026-05-17) \u2500\u2500
  # Per P1-3: Pearson r alone is the WEAKEST autorepression test. This entry
  # remains as a first-pass screen but is downgraded to `target_class:
  # regression_compatibility`. Full biological validation now requires the
  # autorepression_test_suite below (4 tests; this is just test 1 of 4).
  target_class: regression_compatibility  # NOT biological_validation by itself
  measurement_mapping:
    literature_observable:
      name: dnaA autorepression strength
      biological_pool: ATP_bound        # only DnaA-ATP binds dnaAp promoter
      condition: 'M9 + glucose, exponential growth'
      statistic: 'negative correlation between bound-DnaA and dnaA transcription rate'
      source_ids: [Speck1999EMBO, Saggioro2013BiochemJ, Katayama2017Frontiers, Hansen2018DnaATale]
    model_observable:
      listener_path: 'listeners.rna_synth_prob.n_bound_TF_per_TU + listeners.rna_counts.mRNA_cistron_counts'
      state_path: 'sum(n_bound_TF_per_TU[:, 12]) at t  vs  mRNA_cistron_counts[227] at t'
      molecular_pool: ATP_bound
      units: dimensionless (Pearson r)
      includes_bound_species: true
    transformation:
      formula: 'pooled_pearson_r(x=sum_binding_col_12, y=mRNA_cistron_227, samples=second_half_across_5_seeds)'
      time_window: second_half
      aggregation: pooled across seeds
    caveats:
    - 'Pearson r is symmetric in time \u2014 does NOT discriminate causation from co-incidence.'
    - 'Same-time correlation misses transcription-binding lag (~30-120s in vivo).'
    - 'Cell-wide init events (rna_init_event sum) was the original Y axis; switched to mRNA_cistron_counts[227] because dnaA init events are too sparse (~0/step in 10-min window).'
    - 'A PASS here is necessary but not sufficient for autorepression validation \u2014 see autorepression_test_suite.'

  # \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  description: |
    When DnaA bound-to-promoters is high, cell-wide transcription init
    events should bias down \u2014 autorepression signature. Coarse first-pass
    test: Pearson r \u2264 -0.3 across the second-half window.

    X axis: DnaA-specific TF binding (sum over TUs in column 12 of
    listeners.rna_synth_prob.n_bound_TF_per_TU; idx 12 = MONOMER0-160
    = DnaA-ATP in tf_binding.tf_ids).

    Y axis: cell-wide transcription init events. Note this is a coarse
    proxy \u2014 true autorepression targets the dnaA promoter (EG10235_RNA
    TU) specifically. Refining Y to slice on EG10235_RNA's TU index
    needs a sim_data lookup not currently available to the evaluator.
  measure:
    kind: xy_correlation
    x:
      kind: tf_axis_sum
      path: listeners.rna_synth_prob.n_bound_TF_per_TU
      tf_index: 12        # MONOMER0-160 = DnaA-ATP in tf_ids
    y:
      kind: listener_index
      path: listeners.rna_counts.mRNA_cistron_counts
      index: 227          # EG10235_RNA in cistron_ids (dnaA's own mRNA)
      # Switched from rna_init_event_per_cistron[227] because dnaA init
      # events are too sparse (~0/step) in a 10-min window to compute
      # correlation. mRNA_cistron_counts is the continuous downstream
      # signal — autorepression should suppress sustained dnaA mRNA.
    window: second_half
  pass_if:
    op: pearson_at_most
    threshold: -0.3
  units: dimensionless r
  requires_simulation: baseline-steady-state
  prerequisites:
  - run with --heavy_tf_listener so n_bound_TF_per_TU is populated
  cites:
  - Speck1999EMBO
  - Saggioro2013BiochemJ
  - Katayama2017Frontiers
- name: stop-synthesis-30pct-drop
  classification: diagnostic
  description: "With translation_efficiency[EG10235] = 0, DnaA count at end of\none\
    \ doubling time \u2264 70% of initial count. Confirms the dilution\n+ turnover\
    \ balance.\n"
  measure:
    kind: monomer_count
    id: PD03831[c]
    reduce: first_and_last
    window: full
  pass_if:
    op: ratio_at_most
    ratio: 0.7
  units: ratio (last/first)
  requires_simulation: stop-dnaA-synthesis
  cites:
  - Li2014Cell
  - Hansen1999JBacteriol
- name: stop-synthesis-monotonic
  classification: diagnostic
  description: "Stop-synthesis run shows monotonic DnaA decrease (allow \u22645% rebound\n\
    for noise). Confirms there's no compensatory production mechanism.\n"
  measure:
    kind: monomer_count
    id: PD03831[c]
    reduce: series
    window: full
  pass_if:
    op: monotonic_decreasing
    allow_rebound_pct: 5
  units: monotonic check
  requires_simulation: stop-dnaA-synthesis
- name: post-initiation-tx-spike
  classification: diagnostic
  description: "Within 10 min after replication-initiation, dnaA transcription rate\n\
    rises \u226550% (gene-dosage effect when EG10235 is duplicated).\n"
  measure:
    kind: listener_sum
    path: listeners.rnap_data.rna_init_event
    reduce: pre_post_event_ratio
    window: post_initiation_10min
  pass_if:
    op: ratio_at_least
    ratio: 1.5
  units: ratio (post/pre)
  requires_simulation: gene-dosage-distal-promoter
  blocked_by_requirements:
  - req-5-initiation-event-detector
  cites:
  - Speck1999EMBO
  - Hansen2018DnaATale


# ── Biology-review additions (dnaa_biology_feedback, 2026-05-17) ────────────
# Per P1-3: replace Pearson-only autorepression with a SUITE. Sparse mRNA data
# can return INSUFFICIENT_EVIDENCE rather than a false PASS or FAIL.

autorepression_test_suite:
- name: lagged_binding_mrna_cross_correlation
  kind: lagged_binding_mrna_cross_correlation   # ← bigraph-registered enum
  description: |
    Cross-correlation between DnaA-TF binding(t-Δt) and dnaA mRNA(t) at
    Δt ∈ {0, 30, 60, 120}s. Biologically valid autorepression should show
    a NEGATIVE peak at Δt ≈ 30-90s (transcription-binding response delay).
  measure:
    kind: cross_correlation
    x_signal: 'sum(listeners.rna_synth_prob.n_bound_TF_per_TU[:, 12])'
    y_signal: 'listeners.rna_counts.mRNA_cistron_counts[227]'
    lags_s: [0, 30, 60, 120]
  pass_if:
    op: negative_peak_at_lag_within
    lag_range_s: [30, 120]
    min_magnitude: 0.3
  status: not_implemented_yet

- name: conditional_transcription_probability_given_promoter_bound
  kind: conditional_transcription_probability_given_promoter_bound
  description: |
    P(rna_init_event[EG10235] = 1 | dnaAp promoter bound) vs
    P(rna_init_event[EG10235] = 1 | dnaAp promoter unbound).
    Ratio < 1.0 = autorepression active.
  measure:
    kind: conditional_probability_ratio
    condition_on: 'listeners.rna_synth_prob.n_bound_TF_per_TU[dnaAp_TUs, 12] > 0'
    event:        'listeners.rnap_data.rna_init_event[EG10235_TUs] > 0'
  pass_if:
    op: less_than
    value: 1.0
  status: not_implemented_yet
  requires_data: 'dnaAp_TUs index list — currently unresolved (P3 expert question)'

- name: transcription_burst_rate_by_promoter_state
  kind: transcription_burst_rate_by_promoter_state
  description: |
    Burst rate when bound vs unbound, computed via inter-event interval
    distribution. Bound state should have longer inter-event intervals.
  status: not_implemented_yet

- name: dnaA_gene_dosage_corrected_expression
  kind: dnaA_gene_dosage_corrected_expression
  description: |
    Correct for gene dosage (chromosomal-locus replication doubles dnaA
    gene copies mid-cycle). Per-copy expression should drop when DnaA
    is high. Without this correction, dosage swamps the autorepression
    signal.
  status: not_implemented_yet
  requires_data: 'per-cell-cycle replication-fork position relative to dnaA locus'


# Per P1-5: perturbation panel required for biological_validation.
# A test that declares target_class=biological_validation AND lists
# requires_perturbations: [...] cannot pass until those perturbations have run.

perturbation_panel:
- name: dnaA-overexpression
  kind: expression_step                # ← bigraph-registered enum
  description: |
    Double dnaA TE at t=300s of a 600s sim. Expected: dnaA mRNA drops
    within 60s (autorepression kicks in), DnaA-ATP steady-state rises
    <1.5× (not 2× — autorepression attenuates).
  expected_response:
    metric: 'change in mRNA[EG10235] within 60s of perturbation'
    direction: decrease
    magnitude_estimate: '~30-50%'
  status: not_run

- name: dnaA-knockdown
  kind: expression_step
  description: |
    Halve dnaA TE at t=300s. Expected: dnaAp promoter de-repression
    within 60s (mRNA bursts higher), eventual recovery toward new lower
    steady state.
  expected_response:
    metric: 'change in mRNA[EG10235] within 60s'
    direction: increase
  status: not_run

- name: autorepression-ablation
  kind: parameter_swap
  description: |
    Set fc multiplier = 0 (zero out delta_prob.deltaV[:, 12] entries).
    Expected: uncontrolled DnaA accumulation; CV of DnaA count grows
    over time; cell loses homeostatic regulation. This is the "what would
    change my mind" control — if DnaA pool stays stable WITHOUT
    autorepression, the autorepression-tests above are testing the wrong
    thing.
  expected_response:
    metric: 'rolling CV of DnaA count over 10 min'
    direction: increase
    magnitude_estimate: '> 0.5 (vs <0.01 baseline)'
  status: not_run

- name: ATP-cycle-ablation
  kind: pathway_swap
  description: |
    Disable the IntrinsicHydrolysis Step. Expected: DnaA-ATP fraction
    → 1.0 (no sink for the ATP form). Confirms F-04 of dnaa-02 in the
    reverse direction.
  expected_response:
    metric: 'median DnaA-ATP / total over second half'
    direction: increase
    target_value: 1.0
  status: not_run

- name: titration-site-removal
  kind: site_mutation
  description: |
    Remove the ~445 non-oriC chromosomal DnaA-boxes (P2-1 dependent —
    requires DnaA_box catalog with region_type attribute). Expected:
    oriC saturates earlier (smaller titration buffer), initiation
    timing shifts earlier in the cell cycle.
  expected_response:
    metric: 'inter-initiation interval (when initiation mechanism is wired in dnaa-04)'
    direction: decrease
  status: blocked_until_dnaa_03_box_catalog


# Per P2-2 / P2-3: SeqA + reset mechanisms get versioned mechanism cards.
# Currently a no-op for dnaa-01; populated in dnaa-05 / dnaa-06.
mechanism_cards: []   # dnaa-01 implements the EXPRESSION layer only;
                       # mechanism cards belong to dnaa-02..06.

conclusion_logic:
  if_primary_tests_pass:
    implementation_status: v2ecoli baseline is functional at the layer-1 (total DnaA
      pool) abstraction.
    biological_validation: "v2ecoli reproduces a STABLE DnaA pool \u2014 does NOT\
      \ validate that\nthe per-cell count matches mass-spec measurements. That's a\n\
      separate calibration pass (compare median(dnaA_protein_count)\nto Schmidt2016's\
      \ reported absolute count).\n"
    pipeline_unblocks:
    - dnaa-02 (DnaA-ATP/ADP/apo nucleotide-state split) becomes safe to start.
    - Calibration_anchor.v2ecoli_observed gets locked in as the baseline reference
      for dnaa-02.
  if_primary_tests_fail:
    diagnose:
    - "If dnaA-count-in-range fails: check calibration_anchor.divergence_alarm_factor\
      \ \u2014 likely concept mismatch (monomer_counts vs bulk vs complex form)."
    - 'If dnaA-concentration-stable fails: check whether translation rate + dilution
      balance reached steady state in the time window (try multi-generation).'
    - 'If autorepression-correlation fails: tf_binding wiring may be broken or fold-change
      too weak.'
    block_downstream: dnaa-02..06 should not start until primary failures are resolved.
limitations:
- Single doubling time; multi-generation drift not validated (see dnaa-04 mechanism
  for that).
- Total DnaA pool only; no ATP/ADP/apo split (dnaa-02).
- Slow non-overlapping growth on M9; rich-media + fast growth not validated here.
- dnaAp-specific box-by-box occupancy NOT validated (dnaa-03 covers the box catalog).
- "Absolute DnaA count vs literature is a calibration question, not a test outcome\
  \ \u2014 see calibration_anchor on dnaA-count-in-range."
- Coarse autorepression proxy sums TF binding across ALL DnaA TF targets, not just
  dnaAp.
implementation_requirements:
- id: req-1-concentration-listener
  kind: listener
  title: DnaaConcentrationListener Step
  effort: S
  description: 'A Step that reads bulk[PD03831[c]] + (mRNA count via rna_counts) +

    cell_volume and emits at listeners.dnaa.{protein_uM, mrna_uM}.

    Converts via Avogadro + volume.

    '
  steps:
  - Create v2ecoli/steps/dnaa_concentration_listener.py.
  - Wire into baseline composite layer after transcript / translation.
  - 'Unit test: assert dnaA_protein_uM > 0 after one timestep.'
  unblocks:
  - readouts.dnaA_protein_concentration
  - dnaA-concentration-stable test in uM units (preferred)
- id: req-2-translation-override-hook
