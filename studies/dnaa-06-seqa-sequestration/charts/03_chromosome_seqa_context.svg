<rect x="0" y="0" width="900" height="44" fill="#0f172a"/><text x="450.0" y="28" text-anchor="middle" fill="white" font-weight="600" font-size="15">oriC chromosomal context — SeqA sequestration target site</text><text x="450.0" y="60" text-anchor="middle" fill="#64748b" font-size="11">SeqA binds hemimethylated GATC sites clustered around oriC (top). After initiation, oriC is hemimethylated for ~10 min while SeqA blocks re-initiation.</text>
