schema_version: 3
name: mbp-04-fed-batch-operations
created: '2026-05-22'
# Multi-axis status (Pass A, canonical). Six independent axes; gate_status
# is intentionally unset — it's a pass/fail outcome, only meaningful after
# the gate is attempted. Replaces the legacy `status: planned` enum.
design_status: drafted             # planned | drafted | expert_reviewed | approved
implementation_status: not_started # not_started | partial | complete
simulation_status: not_run         # not_run | running | ran | failed
evaluation_status: not_evaluated   # not_evaluated | evaluated | failed_evaluation
expert_review_status: not_requested # not_requested | requested | reviewed | approved | disputed
phase: Design

baseline:
- name: fed-batch-dfba
  composite: multiscale_bioprocess.composites.fed_batch_reactor_dfba   # TODO: not yet built
  params: {seed: 0}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Does adding fed-batch capability — feed schedules (constant, exponential,
    pulsed), volume increase from feed addition, and dilution of all
    dissolved-phase species — let the reactor produce true fed-batch
    trajectories: feed-limited steady-state under constant feed, exponential
    biomass at a targeted μ under exponential feed, and a return of overflow
    metabolism when feed exceeds uptake capacity?
  mechanism: |
    Feed lines add substrate and volume over time; every dissolved-phase
    concentration is diluted by the increasing volume. Under glucose-limited
    feed the cell consumes glucose as fast as it arrives (residual glucose ≈
    0). Exponential feed F(t)=F0·exp(μ_set·t) sustains exponential biomass at
    μ_set while feed-limited. Feed above the cell's uptake capacity lets
    glucose accumulate and overflow (acetate) returns. Cell side is the Phase 3
    dFBA process; reactor gains the feed/volume machinery.
  expected_outcome: |
    Constant glucose-limited feed → biomass approaches a feed-limited
    steady-state concentration. Exponential feed targeting μ_set → biomass
    accumulates exponentially at the targeted rate while feed-limited. Feed
    above uptake capacity → glucose accumulates and overflow metabolism
    returns. Feed-rate vs biomass-accumulation-rate calibrates against a
    held-out fed-batch trajectory (selected in spec PR).


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - mbp-03-dfba-substitution
  enables:
    - mbp-05-palsson-benchmark
  gate_status_summary: |
    Blocked on mbp-03: fed-batch trajectories need the dFBA cell side (overflow
    behavior, exchange-bounded uptake). Last construction phase before the
    quantitative Palsson benchmark.
  proceed_condition: |
    Constant-feed, exponential-feed, and over-feed direction tests pass; the
    feed-rate-vs-biomass-accumulation calibration against the held-out
    trajectory falls within the tolerance set in the spec PR.


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

- name: constant-glucose-limited-feed
  base_model: multiscale_bioprocess.composites.fed_batch_reactor_dfba
  perturbation: {feed_mode: constant, feed_rate_gluc_gph: 2.0}
  condition: glucose-limited-fed-batch
  duration_min: 1200
  seeds: [0]
  readouts: [biomass_gL, glucose_gL, volume_L, mu_per_h]
  applies_tests:
    - constant-feed-reaches-feed-limited-steady-state
    - glucose-limited-residual-glucose-near-zero
  status: planned

- name: exponential-feed-mu-target
  base_model: multiscale_bioprocess.composites.fed_batch_reactor_dfba
  perturbation: {feed_mode: exponential, mu_set_per_h: 0.2}
  condition: glucose-limited-fed-batch
  duration_min: 1200
  seeds: [0]
  readouts: [biomass_gL, glucose_gL, volume_L, mu_per_h]
  applies_tests:
    - exponential-feed-yields-exponential-biomass
  status: planned

- name: over-feed-overflow
  base_model: multiscale_bioprocess.composites.fed_batch_reactor_dfba
  perturbation: {feed_mode: constant, feed_rate_gluc_gph: 12.0}   # above uptake capacity
  condition: glucose-excess-fed-batch
  duration_min: 1200
  seeds: [0]
  readouts: [glucose_gL, acetate_gL, biomass_gL]
  applies_tests:
    - over-feed-accumulates-glucose-and-acetate
  status: planned


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: multiscale_bioprocess.composites.fed_batch_reactor_dfba
  new_state_variables:
    - "reactor.volume_L now time-varying (feed addition)"
    - "reactor.cumulative_feed_L (L)"
  new_processes:
    - {name: FeedController, kind: Process, requirement_id: req-1-feed-controller}
  new_parameters:
    - {name: feed_mode, default: constant, units: "{constant|exponential|pulsed}"}
    - {name: feed_rate_gluc_gph, units: "g-glucose/h"}
    - {name: mu_set_per_h, units: "1/h"}
    - {name: feed_glucose_conc_gL, units: "g/L"}
  modified_processes:
    - "WellMixedBatchReactor: volume becomes dynamic; all dissolved-phase species diluted by dV/dt; feed adds substrate + volume."


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "Feed is well-mixed instantaneously (0D)."
  - "Single glucose feed stream; multi-component feeds out of scope."
  - "Pumped acid/base pH control out of scope unless spec PR pulls it in."
  - "No online-sensor noise modeling."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:
- {name: biomass_gL, store_path: reactor.biomass_gL,     units: g/L,   status: planned}
- {name: glucose_gL, store_path: reactor.glucose_gL,     units: g/L,   status: planned}
- {name: acetate_gL, store_path: reactor.acetate_gL,     units: g/L,   status: planned}
- {name: volume_L,   store_path: reactor.volume_L,       units: L,     status: planned}
- {name: mu_per_h,   store_path: reactor.diagnostics.mu, units: "1/h", status: planned}


behavior_tests:

- name: constant-feed-reaches-feed-limited-steady-state
  classification: primary
  description: "Under constant glucose-limited feed, biomass concentration approaches a feed-limited steady state (plateau)."
  measure: {kind: series, path: reactor.biomass_gL, reduce: rolling_cv, window: final_quarter, window_steps: 10}
  pass_if: {op: at_most, value: 0.05}
  units: fraction
  requires_simulation: constant-glucose-limited-feed
  cites: [Lee1996TrendsBiotechnol]

- name: glucose-limited-residual-glucose-near-zero
  classification: supporting
  description: "Under glucose-limited feed, residual glucose stays near zero (uptake keeps pace with feed)."
  measure: {kind: series, path: reactor.glucose_gL, reduce: mean, window: second_half}
  pass_if: {op: at_most, value: 0.1}
  units: g/L
  requires_simulation: constant-glucose-limited-feed
  cites: [Lee1996TrendsBiotechnol]

- name: exponential-feed-yields-exponential-biomass
  classification: primary
  description: "Under exponential feed targeting μ_set, biomass accumulates exponentially at approximately the targeted specific rate while feed-limited."
  measure: {kind: series, path: reactor.biomass_gL, reduce: fitted_exponential_rate, window: feed_limited}
  pass_if: {op: in_range, low: 0.18, high: 0.22}   # μ_set = 0.2 ± 10%
  units: "1/h"
  requires_simulation: exponential-feed-mu-target
  cites: [Lee1996TrendsBiotechnol, Korz1995JBiotechnol]

- name: over-feed-accumulates-glucose-and-acetate
  classification: primary
  description: "At feed rates above the cell's uptake capacity, glucose accumulates and acetate overflow returns."
  measure: {kind: series, path: reactor.acetate_gL, reduce: max, window: full}
  pass_if: {op: at_least, value: 0.5}
  units: g/L
  requires_simulation: over-feed-overflow
  cites: [Korz1995JBiotechnol, Vemuri2006ApplEnvironMicrobiol]


# ─── 6. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "0D well-mixed; feed-point gradients ignored."
  - "Quantitative feed-rate calibration depends on the held-out trajectory chosen in the spec PR."
  - "High-density (OD > 10) physics not yet validated — that is longer-horizon scope."


# ─── 7. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-feed-controller
  kind: process
  title: FeedController Process + dynamic-volume reactor
  effort: M
  description: |
    Feed process supporting constant / exponential / pulsed schedules; adds
    substrate mass + liquid volume; reactor dilutes all dissolved-phase
    species by dV/dt. Exponential mode computes F(t)=F0·exp(μ_set·t).
  unblocks: [all mbp-04 behavior_tests]


bibliography:
  expert: [multiscale_bioprocess_roadmap]
  bib_keys: [Lee1996TrendsBiotechnol, Korz1995JBiotechnol, Vemuri2006ApplEnvironMicrobiol]


runs: []


tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
