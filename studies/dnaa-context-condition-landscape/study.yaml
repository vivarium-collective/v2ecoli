findings:
- id: F-C1
  kind: methodological
  status: confirms
  statement: |
    **[Framing established]** Three takeaways now in one place — (1) v2ecoli's 5 canonical
    conditions max out at acetate τ=136; none are ABT glycerol. (2) The Stage 1 PDF chose ABT
    glycerol τ=150 specifically to avoid multi-fork replication and the synchronization artefacts
    that come with it. (3) Acetate is the v2ecoli ↔ vEcoli equivalence reference because it's
    the closest non-multi-fork existing condition AND has an established vEcoli implementation
    for side-by-side comparison; glycerol is the Stage 1 deliverable.
  evidence:
    from_run: (analysis-only)
    artifact: docs/canonical_acetate_vs_stage1.html
conclusion_logic:
  if_primary_tests_pass: |
    Context surfaced. Reader can answer "why glycerol, why acetate" in under five minutes from
    the investigation card.
  if_primary_tests_fail: |
    Not applicable — this study has no primary tests. If the framing isn't clear to a fresh
    reader, expand the description or add a second embed.
  biological_validation: |
    The multi-fork constraint (Td < C+D → overlapping replication cycles) is a textbook E. coli
    fact, not v2ecoli-specific. The choice of ABT glycerol for DnaA studies is consistent with
    the broader literature (Cooper-Helmstetter, Wold 1994, Boesen 2024) that uses slow
    non-overlapping conditions for replication-timing work.
  block_downstream: |
    Nothing blocked. This study is reference material; the strict prerequisites for Study 0
    are independent of whether this study is read.
