- name: fix-per-process-rng-seeding
  status: fixed
  n_steps: (infrastructure fix, no simulation steps)
  details: 'FIXED 2026-05-24. Per-process RNG seed derivation added in v2ecoli/composites/baseline.py via _derive_process_seed(master_seed,
    base_name) = crc32(process_name, master_seed). Mirrors the pattern already used in v2ecoli/steps/division.py:CellDivision.
    Verified by tests/test_seed_diversity.py — seed=0 vs seed=1 produces divergent trajectories while per-(seed) reproducibility
    is preserved (test_seed_determinism still passes). Unblocks Phase 0 N≥64 ensemble. Original bug: baseline''s `seed` parameter
    only seeded `allocator_rng` (baseline.py:408); the other 14 stochastic processes (TranscriptInitiation, Metabolism, Complexation,
    etc.) inherited a single cache-derived seed from the ParCa cache, so multi-seed ensembles collapsed to bit-identical trajectories.'
