schema_version: 4
name: dnaa-00-parameter-foundation
created: '2026-05-18'
runtime:
  subprocess_timeout_s: 3600
report:
  title: DnaA parameter foundation
  verdict: passing-with-caveats
  confidence: medium
  evidence_quality: literature-matched
  objective: Establish the parameter-pinned v2ecoli baseline the whole investigation calibrates against, before
    any new mechanism lands.
  conclusion: 'Round 3 (2026-05-25, Haochen ask): Stage-1 cell-cycle parameters τ=150 / C=70 / D=30 are now
    IMPOSED via the new minimal_glycerol ParCa cache + composite knobs. Mass-listener reports cell_cycle_len=9000s,
    chromosome_replication reports D_period=1800s + basal_elongation_rate=554 nt/s (C≈70 min). BUT the cell
    actually divides at t=5000s (83 min), not 150 min: ParCa fit dry_mass_inc[minimal_glycerol]=82 fg (small
    threshold from slow-growth bacterial-growth-law fit), and glycerol synthesis was fast enough to hit that
    threshold in 83 min. The 150 min target controls cell_cycle_len (used for expected_mass_fold_change
    reference) but not division (driven by dry_mass ≥ threshold). Open biology question for next round —
    see "decision needed" below.'
  main_insight: 'Two new findings worth Haochen review:
    (1) τ-divergence: declared 150, emergent 83 min (cell-cycle/division uses different signals).
    (2) DnaA concentration NOT stable: drops from 1.03 /fg → 0.42 /fg over the first cycle, dropping further
    to 0.33 /fg by t=10000s. Glycerol ParCa fit may not produce enough DnaA expression to track cell-mass
    growth in this condition.'
  caveat: 'Cell divides at 83 min, not the declared 150 min. DnaA count drops from 329 (in band) to 222
    (below the literature 300-800 band) by run end. These are the focus questions for Round 4.'
  lit_match: Boesen 2024 / Fu-Xiao-Jun 2023
  key_metrics:
  - label: τ declared / emergent
    value: 150 / 83 min
    status: caveat
  - label: C-period (replisome elongation 554 nt/s × 2.32 Mbp replichore)
    value: 69.94 min
    status: pass
  - label: D-period
    value: 30 min
    status: pass
  - label: DnaA count (start / division / end)
    value: 329 / 234 / 222
    status: caveat
  - label: DnaA concentration (start / division / end)
    value: 1.03 / 0.42 / 0.33 mol/fg
    status: caveat
  decisions_needed:
  - question: 'τ-gap: cell divides at 83 min not 150. Three paths — (a) accept emergent; (b) hand-tune
      dry_mass_inc; (c) rebuild ParCa with hand-calibrated glycerol kinetics. Which?'
  - question: 'DnaA concentration drops 3× over one cycle. Is this real biology (glycerol-fitted synthesis)
      or an artifact (translation_efficiency scale needs recalibration)?'
  purpose: Establish the baseline the whole investigation calibrates against, and show how the same v2ecoli code
    behaves when its surfaced parameters are pinned to the Fu/Xiao/Jun (2023) Stage-1 heuristic values — before
    any new mechanism lands.
  setup: 'v2ecoli baseline + a read-only DnaA-cycle listener on minimal-glucose (seed 0), run to division (~2640
    s). Two comparators overlay it: a RIDA-active variant (dnaa-04 mechanism, Stage-1 parameters) and the Fu/Xiao/Jun
    ITv2 analytical mean-field model.'
  result: The baseline initiates a round of replication within one cell cycle (oriC count 2→4) and holds DnaA at
    ~325 (literature band 300-800). The RIDA-active variant keeps DnaA-ATP fraction at ~0.15-0.44 (near Boesen 2024's
    [0.2, 0.5]); the no-RIDA baseline sits at ~1.0.
  interpretation: The unmodified cell already fires replication via the legacy mass-per-oriC heuristic, so it is
    a valid reference. Adding the hydrolysis/RIDA layer is what brings DnaA-ATP into the physiological band — evidence
    that the ported mechanism, not the heuristic, governs the ATP fraction.
  decision: Baseline confirmed and parameter-pinned. Proceed to the mechanism studies.
  next_action: dnaa-01 (expression dynamics) and dnaa-02 (intrinsic hydrolysis) build on these two composites.
question: 'What baseline does the dnaa-replication investigation calibrate

  against, and how does the same v2ecoli code respond when its key

  parameters are pinned to the Fu/Xiao/Jun (2023) Stage 1 heuristic

  values? This is the parameter-foundation study — every downstream

  study (dnaa-01..04) starts from one of the two composites declared

  here. An optional ITv2 analytical comparator surfaces when an

  external mean-field reference helps interpret the v2ecoli traces.

  '
assumptions:
- text: Cell birth volume is 1 µm³ in slow steady growth (M9-glucose, MG1655).
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: true
- text: Mass-doubling time τ is 150 min in ABT minimal-glycerol (non-overlapping cell cycle).
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: Expert target, NOT applied. v2ecoli's τ is implicit in the media composition; these runs use minimal-glucose
    (τ≈44 min, cell divides ~2640 s), not the glycerol Stage-1 condition. Switching to 150 min needs a media-level
    override / ParCa fit for ABT minimal-glycerol (TODO).
- text: C period (replication duration) is 70 min — sets replication speed at ≈ 66.31 kbp/min.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: Buried in chromosome_replication.replication_speed; not surfaced today.
- text: D period (termination → division delay) is 30 min.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
- text: dnaA transcription rate is 1.5 mRNA/min/gene (constitutive expression at Stage 1).
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: Would need a ParCa cache override.
- text: DnaA translation efficiency is 1 protein/mRNA (Hansen & Atlung 2018 estimate).
  cites:
  - wcm_stage1_parameters
  - Hansen2018DnaATale
  verified_in_v2ecoli: true
  note: Surfaced via dnaa-01 model_settings.translation_efficiency_eg10235_scale.
- text: DnaA is fully stable — degradation rate = 0.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: true
- text: DnaA-ATP dissociation constant is 30 nM (Sekimizu 1987 / Kawakami 2006).
  cites:
  - wcm_stage1_parameters
  - Sekimizu1991
  verified_in_v2ecoli: false
  note: Encoded inside the MONOMER0-160_RXN equilibrium reaction; not surfaced.
- text: DnaA-ADP dissociation constant is 100 nM.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
- text: DnaA-ATP intrinsic hydrolysis rate is 0.046 /min (Sekimizu 1987).
  cites:
  - wcm_stage1_parameters
  - Sekimizu1991
  verified_in_v2ecoli: true
  note: Surfaced via dnaa-02 model_settings.hydrolysis_rate_per_min.
- text: Consensus chromosomal DnaA-box Kd is 1 nM (ATP- or ADP-bound).
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: true
  note: Surfaced via dnaa-03 model_settings.kd_high_nM.
- text: 8 low-affinity DnaA-ATP-only boxes in oriC, cooperative Kd 50 → 1 nM.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: v2ecoli ships 7 oriC sites (not 8) with single Kd. Cooperativity is dnaa-03-EQ-02.
- text: Hda (RIDA) hydrolyses DnaA-ATP at 40 /min per replication-fork pair.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: dnaa-rida-v0 Step exists; default rate (4.6) is ~10× below Stage 1's 40. Variant overrides.
- text: datA (DDAH) hydrolyses DnaA-ATP at 12 /min per locus. Artificial heuristic.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: datA Step doesn't exist yet — deferred to follow-on investigation.
- text: DARS1 reactivates DnaA-ADP → DnaA-ATP at 5 /min per locus.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: DARS Step doesn't exist yet — deferred.
- text: DARS2 reactivates DnaA-ADP → DnaA-ATP at 10 /min per locus.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: false
  note: DARS Step doesn't exist yet — deferred.
- text: SeqA sequestration time is 0 min — origin sequestration not modelled at Stage 1.
  cites:
  - wcm_stage1_parameters
  verified_in_v2ecoli: true
  note: dnaa-04 ships SeqA_v0 fixed-timer stand-in; set refractory_seconds = 0 to recover Stage 1.
- text: apo-DnaA monomer = bulk ID PD03831[c] — newly translated, not yet nucleotide-bound.
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: true
- text: DnaA-ATP (active, initiation-competent) = bulk ID MONOMER0-160[c].
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: true
- text: DnaA-ADP (inactive, cannot bind oriC weak boxes) = bulk ID MONOMER0-4565[c].
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: true
- text: apo-DnaA + ATP ⇌ DnaA-ATP equilibrium runs through reaction MONOMER0-160_RXN (mass-action driven, ParCa-fitted
    Kd ≈ 30 nM).
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: true
- text: apo-DnaA + ADP ⇌ DnaA-ADP equilibrium runs through reaction MONOMER0-4565_RXN (mass-action driven, ParCa-fitted
    Kd ≈ 100 nM).
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: true
- text: RIDA (DnaA-ATP → DnaA-ADP, replisome-coupled) is encoded in v2ecoli's metabolism as reaction RXN0-7444.
    Flux is currently zero (not wired through dnaa-02f); dnaa-rida-v0 Step is the workaround.
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: false
  note: Reaction exists in flat data and FBA, but no flux until dnaa-rida-v0 fires.
- text: 307 consensus chromosomal DnaA boxes are partitioned by a region classifier into chromosomal-titration /
    oriC / dnaAp / datA / DARS regions.
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: true
  note: Box catalog at v2ecoli/data/dnaa_box_catalog.py; region partitioning matches the report's classifier.
- text: oriC carries 11 DnaA boxes — 3 high-affinity + 8 low-affinity (cooperative). DnaA-ATP only binds the 8 low-affinity
    sites; both ATP- and ADP-forms can bind the 3 high-affinity sites.
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: false
  note: v2ecoli's catalog ships 7 (not 8) oriC low-affinity boxes today.
- text: DDAH (DnaA-ATP hydrolysis at datA) is gated by IHF binding at the datA locus — not currently represented
    in v2ecoli.
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: false
- text: DARS1 + DARS2 reactivate DnaA-ADP → apo → DnaA-ATP (nucleotide release at the DARS loci, with DARS2 additionally
    modulated by IHF + Fis). Not yet represented.
  cites:
  - v2ecoli_replication_initiation_report
  verified_in_v2ecoli: false
conditions:
  baseline:
    composite: v2ecoli.composites.baseline_recipes.dnaa_00_baseline_with_dnaa_readout
    # Round 3 (Haochen 2026-05-25): Stage-1 ABT minimal glycerol cache
    # imposes τ=150 / C=70 / D=30. Cache built via:
    #   scripts/build_condition_cache.py --condition stage1-heuristic
    #     --fixture out/parca-glycerol-rebuild/parca_state.pkl.gz
    #     --media-condition glycerol --fixed-media minimal_glycerol
    #     --c-period-min 70 --d-period-min 30
    #     --cache out/cache-stage1-glycerol
    # n_steps=10000 covers > 1 doubling time (150 min × 60 = 9000 s).
    params:
      seed: 0
      cache_dir: out/cache-stage1-glycerol
      n_steps: 10000
  variants:
  - name: baseline-stage1-modified
    composite: v2ecoli.composites.baseline_recipes.dnaa_04_with_dnaa_initiation_trigger
    description: "v2ecoli baseline + dnaa-04 mechanism, with the surfaced parameters\npinned to the Fu/Xiao/Jun\
      \ (2023) Stage 1 heuristic table:\n  hydrolysis_rate_per_min = 0.046  (Sekimizu 1987)\n  rida_rate_per_min\
      \       = 40.0   (Hda heuristic)\n  kd_high_nM              = 1.0    (consensus chromosomal Kd)\n  kd_low_nM\
      \               = 50.0   (oriC weak-box upper end)\n  atp_fraction_clamp_*    = null   (no clamp — let RIDA\
      \ do the work)\n  oric_high_threshold     = 0.8    (~80 % saturation gates firing)\n  refractory_seconds \
      \     = 0.0    (Stage 1 disables SeqA)\n  initial_dnaA_count_per_cell = 300  (anchor to literature band)\n"
    params:
      seed: 0
      cache_dir: out/cache-stage1-heuristic
      n_steps: 3600
      mechanism: rida-v0
      hydrolysis_rate_per_min: 0.046
      rida_rate_per_min: 40.0
      atp_fraction_clamp_low: null
      atp_fraction_clamp_high: null
      kd_high_nM: 1.0
      kd_low_nM: 50.0
      enable_oric_binding: true
      enable_dnaap_binding: true
      oric_high_threshold: 0.8
      atp_fraction_threshold: 0.5
      refractory_seconds: 0.0
      initial_dnaA_count_per_cell: 300
  - name: itv2-reference
    composite: v2ecoli.composites.initiator_titration_v2.initiator_titration_v2
    description: 'Fu/Xiao/Jun (2023) mean-field initiator-titration model v2 as an

      analytical comparator. Wild-type defaults — slow growth, RIDA

      active. Surfaces alongside the two v2ecoli composites so the

      evaluator can sanity-check the v2ecoli traces against the paper''s

      analytical predictions in one place.

      '
    params:
      seed: 0
      n_steps: 3600
  model_settings:
  - name: tau_min_stage1
    description: 'Mass-doubling time τ at Stage 1: 150 min (ABT minimal-glycerol).
      Applied in Round 3 (2026-05-25) via the new `minimal_glycerol` ParCa
      condition (commit 0a3c36d). Mass-listener reports cell_cycle_len=9000s
      verified at composite-build time.'
    type: number
    default: 150.0
    current: 150.0
    gate: required
    status: applied
    cites:
    - wcm_stage1_parameters
  - name: c_period_min_stage1
    description: 'Replication period C at Stage 1: 70 min. Applied in Round 3
      via the LoadSimData `c_period_minutes` override: basal_elongation_rate
      = replichore_length / (C × 60) = 2,324,960 nt / 4200 s ≈ 554 nt/s,
      yielding C ≈ 69.94 min on the WCM E. coli genome. Verified at
      composite-build time.'
    type: number
    default: 70.0
    current: 70.0
    gate: required
    status: applied
    cites:
    - wcm_stage1_parameters
  - name: d_period_min_stage1
    description: 'Termination → division delay D at Stage 1: 30 min. Applied in
      Round 3 via the LoadSimData `d_period_seconds` override (1800 s).
      Verified at composite-build time.'
    type: number
    default: 30.0
    current: 30.0
    gate: required
    status: applied
    cites:
    - wcm_stage1_parameters
  - name: dnaa_intrinsic_hydrolysis_per_min_stage1
    description: 'DnaA-ATP intrinsic hydrolysis rate (Sekimizu 1987): 0.046/min.'
    type: number
    default: 0.046
    current: 0.046
    gate: optional
    cites:
    - wcm_stage1_parameters
    - Sekimizu1991
  - name: chromosomal_dnaa_box_kd_nM_stage1
    description: 'Consensus chromosomal DnaA-box Kd: 1 nM.'
    type: number
    default: 1.0
    current: 1.0
    gate: optional
    cites:
    - wcm_stage1_parameters
  - name: hda_rida_rate_per_min_per_fork_pair_stage1
    description: 'Hda / RIDA hydrolysis rate: 40/min per fork pair (artificial heuristic).'
    type: number
    default: 40.0
    current: 40.0
    gate: optional
    cites:
    - wcm_stage1_parameters
tests:
- name: baseline-initiates-replication
  classification: primary
  question: Does the v2ecoli baseline initiate a round of chromosome replication (oriC count at least doubles) within
    the run window?
  measure:
    kind: listener_path
    path: listeners.replication_data.number_of_oric
    reduce: first_and_last
    window: full_run
  pass_if:
    op: ratio_at_least
    ratio: 2.0
  requires_simulation: dnaa-00-parameter-foundation
  status: passed
  cites:
  - wcm_stage1_parameters
  run_ids: []
- name: stage1-variant-dnaa-fraction-in-band
  classification: primary
  question: Does the Stage 1-parameterised variant maintain DnaA-ATP fraction inside Boesen 2024's [0.2, 0.5] band?
  measure:
    kind: listener_median
    path: listeners.dnaA_cycle.atp_fraction
    window: second_half
  requires_simulation: baseline-stage1-modified
  pass_if:
    op: in_range
    low: 0.2
    high: 0.5
  status: pending-first-run
  cites:
  - wcm_stage1_parameters
  - Boesen2024PNAS
  run_ids: []
- name: stage1-parameters-catalogued
  classification: secondary
  question: Have all 17+ Stage 1 parameter rows been catalogued with their literature anchor + v2ecoli wiring status?
  measure:
    kind: count_assumptions
  pass_if:
    op: at_least
    value: 17
  status: pass
  cites:
  - wcm_stage1_parameters
  run_ids: []
comparative_visualizations:
- name: dnaa-atp-fraction-foundation
  title: DnaA-ATP fraction over time — baseline vs Stage 1 modified
  observable_path: listeners.dnaA_cycle.atp_fraction
  y_label: DnaA-ATP / total
  target_band:
  - 0.2
  - 0.5
  target_band_label: physiological band (Boesen 2024)
  runs:
  - sim_name: dnaa-00-parameter-foundation
    label: Baseline (v2ecoli default)
  - sim_name: baseline-stage1-modified
    label: Baseline + Stage 1 params
  - sim_name: itv2-reference
    label: ITv2 reference (FXJ 2023)
- name: dnaa-monomer-count-foundation
  title: Total DnaA monomer count over time
  observable_path: listeners.monomer_counts
  observable_index: 3861
  y_label: DnaA (molecules / cell)
  target_band:
  - 300
  - 800
  target_band_label: literature band (Schmidt 2016 / Mori 2021)
  runs:
  - sim_name: dnaa-00-parameter-foundation
    label: Baseline (v2ecoli default)
  - sim_name: baseline-stage1-modified
    label: Baseline + Stage 1 params
- name: dnaa-oric-count-foundation
  title: oriC copy number over the cell cycle (replication initiation)
  observable_path: listeners.replication_data.number_of_oric
  y_label: oriC copies / cell
  runs:
  - sim_name: dnaa-00-parameter-foundation
    label: Baseline (v2ecoli default)
  - sim_name: baseline-stage1-modified
    label: Baseline + Stage 1 params
status: round3-tau-c-d-imposed-emergent-tau-divergence-awaiting-expert-review
last_run: '2026-05-25'
phase: Foundation
parent_studies: []
expert_docs:
- wcm_stage1_parameters
- replication_initiation_molecular_info
- v2ecoli_replication_initiation_report
bibliography:
  bib_keys:
  - FuXiaoJun2023
  - Sekimizu1991
  - Hansen2018DnaATale
  - Katayama2017Frontiers
  - Boesen2024PNAS
  - Schmidt2016
  - Mori2021
biological_summary: "This is the parameter-foundation study for the dnaa-replication\ninvestigation. It establishes\
  \ the two composites every downstream\nstudy calibrates against:\n\n  1. baseline                 — v2ecoli's\
  \ default whole-cell composite\n                                at ParCa-fitted parameters (no overrides).\n \
  \ 2. baseline-stage1-modified — the same v2ecoli code with the surfaced\n                                parameters\
  \ pinned to the Fu/Xiao/Jun\n                                (2023) Stage 1 heuristic-values table.\n\nAn optional\
  \ itv2-reference variant runs the analytical Fu/Xiao/Jun\nmean-field model standalone, for an apples-to-apples\
  \ external check.\n\nThe Stage 1 parameter table is the single source of truth for what\n\"Stage 1\" means. 17+\
  \ parameter rows are catalogued in assumptions[]\nwith their literature anchor (Sekimizu 1987, Kawakami 2006,\
  \ Hansen\n& Atlung 2018) or \"artificial setup\" flag for the heuristic\nplaceholders (Hda, datA, DARS). Each\
  \ downstream study (dnaa-01\nexpression, dnaa-02 hydrolysis, dnaa-03 box-binding, dnaa-04\ninitiation-mechanism)\
  \ calibrates a subset of these; dnaa-00 surfaces\nthe spec-vs-model gap centrally.\n\nGoing forward, every investigation\
  \ should start with a study-00 of\nthis shape: the canonical foundation composites + a parameter\ncatalog + an\
  \ optional external analytical comparator. Downstream\nstudies are perturbations over this baseline.\n"
readouts:
- name: number_of_oric
  store_path: agents.0.listeners.replication_data.number_of_oric
  units: count
  status: available
  description: oriC copy number — counts the replication initiation events across the cell cycle (the baseline observable
    for replication-initiation work).
- name: dnaa_atp_fraction
  store_path: agents.0.listeners.dnaA_cycle.atp_fraction
  units: fraction
  status: available
  description: DnaA-ATP / (DnaA-ATP + DnaA-ADP) — the headline pool ratio.
- name: monomer_counts
  store_path: agents.0.listeners.monomer_counts
  units: molecules/cell (vector indexed by monomer)
  status: available
  description: Full per-monomer count vector. DnaA monomer is at index 3861 (MONOMER0-160).
- name: cell_mass
  store_path: agents.0.listeners.mass.cell_mass
  units: fg
  status: available
  description: Total cell mass in fg. Required to compute DnaA concentration (count
    / mass) — Haochen 2026-05-25 Round-3 ask. Also lets the report show actual
    mass-doubling time vs the declared cell_cycle_len target.
- name: dry_mass
  store_path: agents.0.listeners.mass.dry_mass
  units: fg
  status: available
  description: Cell dry mass in fg. This is what the division trigger compares against
    the ParCa-fitted threshold (division_threshold = dry_mass + dry_mass_inc[media_id]).
- name: expected_mass_fold_change
  store_path: agents.0.listeners.mass.expected_mass_fold_change
  units: dimensionless
  status: available
  description: 2^(t/cell_cycle_len) — the mass listener's REFERENCE curve under the
    declared τ=150 min. Diverges from actual mass when ParCa's fitted synthesis
    rate disagrees with the declared cycle length.
biological_role: Defines the BASELINE every other study calibrates against — the v2ecoli single-cell composite running
  on minimal glucose, before any DnaA mechanism is ported. Catalogs the Fu/Xiao/Jun (2023) Stage-1 parameter set
  with explicit wiring status (which parameters v2ecoli already exposes vs which need new listeners).
dependency_rationale: Foundation — nothing else can run until the baseline composite + parameter catalog exist.
  Every downstream study composes on top of this composite and compares its observables back to this baseline.
mechanism_replaced: Nothing yet — this study establishes WHAT the v2ecoli baseline does (mass-per-oriC heuristic
  intact) so the downstream studies have a concrete "before" reference.
primary_claim: The baseline initiates replication within one cell cycle (number_of_oric 2→4) on a glucose ParCa
  cache, and the Stage-1 parameter set composes cleanly into the v2ecoli composite without breaking core behaviour.
primary_visualization: 'chromosome_state — full multi-panel cell-cycle figure: 5 circular chromosome maps across
  the cycle with replication bubbles + RNAPs, plus replication-fork progress + mass growth timeseries. This is the
  biological reference picture every other study calibrates against.'
scope_boundary: Single cell, single generation, minimal glucose, seed 0. No biology is ADDED here — only catalogued.
deferred_biology: All DnaA mechanism work is deferred to dnaa-01 through dnaa-06. This study does not introduce
  any new listeners, processes, or steps.

post_run_scripts:
- path: scripts/render_dnaa00_chromosome_viz.py
  args: [ '--steps', '600',]
  timeout_s: 1800
