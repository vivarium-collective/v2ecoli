executive:
  what_is_this: Porting the DnaA-driven chromosome-replication-initiation decision into v2ecoli — replacing the
    legacy "cell mass per oriC ≥ critical mass" heuristic with the actual mechanism (DnaA expression → ATP/ADP exchange
    → DnaA-box titration across the chromosome → oriC loading → initiation).
  verdict: 'Round 3 (2026-05-25) addresses Haochen''s workflow shift to one-study-at-a-time + his specific dnaa-00
    asks (impose τ=150 / C=70 / D=30, run ≥1 doubling time, add DnaA-concentration viz). Wiring landed end-to-end:
    new `minimal_glycerol` ParCa condition (MIX0-845 media + rebuilt cache); C-period + D-period overrides surfaced
    through LoadSimData + get_chromosome_replication_config; n_steps bumped to 10000 (>1 cycle). Verification at
    composite-build time: mass-listener reports cell_cycle_len=9000s (τ=150) ✓, chromosome_replication reports
    D_period=1800s ✓ and basal_elongation_rate=554 nt/s → C≈69.94 min ✓. BUT the cell actually divides at t=5000s
    (83 min, not 150) — division fires on dry_mass ≥ threshold, not on cell_cycle_len; ParCa''s glycerol fit gave
    dry_mass_inc[minimal_glycerol]=82 fg (small) and glycerol-fast synthesis hit it in 83 min. DnaA count drops
    329 → 222 (below the literature 300-800 band); DnaA concentration drops 3× (1.03 → 0.33 mol/fg). Two open
    questions for Haochen recorded in decisions_needed below. Deliverable: single-study HTML report (rendered via
    dashboard PR #124). Investigation now in single-study cadence: only dnaa-00 ran this round; dnaa-01 → dnaa-07
    blocked-by-prerequisite until dnaa-00 is approved.


    ROUND 3.6 (2026-05-27 / 2026-05-28) — incremental work toward Haochen review:
    (1) PARQUET REGRESSION CHECK — migrated dnaa-01..04 sim runners + the dnaa-replication
    viz infrastructure to parquet_emitter (PR #85 landed the workspace-level infrastructure;
    PR #59 carries the dnaa-specific runner edits). Re-ran each study''s baseline on the
    default minimal-glucose cache: dnaa-02 atp_fraction = 0.975 (was 0.997, same intrinsic-only
    band failure verdict); dnaa-02f variant B'' atp_fraction = 0.270 ∈ [0.2, 0.5] ✓ band-recovery
    re-confirmed; dnaa-03 all 4 declarative tests pass under the imperative runner; dnaa-04
    mechanism would_fire = 1 over 30 min (single-seed). dnaa-01 re-run on the existing
    out/cache-stage1-heuristic-acetate (rebuilt with tx=30 / te=2.48 bootstrap factors): DnaA
    monomer total median 396 (range 373-418) IN BAND [300, 800] ✓. NET: every verdict survives
    the parquet path on the prior-round caches — no biology regression from the emitter change.
    (2) τ-GAP EXPERIMENT (the substantive new finding for Haochen) — see decisions_needed #1.
    Option (b) hand-tune dry_mass_inc was tested with a clone of the glycerol cache at 144 fg
    and is REFUTED (division still fires at 83 min because chromosome replication completion
    is the dominant gate, not mass). Option (c) deeper ParCa rebuild is the only path that
    could close the gap.
    (3) THREE OPEN BUGS surfaced (filed, not yet fixed):
      - calibrate_dnaa_stage1.measure() reads 0 mRNA events on the merged-main branch even
        though the sim produces DnaA fine — calibrate-time listener path is wrong. Blocks
        re-converging the te-factor on glycerol (Haochen R2: "Why TE=2.48?").
      - Daughter-process hydration error on dnaa_stage1_constitutive: ''no link found at
        address: ...DnaaConstitutiveExpression''. build_core() DOES register the Step (it''s
        in core.link_registry); the dashboard''s daughter-composite reconstitutor builds a
        DIFFERENT core via core_extensions that doesn''t include it. Blocks multi-gen runs
        of dnaa_stage1_constitutive.
      - C-period imposition only sets the mass-listener reference curve, not the chromosomal
        elongation rate itself — surfaces in the τ-gap finding above. (REVISED 2026-05-29: actually
        the D-period that is unenforced, not C. See caveats and decisions_needed for the corrected
        trace.)'
