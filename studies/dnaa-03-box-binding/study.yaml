schema_version: 3
name: dnaa-03-box-binding
created: '2026-05-16'
status: planned
question: |
  Does pure DnaA-box titration (~307 chromosomal high-affinity sites +
  the 11 oriC boxes + 4 dnaA-promoter boxes) reproduce the textbook
  2-step oriC occupancy (high-affinity sites first, then low) and the
  free-DnaA rise after chromosomal saturation?
hypothesis: |
  Chromosomal occupancy grows monotonically as DnaA accumulates; oriC
  binding stays low until ≤~10 chromosomal sites remain unoccupied,
  then the high-affinity oriC sites fill quickly, followed by the
  low-affinity sites only when DnaA-ATP is plentiful. Free DnaA stays
  sub-Kd through most of the cycle, then rises sharply, providing the
  signal that downstream replication-initiation studies (dnaa-04) will
  consume. With all-high-affinity oriC (variant), the 2-step pattern
  collapses into a single fill event.
objective: |
  Implement DnaA binding to the ~307 chromosomal DnaA boxes, the 11 oriC
  boxes (3 high-affinity + 8 low-affinity), and the 4 dnaA promoter boxes
  (2 high + 2 low). Track which form (DnaA-ATP vs DnaA-ADP) is bound so
  the correct form is released on replication-fork passage.
description: |
  Phase 3 of the multi-phase replication-initiation plan
  (references/expert/chromosome_replication_plan.pdf, Study 3).
  Wires DnaA to its DNA targets. Builds on dnaa-02 (nucleotide cycle).

  Affinity assumptions (initial pass):
    - Chromosomal consensus boxes (TTWTNCACA, n≈307): KD ~ 1 nM, high
      affinity for both DnaA-ATP and DnaA-ADP.
    - oriC: 3 high-affinity (R1, R2, R4; KD ~ 1 nM, bind ATP and ADP forms)
            + 8 low-affinity (R5M, τ2, I1-3, C1-3; KD ~ 100 nM,
              DnaA-ATP-preferential).
    - dnaA promoter: 2 high (box 1, box 2) + 2 low (box b, box c).
    - DNA binding does NOT alter the DnaA-ATP intrinsic hydrolysis rate.

baseline:
- name: baseline
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache

variants:
- name: chromosomal-boxes-only
  description: |
    Disable oriC + dnaA-promoter binding. Pure titration sink — used to
    measure how long titration alone delays free-DnaA accumulation.
  params:
    enable_oric_binding: false
    enable_dnaap_binding: false

- name: all-high-affinity
  description: |
    Promote low-affinity oriC boxes to high affinity (1 nM). Expect early
    oriC saturation regardless of chromosomal pool.
  params:
    oric_low_affinity_kd_nM: 1.0

- name: high-initial-dnaA
  description: |
    Start with high DnaA. Per the plan: expect low dnaA-promoter activity
    (autorepression) and over-occupied oriC.
  params:
    initial_dnaA_count_per_cell: 5000

observables:
- name: chromosome_box_occupancy_fraction
  store_path: agents.0.listeners.dnaA_binding.chromosome.occupied_fraction
- name: oric_high_occupancy
  store_path: agents.0.listeners.dnaA_binding.oric.high_affinity_occupied
- name: oric_low_occupancy
  store_path: agents.0.listeners.dnaA_binding.oric.low_affinity_occupied
- name: dnaap_occupancy
  store_path: agents.0.listeners.dnaA_binding.dnaap.occupied
- name: free_dnaA
  store_path: agents.0.listeners.dnaA_binding.free_total
- name: bound_dnaA_atp
  store_path: agents.0.listeners.dnaA_binding.bound_atp
- name: bound_dnaA_adp
  store_path: agents.0.listeners.dnaA_binding.bound_adp

visualizations:
- name: chromosome-occupancy
  address: local:TimeSeriesPlot
  config:
    title: "Chromosome DnaA-box occupancy vs free DnaA"
    observables: [chromosome_box_occupancy_fraction, free_dnaA]
- name: oric-two-step
  address: local:TimeSeriesPlot
  config:
    title: "oriC occupancy — high-affinity then low-affinity (2-step)"
    observables: [oric_high_occupancy, oric_low_occupancy]
- name: chromosome-map
  address: local:ChromosomeBoxMap   # NEW visualization to author via /pbg-viz
  config:
    title: "Full chromosome — DnaA boxes bound (ATP / ADP / free)"

tasks:
- Catalog all 307 chromosomal DnaA-box positions + 11 oriC sites + 4
  dnaAp sites, with affinity class (high vs low) and nucleotide preference.
- Add DnaA-DNA binding kinetics (KD-driven; cooperative low-affinity if
  feasible).
- Track bound nucleotide form so dnaa-04 can release the matching form.
- Author a chromosome-map visualization (linear or circular).

# ── Concrete gaps ───────────────────────────────────────────────────────────
gaps:
- id: gap-1
  title: DnaA-box catalog (307 chromosomal + 11 oriC + 4 dnaAp)
  effort: M
  why: Without explicit box positions + affinity classes, no binding is computed.
  approach: |
    chromosome_structure.py already has a `DnaA_boxes` unique store with
    `DnaA_bound` flags. Need to (a) seed it with the 307 chromosomal box
    positions from EcoCyc (or from the bioinformatic motif scan in
    Olivi 2025) + their high/low-affinity class, (b) annotate the 11
    oriC boxes (R1-R4 + R5M + τ2 + I1-3 + C1-3) and 4 dnaAp boxes
    (1, 2, b, c) with explicit role tags.
  steps:
    - "Author v2ecoli/data/dnaa_box_catalog.tsv: box_id, position, region (chromosome|oriC|dnaap), affinity (high|low), bound_nucleotide_preference (atp|both)."
    - "chromosome_structure._init reads the catalog + seeds DnaA_boxes."
    - "Lint: 307 chromosomal + 11 oriC (3 high + 8 low) + 4 dnaap (2 high + 2 low) match the expected counts."
  unblocks:
    - dnaa-03 all behaviors
    - dnaa-04 reduced-box-count-shortens-inter-initiation

- id: gap-2
  title: DnaA-box binding kinetics
  effort: L
  why: Sites bind DnaA at affinity-class-specific KD; bound form must be tracked.
  approach: |
    A Step that, each timestep, updates DnaA_bound for each box by a
    simple equilibrium (or stochastic Gillespie) based on free DnaA
    pool, box affinity, and bound-form preference. Track which form
    (ATP / ADP) is bound on each high-affinity site so fork-passage
    (dnaa-04) can release the correct form.
  steps:
    - "Create v2ecoli/processes/dnaa_box_binding.py with a Process or Step shape."
    - "Composite param dnaA_box_binding_kd_nM: {high: 1.0, low: 100.0}."
    - "Update DnaA_bound + the nucleotide-form annotation on each box."
    - "Listener: emit listeners.dnaA_binding.{chromosome,oric,dnaap}.<rollup>."
  unblocks:
    - all dnaa-03 behaviors
    - dnaa-04 mechanism-driven initiation depends on oriC occupancy

- id: gap-3
  title: Variant hooks (initial_dnaA_count_per_cell, enable_oric_binding)
  effort: S
  why: Two of dnaa-03's variants need explicit composite-level knobs.
  steps:
    - "Add composite param initial_dnaA_count_per_cell: int | None = None."
    - "When set, the initial-state seeder uses this value (overrides sim_data's calculated count)."
    - "Add composite param enable_oric_binding: bool = True for the chromosomal-boxes-only variant."

# ── Interventions ───────────────────────────────────────────────────────────
interventions:

- name: single-cycle-binding-dynamics
  description: |
    Run baseline for one full cell cycle and record the time course of
    chromosomal occupancy, oriC occupancy (high vs low affinity), free
    DnaA, and dnaAp occupancy. The cleanest set-up to observe the
    titration -> 2-step oriC fill -> free DnaA rise pattern.
  variant: null
  protocol:
    duration_min: 60
    seeds: [0, 1, 2, 3, 4]
  triggers_tests:
    - chromosomal-occupancy-monotonic-increasing
    - oric-stays-unoccupied-until-chromosome-saturates
    - free-dnaa-rises-after-titration
    - oric-occupancy-is-two-step
  key_observables:
    - chromosome_box_occupancy_fraction
    - oric_high_occupancy
    - oric_low_occupancy
    - free_dnaA
    - bound_dnaA_atp
    - bound_dnaA_adp
  requires:
    - listener: dnaA_binding.chromosome.occupied_fraction
    - listener: dnaA_binding.oric.high_affinity_occupied
    - listener: dnaA_binding.oric.low_affinity_occupied
    - listener: dnaA_binding.free_total
    - upstream: dnaa-03 box-binding model

- name: start-with-saturated-dnaa
  description: |
    Initialize the cell with 5000 DnaA molecules (≥10× normal) and run
    one cycle. Tests the autorepression feedback when the pool is
    deliberately oversaturated.
  variant: high-initial-dnaA
  protocol:
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests:
    - high-initial-dnaa-shows-autorepression
  key_observables:
    - dnaap_occupancy
    - dnaA_protein_count    # cross-study reference to dnaa-01 observable
    - dnaA_transcription_init_events
  requires:
    - variant_hook: initial_dnaA_count_per_cell
    - listener:     dnaA_binding.dnaap.occupied

- name: disable-oric-binding-titration-only
  description: |
    Disable oriC + dnaAp binding entirely (chromosomal-boxes-only).
    Provides a pure-titration control: confirms the free-DnaA plateau
    is ≥3× higher when the oriC sink is removed, isolating the
    titration component.
  variant: chromosomal-boxes-only
  protocol:
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests:
    - chromosomal-boxes-only-variant-no-oric-fill
  key_observables:
    - free_dnaA
  requires:
    - variant_hook: enable_oric_binding
    - listener:     dnaA_binding.free_total

expected_behavior:

- name: chromosomal-occupancy-monotonic-increasing
  en: "Chromosomal DnaA-box occupancy rises monotonically as DnaA accumulates from cell birth."
  given:  {run: baseline, window: full}
  measure:
    kind: listener_path
    path: "listeners.dnaA_binding.chromosome.occupied_fraction"
    reduce: series
    units: "fraction (occupied / total chromosomal boxes)"
  expect: {op: monotonic_increasing, allow_dip_pct: 5}
  status: gated
  requires:
    - listener: dnaA_binding.chromosome.occupied_fraction
    - upstream: dnaa-03 box-binding model
  cites:
    - Roth1998MolMicrobiol       # high-affinity binding sites on E. coli chromosome
    - Olivi2025NatCommun         # 307 boxes; titration on chromosome

- name: oric-stays-unoccupied-until-chromosome-saturates
  en: "oriC remains largely unoccupied (<20% sites bound) until chromosomal sites are >90% occupied — the titration prediction."
  given:  {run: baseline, window: full}
  measure:
    kind: cross_threshold
    series_x: {kind: listener_path, path: "listeners.dnaA_binding.chromosome.occupied_fraction", units: "fraction"}
    series_y: {kind: listener_path, path: "listeners.dnaA_binding.oric.high_affinity_occupied",  units: "fraction"}
    when_x_crosses: 0.90
  expect: {op: y_was_at_most, value: 0.20}
  status: gated
  requires:
    - listener: dnaA_binding.chromosome.occupied_fraction
    - listener: dnaA_binding.oric.high_affinity_occupied
  cites:
    - Hansen1991ResMicrobiol     # titration prediction (chromosomal sink saturates before oriC fills)
    - Olivi2025NatCommun         # experimental confirmation
    - Berger2022NatCommun        # coupled-homeostasis modeling

- name: free-dnaa-rises-after-titration
  en: "Free DnaA pool rises sharply once chromosomal titration nears completion (≥50% delta over 5 min before initiation)."
  given:  {run: baseline, window: full}
  measure:
    kind: listener_path
    path: "listeners.dnaA_binding.free_total"
    reduce: first_and_last
    units: "molecules/cell"
  expect: {op: ratio_at_least, ratio: 1.5}
  status: gated
  requires:
    - listener: dnaA_binding.free_total
  cites:
    - Hansen1991ResMicrobiol     # free-DnaA rise after sink saturation is the titration signal
    - Olivi2025NatCommun

- name: oric-occupancy-is-two-step
  en: "oriC occupancy is a two-step process: high-affinity sites fill before low-affinity sites (time lag detectable across the cycle)."
  given:  {run: baseline, window: full}
  measure:
    kind: time_lag_between
    series_a: {kind: listener_path, path: "listeners.dnaA_binding.oric.high_affinity_occupied", units: "fraction"}
    series_b: {kind: listener_path, path: "listeners.dnaA_binding.oric.low_affinity_occupied",  units: "fraction"}
    threshold: 0.5
    units: "seconds (time-lag between series_a and series_b crossing the threshold)"
  expect: {op: at_least, value: 60.0, units: "seconds"}   # ≥1 min separation
  status: gated
  requires:
    - listener: dnaA_binding.oric.high_affinity_occupied
    - listener: dnaA_binding.oric.low_affinity_occupied
  cites:
    - Katayama2017Frontiers      # R1/R2/R4 (high) → R5M/τ2/I1-3/C1-3 (low) two-step
    - Kasho2023IJMS              # IHF-driven cooperative low-affinity filling
    - Leonard2015FrontMicrobiol  # orisome assembly review

- name: high-initial-dnaa-shows-autorepression
  en: "Starting with high DnaA suppresses dnaA transcription activity (autorepression at dnaAp; Pearson r < -0.3 between bound DnaA and tx-init events)."
  given:  {run: variant, variant: high-initial-dnaA, window: second_half}
  measure:
    kind: xy_correlation
    x: {kind: listener_path, path: "listeners.dnaA_binding.dnaap.occupied", units: "fraction"}
    y: {kind: listener_sum,  path: "listeners.rnap_data.rna_init_event",   units: "events/step"}
  expect: {op: pearson_below, threshold: -0.3}
  status: gated
  requires:
    - variant_hook: initial_dnaA_count_per_cell
    - listener: dnaA_binding.dnaap.occupied
  cites:
    - Speck1999EMBO              # dnaAp autorepression
    - Saggioro2013BiochemJ       # autoregulation temp-dependence

- name: chromosomal-boxes-only-variant-no-oric-fill
  en: "With oriC binding disabled (chromosomal-boxes-only variant), free DnaA reaches a much higher plateau (≥3× baseline median) since the oriC sink is gone."
  given:  {run: variant, variant: chromosomal-boxes-only, window: second_half}
  measure:
    kind: listener_path
    path: "listeners.dnaA_binding.free_total"
    reduce: median
    units: "molecules/cell"
  expect: {op: at_least, value: 3.0, units: "ratio_vs_baseline"}   # comparative
  status: gated
  requires:
    - variant_hook: enable_oric_binding
    - listener: dnaA_binding.free_total
  cites:
    - Hansen1991ResMicrobiol     # pure-titration control: removing oriC sink redirects DnaA

expert_questions:
- Are all 307 consensus boxes truly equivalent, or does context (cooperativity
  with neighbors) make some effectively higher-affinity?
- Validate the KD ~ 1 nM (high) and ~ 100 nM (low) bracketing.
- Should we model DnaA-ATP only at low-affinity sites, or allow ADP-form
  binding with much lower probability?

bibliography:
  expert: [replication_initiation_molecular_info]
  bib_keys: [Schaper1995JBC, Roth1998MolMicrobiol, Hansen2006JMB, Olivi2025NatCommun, Katayama2017Frontiers, Kasho2023IJMS]
  claims: [dnaa.boxes.consensus-ttwtncaca, dnaa.boxes.chromosomal-307, dnaa.boxes.oric-3high-8low, dnaa.boxes.dnaap-2high-2low, dnaa.boxes.cooperativity, dnaa.titration.initiation-timing]

runs: []
conclusion: null
parent_studies:
  - {study: dnaa-02-atp-hydrolysis, condition: tests-passed}
