schema_version: 4
name: pdmp-00-characterization
title: Phase 0 — Characterization and Interface Extraction
status: planned
phase: Design
topic: pdmp
tags:
- pdmp
- phase-0
- characterization
- markov-blanket
- interfaces
- profiling
- xarray
- xarray-emitter
- zarr
