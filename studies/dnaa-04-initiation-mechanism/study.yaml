schema_version: 4
name: dnaa-04-initiation-mechanism
created: '2026-05-16'
runtime:
  subprocess_timeout_s: 7200
  max_generations: 3   # follow daughters past 2 divisions — initiation-event-per-generation claim needs multiple cycles to evidence.
  single_daughters: true   # memory guardrail — the dnaa-04 9000-tick run that hit 62 GB RSS lived here. v2ecoli PR #73 / dashboard PR #112.
report:
  title: DnaA-driven initiation trigger
  verdict: preliminary
  confidence: low
  evidence_quality: exploratory
  objective: Test whether a DnaA-driven initiation trigger (oriC high-affinity fill + ATP-DnaA band + no active
    replication, with a SeqA-v0 refractory) can replace v2ecoli's mass-per-oriC heuristic, run as a shadow observer
    to compare firing times.
  conclusion: The mechanism runs as a shadow observer alongside the heuristic, but the coordinated generation produced
    no refreshed numeric verdicts (measure kinds unsupported), so the prior PASS-with-offset analysis is verdict-refresh-pending.
  main_insight: The DnaA mechanism built across dnaa-01..03 (oriC boxes occupied by DnaA-ATP open the origin) plus
    a SeqA-v0 fixed-timer placeholder substitutes for the single mass-per-oriC threshold.
  caveat: Tests use count/delta_t/cv measure kinds the scalar evaluator cannot auto-verdict; SeqA is a fixed-timer
    placeholder; replisome-gate and mass-at-fire follow-ups are still open.
  key_metrics:
  - shadow-observer mode
  - label: numeric verdicts
    value: refresh-pending
    status: warn
  - SeqA-v0 fixed timer
  purpose: Test whether a DnaA-driven mechanistic initiation trigger (oriC high-affinity fill + ATP-DnaA band +
    no active replication, with a SeqA-v0 refractory) can replace v2ecoli's mass-per-oriC threshold heuristic. The
    mechanism runs as a shadow observer alongside the heuristic so the two firing times can be compared.
  setup: Composite dnaa_04_with_dnaa_initiation_trigger on minimal-glucose, run in coordinated generation gen-20260522T003700Z-9fcb58.
    The dnaa_04 initiation trigger fires when oriC high-affinity occupancy is at threshold, DnaA-ATP fraction is
    in band, and no replisome is active (n_replisomes_max_for_fire=0, the SeqA-v0 biology gate); a heuristic-only
    control disables the observer.
  result: 'Status as of coordinated generation gen-20260522T003700Z-9fcb58 (minimal-GLUCOSE): the study''s declarative
    tests use measure kinds (count, delta_t, cv) that the scalar evaluator cannot auto-verdict, so there are NO
    refreshed numeric verdicts from this generation — every test is "refresh pending (measure kind not auto-evaluable
    in the current evaluator)". Prior recorded analysis (a multi-seed sweep, seeds 0/1/2, with the replisome gate
    enabled) reported the mechanism firing once per window matching the heuristic event count, deterministic across
    seeds, and a ~-300s offset vs the heuristic; those figures are prior recorded analysis pending verdict refresh,
    not current results. Known limitations: tests framed as multigeneration cannot be satisfied by the single-cell
    run (it self-terminates at division), and the dnaa_flux_contributions figure renders empty because the intrinsic/RIDA
    hydrolysis-event observables are not yet emitted.'
  interpretation: v2ecoli currently decides initiation by a single mass-per-oriC threshold; this study substitutes
    the DnaA mechanism built up across dnaa-01 to 03 (oriC boxes occupied by DnaA-ATP open the origin) plus a SeqA-v0
    fixed-timer placeholder so the model does not immediately re-fire. The mechanism description (the dnaa_04 initiation
    trigger running as a shadow observer alongside the mass-per-oriC heuristic) is current. The prior recorded ~-300s
    offset interpretation — the expected difference between a resource-availability trigger (mechanism) and a timing
    trigger (mass heuristic) — is prior recorded analysis pending verdict refresh; the current evaluator cannot
    auto-verdict the delta_t measure that produced it.
  decision: 'Gate status partial-shadow-observer: the prior recorded verdicts (regression_compatibility PASS, biological_validation
    PASS-WITH-CHARACTERISED-OFFSET, explanatory_gain POSITIVE) are prior recorded analysis pending verdict refresh
    — the coordinated generation gen-20260522T003700Z-9fcb58 produced no refreshed numeric verdicts because the
    tests'' measure kinds (count, delta_t, cv) are not auto-evaluable in the current scalar evaluator. The shadow-observer
    mechanism is implemented and its description is current; the full proceed condition remains unmet (initiation-mass-mean-matches-heuristic
    pending).'
  next_action: 'Planned follow-ups: dnaa-04-add-replisome-gate (verify the fire shifts to match v2ecoli''s timing)
    and dnaa-04-mass-at-fire-analysis (compute mass-at-fire and run the initiation-mass-matches-heuristic test,
    blocked on the gate work). Deferred downstream: dnaa-05 (RIDA/DDAH/DARS) and dnaa-06 (full SeqA model).'
question: 'Can a DnaA-driven mechanistic initiation trigger (oriC fill +

  ATP-DnaA filament + DUE opening) replace v2ecoli''s mass-threshold

  heuristic? At the v0 abstraction level, the mechanism is: trigger

  initiation when oriC high-affinity sites are saturated AND

  DnaA-ATP fraction is in band AND no active replication is in

  progress (SeqA-v0 suppression). The mechanism runs as a SHADOW

  OBSERVER alongside v2ecoli''s existing heuristic; comparing the

  two timings is the headline finding.

  '
assumptions:
- text: 'DnaA-ATP loading at oriC high-affinity sites is the rate-limiting

    step for initiation in vivo.

    '
  cites:
  - Speck1999
  - Kawakami2006
  - Skarstad2013
  verified_in_v2ecoli: false
  note: Established in the literature; v2ecoli's box-binding (dnaa-03) provides the readout.
- text: 'SeqA blocks re-initiation for ~10-20 min after firing (post-

    initiation oriC sequestration via hemimethylated GATC sites).

    The v0 mechanism uses a fixed-timer refractory as a placeholder.

    '
  cites:
  - Lu1994
  - Kang2003
  - Waldminghaus2009
  verified_in_v2ecoli: false
  note: Full SeqA biology (methylation state) deferred to a future study.
- text: 'v2ecoli''s existing mass-threshold heuristic produces ~1 initiation

    per cell cycle; the mechanism should match this at the cycle-count

    level, even if timing differs.

    '
  cites:
  - Donachie1968
  - Cooper1968
  verified_in_v2ecoli: false
  note: Prior recorded multi-seed runs reported 1 init / 30-min sim; pending verdict refresh (the count measure
    is not auto-evaluable in the current evaluator).
conditions:
  baseline:
    composite: v2ecoli.composites.baseline_recipes.dnaa_04_with_dnaa_initiation_trigger
    params:
      seed: 0
      cache_dir: out/cache
      mechanism: rida-v0
      initial_dnaA_count_per_cell: 500
      n_steps: 9000   # ~3 cell cycles — one-initiation-per-gen claim needs multiple cycles
  variants:
  - name: heuristic-only-control
    description: v2ecoli's mass-threshold heuristic, with the DnaaInitiationMechanism observer disabled.
    composite: v2ecoli.composites.baseline_recipes.dnaa_03_with_box_binding
    diff_from_baseline: removes DnaaInitiationMechanism Step
    parameter_overrides: {n_steps: 9000}
  - name: mechanism-with-legacy-monkey-patch
    description: Pre-dnaa-02f mechanism (option B). Kept for reproducibility of the older verdict.
    composite: v2ecoli.composites.baseline_recipes.dnaa_04_with_dnaa_initiation_trigger
    diff_from_baseline:
      mechanism: monkey-patch
    parameter_overrides: {mechanism: monkey-patch, n_steps: 9000}
  model_settings:
  - name: oric_high_threshold
    description: 'Fraction of high-affinity oriC sites that must be DnaA-occupied

      to consider the gate "open". Speck 1999 suggests near-saturation

      (≥0.8) in vivo, but v2ecoli''s binding kinetics may reach saturation

      slower. Empirically 0.5 produces multi-seed-stable single-fire

      timing in our 30-min sims.

      '
    type: number
    default: 0.5
    current: 0.5
    gate: optional
    range:
    - 0.2
    - 1.0
    cites:
    - Speck1999
    - Kawakami2006
  - name: atp_fraction_threshold
    description: 'Minimum DnaA-ATP / total-DnaA ratio for the gate to open.

      Boesen 2024 band is [0.20, 0.50]; we use the low edge as the

      "minimum viable" threshold.

      '
    type: number
    default: 0.3
    current: 0.3
    gate: optional
    range:
    - 0.1
    - 0.5
    cites:
    - Boesen2024
  - name: refractory_seconds
    description: 'SeqA-v0 fixed-timer refractory after each firing. Literature

      SeqA window is 10-20 min in fast growth (Lu 1994); the cell-

      cycle period is ~30 min. Refractory ≥ 600s prevents multiple

      fires per cycle. We use 600s default; 1200s also passes.

      '
    type: number
    default: 600.0
    current: 600.0
    gate: optional
    range:
    - 300
    - 1800
    cites:
    - Lu1994
    - Waldminghaus2009
  - name: n_replisomes_max_for_fire
    description: 'Hard biology gate: refuse to fire when existing replication is

      active. -1 disables this check (debugging). 0 is the SeqA-v0

      biology and the canonical setting.

      '
    type: integer
    default: 0
    current: 0
    gate: required-before-run
    cites:
    - Lu1994
    - Kang2003
tests:
- name: one-initiation-per-generation
  classification: primary
  question: Does the mechanism fire ~once per 30-min cell cycle?
  measure:
    kind: count
    path: listeners.dnaA_initiation.cumulative_fires
    reduce: max
    per_run: true
  pass_if:
    op: in_range
    low: 1
    high: 1
  status: refresh pending (measure kind not auto-evaluable in the current evaluator)
  cites:
  - Donachie1968
  - Cooper1968
  run_ids: []
- name: mechanism-aligns-with-heuristic-timing
  classification: primary
  question: 'Does the mechanism''s fire time match v2ecoli''s existing heuristic

    firing time, within reasonable biological offset?

    '
  measure:
    kind: delta_t
    mechanism_event: would_fire transitions to 1 in listeners.dnaA_initiation
    heuristic_event: n_replisomes transitions from 0 to >0 in unique.active_replisome
  pass_if:
    op: at_most_abs
    value: 600
  status: refresh pending (measure kind not auto-evaluable in the current evaluator)
  observed_offset_seconds: -300
  observed_offset_note: Prior recorded analysis pending verdict refresh — not a current coordinated-generation result.
  observed_offset_basis: 'The mechanism fires when its resources are available (boxes

    saturated + ATP-fraction OK + no active replisomes); the

    heuristic fires when mass accumulates to threshold. 5 min offset

    = the time for mass to accumulate after replication completes.

    Biologically expected.

    '
  cites:
  - Speck1999
  - Skarstad2013
  run_ids: []
- name: cross-seed-stability
  classification: supporting
  question: Does the mechanism produce the same fire count across seeds?
  measure:
    kind: cv
    path: cumulative_fires_per_seed
  pass_if:
    op: at_most
    value: 0.1
  status: refresh pending (measure kind not auto-evaluable in the current evaluator)
  run_ids: []
