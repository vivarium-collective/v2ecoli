biological_summary: 'Three-way comparison study: the Fu/Xiao/Jun (2023) mean-field analytical

  model, the v2ecoli whole-cell baseline at default parameters, and v2ecoli

  with parameters retuned to the FXJ paper''s values. The analytical model

  serves as a clean reference: it predicts initiation mass, DnaA-ATP/ADP

  cycling, and 1/N synchrony scaling from three mechanistic control

  parameters (DnaA expression level, DnaA-ATP/ADP ratio, DnaA-box count).

  If v2ecoli''s mechanism captures the biology, it should converge to the

  analytical prediction once parameters are matched. The default-parameter

  v2ecoli is expected to diverge (it produces ~115 DnaA/cell — 5× below

  the paper''s c_I=600/µm³ anchor); the parameter-tuned variant should

  close that gap. Any residual divergence after parameter matching points

  at structural/mechanism differences worth flagging for expert review.

  '
readouts:
- name: itv2_dnaa_atp_count
  store_path: agents.0.listeners.itv2.dnaa_atp_count
  units: molecules/cell
  status: available
  description: ITv2 standalone simulator pool count (for direct comparison vs v2ecoli).
- name: itv2_dnaa_atp_fraction
  store_path: agents.0.listeners.itv2.dnaa_atp_fraction
  units: fraction
  status: available
  description: ITv2 standalone simulator DnaA-ATP fraction.
- name: itv2_initiation_mass
  store_path: agents.0.listeners.itv2.initiation_mass
  units: fg
  status: available
  description: ITv2 standalone — critical initiation mass (analytical comparison target).
- name: itv2_volume
  store_path: agents.0.listeners.itv2.volume
  units: fL
  status: available
  description: ITv2 standalone — cell volume trajectory.
- name: v2ecoli_dnaa_atp_fraction
  store_path: agents.0.listeners.dnaA_cycle.atp_fraction
  units: fraction
  status: available
  description: v2ecoli DnaA-ATP fraction (for side-by-side comparison vs ITv2).
biological_role: 'External validation: compares v2ecoli''s DnaA mechanism against a standalone analytical model
  of replication initiation (ITv2 from Fu / Xiao / Jun 2023) at matched parameters. Cross-check that v2ecoli''s
  mechanism behaves consistently with an independent implementation of the same biology.'
dependency_rationale: Follow-on to dnaa-04 — only meaningful once v2ecoli has a mechanism-driven initiation step
  to compare. Doesn't gate other studies but acts as confidence check on the full mechanism chain.
mechanism_replaced: Nothing — pure comparison study.
primary_claim: v2ecoli's cell-volume trajectory and DnaA-ATP fraction trajectory agree with the standalone ITv2
  analytical model under matched parameters, validating that v2ecoli's mechanism is a sound discrete-agent realisation
  of the mean-field reference.
primary_visualization: 'Side-by-side cell-volume + DnaA-ATP fraction trajectories: v2ecoli baseline (initiator_titration_v2
  composite) vs v2ecoli + FXJ params vs v2ecoli default baseline. The physiological [0.2, 0.5] band overlaid on
  the ATP fraction panel.'
scope_boundary: ITv2 standalone runs in its own listener namespace (listeners.itv2.*); v2ecoli runs in listeners.mass.*
  + listeners.dnaA_cycle.*. The comparative charts use v2ecoli's native paths so the v2ecoli runs overlay consistently.
deferred_biology: The 1-D mean-field model can't capture the stochastic per-cell variation the v2ecoli mechanism
  produces. Disagreement on noise / CV is expected and not a v2ecoli defect.
