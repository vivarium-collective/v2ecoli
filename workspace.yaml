# ─── DEFAULT BASELINE ─────────────────────────────────────────────────
# A workspace-wide "before any study runs" snapshot. The dashboard and
# downloaded pre-simulation reports use this to pre-fill visualizations
# for ALL studies — so an evaluator opening a study before its specific
# runs exist still sees the cell's baseline behaviour (mass, chromosomes,
# DnaA pool, etc.) against the study's measure paths.
#
# Run once via `python scripts/run_default_baseline.py`. Stores at
# .pbg/default-baseline/runs.db; the dashboard auto-discovers it.
default_baseline:
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache
  # Stop condition: cell division. The runner terminates as soon as the
  # division event fires (the parent agent disappears from
  # state.agents["0"] OR composite.run() raises). max_duration_s is a
  # SAFETY ceiling — if the cell hasn't divided by then, the run stops
  # and the snapshot reflects "no division within 2 h". For slow M9-glc
  # growth the doubling time is ~30-60 min so a divided baseline is
  # almost always produced.
  stop_on: division
  max_duration_s: 7200
  interval_s: 60
  description: |
    M9-glucose, slow steady growth, seed 0. Runs one full cell cycle —
    stops when division triggers (or after max_duration_s as a guard).
    The reference state every study compares "before vs after" against.
    Re-run when the upstream v2ecoli composite changes; otherwise stable.
expert_docs:
- name: replication_initiation_molecular_info
  path: references/expert/replication_initiation_molecular_info.pdf
  sha256: 4c4b85ff4d88b46b816bacc84b494fcdf073ef1d901e77b56329effa92a0dab2
  description: 'Molecular information for simulating replication initiation in E. coli.

    Curated biological knowledge on oriC structure (DOR, DUE, 11 DnaA boxes),

    dnaA promoter (p1/p2, boxes 1-4 + a-c), DnaA boxes consensus, RIDA, DDAH

    (datA), DARS1 & DARS2, intrinsic ATPase activity, and DnaA dissociation

    after initiation. Drives the dnaa-01..06 studies.

    '
  contributor: Replication-initiation working group (Katayama/Lobner-Olesen)
  claims_supported:
  - dnaa.autorepression.dnaap
  - dnaa.intrinsic-hydrolysis.0p046-per-min
  - dnaa.boxes.consensus-ttwtncaca
  - dnaa.boxes.oric-3high-8low
  - dnaa.rida.replisome-coupled
  - dnaa.ddah.data-dependent
  - dnaa.dars.reactivation
  - dnaa.atp-fraction.0p2-to-0p5
  - dnaa.seqa.post-initiation-sequestration
- name: chromosome_replication_plan
  path: references/expert/chromosome_replication_plan.pdf
  sha256: e9145149e9181ac882cd5c9594151ea59c105e75e0b171f062a8dba23b4a105e
  description: 'Multi-phase workflow plan for porting DnaA / replication initiation into

    v2ecoli. Decomposes the work into 6 studies (expression, intrinsic

    hydrolysis, DnaA box binding, mechanism-driven initiation, RIDA/DDAH/DARS,

    SeqA sequestration) plus Phase 7 (cooperativity) and Phase 8 (validation)

    placeholders.

    '
  contributor: Replication-initiation working group
- name: dnaa_biology_feedback
  path: references/expert/dnaa_biology_feedback.pdf
  sha256: c509350a3716a4f447bca44cabbef3edda2c167a492aa9626eb94322ded56904
  description: "Expert biology review of the dnaA / replication-initiation investigation\nreport (May 2026). Core message:\
    \ the decomposition is scientifically\nsensible, but the report must separate heuristic regression from\nbiological validation,\
    \ map every literature value to the exact model\nobservable, and use perturbation panels (not wild-type baseline alone)\n\
    to call a mechanism validated. Defines compact schemas:\n  - target_class: regression_compatibility | biological_validation\
    \ | explanatory_gain\n  - measurement_mapping: literature_observable + model_observable + transformation + caveats\n \
    \ - autorepression_tests: lagged_binding_mrna_cross_correlation, conditional_transcription_probability_given_promoter_bound,\n\
    \    transcription_burst_rate_by_promoter_state, dnaA_gene_dosage_corrected_expression\n  - SeqA versioning: v0 fixed\
    \ timer, v1 methylation+Dam, v2 cooperative SeqA-Dam\nDrives dnaa-* study improvements documented in\ninvestigations/dnaa-replication/biology-feedback-2026-05-17/PLAN.md.\n"
  contributor: External biology reviewer
  claims_supported:
  - dnaa.targets.separate-regression-from-validation
  - dnaa.observables.literature-to-model-mapping-required
  - dnaa.autorepression.promoter-response-test-suite
  - dnaa.pools.atp-decomposition-explicit
  - dnaa.validation.perturbation-panel-required
- name: v2ecoli_replication_initiation_report
  path: references/expert/v2ecoli_replication_initiation_report.html
  sha256: cb2e875bd1b0644d969efd466080ed98971551c3a2a61beeda8960e83c57c208
  description: |
    Comprehensive replication-initiation report for v2ecoli (May 2026).
    Structured as 9 phases across 4 parts: Foundations (region classifier
    for 307 consensus DnaA boxes; expose DnaA-ATP / DnaA-ADP / apo pools),
    DnaA nucleotide cycle (RIDA hydrolysis at the replisome via RXN0-7444;
    DARS reactivation), cytoplasm-to-chromosome (DnaA-box binding +
    chromosomal titration; replace mass-threshold initiation gate),
    and regulatory feedbacks (SeqA post-initiation sequestration; DDAH
    backup hydrolysis at datA via IHF binding; DARS modulation by Fis
    + IHF). Identifies every relevant molecule: PD03831[c] apo-DnaA,
    MONOMER0-160[c] DnaA-ATP, MONOMER0-4565[c] DnaA-ADP, plus the four
    nucleotide-pool drivers (transcription/translation, equilibrium
    reactions MONOMER0-160_RXN / MONOMER0-4565_RXN, protein degradation,
    RIDA RXN0-7444) and the DnaA-box catalog with per-box affinities.
    Use this as the canonical molecule-level catalog for the
    dnaa-replication investigation — richer than the parameter table
    (which is the spec) or the molecular-info doc (which is the biology).
  contributor: dnaa-investigation prior-art (May 2026 pre-redesign report)
  claims_supported:
  - dnaa.molecules.pd03831-apo-monomer
  - dnaa.molecules.monomer0-160-dnaa-atp
  - dnaa.molecules.monomer0-4565-dnaa-adp
  - dnaa.reactions.monomer0-160-rxn-equilibrium
  - dnaa.reactions.monomer0-4565-rxn-equilibrium
  - dnaa.reactions.rxn0-7444-rida-metabolism
  - dnaa.regions.307-consensus-chromosomal-boxes
  - dnaa.regions.dars1-dars2-loci
  - dnaa.regulation.ihf-gates-ddah-at-data
  - dnaa.regulation.fis-ihf-modulate-dars
- name: wcm_stage1_parameters
  path: references/expert/wcm_stage1_parameters.pdf
  sha256: 0539039751f55dc2182a03f8824c9b5fa0ff8d8bfa2fd99b5e8b949952ba1e2a
  description: |
    Stage 1 heuristic parameter table for the whole-cell DnaA / replication-
    initiation model. Companion spreadsheet to FuXiaoJun2023. 23 rows
    spanning cell-cycle physics (τ, C, D, replication speed), DnaA pool
    dynamics (transcription rate, translation efficiency, ATP/ADP Kds,
    intrinsic hydrolysis), DnaA-box layout (consensus Kd, oriC weak-box
    cooperative range, locations), and the extrinsic conversion network
    (Hda / RIDA, datA / DDAH, DARS1, DARS2). Each row is either anchored
    to literature (Sekimizu 1987, Kawakami 2006, Hansen & Atlung 2018) or
    flagged "artificial setup" for the heuristic placeholders. Provides
    the canonical parameter foundation for the dnaa-* investigation —
    every study calibrates a subset of these values. See dnaa-00 for the
    parameter-by-parameter v2ecoli wiring status.
  contributor: Replication-initiation working group (Fu / Xiao / Jun)
  claims_supported:
  - dnaa.parameters.stage1-heuristic-values-canonical
  - dnaa.parameters.taudoubling-150min-abt-min-glycerol
  - dnaa.parameters.c-period-70min
  - dnaa.parameters.d-period-30min
  - dnaa.parameters.consensus-dnaa-box-kd-1nm
  - dnaa.parameters.oric-low-affinity-box-cooperative-50-to-1-nm
  - dnaa.parameters.dnaa-intrinsic-atpase-0p046-per-min
  - dnaa.parameters.hda-rida-rate-40-per-min-per-fork-pair
  - dnaa.parameters.data-ddah-rate-12-per-min-per-locus
  - dnaa.parameters.dars1-conversion-5-per-min
  - dnaa.parameters.dars2-conversion-10-per-min
