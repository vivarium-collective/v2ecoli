conclusions: ''
biological_role: Establishes that v2ecoli's stochastic transcription/translation pipeline can hold a steady DnaA
  pool inside the literature [300, 800]-molecules/cell band — the prerequisite for everything downstream (you can't
  test DnaA-box titration before the DnaA pool is the right size + variability).
dependency_rationale: Must precede the nucleotide-cycle work (dnaa-02). If the pool is wrong, every ATP/ADP fraction
  the later studies measure is unreliable.
mechanism_replaced: Adjusts existing ParCa-fit transcription / translation efficiency for the dnaA gene (EG10235)
  so the pool sits in band. Doesn't replace any mechanism; tunes the existing one.
primary_claim: Stage-1-parameterised expression holds DnaA count ≈ 325-450 across the cycle (median 366, CV < 5%
  in second half), inside the Schmidt 2016 / Mori 2021 [300, 800] band, with no autoregulation needed at this stage.
primary_visualization: 'DnaA abundance trajectory with literature band overlaid + small inset showing nucleotide-state
  partitioning (apo vs ATP vs ADP). Visual answer to: "is the DnaA pool the right size and stable enough?"'
scope_boundary: Stage-1 constitutive expression (no autorepression). One cell cycle, minimal glucose (~44 min) —
  acetate variant available for slower cycle (~67 min) cross-check.
deferred_biology: Autoregulation of dnaA via DnaA binding at its own promoter (deferred to a future autorepression
  study). RpoH-mediated heat-shock DnaA induction (out of scope for steady-state work).
