    composite: v2ecoli.composites.baseline.baseline
    params:
      seed: 0
      cache_dir: out/cache-succinate-mechA-2e-3
      single_daughters: true
      max_generations: 7
      # Step 1: V-only (Mechanism A) — no hydrolysis added yet.
      perturbations:
        "TU00259[c]": 2.0e-3
  variants:
    - name: step1-v-only-k0
      description: |
        Step 1 baseline — Mechanism-A V-tuning only (cache, TU00259[c]=2e-3),
        DnaA nucleotide-binding equilibria observed via the dnaa_nucleotide
        listener, intrinsic hydrolysis OFF (DNAA_INTRINSIC_HYDROLYSIS_RATE=0).
      feature_flags: [ppgpp_regulation, dnaa_nucleotide]
      hydrolysis_rate_per_min: 0.0
    - name: step2-intrinsic-hydrolysis-0.046
      description: |
        Step 2 — same V-tuned lineage with DnaA-ATP intrinsic hydrolysis ON at
        Haochen's rate k=0.046/min (DnaaIntrinsicHydrolysis + DnaaCycleListener,
        the dnaa_nucleotide feature default). Untuned.
      feature_flags: [ppgpp_regulation, dnaa_nucleotide]
      hydrolysis_rate_per_min: 0.046
  model_settings: []

