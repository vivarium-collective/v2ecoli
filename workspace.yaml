schema_version: 2
name: v2ecoli
created: '2026-05-16'
plugin_version: 0.6.1
package_path: v2ecoli

# ─── RUNTIME ──────────────────────────────────────────────────────────
# Workspace-level emitter preference. The dashboard and v2ecoli scaffolds
# read this to decide which emitter to construct for new study runs.
# Allowed values: 'parquet' | 'sqlite' | 'xarray'.
#
# Current preference: **parquet** — column-oriented, hive-partitioned,
# typically 3–5× smaller on disk than the equivalent sqlite run for
# v2ecoli-shaped sims. Use v2ecoli.composites._helpers.parquet_emitter()
# and v2ecoli.library.parquet_run.run_multigen_parquet for the runtime
# wiring; tests live at tests/test_parquet_emitter_ported.py.
#
# Dashboard support note: vivarium-dashboard currently auto-injects sqlite
# for any value it does not recognise; the parquet auto-inject + Registry-
# tab "default" badge land in a follow-up vivarium-dashboard PR. Until then
# the dashboard's Simulations-DB tab continues to read sqlite-shaped runs;
# parquet runs are queried via DuckDB/Polars directly off the hive dir.
runtime:
  default_emitter: parquet  # 'parquet' | 'sqlite' | 'xarray'
  max_generations: 3        # multi-gen cap (xarray + parquet runs)
observables: []
visualizations: []
simulations: []

datasets:
- name: acetate-gen1-canonical
  path: out/acetate_apr24_test.db
  kind: simulation_db
  size: ~9.1 GB
  description: v2ecoli acetate gen 1 run (~80 min observed cycle). Canonical cache, no overrides.
    Anchor for the v2ecoli-vs-vEcoli comparison.
  claims_supported:
  - chromosome-cycle-calibration
- name: glycerol-stage1-gen1
  path: out/glycerol_stage1_1gen.db
  kind: simulation_db
  size: ~14 GB
  description: v2ecoli Stage 1 glycerol gen 1 (121 min cycle). C=70, D=30, τ=150, dnaA TE=1.0,
    DARS1+DARS2 widened. Source for reports/meeting_20260526/glycerol_dynamics.png.
  claims_supported:
  - chromosome-cycle-calibration
- name: acetate-5gen-lineage
  path: out/acetate_multigen/acetate_multigen_timeseries.json
  kind: simulation_db
  size: ~164 KB
  description: 5-gen acetate lineage (chromosome-only, no plasmid, canonical cache, no overrides).
    Cycles 81 / 42 / 61 / 82 / 60 min — refutes monotonic equilibration toward declared τ=136.
  claims_supported:
  - chromosome-cycle-calibration
- name: vecoli-acetate-compare
  path: out/vecoli_acetate_compare_parquet/
  kind: simulation_db
  size: ~677 MB
  description: vEcoli acetate run on the same kb_default simData. ~80 min cycle. Side-by-side
    counterpart to acetate-gen1-canonical for the v2ecoli↔vEcoli match.
  claims_supported:
  - chromosome-cycle-calibration

expert_docs:
- name: chromosome-replication-plan
  path: chromosome-replication-plan.pdf
  kind: workflow_plan
  description: Multi-phase Study 1-8 plan for the DnaA / replication-initiation arc. Study 1 =
    DnaA expression dynamics (currently active). Source for the 8 phase-study scaffolds.
  claims_supported:
  - chromosome-cycle-calibration
- name: molecular-info-replication-initiation
  path: Molecular information for simulating replication initiation.pdf
  kind: biology_reference
  description: oriC structure (DUE + DOR, 11 DnaA boxes); dnaA promoter (p1 / p2 + boxes 1-4 +
    a-c); RIDA, DDAH, DARS1, DARS2; DnaA-ATP intrinsic hydrolysis 0.046 /min.
  claims_supported:
  - chromosome-cycle-calibration
- name: parameters-wcm-stage1
  path: Parameters for WCM (Stage 1_ heuristic values) - Stage 1.pdf
  kind: parameter_table
  description: 'Stage 1 heuristic parameters for ABT minimal glycerol MG1655 wildtype: τ=150,
    C=70, D=30, replication speed 66.31 kbp/min, DnaA TE=1, DnaA Kd_ATP=30 nM, DnaA Kd_ADP=100
    nM, DARS1+DARS2 locations.'
  claims_supported:
  - chromosome-cycle-calibration

server:
  enabled: true
