schema_version: 3
name: pdmp-04-compilation
title: "Phase 4 — Compilation and Performance"
status: planned
phase: Design

topic: pdmp
tags: [pdmp, phase-4, compilation, catalyst-jl, modelingtoolkit, column-centric, gpu, jumpprocesses-jl, hpc, 
      xarray-emitter]
created: '2026-05-24'

parent_studies:
  - {study: pdmp-02-jump-processes, condition: tests-passed}
  # Note: roadmap permits Phase 4 to run in parallel with Phases 1–2.
  # We gate on Phase 2 because the PDMP structure must be stable
  # before compilation, but we do NOT gate on Phase 3 — compilation
  # is independent of the likelihood interface.

question: |
  Can the Phase 2 PDMP be exported to a high-performance compiled
  representation (Catalyst.jl / ModelingToolkit with symbolic
  Jacobians and automatic sensitivity equations) running on a
  column-centric Vivarium runtime, and achieve ≥10³ parallel
  single-cell trajectories on a GPU or multi-core CPU with
  near-zero per-step marshalling overhead — turning the throughput
  bottleneck the DUF report identified into a non-issue for
  downstream inference?

hypothesis: |
  (a) The PDMP, expressed in Process Bigraph schemas, admits an
  automatic export to Catalyst.jl / ModelingToolkit that produces
  LLVM-optimized simulation with symbolic Jacobians and
  automatic forward-mode sensitivity equations. (b) Replacing
  v2ecoli's row-centric nested-dictionary state with pre-allocated
  column-centric tensors removes essentially all per-step
  marshalling overhead identified in Phase 0. (c) Vivarium's API
  can be inverted so processes declare local state, ODE vector
  fields, and jump propensities; the runtime handles topology
  traversal and time-stepping. (d) The combined runtime achieves
  ≥10³ parallel single-cell trajectories on GPU or multi-core CPU
  with throughput an order of magnitude or more above the v2ecoli
  baseline.

objective: |
  Implement the PB → Catalyst.jl export; refactor Vivarium's
  state representation to column-centric pre-allocated tensors;
  invert the Vivarium API so process specifications are
  declarative (local state + ODE vector field + jump
  propensities); deploy the compiled runner on GPU and multi-core
  CPU; benchmark ≥10³ parallel trajectories vs. v2ecoli baseline
  and vs. Phase 2 PDMP runner; report ABC wall-clock time
  improvement (handing off to Phase 3 / Phase 5).

description: |
  Phase 4 of the v2ecoli → PDMP roadmap. The DUF report Sec. 4.2.1
  identifies that "submodel definitions and simulation modules
  are currently inseparable" in v2ecoli and that the runtime
  "exhibits orders of magnitude of overhead, relative to
  competitive numerical solvers" — the dominant cause being
  marshalling overhead from the row-centric nested-dictionary
  state representation.

  Catalyst.jl + ModelingToolkit + JumpProcesses.jl is the
  reference target: an established Julia stack for compiled
  reaction-network simulation with symbolic Jacobians and
  GPU-friendly state representations. The PB → Catalyst.jl
  bridge will require codifying the PB process interface as a
  Catalyst-compatible reaction network spec; this is the
  primary new infrastructure deliverable.

  The column-centric refactor of Vivarium itself is a substantial
  undertaking; the roadmap implies it can be initiated in
  parallel with Phases 1–2 by an independent infrastructure team.

  # Numerical considerations
  Numerical equivalence. The single hardest test for a compiled
  re-implementation is: does it produce the same trajectory
  ensemble as the reference Phase 2 runner? "Same" means
  W₂(p_compiled, p_phase2) ≤ 5·σ_MC where σ_MC is the standard
  error of the Phase 2 self-W₂ estimate at the same N (a 5σ
  bound is conservative — covers genuine FP-order differences
  without firing on legitimate stochastic noise). We test on N=10⁴
  trajectories across all Phase 0 conditions.

  Precision. Single-precision (FP32) on GPU is tempting for 2×
  throughput but has been shown to corrupt long-run ABC posteriors
  via catastrophic cancellation in propensity sums. Default:
  FP64. FP32 only allowed where (a) bit-equivalence test passes
  vs FP64 reference and (b) downstream ABC posteriors are
  invariant under switch.

  FP summation order. Parallel reductions over per-trajectory
  log-likelihoods must use a deterministic summation order
  (pairwise or Kahan) so that the result is independent of GPU
  thread scheduling. Non-deterministic atomic-add reductions are
  banned — they break SBC reproducibility across hardware.

  Convergence orders. The compiled ODE integrator and stochastic
  integrator each carry an explicit convergence claim:
   - ODE: order-5 embedded Runge-Kutta (default) or BDF for
     stiff segments; verified on Van der Pol oscillator + Brusselator
     test problems before deployment.
   - SSA-based jumps: exact (no integration error).
   - τ-leaping: weak order 1, strong order 0.5; tested on
     analytical M/M/1 queue.

  Throughput vs variance. The relevant performance metric for
  downstream inference is not raw trajectories/second but
  posterior-estimate-variance per wall-clock second. We report
  both: trajectories/sec at fixed precision AND ABC posterior
  variance × wall-clock-time (standard MCMC efficiency metric).
  Doubling trajectories should roughly halve posterior variance
  (1/√N scaling) — if not, the parallelism has hidden
  correlations to investigate.

  # Emitter
  Compiled-runner output goes through a Julia → XArrayEmitter
  bridge that batches per-trajectory results into chunked zarr
  writes (chunks: {trajectory: 64, time: -1}) at the python
  boundary, avoiding per-trajectory I/O overhead at 10³+
  parallelism. The bridge preserves exact bit-equivalence with
  the Phase 2 emitter so the W₂ equivalence test
  [[uq-compiled-vs-reference-w2-5sigma]] can compare paired
  zarr stores directly.

expected_behavior:
  - name: catalyst-export-works
    en: The PDMP exports to a Catalyst.jl / ModelingToolkit model with symbolic Jacobians and automatic 
      sensitivity equations; the compiled artefact runs and reproduces interface statistics of the Phase 2 
      PDMP runner within tolerance.
    given:
      condition: end-to-end-export
    measure:
      kind: observable-comparison
      observable: compiled-model-artefact
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: column-centric-state
    en: Per-step marshalling overhead is reduced to a small fraction (target <10%) of essential numerical 
      computation, vs. the majority share measured in Phase 0.
    given:
      condition: compiled-runner
    measure:
      kind: observable-comparison
      observable: per-step-marshalling-fraction
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: vivarium-api-inversion
    en: Process definitions consist of (local state schema, ODE vector field, jump propensities) only; the 
      runtime handles topology traversal and time-stepping. No process module contains its own step() loop.
    given:
      condition: every-process
    measure:
      kind: observable-comparison
      observable: declarative-process-spec
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: 10cubed-parallel-trajectories
    en: ≥10³ parallel single-cell trajectories run with throughput at least one order of magnitude above 
      v2ecoli baseline. (Gating criterion.)
    given:
      condition: gpu OR multi-core-cpu
    measure:
      kind: observable-comparison
      observable: parallel-throughput-benchmark
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-compiled-vs-reference-w2-5sigma
    en: W₂(p_compiled, p_phase2) ≤ 5·σ_MC across N=10⁴ trajectories for every Phase 0 condition. Confirms 
      compilation doesn't change the *distribution* of trajectories within stochastic noise.
    given:
      condition: N10000-per-Phase0-condition
    measure:
      kind: observable-comparison
      observable: w2-compiled-vs-phase2
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-deterministic-fp-summation
    en: Parallel reductions (per-trajectory log-likelihoods, summary statistics) use pairwise or Kahan 
      summation and give bit-identical results across runs with the same seed and input. No atomic-add 
      reductions.
    given:
      condition: repeated-runs-identical-seed
    measure:
      kind: observable-comparison
      observable: parallel-reduction-result-stability
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-1-over-sqrt-N-variance-scaling
    en: Doubling trajectory count halves ABC posterior variance (within MC noise) — the 1/√N scaling expected 
      of independent MC. Deviations indicate hidden correlations in the parallel runner that compromise 
      inference validity.
    given:
      condition: abc-on-synthetic
    measure:
      kind: observable-comparison
      observable: posterior-variance-vs-N
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
  - name: uq-precision-mode-validated
    en: Any FP32 deployment passes both (a) bit-equivalence test on a held-out trajectory subset vs FP64 
      reference and (b) ABC posterior KL divergence < 0.01 vs FP64-derived posterior.
    given:
      condition: where-fp32-claimed
    measure:
      kind: observable-comparison
      observable: fp32-vs-fp64-posterior-equivalence
    expect:
      op: within-tolerance
      note: Tolerance / target gate to be defined when this study moves Design → Build.
    status: stub
baseline:
  - name: pdmp-catalyst-runner-tbd
    composite: v2ecoli_pdmp.composites.catalyst.pdmp_catalyst
    params:
      emitter: xarray
      backend: catalyst-jl
      precision: fp64
    _placeholder: true
    _note: Catalyst.jl-compiled PDMP runner. Bridge process loads the Phase 2 model via PB-->Catalyst export.
variants:
  - name: catalyst-export
    description: Export Phase 2 PDMP to Catalyst.jl + ModelingToolkit — symbolic Jacobians, automatic 
      forward-mode sensitivity equations, LLVM-optimised. Bit-equivalent to Phase 2 runner within solver 
      tolerance.
    params:
      backend: catalyst-jl
      precision: fp64
  - name: column-centric-runtime
    description: Replace nested-dict row-centric state with pre-allocated column-centric tensors. Targets 
      per-step marshalling overhead < 10% of essential compute.
    params:
      runtime: column-centric-tensor
  - name: vivarium-api-inversion
    description: Invert the Vivarium API so process definitions declare local state + ODE vector fields + jump
      propensities only; runtime handles topology traversal and time-stepping.
    params:
      api: declarative-process-spec
  - name: gpu-parallel-1000
    description: ≥10³ parallel single-cell trajectories on GPU. The throughput gating criterion.
    params:
      hardware: GPU
      parallelism: 1000
      precision: fp64
  - name: multi-core-cpu-parallel
    description: Same throughput target on multi-core CPU (fallback for sites without GPU).
    params:
      hardware: CPU
      parallelism: 1000
