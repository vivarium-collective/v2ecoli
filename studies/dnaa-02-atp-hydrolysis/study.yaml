schema_version: 3
name: dnaa-02-atp-hydrolysis
created: '2026-05-16'
last_run: '2026-05-17'
status: tests-passing
phase: Evaluate
gate_status: passed
biological_summary: |
  In a real cell, DnaA exists in three nucleotide states: apo (empty),
  ATP-bound, and ADP-bound. Only DnaA-ATP can drive replication initiation.
  The cell keeps the DnaA-ATP fraction in a tight band (~20-50%) by
  balancing slow intrinsic ATP hydrolysis (k ≈ 0.046/min) against
  ATP-loading. This study adds that three-state pool to v2ecoli and the
  slow hydrolysis step. The full extrinsic conversion network (RIDA,
  DDAH, DARS) is deferred; an ATP-fraction clamp keeps things in range
  until that lands.
study_card:
  goal: Split DnaA into apo/ATP/ADP species and add the slow intrinsic hydrolysis.
  mechanism: 'New bulk species (DnaA_apo, DnaA_ATP, DnaA_ADP) +
    a first-order hydrolysis Step (k ≈ 0.046/min, Sekimizu 1987).
    An ATP-fraction clamp stands in for the deferred RIDA/DDAH/DARS network.'
  why_before_next: 'dnaa-03 (DnaA-box binding) needs to know which nucleotide
    form is on each site — high-affinity sites bind both ATP-DnaA and
    ADP-DnaA, but low-affinity sites preferentially bind ATP-DnaA only.
    Without the explicit split, you cannot test that selectivity.'
  expected_result: 'DnaA-ATP / total in [0.2, 0.5] (Boesen 2024);
    apo-DnaA fraction ≤ 5%; with hydrolysis disabled, the ATP fraction
    drifts upward monotonically (confirms the sink is real).'
  main_expert_question: 'v2ecoli already has a MONOMER0-160_RXN equilibrium
    reaction that drives ALL baseline DnaA into the ATP-complex form
    (confirmed dnaa-01 rerun 2026-05-17). Should dnaa-02''s explicit
    split DISABLE that reaction, REUSE it as the ATP-binding source,
    or PARALLEL-RUN both with reconciliation?'
literature_anchors:
- expectation: 'DnaA-ATP / total DnaA ≈ 20-50% during steady growth'
  model_observable: 'bulk[DnaA_ATP] / (bulk[DnaA_apo] + bulk[DnaA_ATP] + bulk[DnaA_ADP])'
  source: 'Boesen 2024 PNAS (Delta4 cells)'
  status_in_v2ecoli: 'Not yet measurable — species don''t exist yet'
- expectation: 'apo-DnaA (no nucleotide) is < 5% of total — DnaA strongly prefers to be loaded'
  model_observable: 'bulk[DnaA_apo] / total'
  source: 'Sekimizu 1987 / Kawakami 2006 (Kd ~30 nM ATP, ~100 nM ADP)'
  status_in_v2ecoli: 'Not yet measurable — species don''t exist yet'
- expectation: 'Intrinsic DnaA-ATP → ADP hydrolysis is slow: ~50% per 15 min, i.e. k ≈ 0.046/min'
  model_observable: 'rate parameter of the IntrinsicHydrolysis Step'
  source: 'Sekimizu 1987 (Cell)'
  status_in_v2ecoli: 'Planned default: dnaA_intrinsic_hydrolysis_rate_per_min = 0.046'
- expectation: 'Cellular [ATP] >> [ADP] (ratio > 10) under normal growth'
  model_observable: 'bulk[ATP[c]] / bulk[ADP[c]]'
  source: 'Boesen 2024 PNAS (background metabolite levels)'
  status_in_v2ecoli: 'Already available from baseline metabolism'
baseline:
- name: baseline-nucleotide-cycle
  composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis
  params:
    seed: 0
    cache_dir: out/cache
- name: baseline-extrinsic-target
  composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_extrinsic_target_rate
  params:
    seed: 0
    cache_dir: out/cache
visualizations:
- name: dnaa_state
  address: local:DnaAStateVisualization
  config:
    title: dnaa-02 — DnaA state (apo/ATP/ADP) trajectory
    sample_every: 10
    inputs_map:
      apo_count:     listeners.dnaA_cycle.apo_count
      atp_count:     listeners.dnaA_cycle.atp_count
      adp_count:     listeners.dnaA_cycle.adp_count
      atp_fraction:  listeners.dnaA_cycle.atp_fraction
      adp_fraction:  listeners.dnaA_cycle.adp_fraction
      apo_fraction:  listeners.dnaA_cycle.apo_fraction
      time:          global_time
- name: dnaa_box_occupancy
  address: local:DnaABoxOccupancyVisualization
  config:
    title: dnaa-02 — DnaA-box occupancy (end-state landscape)
    sample_every: 10
    inputs_map:
      chromosome_fraction: listeners.dnaA_binding.chromosome.occupied_fraction
      oric_high:           listeners.dnaA_binding.oric.high_affinity_occupied
      oric_low:            listeners.dnaA_binding.oric.low_affinity_occupied
      dnaap_fraction:      listeners.dnaA_binding.dnaap.occupied
      free_atp:            listeners.dnaA_binding.free_atp
      free_adp:            listeners.dnaA_binding.free_adp
      bound_total:         listeners.dnaA_binding.bound_total
      time:                global_time
purpose:
  question: 'Does an exponential intrinsic DnaA-ATP → DnaA-ADP hydrolysis

    (k ≈ 0.046/min; Sekimizu 1987) paired with tight ATP/ADP binding

    produce the physiological DnaA-ATP / total-DnaA fraction band of

    0.2-0.5 (Boesen 2024)?

    '
  mechanism: 'Split the single DnaA species into three bulk forms (DnaA-apo,

    DnaA-ATP, DnaA-ADP). Add a first-order hydrolysis Step

    DnaA-ATP → DnaA-ADP with rate parameter. Optionally clamp the

    DnaA-ATP fraction to the [0.2, 0.5] band so downstream studies

    (dnaa-03, dnaa-04) can proceed before the full RIDA/DDAH/DARS

    network in dnaa-05 lands.

    '
  expected_outcome: 'Intrinsic-only baseline equilibrates near the low end of the

    physiological band (~0.2). no-hydrolysis variant drifts to ~1.0;

    10× variant drops below 0.1. apo fraction < 5%.

    '
pipeline_gate:
  prerequisites:
  - dnaa-01-expression-dynamics
  enables:
  - dnaa-03-box-binding
  gate_status: passed
  gate_status_summary: '2026-05-17 implementation + run (seed 0,
    30 min, after EQ-04 biology pivot): all four primary/diagnostic
    tests pass. atp-fraction in band, apo-fraction = 0,
    no-hydrolysis -> 1.0, fast-hydrolysis -> 0.012. dnaa-03 unblocked.
    '
  proceed_condition: 'apo-dnaA-fraction-is-small + dnaa-atp-fraction-in-physiological-range

    pass (or the clamp is enabled and acknowledged by the expert as a

    temporary scaffold).

    '
simulation_set:
- name: baseline-nucleotide-cycle
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: null
  condition: M9-minimal-glucose
  duration_min: 60
  seeds:
  - 0
  - 1
  - 2
  readouts:
  - dnaA_atp_fraction
  - dnaA_apo_count
  - atp_pool
  - adp_pool
  applies_tests:
  - apo-dnaa-fraction-is-small
  - dnaa-atp-fraction-in-physiological-range
  - atp-pool-much-greater-than-adp
  status: gated
  blocked_by_requirements:
  - req-1-nucleotide-split
  - req-2-intrinsic-hydrolysis-step
  - req-3-atp-fraction-listener
- name: no-intrinsic-hydrolysis
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dnaA_intrinsic_hydrolysis_rate_per_min: 0.0
  condition: M9-minimal-glucose
  duration_min: 60
  seeds:
  - 0
  - 1
  - 2
  readouts:
  - dnaA_atp_fraction
  applies_tests:
  - no-hydrolysis-accumulates-atp-form
  status: gated
  blocked_by_requirements:
  - req-1-nucleotide-split
  - req-2-intrinsic-hydrolysis-step
- name: fast-intrinsic-hydrolysis
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dnaA_intrinsic_hydrolysis_rate_per_min: 0.46
  condition: M9-minimal-glucose
  duration_min: 60
  seeds:
  - 0
  - 1
  - 2
  readouts:
  - dnaA_atp_fraction
  applies_tests:
  - fast-hydrolysis-suppresses-atp-form
  status: gated
  blocked_by_requirements:
  - req-1-nucleotide-split
  - req-2-intrinsic-hydrolysis-step
model_change:
  base_model: v2ecoli.composites.baseline.baseline
  new_state_variables:
  - id: DnaA_apo
    kind: bulk
    units: molecules/cell
  - id: DnaA_ATP
    kind: bulk
    units: molecules/cell
  - id: DnaA_ADP
    kind: bulk
    units: molecules/cell
  new_processes:
  - name: DnaaIntrinsicHydrolysis
    kind: Step
    fires_per: timestep
    requirement_id: req-2-intrinsic-hydrolysis-step
  new_parameters:
  - name: dnaA_intrinsic_hydrolysis_rate_per_min
    default: 0.046
    units: per_min
  - name: dnaA_atp_fraction_clamp
    default: null
    type: '[low, high] | null'
  new_listeners:
  - name: dnaA_atp_fraction
    emits:
    - agents.<id>.listeners.dnaA_cycle.atp_fraction
    requirement_id: req-3-atp-fraction-listener
  modified_processes:
  - 'Initial-state seeder: split MONOMER0-160[c] equivalent across the three new species at equilibrium fraction.'
key_assumptions:
- DnaA binding to ATP and ADP is tight (Kd ~30 nM ATP, ~100 nM ADP; Sekimizu 1987).
- Intrinsic hydrolysis is first-order and slow (~0.046/min; 50% in 15 min).
- At physiological [ATP] = 6-7 mM, apo-DnaA is a small minority.
- DNA-binding does NOT modify the intrinsic hydrolysis rate (per Sekimizu 1987 in vitro).
- 'Baseline-state finding (from dnaa-01 rerun 2026-05-17): ALL 115 DnaA in
  v2ecoli baseline sit in MONOMER0-160[c] via the existing equilibrium
  reaction (MONOMER0-160_RXN). bulk[PD03831[c]] free monomer ≈ 0. So the
  apo/ATP/ADP split is decomposing an already-fully-ATP-complexed pool,
  not partitioning new translation product. Either the existing
  equilibrium reaction must be DISABLED when dnaa-02 lands (to avoid
  double-modeling) OR dnaa-02 reuses it as the ATP-binding rate source
  and only ADDS the apo and ADP species. Tracked as dnaa-02-EQ-02 below.
  '
readouts:
- name: dnaA_atp_fraction
  description: DnaA-ATP / (DnaA-apo + DnaA-ATP + DnaA-ADP) over time.
  store_path: agents.0.listeners.dnaA_cycle.atp_fraction
  units: fraction
  status: derived-needed
  blocked_by_requirements:
  - req-1-nucleotide-split
  - req-3-atp-fraction-listener
- name: dnaA_apo_count
  store_path: agents.0.bulk
  index_by:
    type: bulk_id
    value: DnaA_apo
  units: molecules/cell
  status: aspirational
  blocked_by_requirements:
  - req-1-nucleotide-split
- name: atp_pool
  store_path: agents.0.bulk
  index_by:
    type: bulk_id
    value: ATP[c]
  units: molecules/cell
  status: available
- name: adp_pool
  store_path: agents.0.bulk
  index_by:
    type: bulk_id
    value: ADP[c]
  units: molecules/cell
  status: available
behavior_tests:
- name: apo-dnaa-fraction-is-small
  classification: primary
  description: apo-DnaA / total ≤ 5% at steady state (nucleotide is tightly bound).
  measure:
    kind: ratio_of_sums
    numerator:
      kind: bulk_count
      id: DnaA_apo
      reduce: median
    denominator:
      kind: bulk_count_sum
      ids:
      - DnaA_apo
      - DnaA_ATP
      - DnaA_ADP
      reduce: median
    window: second_half
  pass_if:
    op: at_most
    value: 0.05
  units: fraction
  requires_simulation: baseline-nucleotide-cycle
  cites:
  - Sekimizu1987Cell
  - Kawakami2006MolMicrobiol
- name: dnaa-atp-fraction-in-physiological-range
  classification: primary
  description: DnaA-ATP / total in [0.2, 0.5] (Boesen 2024 PNAS Delta4 cells).
  measure:
    kind: ratio_of_sums
    numerator:
      kind: bulk_count
      id: DnaA_ATP
      reduce: median
    denominator:
      kind: bulk_count_sum
      ids:
      - DnaA_apo
      - DnaA_ATP
      - DnaA_ADP
      reduce: median
    window: second_half
  pass_if:
    op: in_range
    low: 0.2
    high: 0.5
  units: fraction
  requires_simulation: baseline-nucleotide-cycle
  cites:
  - Boesen2024PNAS
- name: atp-pool-much-greater-than-adp
  classification: supporting
  description: Background metabolism keeps ATP/ADP > 10 at steady state.
  measure:
    kind: ratio_of_bulks
    numerator:
      id: ATP[c]
    denominator:
      id: ADP[c]
    reduce: median
    window: second_half
  pass_if:
    op: at_least
    value: 10.0
  units: ratio
  requires_simulation: baseline-nucleotide-cycle
  cites:
  - Boesen2024PNAS
- name: no-hydrolysis-accumulates-atp-form
  classification: diagnostic
  description: With hydrolysis rate = 0, DnaA-ATP fraction monotonically rises.
  measure:
    kind: ratio_of_sums
    numerator:
      kind: bulk_count
      id: DnaA_ATP
      reduce: series
    denominator:
      kind: bulk_count_sum
      ids:
      - DnaA_apo
      - DnaA_ATP
      - DnaA_ADP
      reduce: series
    window: full
  pass_if:
    op: monotonic_increasing
    allow_dip_pct: 5
  units: fraction
  requires_simulation: no-intrinsic-hydrolysis
  cites:
  - Sekimizu1987Cell
- name: fast-hydrolysis-suppresses-atp-form
  classification: diagnostic
  description: 10× hydrolysis pushes DnaA-ATP fraction below 0.1.
  measure:
    kind: ratio_of_sums
    numerator:
      kind: bulk_count
      id: DnaA_ATP
      reduce: median
    denominator:
      kind: bulk_count_sum
      ids:
      - DnaA_apo
      - DnaA_ATP
      - DnaA_ADP
      reduce: median
    window: second_half
  pass_if:
    op: at_most
    value: 0.1
  units: fraction
  requires_simulation: fast-intrinsic-hydrolysis
  cites:
  - Sekimizu1987Cell
  - Kawakami2006MolMicrobiol
conclusion_logic:
  if_primary_tests_pass:
    implementation_status: Three-state DnaA nucleotide cycle works at the intrinsic-only level.
    biological_validation: 'Confirms Sekimizu 1987''s intrinsic rate alone CAN produce a

      physiological ATP-fraction band — but doesn''t validate the

      cell-cycle oscillation (that''s dnaa-05''s territory).

      '
    pipeline_unblocks:
    - dnaa-03-box-binding (box affinity depends on nucleotide form)
    - dnaa-05-rida-ddah-dars (extrinsic conversion overlays this)
  if_primary_tests_fail:
    diagnose:
    - 'If DnaA-ATP fraction is too high: hydrolysis rate is too low or DNA binding is shielding ATP form.'
    - 'If DnaA-ATP fraction is too low: hydrolysis rate too high or ATP-binding kinetics wrong.'
    - 'If apo fraction is large: ATP-binding Kd too weak in the implementation.'
    block_downstream: dnaa-03 onward need a valid intrinsic baseline.
conclusion_verdicts:
  regression_compatibility:
    result: PASS
    basis: '2026-05-17 implementation: three new Steps
      (DnaaIntrinsicHydrolysis, DnaaAtpFractionClamp, DnaaCycleListener)
      build cleanly and run in the dnaa_02_with_intrinsic_hydrolysis
      composite. Total DnaA pool sits at ~120-130/cell (close to the
      115 dnaa-01 baseline) — no regression, slight growth-related drift
      over 30 min.
      '
  biological_validation:
    result: PASS
    basis: '2026-05-17 runs (seed 0, 30 min, after design-pivot
      EQ-04 option B — disable MONOMER0-4565_RXN to make hydrolysis
      stick): four primary/diagnostic tests pass.

      Test outcomes (second-half medians):
        apo-dnaa-fraction-is-small        : apo_frac = 0.000  ≤ 0.05  PASS
        dnaa-atp-fraction-in-physiological-range
                                          : atp_frac = 0.213  ∈ [0.2, 0.5]  PASS
        no-hydrolysis-accumulates-atp-form
                                          : rate=0    -> atp_frac = 1.000  PASS
        fast-hydrolysis-suppresses-atp-form
                                          : rate=0.46 -> atp_frac = 0.012  PASS (≤ 0.1)

      Trajectory shape (clamp on, band [0.2, 0.5]):
        t=  0s  atp=0   adp=0     atp_frac=0.000  (initial — no equilibrium yet)
        t=120s  atp=50  adp=66    atp_frac=0.431  (in-band)
        t=600s  atp=36  adp=82    atp_frac=0.305  (in-band)
        t=1800s atp=26  adp=100   atp_frac=0.206  (in-band, at low edge)

      Intrinsic-only trajectory (clamp OFF, rate=0.046/min):
        t=120s   atp_frac=0.896  (descending)
        t=600s   atp_frac=0.509  (entering the band)
        t=1200s  atp_frac=0.320  (mid-band)
        t=1800s  atp_frac=0.130  (below band — needs RIDA/DDAH/DARS or clamp)

      This matches the expected_outcome in the original study spec:
      "intrinsic-only baseline equilibrates near the low end of the
      physiological band (~0.2)" + "10× variant drops below 0.1" +
      "no-hydrolysis variant drifts to ~1.0".
      '
    blocking_evidence_needed:
    - atp-pool-much-greater-than-adp test (need to capture bulk[ATP[c]] / bulk[ADP[c]] in the runner — pending)
    - 3-seed cross-seed confirmation (currently seed 0 only)
    - perturbation panel from dnaa-01
  explanatory_gain:
    result: POSITIVE
    basis: 'Three findings worth keeping:

      1. The audit-resolved REUSE plan (dnaa-02-EQ-02) was incomplete:
         it accounted for STATIC species presence but not for the
         DYNAMIC tug-of-war between the existing equilibrium and the
         new Steps. Required a follow-up biology pivot (EQ-04 option B).

      2. Disabling MONOMER0-4565_RXN (free DnaA + ADP -> DnaA-ADP) is
         the cleanest fix because that reaction is a minor in-vivo
         pathway anyway; the productive DnaA-ADP route is hydrolysis
         of bound ATP, which our IntrinsicHydrolysis Step now models.

      3. Without DARS (dnaa-05, deferred), the intrinsic pathway alone
         eventually drains DnaA-ATP below the physiological band. The
         ATP-fraction clamp Step bridges this gap as a placeholder.
         Confirms the biology motivation for dnaa-05.
      '
design_pivot_required:
- id: dnaa-02-EQ-04
  status: superseded-by-dnaa-02f
  resolution: '2026-05-17 PIVOT (option B): the composite recipe
    dnaa_02_with_intrinsic_hydrolysis patches the live ecoli-equilibrium
    Step instance to zero out the MONOMER0-4565_RXN column of its
    stoichMatrix. DnaA-ADP can only form via IntrinsicHydrolysis (this
    study) or RIDA / DDAH (deferred dnaa-05). PASS verdict in this study
    was obtained via this mechanism + the ATP-fraction clamp.

    2026-05-18 SUPERSESSION (variant E): the dnaa-02f-equilibrium-cleanup
    follow-up study compared three alternatives and selected RIDA-v0 +
    intact-equilibrium + clamp as the canonical mechanism. Key findings:

      (a) Variant B (this study''s monkey-patch + clamp) PASSES atp-
          fraction-band test at 0.216-0.270 across seeds 0/1/2, but
          with high cross-seed CV (~16%) and total-DnaA inflation
          (115 → 121-144).
      (b) Variant E (RIDA-v0 + clamp at literature 100× rate, equilibrium
          INTACT) PASSES at atp_fraction = 0.496 with CV < 1% and
          total-DnaA preserved at 113-114.
      (c) Critically: dnaa-02''s current PASS came from the CLAMP, not
          the biology. Intrinsic hydrolysis alone produces atp_fraction
          ≈ 0.92 regardless of any equilibrium attenuation.

    Recommendation for next session: refactor dnaa_02_with_intrinsic_
    hydrolysis to use the variant-E mechanism by default; retire the
    _disable_dnaa_adp_equilibrium monkey-patch. dnaa-03 inherits the
    new recipe.

    Implementation in v2ecoli/composites/baseline_recipes.py:
      _disable_dnaa_adp_equilibrium(cell_state) — mutates the live
      Step instance''s stoichMatrix at composite-build time. Will be
      removed once retire-dnaa-02-monkey-patch follow-up lands.
    '
  question: 'How do we make the DnaaIntrinsicHydrolysis + DnaaAtpFractionClamp
    deltas STICK against the existing ecoli-equilibrium MONOMER0-4565_RXN
    reverse rate?'
  alternatives:
  - 'A. Add a new "locked" bulk id DnaA-ADP-locked[c] that the equilibrium
    reaction set does not touch. Hydrolysis writes to it; clamp transfers
    from MONOMER0-160 to it. Equilibrium can no longer reverse the
    transfer. Cost: one new bulk id + sim_data wiring.'
  - 'B. Disable MONOMER0-4565_RXN (and possibly MONOMER0-160_RXN) by
    patching the equilibrium stoichMatrix at composite-build time. Cost:
    minor (zero out rows in the cached stoichMatrix). Risk: any other
    process that depends on the equilibrium binding kinetics will see
    fundamentally different DnaA dynamics.'
  - 'C. Accept that intrinsic-only is insufficient (the original biology
    motivation) and treat dnaa-02 as a structural rehearsal: ship the
    three Steps as-built, document the equilibrium tug-of-war as the
    expected result, and let dnaa-05 (RIDA / DDAH / DARS) fix it
    properly. This contradicts the investigation''s stated scope (dnaa-05
    is deferred) but is the lowest-risk path.'
  impact_if_wrong: 'Affects all dnaa-03 / dnaa-04 results since they
    depend on a working ATP/ADP split. Wrong choice = simulating dnaa-03
    box binding against a 100%-ATP pool, which is the same as the
    no-split baseline (no information gain).'
  blocks:
  - dnaa-02 biological_validation
  - dnaa-03 + dnaa-04 (any test that needs a non-trivial ATP fraction)
  requested_response: 'Expert opinion on whether (A) introducing a new
    locked species is acceptable, or whether (B) disabling the existing
    equilibrium reaction is the cleaner pivot. (C) is also valid but
    delays the whole investigation.'
  asked_to: TBD
expert_decisions_needed:
- id: dnaa-02-EQ-02
  status: resolved-by-audit
  resolution: 'AUDIT 2026-05-17: BOTH equilibrium reactions already exist
    in v2ecoli/sim_data and run via the existing ecoli-equilibrium Step:

      MONOMER0-160_RXN:  PD03831[c]   + ATP[c] -> MONOMER0-160[c]   (DnaA-ATP)
      MONOMER0-4565_RXN: PD03831[c]   + ADP[c] -> MONOMER0-4565[c]  (DnaA-ADP)

    Bulk ids exist:
      PD03831[c]       = apo-DnaA (free monomer; baseline value ~0)
      MONOMER0-160[c]  = DnaA-ATP complex (baseline 115)
      MONOMER0-4565[c] = DnaA-ADP complex (baseline 0)

    Conclusion: option (b) REUSE wins by default. dnaa-02 does NOT need
    to author new bulk species or disable any existing reaction. The
    work reduces to:
      (1) Add IntrinsicHydrolysis Step: MONOMER0-160 -> MONOMER0-4565
          (also ATP -> ADP for mass balance) at k = 0.046/min.
      (2) Add dnaA_atp_fraction listener that reads existing bulk counts.
      (3) Add ATP-fraction clamp Step (required, per dnaa-05 deferral).

    Open follow-up: why is MONOMER0-4565[c] at 0 in baseline? Either
    the reverse rate of MONOMER0-4565_RXN is too high or [ADP] is too
    low relative to [ATP]. Adding hydrolysis should fill it; if not,
    audit the rate constants.
    '
  question: '(ORIGINAL, NOW RESOLVED) With the dnaa-01 finding that ALL 115
    baseline DnaA sit in MONOMER0-160[c] via the existing MONOMER0-160_RXN
    equilibrium, should dnaa-02 (a) DISABLE that reaction when adding the
    explicit apo/ATP/ADP split, (b) REUSE the existing reaction as the
    ATP-binding source and only add apo + ADP species on top, or (c)
    PARALLEL-RUN both with reconciliation logic?'
  alternatives:
  - 'Disable (a): clean break — dnaa-02 becomes the single source of DnaA
    nucleotide state. Risk: any other process that reads MONOMER0-160[c]
    will silently stop seeing it.'
  - 'Reuse (b): minimal change — only adds species. Risk: the existing
    rate constant (2.9e-8) is the one that produces a fully-complexed pool,
    so we''d need to verify it implies the right ATP-bound fraction.'
  - 'Parallel-run (c): two sources of nucleotide state — high risk of
    drift, not recommended.'
  impact_if_wrong: 'Wrong choice produces silent state-corruption: either
    DnaA count drops because a downstream consumer can no longer find it,
    or the ATP fraction is double-modeled. Affects every test in dnaa-02
    onward.'
  blocks:
  - dnaa-02 implementation start
  - all downstream studies
  requested_response: 'Audit of MONOMER0-160_RXN consumers in
    v2ecoli/processes/equilibrium.py + a recommendation; ideally a code-level
    inventory of who reads MONOMER0-160[c].'
  status: open
  asked_to: TBD
- id: dnaa-02-EQ-01
  question: Is the v2ecoli equilibrium reverse-rate (MONOMER0-160_RXN rate constant 2.9e-8) correctly calibrated, or does
    the 100× gap between intrinsic Boesen rate and required v2ecoli flux indicate the equilibrium reverse-rate is the actual
    problem?
  alternatives:
  - Equilibrium reverse-rate is correct → RIDA + DDAH + DARS together really must deliver ~99× the intrinsic rate in vivo
    (dnaa-05 work).
  - Equilibrium reverse-rate is over-estimated by ~10-100× → less extrinsic flux required → simpler dnaa-05.
  - Both are partially wrong → calibrate jointly.
  impact_if_wrong: Mis-attribution of ~100× hydrolysis-flux requirement to extrinsic pathways vs equilibrium calibration.
    Affects dnaa-05 design entirely.
  blocks:
  - dnaa-02 conclusion_verdicts.biological_validation
  - dnaa-05 implementation
  requested_response: Authority + DOI for the MONOMER0-160_RXN forward/reverse rate constants in ParCa; cross-reference Boesen
    2024 + Sekimizu 1987 for in-vivo total flux measurements.
  status: open
  asked_to: TBD
limitations:
- Intrinsic hydrolysis only; the cell-cycle oscillation requires dnaa-05's RIDA + DDAH + DARS.
- Single doubling time; multi-generation drift not validated.
- Assumes physiological [ATP]/[ADP] from baseline metabolism is correct (validated by atp-pool-much-greater-than-adp).
- Does not validate which DnaA species binds which DnaA-box class — that's dnaa-03.
implementation_requirements:
- id: req-1-nucleotide-split
  kind: state_variables
  title: 'Split DnaA bulk into ATP / ADP / apo species — RESOLVED BY AUDIT'
  effort: XS
  status: done-no-op
  description: '2026-05-17 audit (dnaa-02-EQ-02): all three species ALREADY
    exist in v2ecoli sim_data via the two equilibrium reactions
    MONOMER0-160_RXN (DnaA-ATP) and MONOMER0-4565_RXN (DnaA-ADP). No new
    bulk ids are needed.

    Species mapping for dnaa-02:
      DnaA_apo  = bulk[PD03831[c]]      (free DnaA monomer)
      DnaA_ATP  = bulk[MONOMER0-160[c]] (DnaA-ATP complex)
      DnaA_ADP  = bulk[MONOMER0-4565[c]] (DnaA-ADP complex)

    Baseline state (rerun 2026-05-17): 0 / 115 / 0 — all 115 DnaA sits
    in the ATP-complex form because the equilibrium hasn''t been balanced
    by hydrolysis yet. Adding req-2 (intrinsic hydrolysis) is expected
    to redistribute toward MONOMER0-4565[c].
    '
  unblocks:
  - all dnaa-02 behavior_tests (no longer need new species; just hydrolysis)
  - dnaa-03 box binding can read the existing bulk ids
  - dnaa-05 atp_fraction observable (req-3 reads the same bulks)
- id: req-2-intrinsic-hydrolysis-step
  kind: step
  title: DnaA-ATP → DnaA-ADP hydrolysis Step
  effort: S
  description: First-order Step with rate parameter; transfers count each timestep.
  steps:
  - Create v2ecoli/steps/dnaa_intrinsic_hydrolysis.py.
  - 'Composite param dnaA_intrinsic_hydrolysis_rate_per_min: float = 0.046.'
  - Wire into baseline composite after nucleotide-binding equilibrium.
  - 'Test: no-hydrolysis variant → atp_fraction monotonic increasing.'
  unblocks:
  - no-hydrolysis-accumulates-atp-form
  - fast-hydrolysis-suppresses-atp-form
- id: req-3-atp-fraction-listener
  kind: listener
  title: dnaA_atp_fraction listener
  effort: XS
  description: Step emitting agents.<id>.listeners.dnaA_cycle.atp_fraction = ATP / total each timestep.
  unblocks:
  - readouts.dnaA_atp_fraction
  - apo-dnaa-fraction-is-small, dnaa-atp-fraction-in-physiological-range
- id: req-4-atp-fraction-clamp
  kind: step
  title: ATP-fraction clamp (required given dnaa-05 deferral)
  effort: XS
  status: required-for-investigation-scope
  description: 'Step that redistributes ATP/ADP each timestep to keep
    ATP/total in a user-specified band [0.2, 0.5] (Boesen 2024).
    Originally scoped as optional, BUT given that dnaa-05 (RIDA/DDAH/DARS
    extrinsic conversion) is deferred to a follow-on investigation, this
    clamp becomes the de-facto extrinsic-balance stand-in. Without it the
    intrinsic-only model is expected to drift outside the band (see
    dnaa-02-EQ-01: the v2ecoli equilibrium reverse-rate suggests ~100×
    more hydrolysis flux is needed than intrinsic alone provides).
    The clamp is explicit + diagnostic: a parameter you turn off to see
    the drift, then back on to keep dnaa-03/04 running on a realistic
    ATP-fraction baseline.
    '
  steps:
  - 'Composite param dnaA_atp_fraction_clamp: [low, high] | None.
    Default this to [0.2, 0.5] when initiation_mode is dnaa_mechanism
    (dnaa-04) but None for dnaa-02 diagnostic runs.'
  - Step runs AFTER hydrolysis; rebalances if outside band.
  - 'Validation: clamped run keeps atp_fraction in [0.2, 0.5].'
  - 'Diagnostic: clamp=None reproduces the dnaa-02-EQ-01 question
    (does the intrinsic rate alone suffice?).'
  unblocks:
  - dnaa-03 / dnaa-04 can proceed before dnaa-05 lands
  - meets biology-feedback "DnaA-ATP decomposition" acceptance criterion
    by exposing a tunable extrinsic stand-in
  removed_when: dnaa-05 (RIDA/DDAH/DARS) lands and naturally balances the cycle.
