  - round: '2026-05-31'
    reviewer: Rashmi
    source: feedback-dnaa-replication-2026-05-31-03-23-19.yaml (study-dnaa-1-expression-dynamics-build)
    verdict_effect: re-tunes-V-to-reduce-peak-overshoot
    notes: |
      "we might have to decrease the rna synthesis probability a little, to get
      to oscillate within the band. Right now, at division it overshoots a
      little." → Re-ran the lineage at V=1.5e-3 and V=1.7e-3 (bracketing 2e-3)
      and analyzed the full oscillation (scripts/analyze_dnaa1_band.py).
      Finding: the DnaA pool doubles per cycle (peak ≈ 2× trough), so it cannot
      sit entirely within the 2.67×-wide [300,800] band without the trough
      dropping below 300 (V=1.5e-3 dips to 288 and is noisier, CV 10.9%).
      Selected V=1.7e-3 as canonical: peak overshoot cut from ~28% to ~10–15%,
      cycle-mean 665–710 (CV 2.3%), trough ≥417, oriC clean 1↔2. The residual
      peak excursion above 800 is intrinsic to the once-per-cycle
      accumulate-and-halve dynamics (finding dnaa-pool-doubles-per-cycle).
      Build-note carryover (monomer_counts aggregates all DnaA forms) confirmed
      in report.build_method — monomer_counts[3861] is total DnaA, used directly.

