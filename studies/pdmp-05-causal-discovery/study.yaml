report:
  confidence: design-stage
  evidence_quality: scaffold
  conclusion: Predicted — framing gene-function annotation as Bayesian model comparison with Russian Roulette 
    marginal-likelihood estimators (Lyne et al. 2015) plus an active-inference loop (Toth et al. 2022) will 
    recover ≥20 benchmark E. coli gene annotations at BH-FDR ≤ 0.1, with credible-interval widths shrinking at
    the ≥n⁻¹ᐟ² rate.
  main_insight: Active causal inference closes the experiment-design loop — instead of passively observing, 
    the agent selects in-silico knockouts/overexpression by expected information gain. This is what converts 
    annotation from pattern-matching to hypothesis-driven discovery.
  caveat: RR estimator variance is unbounded in pathological cases — N_eff ≥ 100 per marginal-likelihood 
    estimate is the floor; below that, the run is flagged and falls back to thermodynamic integration / nested
    sampling with documented bias.
  key_metrics:
    - label: RR estimator N_eff per Z
      status: stub
      value: ≥ 100
    - label: log Bayes factor CI clears Jeffreys
      status: stub
      value: '|log BF| > 1'
    - label: Model-level SBC χ² uniformity
      status: stub
      value: p > 0.05
    - label: EIG MCSE nonzero per proposal
      status: stub
    - label: Benchmark BH-FDR
      status: stub
      value: q ≤ 0.1
    - label: CI shrinkage rate (log-log slope)
      status: stub
      value: ≤ -0.4
design_status: in_progress
implementation_status: not_started
simulation_status: not_started
evaluation_status: not_started
gate_status: blocked
expert_review_status: not_requested
pipeline_gate:
  prerequisites:
    - study: pdmp-03-inference
      condition: tests-passed
    - study: pdmp-04-compilation
      condition: tests-passed
  enables: []
  proceed_condition: |-
    RR marginal-likelihood estimator achieves N_eff ≥ 100 per estimate. Log BF CIs lie entirely above |log BF| > 1 (Jeffreys substantial-evidence threshold). Model-level SBC χ² uniformity p > 0.05. Active-inference EIG MCSE non-zero per proposal. Benchmark gene-set BH-FDR ≤ 0.1. CI shrinkage rate log-log slope ≤ -0.4.
study_card: |-
  Phase 5 — close the loop on the DUF ARC vision: frame gene-function annotation as Bayesian model comparison, estimate marginal likelihoods via Russian Roulette / doubly-intractable methods, drive an active causal inference loop selecting in-silico interventions by expected information gain, validate against ≥20 E. coli benchmark genes.
readouts:
  - name: rr-estimator-trace
    status: planned
    path: .pbg/runs/<id>/rr_estimate.zarr
    units: log-marginal-likelihood + N_eff
    notes: 'Per candidate annotation. Gating: N_eff >= 100 or fallback to thermodynamic integration.'
  - name: log-bayes-factor-cis
    status: planned
    path: out/trajectories/log_bf_cis.csv
    units: log Bayes factor + 95% bootstrap CI
    notes: Per pairwise annotation comparison. Recovery claim requires CI entirely above Jeffreys |log BF| > 
      1.
  - name: model-comparison-sbc
    status: planned
    path: out/trajectories/model_sbc_ranks.csv
    units: model-posterior rank
    notes: 'K=500 synthetic datasets from known true annotations. Gating: chi^2 uniformity p > 0.05.'
  - name: eig-per-intervention
    status: planned
    path: out/trajectories/eig_proposals.csv
    units: expected information gain (nats)
    notes: Per active-inference intervention proposal. MCSE-bounded; proposals with CI overlapping zero not 
      selected.
  - name: benchmark-recovery
    status: planned
    path: out/trajectories/benchmark_recovery.csv
    units: per-gene q-value (BH-adjusted)
    notes: '20-gene benchmark E. coli set. Investigation success: BH-FDR q <= 0.10 + CI shrinkage rate log-log slope
      <= -0.4.'
