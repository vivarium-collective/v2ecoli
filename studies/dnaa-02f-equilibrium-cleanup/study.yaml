schema_version: 4
name: dnaa-02f-equilibrium-cleanup
created: '2026-05-17'
report:
  purpose: >-
    dnaa-02 passes its DnaA-ATP fraction band test only via an invasive
    monkey-patch that zeroes MONOMER0-4565_RXN's stoichMatrix column. This study
    asks which real-biology alternative produces a defensible DnaA
    nucleotide-cycle baseline for dnaa-03/04 to inherit, without inventing
    molecules or mutating the live equilibrium Step.
  setup: >-
    Minimal-glucose. Three composite variants compared on the same test panel,
    seeds 0/1/2 over 1800s: variant B (legacy monkey-patch control), variant B'
    (recalibrated MONOMER0-4565_RXN reverse rate, scale 0.01), and variant E
    (RIDA-v0 fork-active 100x hydrolysis multiplier plus ATP-fraction clamp,
    equilibrium intact; baseline rida_rate_per_min=4.6).
  result: >-
    Variant E + clamp passed the ATP-fraction-band test at all three seeds,
    landing at atp_fraction 0.496 with CV under 1% and total DnaA 113-114.
    Variant B (control) passed at the low band edge (0.208-0.270) with CV ~16%
    and DnaA growth to 121-144. Variant B' failed: intrinsic-only steady state
    stuck near 0.92 regardless of equilibrium scaling. A rate sweep (50x-500x)
    showed atp_fraction is insensitive to RIDA rate once the clamp dominates.
  interpretation: >-
    The original dnaa-02 PASS comes from the clamp, not the biology; the
    intrinsic Sekimizu rate is too slow to compete with equilibrium recovery.
    Variant E adds enough fork-active ATP-to-ADP flux for the clamp's transfers
    to stick while keeping the equilibrium reaction intact, with no stoichMatrix
    mutation or fictional species.
  decision: >-
    Variant E (RIDA-v0 + clamp at literature 100x rate) wins and replaces option
    B as the canonical dnaa-02 recipe. Regression, biological-validation, and
    explanatory-gain verdicts all positive; pipeline gate runs parallel with
    dnaa-03, which rebinds to variant E.
  next_action: >-
    Retire the dnaa-02 monkey-patch by refactoring the recipe to variant E as
    default; build the deferred downstream-isolation test comparing variant B vs
    E side effects; and advance to dnaa-05 production RIDA (explicit Hda /
    beta-clamp loading kinetics replacing the v0 multiplier).
question: 'dnaa-02 currently passes its DnaA-ATP fraction band test, but it does

  so via an invasive monkey-patch (zeroing MONOMER0-4565_RXN''s

  stoichMatrix column). Three real-biology alternatives haven''t been

  evaluated. Which produces a defensible DnaA nucleotide-cycle baseline

  for dnaa-03/04 to inherit, without inventing molecules or mutating

  the live equilibrium Step?

  '
assumptions:
- text: 'Direct free-DnaA + free-ADP binding (MONOMER0-4565_RXN forward direction)

    is a minor in-vivo route; the productive DnaA cycle is ATP-binding →

    intrinsic / RIDA / DDAH hydrolysis.

    '
  cites:
  - Sekimizu1987
  - Kawakami2006
  verified_in_v2ecoli: false
- text: 'RIDA accelerates DnaA-ATP → DnaA-ADP by ~100× relative to intrinsic

    hydrolysis when active replisomes are present (Hda + β-clamp loading

    on the moving fork).

    '
  cites:
  - Kato2001
  - Kawakami2006
  verified_in_v2ecoli: false
  note: This RIDA-v0 placeholder uses a continuous multiplier; production RIDA in dnaa-05 will refine.
- text: 'The dnaa-01 baseline at ~115 DnaA/cell is the authoritative reference

    pool size for the in-sim downstream-isolation test.

    '
  cites:
  - v2ecoli/dnaa-01 conclusion
  verified_in_v2ecoli: true
conditions:
  baseline:
    composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_rida_v0
    params:
      seed: 0
      cache_dir: out/cache
      atp_fraction_clamp_low: 0.2
      atp_fraction_clamp_high: 0.5
  variants:
  - name: variant-B-current-pivot
    description: Legacy option-B (monkey-patch zeroes MONOMER0-4565_RXN). Control for comparison.
    composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis
    diff_from_baseline: mechanism=monkey-patch
  - name: variant-Bprime-recalibrated
    description: Scale MONOMER0-4565_RXN reverse rate (instead of disabling). Tests whether ParCa rate
      is over-fitted.
    composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_recalibrated_equilibrium
    diff_from_baseline: dnaa_adp_rxn_reverse_rate_scale=0.01
  - name: variant-E-rida-v0
    description: RIDA-v0 + clamp at literature 100× intrinsic, equilibrium INTACT. Real biology candidate.
    composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_rida_v0
    diff_from_baseline: rida_rate_per_min=4.6
  model_settings:
  - name: rida_rate_per_min
    description: 'RIDA-v0 effective rate (×Sekimizu intrinsic = 0.046/min). Literature

      estimate ~100× = 4.6/min. The rate-sweep finding (50× → 500×) shows

      atp_fraction is INSENSITIVE in this range with the clamp — the

      mechanism is robust.

      '
    type: number
    default: 4.6
    current: 4.6
    gate: optional
    range:
    - 0.046
    - 46.0
    cites:
    - Kato2001
    - Kawakami2006
tests:
- name: atp-fraction-band-across-variants
  classification: primary
  question: Does each variant produce DnaA-ATP / total in the Boesen 2024 band [0.2, 0.5]?
  measure:
    kind: listener_median
    path: listeners.dnaA_cycle.atp_fraction
    window: second_half
    per_variant: true
  pass_if:
    op: in_range
    low: 0.2
    high: 0.5
  status: pass-2-of-3
  cites:
  - Boesen2024
  run_ids: []
- name: downstream-isolation-monomer160
  classification: primary
  question: 'Does the variant preserve MONOMER0-160 dynamics close to dnaa-01 baseline

    (≤10% deviation in second-half median)?

    '
  measure:
    kind: deviation_from_reference
    path: bulk[MONOMER0-160]
    reference: dnaa-01-expression-dynamics:baseline
    window: second_half
  pass_if:
    op: at_most
    value: 0.1
  status: partial
  cites:
  - v2ecoli/dnaa-01
  run_ids: []
- name: equilibrium-untouched-flag
  classification: supporting
  question: Does the variant leave ecoli-equilibrium's stoichMatrix byte-identical?
  measure:
    kind: equality_check
    target: ecoli-equilibrium.stoichMatrix
  pass_if:
    op: equals
    value: baseline-stoichMatrix
  status: pass-B'-and-E
  cites: []
  run_ids: []
- name: cross-seed-stability
  classification: supporting
  question: Does atp_fraction reproduce within CV ≤ 0.05 across seeds 0/1/2?
  measure:
    kind: cv
    path: listeners.dnaA_cycle.atp_fraction
    window: second_half
    across: seeds
  pass_if:
    op: at_most
    value: 0.05
  status: pass-E-CV-0.0
  run_ids: []
status: done-variant-E-wins
last_run: '2026-05-18'
follow_up_of: dnaa-02-atp-hydrolysis
parent_studies:
- study: dnaa-02-atp-hydrolysis
  condition: pass-via-pivot
gating: parallel-with-dnaa-03
biological_summary: "dnaa-02 currently passes its DnaA-ATP fraction band test, but it does so\nvia an\
  \ invasive workaround: the recipe mutates the live ecoli-equilibrium\nStep's stoichMatrix at composite-build\
  \ time to zero out MONOMER0-4565_RXN\n(the equilibrium reaction that loads free DnaA with free ADP).\
  \ Without\nthis mutation, snapshot-semantics let the equilibrium reverse every\nhydrolysis transfer\
  \ within the same tick (see dnaa-02 study.yaml\nconclusion_verdicts.biological_validation + design_pivot_required.EQ-04).\n\
  \nTwo structural alternatives exist but have not been evaluated:\n  B (current).  The monkey-patch we\
  \ already ship. Control.\n  B'.           Re-calibrate the existing MONOMER0-4565_RXN rate constants\n\
  \                instead of disabling the reaction. If the reverse rate\n                (2.9e-8 per\
  \ the ParCa cache) is mis-calibrated, fix the\n                number — no workaround needed. Real biology,\
  \ real reactions.\n  E.            RIDA-v0 placeholder: scale intrinsic hydrolysis by ~100×\n      \
  \          when at least one replisome is active. RIDA is the in-vivo\n                mechanism that\
  \ drives DnaA-ADP accumulation during S phase;\n                bringing a minimal stand-in forward\
  \ from the deferred dnaa-05\n                models the actual biology rather than disabling it.\n\n\
  dnaa-03 (box binding) and dnaa-04 (initiation) inherit whichever variant\ndnaa-02 ships with. If A or\
  \ B' would produce materially different\nDnaA-ADP dynamics or different MONOMER0-160 dynamics, the downstream\n\
  studies are calibrating against the wrong baseline. This study compares\nall three on the same behavior\
  \ tests + a downstream-isolation test so\nthe chain has a defensible foundation.\n"
study_card:
  goal: Select a structurally clean DnaA nucleotide-cycle implementation by A/B-comparing three pivots
    on the same test panel.
  mechanism: Three composite variants; each runs the same dnaa-02 behavior tests AND a new downstream-isolation
    test for MONOMER0-160[c] + MONOMER0-4565[c] trajectories.
  why_before_next: dnaa-03/04 will inherit whichever recipe dnaa-02 settles on. If the current monkey-patch
    is fragile or biologically off, the titration + initiation studies recalibrate against the wrong DnaA-ATP
    pool.
  expected_result: At least one of B' (rate recalibration) or E (RIDA-v0) matches the current option-B
    ATP-fraction-band PASS without monkey- patching the equilibrium step. Pick that one as the canonical
    recipe; rebind dnaa-03/04.
  main_expert_question: 'Is the v2ecoli MONOMER0-4565_RXN reverse-rate (2.9e-8 in ParCa cache) correctly
    calibrated? Resolves whether variant B'' is feasible. Companion: what is the right order-of-magnitude
    scale for the RIDA-v0 placeholder (variant E)? Literature suggests ~100× intrinsic during S phase;
    production RIDA in dnaa-05 will refine.'
literature_anchors:
- expectation: Direct free-DnaA + free-ADP binding (MONOMER0-4565_RXN forward direction) is a minor in-vivo
    route. Productive cycle is ATP-binding → intrinsic / RIDA / DDAH hydrolysis.
  source: Sekimizu 1987; Kawakami 2006
  status_in_v2ecoli: Asserted in dnaa-02 design pivot, not validated by any in-sim or literature-rate
    comparison.
- expectation: MONOMER0-4565_RXN reverse-rate constant
  source: ParCa cache (provenance unclear)
  status_in_v2ecoli: 2.9e-8 — open question dnaa-02-EQ-01 (unresolved). May be over-estimated by 10-100×
    per the friction-log working hypothesis.
visualizations:
- name: dnaa_state_across_variants
  address: local:DnaAStateVisualization
  config:
    title: dnaa-02f — DnaA state across three pivot variants
    sample_every: 10
    inputs_map:
      apo_count: listeners.dnaA_cycle.apo_count
      atp_count: listeners.dnaA_cycle.atp_count
      adp_count: listeners.dnaA_cycle.adp_count
      atp_fraction: listeners.dnaA_cycle.atp_fraction
      adp_fraction: listeners.dnaA_cycle.adp_fraction
      apo_fraction: listeners.dnaA_cycle.apo_fraction
      time: global_time
- name: dnaa_flux_contributions
  address: local:DnaAFluxContributions
  config:
    title: 'dnaa-02f — Hydrolysis flux: intrinsic vs RIDA-v0'
    inputs_map:
      intrinsic_events: listeners.dnaA_cycle.intrinsic_hydrolysis_events
      rida_events: listeners.dnaA_cycle.rida_events
      time: global_time
pipeline_gate:
  prerequisites:
  - dnaa-02-atp-hydrolysis
  enables:
  - dnaa-03-box-binding (rebind to selected variant if not option B)
  - dnaa-04-initiation-mechanism (transitively)
  gate_status: open
  proceed_condition: "At least one of variants B' or E passes BOTH:\n  (1) the dnaa-02 ATP-fraction-band\
    \ test (atp_fraction in [0.2, 0.5]\n      over the second half of a 30-min sim, seed 0/1/2), and\n\
    \  (2) the downstream-isolation test (MONOMER0-160 trajectory matches\n      dnaa-01 baseline ±10%\
    \ over the second half).\nPick the cleanest passing variant; if both pass equivalently, prefer\nvariant\
    \ E (RIDA-v0) for biological fidelity — RIDA is the actual\nin-vivo mechanism, and a v0 placeholder\
    \ cleanly extends to dnaa-05's\nfull RIDA implementation.\n"
  blocks_until_resolved: 'None — this study runs in parallel with dnaa-03. dnaa-03 inherits the

    current option-B recipe and will be rerun if dnaa-02f selects a

    different variant.

    '
implementation_requirements:
- name: dnaa_02f_with_recalibrated_equilibrium
  kind: composite-recipe
  description: 'New recipe in v2ecoli.composites.baseline_recipes. Same structure as option B but instead
    of zeroing the stoichMatrix column, multiplies the MONOMER0-4565_RXN reverse-rate by a scale factor
    (default 0.01). Param exposed as dnaa_adp_rxn_reverse_rate_scale. Real biology: the equilibrium reaction
    stays in the model with its correct stoichiometry; only the rate constant is adjusted, motivated by
    dnaa-02-EQ-01''s open question on the provenance of 2.9e-8.'
  effort_estimate: small — single-line param + a multiplicative scale at composite-build time. Reuses
    dnaa-02 Steps unchanged.
- name: dnaa_02f_with_rida_v0
  kind: composite-recipe
  description: New recipe in v2ecoli.composites.baseline_recipes. Keeps the equilibrium reaction set INTACT
    (no monkey-patch). Adds a DnaaRidaV0 Step that reads unique.active_replisome and multiplies the DnaaIntrinsicHydrolysis
    effective rate by rida_scale_when_forks_active (default 100×) whenever ≥1 replisome is active, else
    1×. Models the in-vivo RIDA biology that drives DnaA-ADP accumulation during S phase. NOT a full RIDA
    (no Hda / β-clamp loading dynamics) — explicitly a v0 stand-in until dnaa-05.
  effort_estimate: medium — new Step + composite recipe + listener entry. Reuses DnaaCycleListener unchanged.
    No sim_data changes.
- name: downstream-isolation-test
  kind: behavior-test
  description: Read both this study's runs.db and dnaa-01-expression-dynamics' runs.db. Compare bulk[MONOMER0-160[c]]
    trajectories. Output a per-variant deviation ratio (median absolute deviation / dnaa-01 median).
  effort_estimate: small — read history rows + compute deviation.
conclusion_verdicts:
  regression_compatibility:
    result: PASS
    basis: '2026-05-18 implementation: all three variants build cleanly and

      run for 1800s at 60s intervals. No regressions in the baseline

      composite chain. Variant E adds DnaaRidaV0 between

      DnaaIntrinsicHydrolysis and DnaaAtpFractionClamp; variant B'' adds

      a parametric _scale_dnaa_adp_equilibrium helper. Both new

      composites are token-chained so step order is deterministic.

      '
  biological_validation:
    result: PASS
    basis: "2026-05-18, seeds 0/1/2, 1800s sims (in second-half medians):\n\n  Variant               \
      \     seed 0   seed 1   seed 2   total DnaA\n  ──────────────────────────────────────────────────────────────────\n\
      \  B (monkey-patch + clamp)   0.216    0.270    0.208    121-144\n  B' (recalibrated, scale 0.001-1.0)\
      \  FAIL — intrinsic-only steady state\n                                      stuck at atp_fraction\
      \ = 0.92 regardless\n                                      of equilibrium scaling; no clamp coupling\n\
      \                                      tested here, but B' adds nothing without it\n  E (RIDA-v0\
      \ + clamp @ lit 100×)  0.496    0.496    0.496    113-114\n\nVariant E + clamp at literature RIDA\
      \ rate (4.6/min = 100×\nSekimizu intrinsic) PASSES the atp-fraction-band test across all\nthree\
      \ seeds with remarkable stability (CV < 1%). Variant B also\npasses but sits at the low edge of\
      \ the band with higher\ncross-seed variance (CV ~16%) and total-DnaA growth (115 →\n121-144 over\
      \ 30 min). Variant B' alone (intrinsic + scaled\nequilibrium, no clamp, no RIDA) cannot reach the\
      \ band — the\nintrinsic Sekimizu rate is too slow to compete with the\nequilibrium recovery at any\
      \ tested scale.\n\nCritical insight: in variant E + clamp, the equilibrium reaction\nis INTACT.\
      \ No stoichMatrix mutation, no fictional bulk-IDs. The\nclamp + RIDA together outpace the equilibrium's\
      \ recovery,\nsomething the clamp ALONE could not do in dnaa-02 (which is why\noption B was originally\
      \ adopted). Adding the literature-rate RIDA\ncontribution shifts the steady-state balance enough\
      \ for the\nclamp's transfers to stick.\n"
    blocking_evidence_needed: []
  explanatory_gain:
    result: POSITIVE
    basis: "Three findings worth keeping:\n\n1. The original dnaa-02 PASS comes from the CLAMP, not the\n\
      \   biology. The intrinsic-only rate (Sekimizu 0.046/min) is too\n   slow to produce any meaningful\
      \ DnaA-ADP accumulation against\n   v2ecoli's equilibrium reverse flux. The clamp Step is the\n\
      \   actor; the monkey-patch was a workaround to let its transfers\n   stick.\n\n2. The MONOMER0-4565_RXN\
      \ scaling sweep (variant B') showed that\n   any attenuation factor ≤ 0.1 produces identical steady\
      \ states\n   (atp_fraction ≈ 0.92). The reaction is essentially binary —\n   either full strength\
      \ (= 1.0) or effectively disabled (≤ 0.1).\n   Smooth scaling between these regimes is not biologically\n\
      \   meaningful with the legacy fluxesAndMoleculesToSS solver path.\n\n3. RIDA at literature rate\
      \ (~100× intrinsic) combined with the\n   clamp is the right biological-fidelity solution. The\n\
      \   equilibrium reaction stays in the model. No invented species.\n   Production RIDA (with explicit\
      \ Hda + β-clamp kinetics) in\n   dnaa-05 will refine this; variant E is the v0 placeholder.\n\n\
      4. Variant E + clamp is INSENSITIVE to RIDA rate over a wide range\n   (50× ≤ k_RIDA ≤ 500× intrinsic).\
      \ atp_fraction lands at exactly\n   0.496 (the clamp''s upper band edge minus 1 epsilon) for all\n\
      \   tested rates in this range. The CLAMP is the dominant force;\n   RIDA only needs to supply enough\
      \ background ATP→ADP flux to\n   keep the clamp''s transfers from being unwound by the\n   equilibrium.\
      \ Once that threshold is met, the clamp pins the\n   atp_fraction at the band edge regardless of\
      \ how much\n   additional RIDA flux is added. Concrete numbers (1800s, seed 0):\n\n     RIDA rate\
      \     /min      × intrinsic   atp_fraction   rida_events/tick\n     ──────────────────────────────────────────────────────────────────────\n\
      \     2.3                     50×           0.496          1.5\n     4.6  (literature)       100×\
      \          0.496          6.5\n     9.2                     200×          0.496          14.0\n\
      \     23.0                    500×          0.496          32.5\n\n   RIDA events scale linearly\
      \ with the rate (Poisson on k·dt·N is\n   expected); the steady state does not. The clamp absorbs\
      \ the\n   excess.\n\n   Implication for dnaa-05 production RIDA: the rate constant is\n   far less\
      \ important than the existence of a fork-active flux\n   channel. Mechanism design can prioritise\
      \ FAITHFUL kinetics\n   over precise rate-matching. The cell''s actual atp_fraction\n   pin-point\
      \ comes from whatever sets the upper band edge — in\n   vivo, that''s the balance of DARS/RIDA/equilibrium\
      \ dynamics,\n   not the absolute RIDA rate.\n"
design_pivot_required:
- id: dnaa-02-EQ-04
  status: superseded-by-dnaa-02f
  resolution: "Original pivot adopted option B (zero out MONOMER0-4565_RXN's\nstoichMatrix column). dnaa-02f\
    \ revisits this with three real-biology\nalternatives:\n\n  A. (DROPPED) Fictional DnaA-ADP-locked[c]\
    \ species. Rejected on\n     biological-correctness grounds: invented molecules erode the\n     model's\
    \ fidelity to known biology.\n  B'. Re-scale MONOMER0-4565_RXN reverse rate within the existing\n\
    \     reaction set. EVALUATED — fails the band test regardless of\n     scale because intrinsic-only\
    \ is too slow.\n  E. RIDA-v0 placeholder Step (fork-active 100× hydrolysis\n     multiplier) + ATP-fraction\
    \ clamp. EVALUATED — passes the band\n     test at literature RIDA rate, with the equilibrium INTACT.\n\
    \nDecision: variant E + clamp at literature RIDA replaces option B\nas the canonical dnaa-02 recipe.\
    \ Implementation work to retire the\nmonkey-patch tracked in dnaa-02f follow_up_studies (planned).\n\
    Downstream studies (dnaa-03, dnaa-04) inherit variant E's recipe.\n"
follow_up_studies:
- id: retire-dnaa-02-monkey-patch
  description: 'Refactor dnaa_02_with_intrinsic_hydrolysis composite recipe to

    use the variant-E mechanism (RIDA-v0 + intact equilibrium + clamp)

    as its default. Drop _disable_dnaa_adp_equilibrium. Update

    dnaa-02 study.yaml conclusion_verdicts to point at variant-E

    canonical setup.

    '
  blocks:
  - dnaa-03 recipe rebinding
  status: planned
- id: variant-e-downstream-isolation-test
  description: 'Build the downstream-isolation test (originally scoped for

    dnaa-02f). Compare other-process behavior (ATP/ADP free-pool

    dynamics, ribosome activity, growth rate) between variant B and

    variant E to confirm the equilibrium-untouched path doesn''t

    introduce unintended side effects elsewhere.

    '
  status: planned
- id: hda-clamp-loading-dnaa05
  description: 'Production RIDA (dnaa-05) — replace the v0 continuous multiplier

    with explicit Hda + β-clamp loading kinetics. Variant E''s

    rida_rate_per_min parameter goes away in favor of mechanism.

    '
  status: planned-dnaa-05
limitations:
- Three variants × three seeds × 1800s = 9 runs at ~15s wall-clock each + load time. Whole study completes
  in ~5 min wall time on this machine.
- The downstream-isolation test uses dnaa-01 as reference but dnaa-01 is itself at ~115 DnaA/cell, 5×
  below the literature band (open calibration issue, see dnaa-01 follow_up_studies). Test asserts isolation
  against the in-sim baseline, NOT against literature.
- Does not resolve dnaa-02-EQ-01 (whether the original 2.9e-8 rate is correct). Option B' uses a heuristic
  0.01× scale as a starting point; proper resolution needs literature work or ParCa code archaeology.
decision_inputs_to_dnaa_03:
- name: selected-recipe
  description: The variant that passes both primary tests. Becomes the canonical dnaa_02_with_intrinsic_hydrolysis
    recipe; dnaa-03's recipe chains off of it.
  affects: dnaa-03 simulation_set baseline composite name; if variant E wins, dnaa-03 inherits the fork-active
    hydrolysis scaling, which may materially change DnaA-ATP dynamics once replication starts firing.
