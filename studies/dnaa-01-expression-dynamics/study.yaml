schema_version: 3
name: dnaa-01-expression-dynamics
created: '2026-05-16'
status: planned
question: |
  Does the v2ecoli baseline maintain a realistic, steady DnaA pool
  (300-800 monomers/cell) with concentration stability within ±10%
  through one cell cycle, and does autorepression at dnaAp set this
  steady-state?
hypothesis: |
  With the existing transcript_initiation + tf_binding autoregulation
  chain driven by the dnaA→EG10235_RNA fold change, DnaA concentration
  is steady within ±10%. Disabling DnaA translation
  (stop-dnaA-synthesis variant) causes monotonic decay on the dilution
  timescale (~doubling time). The autorepression-strength knob shifts
  steady-state inversely (stronger repression → lower DnaA pool).
objective: |
  Add dnaA transcription, mRNA dynamics, translation, and DnaA protein
  abundance dynamics sufficient to maintain realistic DnaA levels during
  steady growth.
description: |
  Phase 1 of the multi-phase replication-initiation plan
  (see references/expert/chromosome_replication_plan.pdf, Study 1).
  Goal: a steady-state DnaA expression baseline that downstream studies
  (hydrolysis, box binding, mechanism-driven initiation) can build on.

  Identifiers (from v2ecoli/processes/parca/reconstruction/ecoli/flat/):
    - dnaA gene:              EG10235  (b3702, ECK3694; locus 3,882,326-3,883,729 on minus strand)
    - dnaA mRNA (TU):         EG10235_RNA  (half-life 1.9 min)
    - dnaA translation eff.:  0.35
    - DnaA monomer (TF):      MONOMER0-160[c]
                              ^ molecule_ids.py labels this as "DnaA_ATP_complex" —
                                the existing v2ecoli model collapses DnaA / DnaA-ATP /
                                DnaA-ADP into a single bulk species. Splitting them
                                is dnaa-02's job.

  What already exists in baseline (no new code needed):
    - dnaA transcription and mRNA dynamics via transcript_initiation +
      transcript_elongation + rna_degradation processes.
    - DnaA translation via polypeptide_initiation + polypeptide_elongation.
    - Autoregulation via tf_binding + transcript_initiation: the
      transcription_factors.tsv entry "dnaA  EG10235  MONOMER0-160" wires
      DnaA as a TF for its own TU. tf_condition.tsv carries the minimal-
      media fold change (-1.91 from ppgpp_fc.tsv).
    - Per-step transcription init + completion counts via
      listeners.rnap_data.{rna_init_event, count_rna_synthesized}.

  What is NOT yet exposed (and needs new code; see `gaps:` below):
    - DnaA / DnaA-ATP / DnaA-ADP split (deferred to dnaa-02).
    - dnaAp-specific binding-occupancy listener (the box 1-4 + a-c story
      from the plan). tf_binding's n_actual_bound[DnaA] aggregates across
      all DnaA TUs, not just dnaAp.
    - Tunable autorepression strength as a single composite parameter
      (currently buried in fold_changes.tsv).
    - Gene-locus relocation hook (variant `distal-dnaA-promoter` needs a
      composite-level override of the EG10235 chromosomal coordinates).

baseline:
- name: baseline
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache

variants:
- name: stop-dnaA-synthesis
  status: aspirational
  description: |
    Knock out DnaA translation to confirm dilution/degradation drives
    concentration down on the expected timescale. Need a hook in
    polypeptide_elongation (or sim_data.translation_efficiency override)
    to zero out translation_efficiency[EG10235].
  requires:
    - "param-hook: baseline composite override `translation_efficiency_override={EG10235: 0.0}`"
  params:
    translation_efficiency_override:
      EG10235: 0.0

- name: distal-dnaA-promoter
  status: aspirational
  description: |
    Move the dnaA gene further from oriC to expose gene-dosage effects on
    DnaA accumulation. Requires a composite-level chromosomal-coordinate
    override; not currently exposed.
  requires:
    - "param-hook: composite override for sim_data.process.replication.genome_length + the EG10235 locus coordinates"
  params:
    dnaA_locus_relative_to_oric: 0.5    # 0=oriC, 1=ter (placeholder)

- name: low-autorepression
  status: aspirational
  description: |
    Reduce autorepression strength. Currently the dnaA→EG10235_RNA fold
    change lives in fold_changes.tsv (~-0.92 to -1.91); exposing a single
    knob ("repression_multiplier") at composite level requires a small
    Step + a sim_data hook.
  requires:
    - "param-hook: composite override that multiplies the dnaA->EG10235_RNA fold change"
  params:
    dnaap_autorepression_multiplier: 0.1

- name: high-autorepression
  status: aspirational
  description: Strong autorepression; expect lower steady-state DnaA pool.
  requires:
    - "param-hook: same as low-autorepression"
  params:
    dnaap_autorepression_multiplier: 3.0

# ── Observables ─────────────────────────────────────────────────────────────
# Each observable carries `status:`
#   available        = path resolves in the live baseline composite today;
#   derived-needed   = the underlying data exists, but a derived listener
#                      Step has to wire it to a clean store_path;
#   aspirational     = the data does not exist yet (waiting on
#                      dnaa-02 / dnaa-03 work).
observables:
- name: dnaA_transcription_init_events
  status: available
  description: |
    Per-step transcription initiations on EG10235_RNA. Read from the
    indexed rnap_data array; the TU index is sim_data.process.transcription
    .rna_data.id.index("EG10235_RNA").
  store_path: agents.0.listeners.rnap_data.rna_init_event
  index_by:
    type: rna_id
    value: EG10235_RNA

- name: dnaA_mrna_synthesized_events
  status: available
  description: Per-step mRNA-completion events (transcript_elongation terminations).
  store_path: agents.0.listeners.rnap_data.count_rna_synthesized
  index_by: {type: rna_id, value: EG10235_RNA}

- name: dnaA_mrna_count
  status: available
  description: |
    Bulk mRNA count. v2ecoli's `bulk` store is a `bulk_array` (structured
    array of id+count); the observable resolver should look up by molecule
    id.
  store_path: agents.0.bulk
  index_by: {type: bulk_id, value: EG10235_RNA}

- name: dnaA_protein_count
  status: available
  description: |
    Bulk DnaA monomer count (current model: one species for total DnaA;
    dnaa-02 will split this into ATP/ADP/apo forms).
  store_path: agents.0.bulk
  index_by: {type: bulk_id, value: "MONOMER0-160[c]"}

- name: dnaA_protein_concentration
  status: derived-needed
  description: |
    Volume-normalised DnaA concentration. Requires a derived listener:
    dnaA_protein_count / cell_volume. Volume is at
    agents.0.listeners.mass.cell_volume (or .volume). Add a small Step
    `DnaaConcentrationListener` that emits at agents.0.listeners.dnaa.protein_uM.
  store_path: agents.0.listeners.dnaa.protein_uM    # provisional

- name: dnaA_mrna_concentration
  status: derived-needed
  description: |
    Same derived-listener pattern as protein_concentration. Emits at
    agents.0.listeners.dnaa.mrna_uM (provisional).
  store_path: agents.0.listeners.dnaa.mrna_uM      # provisional

- name: dnaA_bound_to_promoters_total
  status: available
  description: |
    Count of DnaA molecules currently bound across ALL its TF target TUs
    (not just dnaAp). Read from rna_synth_prob.n_actual_bound at the DnaA
    index. Useful as a coarse autorepression proxy until the per-promoter
    listener lands.
  store_path: agents.0.listeners.rna_synth_prob.n_actual_bound
  index_by: {type: tf_id, value: MONOMER0-160}

- name: dnaap_box_occupancy
  status: aspirational
  description: |
    Per-box (1, 2, 3, 4, a, b, c) DnaA occupancy at the dnaA promoter
    region. Needs a new derived listener that filters
    n_actual_bound by TU=EG10235_RNA and then breaks the count out by
    the (planned) per-box state from chromosome_structure.DnaA_boxes. NOT
    available until dnaa-03 lands the dnaAp box catalog.
  store_path: agents.0.listeners.dnaa.dnaap_box_occupancy   # provisional

# ── Visualizations ──────────────────────────────────────────────────────────
visualizations:
- name: dnaa-counts-vs-time
  address: local:TimeSeriesPlot
  config:
    title: "dnaA mRNA + DnaA protein counts vs time"
    observables: [dnaA_mrna_count, dnaA_protein_count]
- name: dnaa-transcription-events
  address: local:TimeSeriesPlot
  config:
    title: "dnaA transcription init + completion events per step"
    observables: [dnaA_transcription_init_events, dnaA_mrna_synthesized_events]
- name: dnaa-concentration-vs-time
  address: local:TimeSeriesPlot
  config:
    title: "dnaA mRNA + DnaA concentrations vs time (requires derived listener)"
    observables: [dnaA_mrna_concentration, dnaA_protein_concentration]
- name: autorepression-proxy
  address: local:TimeSeriesPlot
  config:
    title: "DnaA bound to its TF targets (coarse autorepression proxy)"
    observables: [dnaA_bound_to_promoters_total]
- name: dnaap-occupancy
  address: local:TimeSeriesPlot
  config:
    title: "dnaAp DnaA-box occupancy (aspirational — needs dnaa-03)"
    observables: [dnaap_box_occupancy]

# ── Tasks (from the plan) ───────────────────────────────────────────────────
tasks:
- "[exists] dnaA transcription events"
- "[exists] dnaA mRNA degradation"
- "[exists] DnaA translation"
- "[exists] DnaA protein dilution/degradation (implicit via division dilution)"
- "[gap-1] Add `DnaaConcentrationListener` Step emitting dnaA protein/mRNA in uM"
- "[gap-2] Expose `translation_efficiency_override` hook on baseline composite"
- "[gap-3] Expose `dnaap_autorepression_multiplier` hook on baseline composite"
- "[gap-4] Expose `dnaA_locus_relative_to_oric` hook (chromosome-coords override)"
- "[gap-5] Add per-box dnaAp occupancy listener (deferred — partly dnaa-03)"

# ── Concrete gaps ───────────────────────────────────────────────────────────
gaps:
- id: gap-1
  title: DnaaConcentrationListener Step
  why: Plot DnaA + dnaA mRNA in uM (the plan's primary readout).
  approach: |
    A Step that reads bulk[MONOMER0-160[c]], bulk[EG10235_RNA], and
    cell_volume, and emits at agents.<id>.listeners.dnaa.{protein_uM,mrna_uM}.
    Convert via Avogadro + volume.

- id: gap-2
  title: translation_efficiency override hook
  why: The `stop-dnaA-synthesis` variant needs to zero out DnaA translation.
  approach: |
    Add `translation_efficiency_override: dict[str, float]` to
    baseline composite parameters; in build_composite, patch
    sim_data.process.translation.translation_efficiency before instantiating
    polypeptide_initiation.

- id: gap-3
  title: dnaap autorepression multiplier
  why: low- / high-autorepression variants.
  approach: |
    Either (a) multiply the (dnaA, EG10235_RNA) entry in fold_changes
    inside a Step that runs before transcript_initiation, or (b) expose
    a single parameter that scales the existing fold-change for that
    (TF, TU) pair at sim-data load.

- id: gap-4
  title: dnaA locus relocation
  why: distal-dnaA-promoter variant — gene-dosage test from the plan.
  approach: |
    Override sim_data.process.replication.genome_data.gene_data
    (EG10235 row, coordinate column) at build_composite time. Complicated
    because replication models gene-dosage by walking from oriC; needs
    care to keep replication-fork advance + DnaA gene dosage consistent.
  defer_until: dnaa-04 (which already touches replication mechanism).

- id: gap-5
  title: per-box dnaAp occupancy listener
  why: Plan asks for occupancy per dnaAp box (1, 2, 3, 4, a, b, c).
  approach: |
    chromosome_structure already has DnaA_boxes with DnaA_bound flags.
    Need to (i) tag dnaAp boxes in the chromosome_structure init, and
    (ii) emit a summary listener.
  defer_until: dnaa-03 (full DnaA-box binding model).

# ── Interventions ───────────────────────────────────────────────────────────
# An intervention is an explicit simulation plan: which baseline, which
# variant, how long to run, when to perturb, and which behavioral tests
# the resulting run unlocks. Each intervention should map 1:N to entries
# in `expected_behavior:` via `triggers_tests:`.
interventions:

- name: steady-state-baseline
  description: |
    Run the baseline composite for one doubling time (no perturbation) and
    capture DnaA + dnaA-mRNA at steady state. Establishes the reference
    pool for all subsequent comparisons.
  variant: null               # baseline composite, no overrides
  protocol:
    duration_min: 60          # one doubling time on minimal media
    seeds: [0, 1, 2, 3, 4]    # multi-seed for distribution checks
  triggers_tests:
    - dnaa-count-in-mass-spec-range
    - dnaa-concentration-stable-within-10pct
    - coarse-autorepression-negative-correlation
  key_observables:
    - dnaA_protein_count
    - dnaA_mrna_count
    - dnaA_transcription_init_events
    - dnaA_bound_to_promoters_total

- name: knockout-translation-and-watch-decay
  description: |
    Apply the stop-dnaA-synthesis variant (translation_efficiency[EG10235]=0)
    from t=0 and watch the DnaA pool decay over one doubling time.
  variant: stop-dnaA-synthesis
  protocol:
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests:
    - stop-synthesis-drops-30pct
    - stop-synthesis-monotonic-decrease
  key_observables:
    - dnaA_protein_count
  requires:
    - variant_hook: translation_efficiency_override   # gap-2

- name: gene-dosage-distal-promoter
  description: |
    Move the dnaA locus to ~50% relative-to-oriC distance. Run for two
    doublings to capture the gene-dosage shift around replication.
    Required to evaluate BT-05 (post-initiation transcription-rate spike).
  variant: distal-dnaA-promoter
  protocol:
    duration_min: 120
    seeds: [0, 1, 2, 3, 4, 5]
  triggers_tests:
    - post-initiation-gene-dosage-spike
  key_observables:
    - dnaA_transcription_init_events
    - dnaA_protein_count
  requires:
    - variant_hook: dnaA_locus_relative_to_oric        # gap-4
    - listener:    replication_initiation_event       # initiation-event detector

- name: autorepression-strength-sweep
  description: |
    Sweep dnaap_autorepression_multiplier across [0.1, 1.0, 3.0] (low /
    baseline / high) and compare steady-state DnaA pool. Confirms the
    feedback knob inversely scales the pool size.
  variant: [low-autorepression, baseline, high-autorepression]
  protocol:
    kind: sweep
    duration_min: 60
    seeds: [0, 1, 2]
  triggers_tests: []     # no quantitative test yet; visualization-only
  key_observables:
    - dnaA_protein_count
    - dnaap_box_occupancy
  notes: |
    Designed as a visualization-driven sanity check. Add a quantitative
    test (e.g. "steady-state DnaA scales inversely with repression
    multiplier") once gap-3 lands and the sweep produces clean data.
  requires:
    - variant_hook: dnaap_autorepression_multiplier   # gap-3

# ── Expected behavior ───────────────────────────────────────────────────────
#
# Each entry is a precise, testable prediction. The user-facing field is
# `en:` — a one-sentence English description that goes in the Overview tab.
# `given / measure / expect` is the machine-readable form that
# `tests/_behaviors.py` turns into a pytest assertion at run time, so every
# English sentence here auto-generates exactly one test.
#
# Grammar:
#   en:      one-sentence English summary.
#   given:   {run: baseline | <variant-name>, window: full | second_half |
#             post_initiation_10min, ...}
#   measure: {kind: bulk_count | listener_path | listener_sum | xy_correlation,
#             ...measure-specific args, reduce: median | mean | series |
#             first_and_last | top_quartile_vs_bottom_quartile}
#   expect:  {op: in_range | rolling_cv_below | ratio_at_most |
#             ratio_at_least | pearson_below | pearson_above | monotonic_decreasing,
#             ...op-specific args}
#   status:  implemented | stub | gated
#   requires: optional list of {gap | listener | variant_hook} cross-refs.
#
# This is the canonical source of truth for dnaa-01's behavioral tests.
# The dashboard should render `en:` on the Overview tab; pytest is invoked
# from tests/test_behaviors.py which iterates over this list.
expected_behavior:

- name: dnaa-count-in-mass-spec-range
  en: "Under steady growth, DnaA monomer count per cell is between 300 and 800 (mass-spec / EcoCyc range)."
  given:  {run: baseline, window: second_half}
  measure: {kind: bulk_count, id: "MONOMER0-160[c]", reduce: median}
  expect:  {op: in_range, low: 300, high: 800}
  status: implemented

- name: dnaa-concentration-stable-within-10pct
  en: "DnaA concentration is stable across the cycle: rolling 5-step coefficient of variation stays below 0.10."
  given:  {run: baseline, window: second_half}
  measure:
    kind: bulk_count
    id: "MONOMER0-160[c]"
    reduce: series
  expect:  {op: rolling_cv_below, window_steps: 5, threshold: 0.10}
  status: implemented
  requires:
    - listener: dnaA_protein_concentration   # gap-1: prefer the concentration listener once it exists

- name: stop-synthesis-drops-30pct
  en: "If you stop DnaA synthesis, DnaA count drops by at least 30% over one doubling time."
  given:  {run: variant, variant: stop-dnaA-synthesis, window: full}
  measure: {kind: bulk_count, id: "MONOMER0-160[c]", reduce: first_and_last}
  expect:  {op: ratio_at_most, ratio: 0.70}   # last / first ≤ 0.70
  status: implemented
  requires:
    - variant_hook: translation_efficiency_override   # gap-2

- name: stop-synthesis-monotonic-decrease
  en: "If you stop DnaA synthesis, DnaA count decreases monotonically (no rebound)."
  given:  {run: variant, variant: stop-dnaA-synthesis, window: full}
  measure: {kind: bulk_count, id: "MONOMER0-160[c]", reduce: series}
  expect:  {op: monotonic_decreasing, allow_rebound_pct: 5}
  status: implemented
  requires:
    - variant_hook: translation_efficiency_override   # gap-2

- name: coarse-autorepression-negative-correlation
  en: "When DnaA is highly bound to its promoter targets, dnaA transcription init events are low (autorepression; Pearson r < -0.3)."
  given:  {run: baseline, window: second_half}
  measure:
    kind: xy_correlation
    x: {kind: listener_sum, path: "listeners.rna_synth_prob.n_actual_bound"}
    y: {kind: listener_sum, path: "listeners.rnap_data.rna_init_event"}
  expect:  {op: pearson_below, threshold: -0.3}
  status: implemented

- name: post-initiation-gene-dosage-spike
  en: "Within 10 minutes of a replication initiation event, dnaA transcription rate rises by at least 50% (gene dosage doubles)."
  given:  {run: baseline, window: post_initiation_10min}
  measure: {kind: listener_sum, path: "listeners.rnap_data.rna_init_event", reduce: pre_post_event_ratio}
  expect:  {op: ratio_at_least, ratio: 1.5}
  status: stub
  requires:
    - listener: replication_initiation_event   # initiation-event detection — defer to dnaa-04
  notes: "Stub until dnaa-04 lands the initiation-event detector. Pytest marks this xfail."

expert_questions:
- Ask Katayama and Lobner-Olesen labs for opinions on dnaA autorepression.
- Ask about each DnaA box in the dnaA promoter region (boxes 1-4 + a-c).
- Confirm that the existing transcript_initiation autoregulation (driven by
  the dnaA→EG10235_RNA fold change) is biologically appropriate as the
  starting baseline — or whether the explicit dnaAp box-occupancy
  mechanism is required from the outset.

bibliography:
  expert: [replication_initiation_molecular_info, chromosome_replication_plan]
  bib_keys:
    # Primary (expert doc + plan):
    - Boesen2024PNAS                  # DnaA-ATP fraction
    - Hansen2018DnaATale              # key review
    - Katayama2017Frontiers           # DnaA cycle review
    - Speck1999EMBO                   # dnaA promoter / autorepression
    - Saggioro2013BiochemJ            # dnaAp temp-dependence
    # DnaA abundance reference range (300-800/cell):
    - Sekimizu1991JBacteriol          # original DnaA abundance measurement
    - Schmidt2016NatBiotechnol        # E. coli proteome (mass-spec)
    - Li2014Cell                      # absolute synthesis rates
    - Mori2021MolSysBiol              # absolute proteome under growth conditions
    - Liu2020NatMicrobiol             # DnaA stoichiometry (Chenli Liu lab)
    # DnaA protein stability:
    - Hansen1999JBacteriol            # half-life / turnover
    - Hansen2021FrontMolBiosci        # stability in growth-rate transitions
  claims: [dnaa.autorepression.dnaap, dnaa.expression.steady-300-800, dnaa.protein.stability, dnaa.boxes.dnaap-2high-2low]

# ── Tests (v4 shape) ────────────────────────────────────────────────────────
# Picked up by vivarium_dashboard/lib/study_tests.py: shells out to pytest
# against studies/<slug>/tests/ and writes a summary into tests.last_results.
tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null

runs: []
conclusion: null
parent_studies: []
