name: Study tests

# Runs pytest against every `studies/*/tests/` directory on PRs targeting
# main. Posts a per-study PASS / FAIL summary comment so reviewers can
# screen scientific changes without leaving GitHub. PR-gating: branch
# protection should require this workflow to succeed before merge.
#
# Lifecycle alignment: this is the CI gate at the "Open PR" boundary in
# the Investigation → Branch → PR loop the dashboard implements. The
# dashboard's "Open PR" flow auto-commits the investigation HTML report,
# pushes the branch, and opens the PR; this workflow validates that the
# per-study behavior_tests still pass against the branch's state.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: study-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  study-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the PR-comment summary

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install workspace
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .[dev] || uv pip install -e .

      - name: Discover studies
        id: discover
        run: |
          studies=$(find studies -maxdepth 2 -type d -name tests | sort | sed 's|/tests$||')
          echo "Studies with tests/ dir:"
          echo "$studies"
          # Newline-separated, exported for the next step via a file.
          echo "$studies" > .studies-with-tests.txt

      - name: Run per-study tests
        id: run
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mkdir -p .study-test-results
          overall=0
          while IFS= read -r study; do
            [ -z "$study" ] && continue
            name=$(basename "$study")
            echo "── Running $name ──"
            # Use junit-xml so the summary step can parse counts. Don't fail
            # the workflow on a single study failure — collect them all,
            # then mark overall non-zero if any failed.
            if pytest "$study/tests" \
                --tb=short --maxfail=20 \
                --junitxml=".study-test-results/${name}.xml" \
                -p no:cacheprovider; then
              echo "  PASS $name"
            else
              code=$?
              echo "  FAIL $name (exit $code)"
              overall=1
            fi
          done < .studies-with-tests.txt
          exit $overall

      - name: Summarise results
        if: always()
        id: summarise
        run: |
          python - <<'PY'
          import json, os, glob, xml.etree.ElementTree as ET
          rows = []
          for path in sorted(glob.glob('.study-test-results/*.xml')):
              name = os.path.basename(path)[:-4]
              try:
                  root = ET.parse(path).getroot()
                  if root.tag == 'testsuites':
                      suites = root.findall('testsuite')
                  else:
                      suites = [root]
                  total = passed = failed = skipped = errors = 0
                  for s in suites:
                      total   += int(s.get('tests', 0))
                      failed  += int(s.get('failures', 0))
                      errors  += int(s.get('errors', 0))
                      skipped += int(s.get('skipped', 0))
                  passed = total - failed - errors - skipped
                  rows.append({
                      'study': name, 'total': total, 'passed': passed,
                      'failed': failed, 'errors': errors, 'skipped': skipped,
                  })
              except Exception as e:
                  rows.append({'study': name, 'parse_error': str(e)})

          # Markdown summary for the PR comment + the Actions log.
          lines = ['## Study test results', '',
                   '| Study | Total | ✓ Passed | ✗ Failed | ⚠ Errors | ⏭ Skipped |',
                   '|---|---:|---:|---:|---:|---:|']
          for r in rows:
              if 'parse_error' in r:
                  lines.append(f"| `{r['study']}` | — | — | — | — | — _({r['parse_error'][:40]})_ |")
                  continue
              lines.append(f"| `{r['study']}` | {r['total']} | "
                           f"{r['passed']} | {r['failed']} | {r['errors']} | {r['skipped']} |")
          if not rows:
              lines.append('| _no studies with tests/_ | — | — | — | — | — |')

          summary = '\n'.join(lines)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary + '\n')
          with open('.study-summary.md', 'w') as f:
              f.write(summary)
          PY

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: study-tests
          path: .study-summary.md

      - name: Fail workflow on test failures
        if: steps.run.outcome == 'failure'
        run: exit 1
