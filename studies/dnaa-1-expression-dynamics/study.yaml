    reviewer: Rashmi
    source: feedback-dnaa-replication-2026-05-30-13-11-10.yaml
    verdict_effect: reframes-acceptance + flags-no-valid-run
    notes: |
      Two annotations integrated:
        - build ("check whether the monomer counts listener provides
          protein counts in all forms, if yes we can use it directly")
          → captured as report.build_method.dnaa_monomer_total: resolve
          from the re-run whether listeners.monomer_counts already
          aggregates all DnaA forms; if so, use directly.
        - limitations ("the pdf target here means the biologically
          expected rate. Tuning the RNA synthesis probability resulted in
          1.01 events per minute which is close to the biologically
          expected value. This also resulted in getting the DnaA counts
          within expected range.") → reframed the acceptance: the PRIMARY
          target is the dnaA mRNA initiation rate near the biological
          ≈1 event/min, and the in-band DnaA pool is its consequence.
          Promoted dnaa-mrna-init-rate test to primary; retargeted it to
          ≈1.0 event/min; rewrote the "8× discrepancy" limitation as a
          resolved category error.
      Separately (not from the PDF, found while integrating): the prior
      "pass" had NO valid run behind it (FBA SUC[p] failure, then a
      1-row/gen flush bug). Verdict demoted to in-progress and a
      full-series re-run launched.

