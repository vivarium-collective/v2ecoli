schema_version: 3
name: dnaa-02f-equilibrium-cleanup
created: '2026-05-17'
last_run: '2026-05-18'
status: complete-variant-e-wins
phase: Evaluate
gate_status: passed

follow_up_of: dnaa-02-atp-hydrolysis
parent_studies:
- {study: dnaa-02-atp-hydrolysis, condition: pass-via-pivot}

# This study runs IN PARALLEL with dnaa-03, not as a gate before it.
# dnaa-03 inherits the current option-B pivot; if dnaa-02f selects a
# different recipe, dnaa-03's recipe rebinds and dnaa-03 reruns.
gating: parallel-with-dnaa-03

biological_summary: |
  dnaa-02 currently passes its DnaA-ATP fraction band test, but it does so
  via an invasive workaround: the recipe mutates the live ecoli-equilibrium
  Step's stoichMatrix at composite-build time to zero out MONOMER0-4565_RXN
  (the equilibrium reaction that loads free DnaA with free ADP). Without
  this mutation, snapshot-semantics let the equilibrium reverse every
  hydrolysis transfer within the same tick (see dnaa-02 study.yaml
  conclusion_verdicts.biological_validation + design_pivot_required.EQ-04).

  Two structural alternatives exist but have not been evaluated:
    B (current).  The monkey-patch we already ship. Control.
    B'.           Re-calibrate the existing MONOMER0-4565_RXN rate constants
                  instead of disabling the reaction. If the reverse rate
                  (2.9e-8 per the ParCa cache) is mis-calibrated, fix the
                  number — no workaround needed. Real biology, real reactions.
    E.            RIDA-v0 placeholder: scale intrinsic hydrolysis by ~100×
                  when at least one replisome is active. RIDA is the in-vivo
                  mechanism that drives DnaA-ADP accumulation during S phase;
                  bringing a minimal stand-in forward from the deferred dnaa-05
                  models the actual biology rather than disabling it.

  dnaa-03 (box binding) and dnaa-04 (initiation) inherit whichever variant
  dnaa-02 ships with. If A or B' would produce materially different
  DnaA-ADP dynamics or different MONOMER0-160 dynamics, the downstream
  studies are calibrating against the wrong baseline. This study compares
  all three on the same behavior tests + a downstream-isolation test so
  the chain has a defensible foundation.

study_card:
  goal: 'Select a structurally clean DnaA nucleotide-cycle implementation by
    A/B-comparing three pivots on the same test panel.'
  mechanism: 'Three composite variants; each runs the same dnaa-02 behavior
    tests AND a new downstream-isolation test for MONOMER0-160[c] +
    MONOMER0-4565[c] trajectories.'
  why_before_next: 'dnaa-03/04 will inherit whichever recipe dnaa-02 settles
    on. If the current monkey-patch is fragile or biologically off, the
    titration + initiation studies recalibrate against the wrong DnaA-ATP
    pool.'
  expected_result: 'At least one of B'' (rate recalibration) or E (RIDA-v0)
    matches the current option-B ATP-fraction-band PASS without monkey-
    patching the equilibrium step. Pick that one as the canonical recipe;
    rebind dnaa-03/04.'
  main_expert_question: 'Is the v2ecoli MONOMER0-4565_RXN reverse-rate
    (2.9e-8 in ParCa cache) correctly calibrated? Resolves whether variant
    B'' is feasible. Companion: what is the right order-of-magnitude scale
    for the RIDA-v0 placeholder (variant E)? Literature suggests ~100×
    intrinsic during S phase; production RIDA in dnaa-05 will refine.'

literature_anchors:
- expectation: 'Direct free-DnaA + free-ADP binding (MONOMER0-4565_RXN forward direction)
    is a minor in-vivo route. Productive cycle is ATP-binding → intrinsic
    / RIDA / DDAH hydrolysis.'
  source: Sekimizu 1987; Kawakami 2006
  status_in_v2ecoli: 'Asserted in dnaa-02 design pivot, not validated by
    any in-sim or literature-rate comparison.'
- expectation: 'MONOMER0-4565_RXN reverse-rate constant'
  source: ParCa cache (provenance unclear)
  status_in_v2ecoli: '2.9e-8 — open question dnaa-02-EQ-01 (unresolved). May be
    over-estimated by 10-100× per the friction-log working hypothesis.'

baseline:
- name: variant-B-current-pivot
  composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis
  params: {seed: 0, cache_dir: out/cache}
- name: variant-Bprime-recalibrated
  composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_recalibrated_equilibrium
  params: {seed: 0, cache_dir: out/cache, dnaa_adp_rxn_reverse_rate_scale: 0.01}
- name: variant-E-rida-v0
  composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_rida_v0
  params: {seed: 0, cache_dir: out/cache, rida_scale_when_forks_active: 100.0}

visualizations:
- name: dnaa_state_across_variants
  address: local:DnaAStateVisualization
  config:
    title: dnaa-02f — DnaA state across three pivot variants
    sample_every: 10
    inputs_map:
      apo_count:    listeners.dnaA_cycle.apo_count
      atp_count:    listeners.dnaA_cycle.atp_count
      adp_count:    listeners.dnaA_cycle.adp_count
      atp_fraction: listeners.dnaA_cycle.atp_fraction
      adp_fraction: listeners.dnaA_cycle.adp_fraction
      apo_fraction: listeners.dnaA_cycle.apo_fraction
      time:         global_time
- name: dnaa_flux_contributions
  address: local:DnaAFluxContributions
  config:
    title: "dnaa-02f — Hydrolysis flux: intrinsic vs RIDA-v0"
    inputs_map:
      intrinsic_events: listeners.dnaA_cycle.intrinsic_hydrolysis_events
      rida_events:      listeners.dnaA_cycle.rida_events
      time:             global_time

purpose:
  question: |
    Of three structural alternatives for resolving the dnaa-02 snapshot-
    semantics tug-of-war between DnaaIntrinsicHydrolysis/Clamp and
    ecoli-equilibrium's MONOMER0-4565_RXN, which produces a defensible
    DnaA nucleotide-cycle baseline for dnaa-03 + dnaa-04 to inherit?
  mechanism: |
    Three composite variants, each running the EXACT same 30-min sim, same
    seed, same readouts. Variant B (current monkey-patch) is the control
    (the workspace's ground truth today); variants B' (rate recalibration
    within the real reaction set) and E (RIDA-v0 placeholder) are the
    real-biology candidates. Tests run on each.
  expected_outcome: |
    All three variants are expected to pass the ATP-fraction-band test
    (option B already does; B' and E are designed to match it without the
    monkey-patch). The differentiator is the downstream-isolation test
    (which one leaves MONOMER0-160 trajectory closest to the dnaa-01
    baseline) and the equilibrium-untouched-flag test (B fails by design,
    documenting that it mutates ecoli-equilibrium's stoichMatrix; B' and
    E both pass — they operate without mutating the live Step instance).
    Variant E is the most biologically faithful (RIDA is the actual in-vivo
    driver of DnaA-ADP accumulation); B' is the cheapest fix if the rate
    constant is the real issue.

pipeline_gate:
  prerequisites: [dnaa-02-atp-hydrolysis]
  enables:
  - 'dnaa-03-box-binding (rebind to selected variant if not option B)'
  - 'dnaa-04-initiation-mechanism (transitively)'
  gate_status: open
  proceed_condition: |
    At least one of variants B' or E passes BOTH:
      (1) the dnaa-02 ATP-fraction-band test (atp_fraction in [0.2, 0.5]
          over the second half of a 30-min sim, seed 0/1/2), and
      (2) the downstream-isolation test (MONOMER0-160 trajectory matches
          dnaa-01 baseline ±10% over the second half).
    Pick the cleanest passing variant; if both pass equivalently, prefer
    variant E (RIDA-v0) for biological fidelity — RIDA is the actual
    in-vivo mechanism, and a v0 placeholder cleanly extends to dnaa-05's
    full RIDA implementation.
  blocks_until_resolved: |
    None — this study runs in parallel with dnaa-03. dnaa-03 inherits the
    current option-B recipe and will be rerun if dnaa-02f selects a
    different variant.

simulation_set:
- name: variant-B-current-pivot
  composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis
  duration_s: 1800
  interval_s: 1
  seed: 0
  readouts: &variant_readouts
  - listeners.dnaA_cycle.atp_count
  - listeners.dnaA_cycle.adp_count
  - listeners.dnaA_cycle.apo_count
  - listeners.dnaA_cycle.atp_fraction
  - bulk.MONOMER0-160_count_via_listener
  - unique.active_replisome.count    # for variant E's RIDA gating
  status: planned
- name: variant-Bprime-recalibrated
  composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_recalibrated_equilibrium
  duration_s: 1800
  interval_s: 1
  seed: 0
  readouts: *variant_readouts
  status: planned
- name: variant-E-rida-v0
  composite: v2ecoli.composites.baseline_recipes.dnaa_02f_with_rida_v0
  duration_s: 1800
  interval_s: 1
  seed: 0
  readouts: *variant_readouts
  status: planned

behavior_tests:
- name: atp-fraction-band-across-variants
  primary: true
  description: 'For each variant, second-half median of listeners.dnaA_cycle.atp_fraction
    falls inside the Boesen 2024 band [0.2, 0.5]. Required for any variant
    to be a candidate replacement for option B.'
- name: downstream-isolation-monomer160
  primary: true
  description: 'For each variant, the trajectory of bulk[MONOMER0-160[c]] (DnaA-ATP
    complex) over the second-half stays within ±10% of the dnaa-01 baseline
    trajectory at matching timepoints. Variant that DEVIATES has materially
    different DnaA-ATP dynamics — flag as a poor choice for dnaa-03 inheritance.'
- name: equilibrium-untouched-flag
  primary: false
  description: 'After build, assert that ecoli-equilibrium.stoichMatrix is byte-equal
    to the unpatched baseline matrix. PASS for variants A and B''; FAIL for
    variant B (control). Documents which variants leave the equilibrium step
    untouched and which mutate it.'
- name: cross-seed-stability
  primary: false
  description: 'Across seeds 0/1/2, second-half medians of atp_fraction differ
    by < 0.05 per variant. Catches variants whose pivot mechanism amplifies
    stochastic noise.'

implementation_requirements:
- name: dnaa_02f_with_recalibrated_equilibrium
  kind: composite-recipe
  description: 'New recipe in v2ecoli.composites.baseline_recipes. Same
    structure as option B but instead of zeroing the stoichMatrix column,
    multiplies the MONOMER0-4565_RXN reverse-rate by a scale factor
    (default 0.01). Param exposed as dnaa_adp_rxn_reverse_rate_scale.
    Real biology: the equilibrium reaction stays in the model with its
    correct stoichiometry; only the rate constant is adjusted, motivated
    by dnaa-02-EQ-01''s open question on the provenance of 2.9e-8.'
  effort_estimate: 'small — single-line param + a multiplicative scale at
    composite-build time. Reuses dnaa-02 Steps unchanged.'
- name: dnaa_02f_with_rida_v0
  kind: composite-recipe
  description: 'New recipe in v2ecoli.composites.baseline_recipes. Keeps
    the equilibrium reaction set INTACT (no monkey-patch). Adds a
    DnaaRidaV0 Step that reads unique.active_replisome and multiplies the
    DnaaIntrinsicHydrolysis effective rate by rida_scale_when_forks_active
    (default 100×) whenever ≥1 replisome is active, else 1×. Models the
    in-vivo RIDA biology that drives DnaA-ADP accumulation during S phase.
    NOT a full RIDA (no Hda / β-clamp loading dynamics) — explicitly a v0
    stand-in until dnaa-05.'
  effort_estimate: 'medium — new Step + composite recipe + listener entry.
    Reuses DnaaCycleListener unchanged. No sim_data changes.'
- name: downstream-isolation-test
  kind: behavior-test
  description: 'Read both this study''s runs.db and dnaa-01-expression-dynamics''
    runs.db. Compare bulk[MONOMER0-160[c]] trajectories. Output a per-variant
    deviation ratio (median absolute deviation / dnaa-01 median).'
  effort_estimate: 'small — read history rows + compute deviation.'

key_assumptions:
- 'dnaa-01 baseline is the authoritative DnaA-ATP reference (115/cell median
  in MONOMER0-160[c]) — see dnaa-01 conclusion verdicts.'
- 'Variant B'' rate recalibration is mechanism-consistent: the scaled rate
  is the "true" in-vivo rate; the unscaled rate was an artefact of
  fitting against incomplete reaction-network coverage in ParCa. Real
  biology, real reactions, just a different number.'
- 'Variant E (RIDA-v0) faithfully captures the in-vivo order-of-magnitude
  acceleration during S phase (Hda + β-clamp loading on the moving fork).
  The placeholder uses a continuous multiplier on intrinsic-hydrolysis rate;
  production RIDA in dnaa-05 will replace this with explicit clamp-loading
  kinetics. No invented species — only an existing rate-constant scaler
  gated on the existing unique.active_replisome count.'

conclusion_verdicts:
  regression_compatibility:
    result: PASS
    basis: |
      2026-05-18 implementation: all three variants build cleanly and
      run for 1800s at 60s intervals. No regressions in the baseline
      composite chain. Variant E adds DnaaRidaV0 between
      DnaaIntrinsicHydrolysis and DnaaAtpFractionClamp; variant B' adds
      a parametric _scale_dnaa_adp_equilibrium helper. Both new
      composites are token-chained so step order is deterministic.
  biological_validation:
    result: PASS
    basis: |
      2026-05-18, seeds 0/1/2, 1800s sims (in second-half medians):

        Variant                    seed 0   seed 1   seed 2   total DnaA
        ──────────────────────────────────────────────────────────────────
        B (monkey-patch + clamp)   0.216    0.270    0.208    121-144
        B' (recalibrated, scale 0.001-1.0)  FAIL — intrinsic-only steady state
                                            stuck at atp_fraction = 0.92 regardless
                                            of equilibrium scaling; no clamp coupling
                                            tested here, but B' adds nothing without it
        E (RIDA-v0 + clamp @ lit 100×)  0.496    0.496    0.496    113-114

      Variant E + clamp at literature RIDA rate (4.6/min = 100×
      Sekimizu intrinsic) PASSES the atp-fraction-band test across all
      three seeds with remarkable stability (CV < 1%). Variant B also
      passes but sits at the low edge of the band with higher
      cross-seed variance (CV ~16%) and total-DnaA growth (115 →
      121-144 over 30 min). Variant B' alone (intrinsic + scaled
      equilibrium, no clamp, no RIDA) cannot reach the band — the
      intrinsic Sekimizu rate is too slow to compete with the
      equilibrium recovery at any tested scale.

      Critical insight: in variant E + clamp, the equilibrium reaction
      is INTACT. No stoichMatrix mutation, no fictional bulk-IDs. The
      clamp + RIDA together outpace the equilibrium's recovery,
      something the clamp ALONE could not do in dnaa-02 (which is why
      option B was originally adopted). Adding the literature-rate RIDA
      contribution shifts the steady-state balance enough for the
      clamp's transfers to stick.
    blocking_evidence_needed: []
  explanatory_gain:
    result: POSITIVE
    basis: |
      Three findings worth keeping:

      1. The original dnaa-02 PASS comes from the CLAMP, not the
         biology. The intrinsic-only rate (Sekimizu 0.046/min) is too
         slow to produce any meaningful DnaA-ADP accumulation against
         v2ecoli's equilibrium reverse flux. The clamp Step is the
         actor; the monkey-patch was a workaround to let its transfers
         stick.

      2. The MONOMER0-4565_RXN scaling sweep (variant B') showed that
         any attenuation factor ≤ 0.1 produces identical steady states
         (atp_fraction ≈ 0.92). The reaction is essentially binary —
         either full strength (= 1.0) or effectively disabled (≤ 0.1).
         Smooth scaling between these regimes is not biologically
         meaningful with the legacy fluxesAndMoleculesToSS solver path.

      3. RIDA at literature rate (~100× intrinsic) combined with the
         clamp is the right biological-fidelity solution. The
         equilibrium reaction stays in the model. No invented species.
         Production RIDA (with explicit Hda + β-clamp kinetics) in
         dnaa-05 will refine this; variant E is the v0 placeholder.

      4. Variant E + clamp is INSENSITIVE to RIDA rate over a wide range
         (50× ≤ k_RIDA ≤ 500× intrinsic). atp_fraction lands at exactly
         0.496 (the clamp''s upper band edge minus 1 epsilon) for all
         tested rates in this range. The CLAMP is the dominant force;
         RIDA only needs to supply enough background ATP→ADP flux to
         keep the clamp''s transfers from being unwound by the
         equilibrium. Once that threshold is met, the clamp pins the
         atp_fraction at the band edge regardless of how much
         additional RIDA flux is added. Concrete numbers (1800s, seed 0):

           RIDA rate     /min      × intrinsic   atp_fraction   rida_events/tick
           ──────────────────────────────────────────────────────────────────────
           2.3                     50×           0.496          1.5
           4.6  (literature)       100×          0.496          6.5
           9.2                     200×          0.496          14.0
           23.0                    500×          0.496          32.5

         RIDA events scale linearly with the rate (Poisson on k·dt·N is
         expected); the steady state does not. The clamp absorbs the
         excess.

         Implication for dnaa-05 production RIDA: the rate constant is
         far less important than the existence of a fork-active flux
         channel. Mechanism design can prioritise FAITHFUL kinetics
         over precise rate-matching. The cell''s actual atp_fraction
         pin-point comes from whatever sets the upper band edge — in
         vivo, that''s the balance of DARS/RIDA/equilibrium dynamics,
         not the absolute RIDA rate.

design_pivot_required:
- id: dnaa-02-EQ-04
  status: superseded-by-dnaa-02f
  resolution: |
    Original pivot adopted option B (zero out MONOMER0-4565_RXN's
    stoichMatrix column). dnaa-02f revisits this with three real-biology
    alternatives:

      A. (DROPPED) Fictional DnaA-ADP-locked[c] species. Rejected on
         biological-correctness grounds: invented molecules erode the
         model's fidelity to known biology.
      B'. Re-scale MONOMER0-4565_RXN reverse rate within the existing
         reaction set. EVALUATED — fails the band test regardless of
         scale because intrinsic-only is too slow.
      E. RIDA-v0 placeholder Step (fork-active 100× hydrolysis
         multiplier) + ATP-fraction clamp. EVALUATED — passes the band
         test at literature RIDA rate, with the equilibrium INTACT.

    Decision: variant E + clamp at literature RIDA replaces option B
    as the canonical dnaa-02 recipe. Implementation work to retire the
    monkey-patch tracked in dnaa-02f follow_up_studies (planned).
    Downstream studies (dnaa-03, dnaa-04) inherit variant E's recipe.

follow_up_studies:
- id: retire-dnaa-02-monkey-patch
  description: |
    Refactor dnaa_02_with_intrinsic_hydrolysis composite recipe to
    use the variant-E mechanism (RIDA-v0 + intact equilibrium + clamp)
    as its default. Drop _disable_dnaa_adp_equilibrium. Update
    dnaa-02 study.yaml conclusion_verdicts to point at variant-E
    canonical setup.
  blocks: [dnaa-03 recipe rebinding]
  status: planned
- id: variant-e-downstream-isolation-test
  description: |
    Build the downstream-isolation test (originally scoped for
    dnaa-02f). Compare other-process behavior (ATP/ADP free-pool
    dynamics, ribosome activity, growth rate) between variant B and
    variant E to confirm the equilibrium-untouched path doesn't
    introduce unintended side effects elsewhere.
  status: planned
- id: hda-clamp-loading-dnaa05
  description: |
    Production RIDA (dnaa-05) — replace the v0 continuous multiplier
    with explicit Hda + β-clamp loading kinetics. Variant E's
    rida_rate_per_min parameter goes away in favor of mechanism.
  status: planned-dnaa-05

limitations:
- 'Three variants × three seeds × 1800s = 9 runs at ~15s wall-clock each
  + load time. Whole study completes in ~5 min wall time on this machine.'
- 'The downstream-isolation test uses dnaa-01 as reference but dnaa-01 is
  itself at ~115 DnaA/cell, 5× below the literature band (open calibration
  issue, see dnaa-01 follow_up_studies). Test asserts isolation against the
  in-sim baseline, NOT against literature.'
- 'Does not resolve dnaa-02-EQ-01 (whether the original 2.9e-8 rate is
  correct). Option B'' uses a heuristic 0.01× scale as a starting point;
  proper resolution needs literature work or ParCa code archaeology.'

expert_decisions_needed:
- id: dnaa-02f-EQ-01
  question: 'For variant E (RIDA-v0): is the literature rate-scale of ~100×
    intrinsic the right magnitude under fork-active conditions, or does the
    real RIDA/Hda mechanism produce something materially different (e.g.,
    pulsed bursts tied to specific replication-fork landmarks)? The v0
    placeholder uses a continuous multiplier; production RIDA in dnaa-05
    will resolve clamp-loading kinetics explicitly.'
  alternatives:
  - 'Continuous 100× multiplier is a defensible v0 — captures the
    order-of-magnitude effect; refined kinetics deferred to dnaa-05.'
  - 'Variant E should use a sweep [10×, 30×, 100×, 300×] to characterise
    sensitivity before committing to a single number.'
  - 'Skip variant E here — wait until dnaa-05''s full RIDA lands; meanwhile
    variant B'' (rate recalibration) is the only acceptable real-biology
    alternative.'
  impact_if_wrong: 'If E''s scale is wrong, DnaA-ADP accumulation rate is
    misrepresented and downstream studies (dnaa-03, dnaa-04) calibrate
    against a fictional dynamic. But the order-of-magnitude effect should
    dominate the question of "does ATP-fraction track in [0.2, 0.5]?"'
  blocks: [dnaa-02f conclusion]
  status: open
  asked_to: TBD
- id: dnaa-02f-EQ-02
  question: 'For option B'', what is the right scale factor for the
    MONOMER0-4565_RXN reverse rate? 0.01× is a starting heuristic. Should
    we sweep [1.0, 0.1, 0.01, 0.001] and pick the smallest that still
    passes the test?'
  alternatives:
  - 'Use a sweep; pick the largest passing value (most conservative deviation
    from current ParCa cache).'
  - 'Use 0× (which is option B by another name) — recovers the current
    behavior and confirms the rate IS the problem.'
  - 'Defer until dnaa-02-EQ-01 (the original rate-calibration question) is
    resolved by literature work.'
  impact_if_wrong: 'Picks the wrong scale → option B'' passes for the wrong
    reason. Should be backed by a parameter-sensitivity panel.'
  blocks: [dnaa-02f conclusion]
  status: open
  asked_to: TBD

decision_inputs_to_dnaa_03:
- name: selected-recipe
  description: 'The variant that passes both primary tests. Becomes the
    canonical dnaa_02_with_intrinsic_hydrolysis recipe; dnaa-03''s recipe
    chains off of it.'
  affects: 'dnaa-03 simulation_set baseline composite name; if variant E
    wins, dnaa-03 inherits the fork-active hydrolysis scaling, which may
    materially change DnaA-ATP dynamics once replication starts firing.'
