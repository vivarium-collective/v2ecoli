name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Two jobs run in parallel:
#   fast-tests      — unit + state-only tests, target <30 s, PR-gating
#   behavior-tests  — simulation-running tests (composite.run), target <5 min, PR-gating
# A PR only merges when BOTH are green (branch protection requires both).
#
# NOTE: process-bigraph and bigraph-schema are installed from GitHub (main)
# because the PyPI releases (0.0.x) are incompatible with v2ecoli's 1.x API.
# The [tool.uv.sources] section in pyproject.toml points to local editable
# paths for development; CI overrides these with GitHub installs.

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12.9

      - name: Install dependencies (PyPI only)
        run: uv sync --extra dev || uv sync

      - name: Install process-bigraph and bigraph-schema from GitHub
        run: |
          uv pip install --reinstall "process-bigraph @ git+https://github.com/vivarium-collective/process-bigraph.git@api" "bigraph-schema @ git+https://github.com/vivarium-collective/bigraph-schema.git@api"

      - name: Run fast tests (no .run() calls)
        # -n auto: pytest-xdist parallelism (~4 workers on ubuntu-latest).
        # --dist=loadfile keeps tests from the same file on one worker —
        # any module-level fixtures (caches, registry setup) only pay
        # the build cost once per file, not once per worker.
        run: >-
          uv run pytest
          -m "not slow and not sim"
          --ignore=tests/test_initialize.py
          --ignore=tests/test_kinetics_units.py
          --ignore=tests/test_unit_bridge.py
          -n auto --dist=loadfile
          -v --tb=short

  behavior-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12.9

      - name: Install dependencies (PyPI only)
        run: uv sync --extra dev || uv sync

      - name: Install process-bigraph and bigraph-schema from GitHub
        run: |
          uv pip install --reinstall "process-bigraph @ git+https://github.com/vivarium-collective/process-bigraph.git@api" "bigraph-schema @ git+https://github.com/vivarium-collective/bigraph-schema.git@api"

      # Cache out/cache (initial_state.json + sim_data_cache.dill +
      # cache_version.json) across PRs. The cache key pins to the same
      # input files that cache_version.compute_cache_version fingerprints,
      # so a change to ParCa fixture or the LoadSimData boundary forces
      # a rebuild on the next CI run. The hashFiles list mirrors
      # cache_version.INPUT_FILES, plus cache_version.py itself so future
      # additions to INPUT_FILES automatically bust the cache.
      - name: Restore ParCa cache
        id: parca-cache
        uses: actions/cache@v4
        with:
          path: out/cache
          key: >-
            parca-cache-v3-${{ hashFiles(
              'models/parca/parca_state.pkl.gz',
              'v2ecoli/library/sim_data.py',
              'v2ecoli/library/unit_bridge.py',
              'v2ecoli/types/quantity.py',
              'v2ecoli/library/initial_conditions.py',
              'v2ecoli/library/cache_version.py',
              'v2ecoli/core.py',
              'v2ecoli/composites/baseline.py',
              'v2ecoli/composites/colony.py',
              'v2ecoli/composites/departitioned.py',
              'v2ecoli/composites/reconciled.py',
              'v2ecoli/composites/millard_pdmp_baseline.py'
            ) }}

      - name: Build ParCa cache on miss
        if: steps.parca-cache.outputs.cache-hit != 'true'
        run: uv run python scripts/build_cache.py

      - name: Run simulation-based behavior tests
        env:
          CI: 'true'
        # -n auto: pytest-xdist parallelism. The 7 behavior tests are
        # mostly independent full-composite runs that each spend ~2 min
        # in the inner WCM; parallelizing across 4 workers should
        # roughly halve the wall time (target ~7 min vs ~14 min serial).
        # --dist=loadfile keeps a file's tests on one worker so any
        # module-level ParCa-cache-warm fixture pays its cost once.
        run: >-
          uv run pytest
          -m "sim and not slow"
          --ignore=tests/test_initialize.py
          --ignore=tests/test_kinetics_units.py
          --ignore=tests/test_unit_bridge.py
          -n auto --dist=loadfile
          -v --tb=short

  validate-status:
    # Lightweight read-only consistency check on investigation.yaml +
    # study yamls (single-study cadence enum, focus_study existence,
    # upstream-approval ordering, per-study status alignment). See
    # scripts/validate_status.py for the 7 rules. Runs in parallel with
    # the test jobs; ~1s total — no uv sync needed, just PyYAML.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Validate status fields
        # exit 0 = clean, 1 = errors (fail CI), 2 = warnings only (don't fail).
        run: |
          set +e
          python scripts/validate_status.py
          code=$?
          if [ "$code" -eq 1 ]; then exit 1; fi
          exit 0
