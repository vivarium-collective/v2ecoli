# Study schema v4 — proposed shape.
#
# The v3 study.yaml (1142 lines) had ~20 top-level keys with overlapping
# purposes. v4 collapses to 5 evaluator-facing sections + minimal metadata.
#
# The 5 sections map to the evaluator's mental model:
#   QUESTION    — what is this study asking?
#   ASSUMPTIONS — what do we take as given?
#   CONDITIONS  — what did we set up to test it?
#                 (baseline + variants + expert_inputs awaiting human input)
#   TESTS       — how will we judge the result?
#                 (each test references the run_ids that evaluated it)
#   STATUS      — where does this study currently stand?
#
# Things that previously had their own top-level key now live elsewhere:
#   biological_summary / study_card / purpose         → 'question' (one coherent paragraph)
#   literature_anchors / key_assumptions / limitations → 'assumptions[]'
#   baseline / simulation_set                          → 'conditions.{baseline,variants}'
#   behavior_tests / conclusion_verdicts               → 'tests[]'
#   pipeline_gate / gate_status / phase                → 'status' (one keyword)
#   readouts                                           → inside tests[].measure
#   expert_decisions_needed / model_change /           → investigations/<inv>/feedback/<ts>.yaml
#     follow_up_studies / design_pivot_required        (typed by evaluators, imported back)
#   references / bibliography                          → references/*.bib (workspace-level)

schema_version: 4
name: dnaa-01-expression-dynamics
created: '2026-05-16'

# ─── QUESTION ───────────────────────────────────────────────────────────
# Single coherent paragraph. What is this study asking, and why is it the
# first / which downstream studies depend on it?
question: |
  Does v2ecoli reproduce the steady DnaA pool + autorepression baseline
  expected from the literature? Before we can mechanise replication
  initiation (dnaa-02..04), we need to confirm v2ecoli's existing
  transcription/translation chain produces DnaA in a steady amount that
  autoregulates via its own promoter. If the baseline pool is wrong,
  every nucleotide-cycle rate downstream is calibrated against fiction.

# ─── ASSUMPTIONS ────────────────────────────────────────────────────────
# Things we take as given. Each has a literature cite and a flag
# indicating whether we've verified it in v2ecoli. The evaluator can
# leave inline feedback on any assumption.
assumptions:
- text: The literature mass-spec band [300, 800] DnaA/cell measures TOTAL DnaA — both free and chromosomally-bound.
  cites: [Schmidt2016, Mori2021, Sekimizu1991]
  verified_in_v2ecoli: false
  note: "Open question: does the mass-spec band include bound DnaA, or just soluble?"
- text: dnaA mRNA is the EG10235_RNA transcription unit in ParCa.
  cites: [v2ecoli/sim_data]
  verified_in_v2ecoli: true
- text: DnaA concentration is stable over one doubling time under steady growth.
  cites: [Hansen2018, Hansen1999]
  verified_in_v2ecoli: true
- text: When DnaA binds its own promoter, dnaA transcription drops (autorepression).
  cites: [Speck1999, Saggioro2013, Katayama2017]
  verified_in_v2ecoli: false
  note: Test infrastructure exists but heavy_tf_listener arg not enabled in baseline.
- text: Stopping DnaA synthesis drains the cellular pool by ~30% over one doubling time.
  cites: [Li2014, Hansen1999]
  verified_in_v2ecoli: false
  note: Requires translation_efficiency_override hook (see expert_inputs).

# ─── CONDITIONS ─────────────────────────────────────────────────────────
# What we set up to test the question. Three sub-fields:
#   baseline        — the one composite-build that produces this study's reference data.
#   variants        — alternative configurations (perturbations). Empty for studies
#                     that only need the baseline.
#   expert_inputs   — parameters that need human input before the study can run.
#                     'gate: required-before-run' blocks pbg_runner; 'gate: optional'
#                     uses the default fallback.
conditions:
  baseline:
    composite: v2ecoli.composites.baseline.baseline
    params:
      seed: 0
      cache_dir: out/cache
  variants: []
  expert_inputs:
  - name: translation_efficiency_eg10235_scale
    description: |
      Scale factor on the dnaA gene's translation efficiency in ParCa.
      Default 1.0 (use ParCa's fitted value); higher values raise the
      steady-state DnaA pool. The dnaa-01 baseline produces ~115/cell which
      is 5x below the literature [300, 800] band — calibrating this knob
      is one of the open questions.
    type: number
    default: 1.0
    current: null   # awaiting expert input
    gate: optional   # study still runs with default; just flags as "uncalibrated"
    cites: [Schmidt2016, Mori2021]
    range: [0.5, 50.0]

# ─── TESTS ──────────────────────────────────────────────────────────────
# Each test is a single pass/fail criterion (the spec). Tests are immutable.
# Per-run observed values + p-values live in runs.db; the dashboard derives
# them at render time. 'status' caches the LATEST aggregate verdict so the
# evaluator sees pass/fail without a runs.db query.
# 'run_ids' lists the runs that evaluated this test, in chronological order.
tests:
- name: dnaa-count-in-mass-spec-range
  classification: primary
  question: Is the v2ecoli total DnaA count within the literature mass-spec band?
  measure:
    kind: listener_median
    path: listeners.monomer_counts.monomerCounts
    index: 3861
    window: second_half
  pass_if:
    op: in_range
    low: 300
    high: 800
  status: fail-calibration-todo
  cites: [Sekimizu1991, Schmidt2016, Mori2021]
  run_ids: []  # populated as runs land
- name: dnaa-concentration-stable-within-10pct
  classification: primary
  question: Is the DnaA pool stable (no drift) over one doubling time?
  measure:
    kind: rolling_cv
    path: listeners.monomer_counts.monomerCounts
    index: 3861
    window: second_half
  pass_if:
    op: at_most
    value: 0.10
  status: pass
  cites: [Hansen2018, Hansen1999]
  run_ids: []
- name: dnaa-autorepression-correlation
  classification: supporting
  question: Does bound DnaA at promoters anti-correlate with dnaA transcription events?
  measure:
    kind: pearson
    x_path: listeners.tf_binding.bound_DnaA_at_dnaA_promoter
    y_path: listeners.rnap_data.tx_init_events.EG10235_RNA
    window: second_half
  pass_if:
    op: at_most
    value: -0.3
  status: not-yet-tested
  cites: [Speck1999, Saggioro2013, Katayama2017]
  run_ids: []

# ─── STATUS ─────────────────────────────────────────────────────────────
# Single keyword. One of:
#   plan       — study scaffolded, not yet started
#   awaiting-expert  — gates open, expert input needed
#   ready      — gates closed, can run baseline
#   run        — baseline run produced data
#   evaluate   — tests evaluated against run data
#   done       — all primary tests pass; study is closed
#   failed     — primary tests fail definitively
status: evaluate-with-calibration-todo
