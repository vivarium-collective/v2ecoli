# dnaa-03 migrated to study schema v4.

schema_version: 4
name: dnaa-03-box-binding
created: '2026-05-16'

# ─── QUESTION ───────────────────────────────────────────────────────────
question: |
  Does explicit DnaA binding to the 322 catalogued DnaA-boxes (307
  chromosomal + 11 oriC + 4 dnaAp) reproduce the textbook titration
  pattern: chromosomal sites fill first, then oriC saturates, then
  free DnaA rises rapidly? This is the foundation for the dnaa-04
  mechanistic initiation trigger (which reads oriC occupancy to fire).

# ─── ASSUMPTIONS ────────────────────────────────────────────────────────
assumptions:
- text: |
    The 322 catalogued boxes span 307 chromosomal titration sites (low/
    medium affinity), 11 oriC sites (3 high + 8 low affinity), and 4
    dnaAp autorepression sites. Each box's Kd is in the 1-100 nM range.
  cites: [Speck1999, Roth1998, Schaper2000]
  verified_in_v2ecoli: true
  note: Catalog in v2ecoli/data/dnaa_box_catalog.py.
- text: |
    DnaA-box binding equilibrates much faster than gene expression
    or replication; per-tick equilibrium-binding is a reasonable
    approximation at 1s timesteps.
  cites: [Kawakami2006, Skarstad2013]
  verified_in_v2ecoli: false
  note: Stochastic binding-events also feasible; equilibrium is the simpler v0.
- text: |
    Chromosomal sites saturate at higher DnaA-ATP availability than
    oriC high-affinity sites (Kd_chrom > Kd_oric_high), producing
    the two-step occupancy pattern observed in the literature.
  cites: [Speck1999, Kawakami2005]
  verified_in_v2ecoli: false
  note: Sensitive to the kd parameters; see expert_inputs.

# ─── CONDITIONS ─────────────────────────────────────────────────────────
conditions:
  baseline:
    composite: v2ecoli.composites.baseline_recipes.dnaa_03_with_box_binding
    params:
      seed: 0
      cache_dir: out/cache
      mechanism: rida-v0
      initial_dnaA_count_per_cell: 500   # bypass dnaa-01's 5× calibration shortfall
      atp_fraction_clamp_low: 0.2
      atp_fraction_clamp_high: 0.5
  variants:
  - name: literature-dnaA-count
    description: Use ~500 DnaA/cell (literature target) instead of dnaa-01's 115.
    composite: v2ecoli.composites.baseline_recipes.dnaa_03_with_box_binding
    diff_from_baseline: initial_dnaA_count_per_cell=500
  - name: low-dnaA-count
    description: Use the 115 baseline (dnaa-01 calibration). Tests whether titration biology breaks at sub-stoichiometric DnaA.
    composite: v2ecoli.composites.baseline_recipes.dnaa_03_with_box_binding
    diff_from_baseline: initial_dnaA_count_per_cell=null
  expert_inputs:
  - name: kd_high_nM
    description: |
      Dissociation constant for high-affinity oriC sites. Speck 1999 reports
      ~1 nM in vitro; in vivo with crowding may be higher.
    type: number
    default: 1.0
    current: 1.0
    gate: optional
    range: [0.1, 10.0]
    cites: [Speck1999, Schaper2000]
  - name: kd_low_nM
    description: |
      Dissociation constant for low-affinity sites (chromosomal + low-
      affinity oriC). ~100× weaker than high-affinity sites.
    type: number
    default: 100.0
    current: 100.0
    gate: optional
    range: [10.0, 1000.0]
    cites: [Roth1998, Kawakami2005]
  - name: enable_oric_binding
    description: Toggle oriC binding (for diagnostic isolation tests).
    type: boolean
    default: true
    current: true
    gate: optional

# ─── TESTS ──────────────────────────────────────────────────────────────
# Some tests under the canonical rida-v0 mechanism currently fail or
# flip-flop across seeds. See assumptions: the v0 model omits cooperative
# binding, HU/IHF facilitation, and SeqA sequestration — those gaps are
# real biology that this study deliberately leaves to dnaa-04/dnaa-06.
tests:
- name: chromosomal-occupancy-monotonic
  classification: primary
  question: Does chromosomal occupancy rise monotonically during titration?
  measure:
    kind: monotonic_increasing
    path: listeners.dnaA_binding.chromosome.occupied_fraction
    smoothing_window: 5
    allow_dip_pct: 5
  pass_if:
    op: equals
    value: true
  status: flaky-cross-seed
  cites: [Speck1999]
  run_ids: []
- name: oric-stays-unoccupied-until-chromosome-saturates
  classification: primary
  question: |
    Does oriC stay ≤20% occupied until chromosomal sites cross 90%
    saturation? (Textbook "buffer first, fire second" pattern.)
  measure:
    kind: conditional_check
    while_path: listeners.dnaA_binding.chromosome.occupied_fraction
    while_below: 0.9
    check_path: listeners.dnaA_binding.oric.high_affinity_occupied
  pass_if:
    op: at_most
    value: 0.2
  status: fail
  cites: [Kawakami2005, Speck1999]
  note_on_fail: |
    Under canonical mechanism, oriC saturates fast. Missing biology:
    cooperative oriC binding, HU/IHF facilitation, SeqA pre-fire
    sequestration. Documented; deferred to dnaa-04/06.
  run_ids: []
- name: free-dnaa-rises-after-titration
  classification: supporting
  question: |
    Once chromosomal saturation reaches steady state, does free DnaA
    rise (the post-titration "available pool" expected in vivo)?
  measure:
    kind: ratio
    numerator_path: listeners.dnaA_binding.free_total
    numerator_window: last_value
    denominator_path: listeners.dnaA_binding.free_total
    denominator_window: first_nonzero
  pass_if:
    op: at_least
    value: 1.5
  status: pass-cross-seed
  cites: [Speck1999, Kawakami2006]
  run_ids: []
- name: oric-occupancy-is-two-step
  classification: diagnostic
  question: Do oriC high-affinity sites cross 0.5 occupancy ≥60s BEFORE low-affinity sites?
  measure:
    kind: time_lag
    first_path: listeners.dnaA_binding.oric.high_affinity_occupied
    first_threshold: 0.5
    second_path: listeners.dnaA_binding.oric.low_affinity_occupied
    second_threshold: 0.5
  pass_if:
    op: at_least
    value: 60
  status: flaky-cross-seed
  cites: [Kawakami2005, Schaper2000]
  run_ids: []

# ─── STATUS ─────────────────────────────────────────────────────────────
# Note: tests partially pass under canonical rida-v0 mechanism. The fail
# cases are documented as expected missing-biology gaps (cooperative
# binding, HU/IHF, SeqA) — not implementation bugs. dnaa-04 and dnaa-06
# will fill these gaps.
status: evaluate-partial-pass-known-gaps
