      text: "Two related things on this list, both tying to the mbp-05 reframe in this submission:\n  \n  1. Some criteria presume the tolerance-test framing of mbp-05. The list includes:\n\n  - {study: mbp-05-palsson-benchmark, behavior: end-of-run-od-matches-published}\n  - {study: mbp-05-palsson-benchmark, behavior: acetate-profile-matches-published-shape}\n\n  If the mbp-05 reframe is adopted (those become process-level \"comparison-rendered\" tests, not tolerance-on-biology), the\n  investigation-level criteria need to shift too — either to the renamed process tests or to the consolidated load-bearing test\n  divergences-categorized-in-report-card. The shift propagates upward: the investigation's success definition becomes \"comparison harness\n  built and applied; structured gap inventory produced,\" not \"Palsson benchmark achieved.\" Worth aligning the success definition with the\n  actual scope rather than leaving the benchmark-style claim encoded in the criteria.\n\n  2. The criteria list doesn't differentiate \"investigation-terminal\" from \"gating-per-study.\" Currently flat: 13 entries across all 6\n  studies. Some are process-style (one-generation-completes-without-divergence), some are evaluative (end-of-run-od-matches-published), all\n   weighted equally as \"investigation success\" inputs. Two cleaner shapes:\n\n  - Mark which criteria are terminal (gate the entire investigation; likely mbp-06's all-five-axes-covered +\n  every-gap-has-candidate-resolution) vs. per-study gating (each study's tests gate its own impl PR but aren't investigation-success\n  conditions).\n  - Or collapse the investigation-level list to just the mbp-06 terminal checks — those by construction subsume the upstream studies, since\n   mbp-06 can't pass without mbp-01..05 having shipped.\n  \n  Either is fine; the current blended shape makes \"investigation complete\" harder to verify than it needs to be."
  "references":
    - ts: "2026-05-26T18:15:00.296Z"
      text: "for lack of a better place to dump this... \n\n  Comment B — under \"overview\" or wherever framework-meta sits (optional; the gathered framework-layer items):\n\n  ---\n  A few schema / framework items surfaced repeatedly across study-level comments that are really upstream pbg-superpowers work, not\n  per-investigation work. Listing them once at the top so they cluster rather than getting scattered across study comments:\n  \n  - study_kind: evaluation (introduced in mbp-06) — first-class schema field worth propagating to pbg-superpowers so the linter knows about\n   it and the dashboard can render evaluation phases distinctly.\n  - comparison_overlays (proposed in mbp-05) — generic trajectory-pair comparison config for the comparison harness; reusable across any\n  benchmark study.\n  - functional_form metadata on claims (proposed in mbp-01) — saturable / step / linear / threshold, so tests can pick the right measure\n  shape and lint-time validation can flag mismatched bindings.\n  - provenance on gap entries + mandatory_findings_to_consider (proposed in mbp-06) — carries known-prior gaps forward into gap analyses,\n  prevents discovery-bias in evaluation phases.\n  - resolution_type / resolution_venue / decision_authority on gap entries (proposed in mbp-06) — distinguishes model-improvement /\n  scope-decision / upstream-PR resolutions, with appropriate routing.\n  - scope_decisions register as a workspace-level artifact distinct from findings (proposed in mbp-06 + methodology pages).\n  - Unit-typed stores (noted in mbp-01 failure modes) — process-bigraph / pbg-superpowers extension; catches unit-mismatch bugs at compose\n  time rather than via documentation.\n  - Claim-kind typing on claims (biological_fact | design_constraint | regime_assumption | …) (mbp-03) — claims linker could refuse to\n  \"back\" tests with constraint-claims; only behavior-claims should back behavior tests.\n  \n  Most of these don't block the current investigation — they're cleanup that would compound over future investigations. Worth tracking as a\n   pbg-superpowers backlog rather than letting them disappear into study-level annotations."
