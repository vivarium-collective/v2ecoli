# ─── v4 tests[] (hand-authored 2026-05-28) ────────────────────────────────
# Hand-curated representatives of the load-bearing claims in
# `behavior_tests:` above — NOT a wholesale auto-projection (the
# no-machine-projected-tests rule applies). The behavior_tests block
# remains the authoritative spec; this block is what the dashboard
# renders to surface trajectories + criteria in the per-study Charts
# tab via render_v4_test_charts.

tests:
  - name:           per-cell-mass-grows-through-division
    classification: primary
    description:    "Per-cell cell_mass grows over 120 sim-min crossing
                    2 generations under cells_per_agent=1.0. Identity
                    with baseline (regression-guard) is enforced by
                    cross-run comparison; this test surfaces the
                    trajectory shape."
    measure:
      path:         listeners__mass__cell_mass
      source:       aggregator-cpa1-multigen parquet hive
      observable:   per-cell dry mass over the lineage trajectory (fg)
      units:        fg
    pass_if:
      operator:     in-range
      low:          400.0
      high:         1500.0
    requires_simulation: aggregator-cpa1-multigen
    cites: []
    backs:
      behavior_test: per-cell-observables-unchanged-vs-baseline

  - name:           population-biomass-scales-with-cells-per-agent
    classification: primary
    description:    "population.total_biomass_gDW(t) at cpa=1.0 is
                    monotonically growing through the lineage trajectory.
                    The same observable at cpa=1e6/1e9 is the literal
                    1e6/1e9 multiplier (verified cross-run by the unit
                    tests + the scaling-factor sweep chart 01)."
    measure:
      path:         population__total_biomass_gDW
      source:       aggregator-cpa1-multigen parquet hive
      observable:   population.total_biomass_gDW (g)
      units:        g
    pass_if:
      operator:     greater-than
      threshold:    0.0
      field:        min_value
    requires_simulation: aggregator-cpa1-multigen
    cites: []
    backs:
      behavior_test: aggregator-output-scales-linearly-with-cells-per-agent

  - name:           single-lineage-cell-count-bounded
    classification: supporting
    description:    "single_daughters=True keeps cell_count at 1.0
                    throughout the run (we follow one daughter, the
                    sibling is dropped at each division)."
    measure:
      path:         population__cell_count
      source:       aggregator-cpa1-multigen parquet hive
      observable:   population.cell_count
      units:        cells
    pass_if:
      operator:     equal-to
      threshold:    1.0
      field:        max_value
    requires_simulation: aggregator-cpa1-multigen
    cites: []
    backs:
      behavior_test: single-cell-aggregation-matches-cell-mass

# Pytest discovery metadata (v3 holdover; kept for tooling compatibility
# while v4 chart-rendering reads the tests[] block above).
pytest:
  auto_discover: true
  data_source:   latest_run
  pytest_args:   []
  last_results:  null
