schema_version: 3
name: dnaa-02-atp-hydrolysis
created: '2026-05-16'
status: ran
phase: Decide   # Design | Build | Simulate | Evaluate | Decide

# Dashboard v3-compat shim — see docs/concepts/study-spec.md
baseline:
- name: baseline-nucleotide-cycle
  # ↓ CASCADING RECIPE: dnaa-01g (calibrated) + intrinsic hydrolysis loop.
  # Walks: v2ecoli_baseline → dnaa_01g_calibrated → dnaa_02_with_intrinsic_hydrolysis.
  composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_intrinsic_hydrolysis
  params: {seed: 0, cache_dir: out/cache}

- name: baseline-extrinsic-target
  # Anticipates dnaa-05's combined extrinsic flux (4.6/min = 100× intrinsic).
  # Predicted to PASS the ATP-fraction band; used as the upstream baseline for dnaa-03+.
  composite: v2ecoli.composites.baseline_recipes.dnaa_02_with_extrinsic_target_rate
  params: {seed: 0, cache_dir: out/cache}


# ─── LIVE VISUALIZATION STEPS ──────────────────────────────────────────────
# Wired into the simulation; each emits one HTML at sim end from per-tick
# accumulated state. The dashboard's investigation report + Visualizations
# tab pick these up.
visualizations:
  - name: dnaa_state
    address: 'local:DnaAStateVisualization'
    config:
      title: 'dnaa-02 — DnaA state (apo/ATP/ADP) trajectory'
      sample_every: 10
  - name: dnaa_box_occupancy
    address: 'local:DnaABoxOccupancyVisualization'
    config:
      title: 'dnaa-02 — DnaA-box occupancy (end-state landscape)'
      sample_every: 10


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Does an exponential intrinsic DnaA-ATP → DnaA-ADP hydrolysis
    (k ≈ 0.046/min; Sekimizu 1987) paired with tight ATP/ADP binding
    produce the physiological DnaA-ATP / total-DnaA fraction band of
    0.2-0.5 (Boesen 2024)?
  mechanism: |
    Split the single DnaA species into three bulk forms (DnaA-apo,
    DnaA-ATP, DnaA-ADP). Add a first-order hydrolysis Step
    DnaA-ATP → DnaA-ADP with rate parameter. Optionally clamp the
    DnaA-ATP fraction to the [0.2, 0.5] band so downstream studies
    (dnaa-03, dnaa-04) can proceed before the full RIDA/DDAH/DARS
    network in dnaa-05 lands.
  expected_outcome: |
    Intrinsic-only baseline equilibrates near the low end of the
    physiological band (~0.2). no-hydrolysis variant drifts to ~1.0;
    10× variant drops below 0.1. apo fraction < 5%.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - dnaa-01-expression-dynamics      # need a steady total-DnaA pool first
  enables:
    - dnaa-03-box-binding              # box binding distinguishes ATP / ADP forms
    - dnaa-05-rida-ddah-dars           # extrinsic conversion needs the species split
  # open | conditional | hold | ready | blocked
  gate_status: open
  gate_status_summary: |
    GATE OPEN via the cascading-recipe chain (F-05). Recipe
    `dnaa_02_with_extrinsic_target_rate` validated end-to-end at 5-min
    second-half median: total DnaA = 707 ∈ [300, 800] ✓, ATP fraction
    = 0.232 ∈ [0.20, 0.50] ✓. The 100× anticipated extrinsic rate is
    baked into the recipe as a single loop-patch parameter; dnaa-05
    will swap that lumped rate for per-pathway (RIDA/DDAH/DARS) implementations.
    dnaa-03 inherits this baseline cleanly via its own recipe.
  proceed_condition: |
    apo-dnaA-fraction-is-small + dnaa-atp-fraction-in-physiological-range
    pass (or the clamp is enabled and acknowledged by the expert as a
    temporary scaffold).


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

- name: baseline-nucleotide-cycle
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: null
  condition: M9-minimal-glucose
  duration_min: 60
  seeds: [0, 1, 2]
  readouts: [dnaA_atp_fraction, dnaA_apo_count, atp_pool, adp_pool]
  applies_tests:
    - apo-dnaa-fraction-is-small
    - dnaa-atp-fraction-in-physiological-range
    - atp-pool-much-greater-than-adp
  status: gated
  blocked_by_requirements: [req-1-nucleotide-split, req-2-intrinsic-hydrolysis-step, req-3-atp-fraction-listener]

- name: no-intrinsic-hydrolysis
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: {dnaA_intrinsic_hydrolysis_rate_per_min: 0.0}
  condition: M9-minimal-glucose
  duration_min: 60
  seeds: [0, 1, 2]
  readouts: [dnaA_atp_fraction]
  applies_tests: [no-hydrolysis-accumulates-atp-form]
  status: gated
  blocked_by_requirements: [req-1-nucleotide-split, req-2-intrinsic-hydrolysis-step]

- name: fast-intrinsic-hydrolysis
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: {dnaA_intrinsic_hydrolysis_rate_per_min: 0.46}
  condition: M9-minimal-glucose
  duration_min: 60
  seeds: [0, 1, 2]
  readouts: [dnaA_atp_fraction]
  applies_tests: [fast-hydrolysis-suppresses-atp-form]
  status: gated
  blocked_by_requirements: [req-1-nucleotide-split, req-2-intrinsic-hydrolysis-step]


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: v2ecoli.composites.baseline.baseline
  new_state_variables:
    - {id: DnaA_apo, kind: bulk, units: molecules/cell}
    - {id: DnaA_ATP, kind: bulk, units: molecules/cell}
    - {id: DnaA_ADP, kind: bulk, units: molecules/cell}
  new_processes:
    - {name: DnaaIntrinsicHydrolysis, kind: Step, fires_per: timestep, requirement_id: req-2-intrinsic-hydrolysis-step}
  new_parameters:
    - {name: dnaA_intrinsic_hydrolysis_rate_per_min, default: 0.046, units: per_min}
    - {name: dnaA_atp_fraction_clamp, default: null, type: "[low, high] | null"}
  new_listeners:
    - {name: dnaA_atp_fraction, emits: ["agents.<id>.listeners.dnaA_cycle.atp_fraction"], requirement_id: req-3-atp-fraction-listener}
  modified_processes:
    - "Initial-state seeder: split MONOMER0-160[c] equivalent across the three new species at equilibrium fraction."


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "DnaA binding to ATP and ADP is tight (Kd ~30 nM ATP, ~100 nM ADP; Sekimizu 1987)."
  - "Intrinsic hydrolysis is first-order and slow (~0.046/min; 50% in 15 min)."
  - "At physiological [ATP] = 6-7 mM, apo-DnaA is a small minority."
  - "DNA-binding does NOT modify the intrinsic hydrolysis rate (per Sekimizu 1987 in vitro)."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:

- name: dnaA_atp_fraction
  description: "DnaA-ATP / (DnaA-apo + DnaA-ATP + DnaA-ADP) over time."
  store_path: agents.0.listeners.dnaA_cycle.atp_fraction
  units: fraction
  status: derived-needed
  blocked_by_requirements: [req-1-nucleotide-split, req-3-atp-fraction-listener]

- name: dnaA_apo_count
  store_path: agents.0.bulk
  index_by: {type: bulk_id, value: "DnaA_apo"}
  units: molecules/cell
  status: aspirational
  blocked_by_requirements: [req-1-nucleotide-split]

- name: atp_pool
  store_path: agents.0.bulk
  index_by: {type: bulk_id, value: "ATP[c]"}
  units: molecules/cell
  status: available

- name: adp_pool
  store_path: agents.0.bulk
  index_by: {type: bulk_id, value: "ADP[c]"}
  units: molecules/cell
  status: available


behavior_tests:

- name: apo-dnaa-fraction-is-small
  classification: primary
  description: "apo-DnaA / total ≤ 5% at steady state (nucleotide is tightly bound)."
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_apo, reduce: median}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: median}
    window: second_half
  pass_if: {op: at_most, value: 0.05}
  units: fraction
  requires_simulation: baseline-nucleotide-cycle
  cites: [Sekimizu1987Cell, Kawakami2006MolMicrobiol]

- name: dnaa-atp-fraction-in-physiological-range
  classification: primary
  description: "DnaA-ATP / total in [0.2, 0.5] (Boesen 2024 PNAS Delta4 cells)."
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_ATP, reduce: median}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: median}
    window: second_half
  pass_if: {op: in_range, low: 0.2, high: 0.5}
  units: fraction
  requires_simulation: baseline-nucleotide-cycle
  cites: [Boesen2024PNAS]

- name: atp-pool-much-greater-than-adp
  classification: supporting
  description: "Background metabolism keeps ATP/ADP > 10 at steady state."
  measure:
    kind: ratio_of_bulks
    numerator: {id: "ATP[c]"}
    denominator: {id: "ADP[c]"}
    reduce: median
    window: second_half
  pass_if: {op: at_least, value: 10.0}
  units: ratio
  requires_simulation: baseline-nucleotide-cycle
  cites: [Boesen2024PNAS]

- name: no-hydrolysis-accumulates-atp-form
  classification: diagnostic
  description: "With hydrolysis rate = 0, DnaA-ATP fraction monotonically rises."
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_ATP, reduce: series}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: series}
    window: full
  pass_if: {op: monotonic_increasing, allow_dip_pct: 5}
  units: fraction
  requires_simulation: no-intrinsic-hydrolysis
  cites: [Sekimizu1987Cell]

- name: fast-hydrolysis-suppresses-atp-form
  classification: diagnostic
  description: "10× hydrolysis pushes DnaA-ATP fraction below 0.1."
  measure:
    kind: ratio_of_sums
    numerator:   {kind: bulk_count, id: DnaA_ATP, reduce: median}
    denominator: {kind: bulk_count_sum, ids: [DnaA_apo, DnaA_ATP, DnaA_ADP], reduce: median}
    window: second_half
  pass_if: {op: at_most, value: 0.1}
  units: fraction
  requires_simulation: fast-intrinsic-hydrolysis
  cites: [Sekimizu1987Cell, Kawakami2006MolMicrobiol]


# ─── 6. CONCLUSION LOGIC ───────────────────────────────────────────────────
conclusion_logic:
  if_primary_tests_pass:
    implementation_status: "Three-state DnaA nucleotide cycle works at the intrinsic-only level."
    biological_validation: |
      Confirms Sekimizu 1987's intrinsic rate alone CAN produce a
      physiological ATP-fraction band — but doesn't validate the
      cell-cycle oscillation (that's dnaa-05's territory).
    pipeline_unblocks:
      - "dnaa-03-box-binding (box affinity depends on nucleotide form)"
      - "dnaa-05-rida-ddah-dars (extrinsic conversion overlays this)"
  if_primary_tests_fail:
    diagnose:
      - "If DnaA-ATP fraction is too high: hydrolysis rate is too low or DNA binding is shielding ATP form."
      - "If DnaA-ATP fraction is too low: hydrolysis rate too high or ATP-binding kinetics wrong."
      - "If apo fraction is large: ATP-binding Kd too weak in the implementation."
    block_downstream: "dnaa-03 onward need a valid intrinsic baseline."


# ─── 7. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "Intrinsic hydrolysis only; the cell-cycle oscillation requires dnaa-05's RIDA + DDAH + DARS."
  - "Single doubling time; multi-generation drift not validated."
  - "Assumes physiological [ATP]/[ADP] from baseline metabolism is correct (validated by atp-pool-much-greater-than-adp)."
  - "Does not validate which DnaA species binds which DnaA-box class — that's dnaa-03."


# ─── 8. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-nucleotide-split
  kind: state_variables
  title: Split DnaA bulk into ATP / ADP / apo species
  effort: M
  description: |
    The existing v2ecoli model has DnaA as a single bulk entry
    (PD03831[c]) + a complex form (MONOMER0-160[c] = "DnaA_ATP_complex").
    Need three explicit species (DnaA_apo, DnaA_ATP, DnaA_ADP) with
    proper initial-state seeding at equilibrium fraction.
  steps:
    - "Add 3 bulk ids in v2ecoli/library/sim_data.py."
    - "Initial-state seeder: distribute existing total DnaA across the three species at equilibrium fraction (~30% ATP-bound under physiological [ATP])."
    - "Audit every reference to MONOMER0-160[c] / PD03831[c] — either keep as the SUM or rewire to the new species explicitly."
    - "Behavioral check: sum(DnaA_apo + DnaA_ATP + DnaA_ADP) ≈ historical PD03831[c] count."
  unblocks:
    - all dnaa-02 behavior_tests
    - dnaa-03 box binding (form-specific)
    - dnaa-05 atp_fraction observable

- id: req-2-intrinsic-hydrolysis-step
  kind: step
  title: DnaA-ATP → DnaA-ADP hydrolysis Step
  effort: S
  description: "First-order Step with rate parameter; transfers count each timestep."
  steps:
    - "Create v2ecoli/steps/dnaa_intrinsic_hydrolysis.py."
    - "Composite param dnaA_intrinsic_hydrolysis_rate_per_min: float = 0.046."
    - "Wire into baseline composite after nucleotide-binding equilibrium."
    - "Test: no-hydrolysis variant → atp_fraction monotonic increasing."
  unblocks:
    - no-hydrolysis-accumulates-atp-form
    - fast-hydrolysis-suppresses-atp-form

- id: req-3-atp-fraction-listener
  kind: listener
  title: dnaA_atp_fraction listener
  effort: XS
  description: "Step emitting agents.<id>.listeners.dnaA_cycle.atp_fraction = ATP / total each timestep."
  unblocks:
    - readouts.dnaA_atp_fraction
    - apo-dnaa-fraction-is-small, dnaa-atp-fraction-in-physiological-range

- id: req-4-atp-fraction-clamp
  kind: step
  title: Optional ATP-fraction clamp
  effort: XS
  description: |
    Optional Step that, when enabled, redistributes ATP/ADP each
    timestep to keep ATP/total in a user-specified band. Lets
    dnaa-03 and dnaa-04 run before dnaa-05's RIDA / DARS / DDAH
    network lands.
  steps:
    - "Composite param dnaA_atp_fraction_clamp: [low, high] | None = None."
    - "Step runs AFTER hydrolysis; rebalances if outside band."
    - "Validation: clamped run keeps atp_fraction in the band."
  unblocks: ["dnaa-03 / dnaa-04 can proceed before dnaa-05 lands"]


# ─── Bibliography ──────────────────────────────────────────────────────────
bibliography:
  expert: [replication_initiation_molecular_info]
  bib_keys: [Sekimizu1987Cell, Kawakami2006MolMicrobiol, Boesen2024PNAS, Hansen2018DnaATale, Katayama2017Frontiers]


runs:
- simulation: probe-baseline-dnaa-states
  duration_s: 600
  started_at: 2026-05-17T04:40Z
  wall_seconds: 288
  rows: 60 sample points (every 10s)
  db: (in-memory probe; data persisted to investigations/dnaa-replication/overnight-2026-05-17/dnaa_states_timeseries.json)
  notes: |
    Probe of the baseline composite at 1× TE — confirmed three Insights
    for Design phase (F-01, F-02, F-03).

- simulation: probe-with-calibration-and-hydrolysis
  duration_s: 600
  started_at: 2026-05-17T08:15Z
  wall_seconds: 278
  rows: 60 sample points (every 10s)
  db: (in-memory probe; data persisted to investigations/dnaa-replication/overnight-2026-05-17/dnaa_with_hydrolysis_timeseries.json)
  notes: |
    Probe with (TE=20×, fc=0.7) calibration AND external intrinsic hydrolysis
    at Boesen 0.046/min. Confirmed total DnaA = 707 (literature band PASS),
    but ATP fraction = 0.989 (FAIL — too slow hydrolysis).
  outcomes:
    dnaA-count-in-range: {result: PASS, observed: 707, expected: '[300, 800]'}
    dnaa-atp-fraction-in-physiological-range: {result: FAIL, observed: 0.989, expected: '[0.20, 0.50]', note: 'intrinsic-only — needs extrinsic'}

- simulation: probe-hydrolysis-rate-sensitivity
  duration_s: 300
  started_at: 2026-05-17T08:21Z
  wall_seconds: 565
  rows: 4 multipliers × 30 sample points
  db: (in-memory; data persisted to investigations/dnaa-replication/overnight-2026-05-17/hydrolysis_rate_sensitivity.json)
  notes: |
    Sensitivity sweep: 1×, 10×, 100×, 1000× the intrinsic rate. Established
    F-04 — mechanism works at 100× intrinsic; over-corrects at 1000×.
  outcomes:
    'k=0.046/min':  {atp_frac: 0.987, gate: FAIL}
    'k=0.46/min':   {atp_frac: 0.921, gate: FAIL}
    'k=4.6/min':    {atp_frac: 0.231, gate: PASS}
    'k=46/min':     {atp_frac: 0.000, gate: FAIL}

findings:
- id: F-01
  kind: computational
  status: novel
  statement: |
    The DnaA-ATP / DnaA-ADP equilibrium machinery is ALREADY active in
    v2ecoli's baseline composite. req-1 (split DnaA bulk into ATP/ADP/apo)
    is therefore PARTIALLY DONE.
  evidence:
    from_run: 'probe_dnaa_total.py + probe_dnaa_states_timeseries.py (2026-05-17 overnight)'
    species_present_in_bulk:
      'PD03831[c] (apo)': 'bulk idx 11565'
      'MONOMER0-160[c] (DnaA-ATP)': 'bulk idx 10822'
      'MONOMER0-4565[c] (DnaA-ADP)': 'bulk idx 11114'
    equilibrium_process: 'ecoli-equilibrium (v2ecoli/processes/equilibrium.py) wired into baseline.py:229 + 167 — already runs every timestep'
    trajectory: |
      Within 60 simulated seconds of starting, equilibrium drives:
        apo: 124 → 0
        DnaA-ATP: 0 → 113
        DnaA-ADP: 0 → 0
        (total stays 115 across 10 min)
  next_action: |
    Reframe req-1 from "Add 3 bulk species" to "Surface existing 3 bulk
    species through a listener". The work shrinks substantially.

- id: F-02
  kind: biological
  status: contradicts
  statement: |
    DnaA-ATP fraction in v2ecoli baseline = 0.99 (~all DnaA is ATP-bound).
    Boesen 2024 reports physiological [0.20, 0.50]. v2ecoli is ~2-5× above
    the upper bound — i.e. the dnaa-02 primary test
    `dnaa-atp-fraction-in-physiological-range` FAILS HARD in current baseline.
  evidence:
    from_run: 'probe_dnaa_states_timeseries.py (10 min sim, 1× TE, seed 0)'
    measured: 'bulk[MONOMER0-160] / (bulk[PD03831] + bulk[MONOMER0-160] + bulk[MONOMER0-4565])'
    observed: 'mean ATP fraction = 0.998 across t=60s..600s'
    expected: '[0.20, 0.50] (Boesen 2024 PNAS, Sekimizu 1991 J Bacteriol)'
  explanation: |
    Forward equilibrium (apo + ATP → DnaA-ATP) fires; reverse path
    (DnaA-ATP → apo + ATP) is slow (k = 2.9e-8). With cytoplasmic [ATP]
    ~mM, mass-action drives essentially all DnaA into ATP-bound form.
    No depletion mechanism present.
  next_action: |
    Add intrinsic hydrolysis Step (req-2). Draft in
    investigations/dnaa-replication/overnight-2026-05-17/proposed_intrinsic_hydrolysis_step.py.

- id: F-03
  kind: computational
  status: novel
  statement: |
    The metabolic reaction RXN0-7444 (DnaA-ATP + H2O → DnaA-ADP + Pi,
    catalyzed by CPLX0-10342) is declared in metabolic_reactions.tsv
    line 4839 but has NO entry in metabolism_kinetics.tsv. The FBA
    solver therefore never selects this reaction → DnaA-ADP pool
    stays at 0 throughout simulation.
  evidence:
    from_files:
      declared_in: 'v2ecoli/processes/parca/reconstruction/ecoli/flat/metabolic_reactions.tsv:4839'
      missing_from: 'v2ecoli/processes/parca/reconstruction/ecoli/flat/metabolism_kinetics.tsv (grep finds nothing)'
      not_disabled: 'v2ecoli/processes/parca/reconstruction/ecoli/flat/disabled_kinetic_reactions.tsv (grep finds nothing)'
    runtime_consequence: 'DnaA-ADP = 0 at every probe sample for 10 min sim.'
  explanation: |
    Unannotated metabolic reactions are silently inactive — they look
    available to the model but are never selected by FBA because they
    don't help biomass. This is the worst kind of model gap because
    nothing warns the user.
  next_action: |
    Option A: Add explicit kinetic constraint for RXN0-7444 at
    Boesen 2024 rate. Option B: Add the IntrinsicHydrolysis Step
    (proposed_intrinsic_hydrolysis_step.py) and bypass FBA entirely
    for the dnaa pool. Option B is cleaner — recommended.

- id: F-04
  kind: biological
  status: novel
  superseded_by: [F-05]
  statement: |
    Intrinsic hydrolysis at Boesen 2024's measured rate (0.046/min) is
    ~100× too slow to produce the physiological DnaA-ATP fraction band
    in v2ecoli, because the existing ecoli-equilibrium process drives
    DnaA-ADP → apo → DnaA-ATP fast enough to neutralize the sink. The
    mechanism PASSES the [0.20, 0.50] target at 100× the intrinsic
    rate (k = 4.6/min, ATP fraction = 0.231) and OVERSHOOTS at 1000×
    (ATP fraction = 0.000 — DnaA-ATP fully depleted).
  evidence:
    from_run: 'probe_hydrolysis_rate_sensitivity.py (4 rates × 5-min sim)'
    calibration: 'TE=20×, fc=0.7 (winning baseline from dnaa-01g-joint-te-fold-change-sweep)'
    sensitivity_table:
      '1x (intrinsic 0.046/min)':  {total: 470, atp_frac: 0.987, gate: FAIL}
      '10x (k=0.46/min)':          {total: 316, atp_frac: 0.921, gate: FAIL}
      '100x (k=4.6/min)':          {total: 502, atp_frac: 0.231, gate: PASS}
      '1000x (k=46/min)':          {total: 512, atp_frac: 0.000, gate: FAIL}
  explanation: |
    The 100× window has biological meaning: it's the prediction for
    what RIDA + DDAH + DARS *together* must deliver in vivo for
    Boesen's measured ATP fraction. RIDA alone (replisome-coupled) is
    documented as roughly 10-30× faster than intrinsic; DDAH (datA-bound)
    adds another ~10× during specific cell-cycle windows; DARS1/DARS2
    reverse the ADP → ATP step. The 100× total is consistent with
    Hansen 2018 and Katayama 2017 reviews. **dnaa-05 should design its
    extrinsic pathways to deliver this magnitude of additional flux.**

    The 1000× over-correction is also informative: above ~50/min total
    hydrolysis rate, DnaA-ATP is completely depleted because translation
    can't replace it fast enough. The window for total in-vivo hydrolysis
    rate is approximately [1, 50]/min.
  next_action: |
    1. Wire IntrinsicHydrolysis Step into baseline composite (the Step
       file is drafted; just needs baseline.py integration).
    2. dnaa-05 picks up with the quantitative target: extrinsic pathways
       must collectively add ~4.5/min of DnaA-ATP → DnaA-ADP flux at
       physiological DnaA pool (i.e., ~100× the intrinsic rate).

- id: F-05
  kind: methodological
  status: confirms
  statement: |
    Cascading-baseline-recipe chain VALIDATED end-to-end. Recipe
    `dnaa_02_with_extrinsic_target_rate` walks v2ecoli_baseline →
    dnaa_01g_calibrated → dnaa_02_with_extrinsic_target_rate and
    delivers a composite that PASSES BOTH dnaa-02 primary gate tests
    (total DnaA = 707 in [300, 800]; ATP fraction = 0.232 in [0.20, 0.50]).
    The recipe pattern replaces ad-hoc per-probe patching with a
    declarative, reusable chain that downstream studies (dnaa-03..06)
    can derive from.
  evidence:
    from_run: 'probe_via_recipe.py dnaa_02_with_extrinsic_target_rate 10 0'
    recipe_lineage: ['v2ecoli_baseline', 'dnaa_01g_calibrated', 'dnaa_02_with_extrinsic_target_rate']
    bundle_patches: 3  # enable_heavy_tf_listener + 2 calibration patches
    loop_patches: 1    # intrinsic_hydrolysis_loop at k=4.6/min
    median_total: 707
