schema_version: 1
name: chromosome-cycle-calibration
title: v2ecoli chromosome cycle-time calibration on slow-growth conditions (acetate + glycerol)
status: running
description: >
  Carefree investigation tracking v2ecoli chromosome dynamics on slow-growth media.
  Validates the architectural port (PartitionedProcess -> layered process-bigraph) against
  vEcoli on acetate, surfaces the upstream FBA-over-supply calibration gap (observed
  ~80 min cycle vs declared 136 min on acetate), and scaffolds the new glycerol medium
  (MIX0-845, tau=150 min, CRP-cAMP active). Lives on feat/aim2-dnaa-oric @ b8d0d1e.
studies:
- dnaa-00-stage1-baseline
- dnaa-01-expression-dynamics
- dnaa-02-atp-hydrolysis
- dnaa-03-box-binding
- dnaa-04-mechanistic-initiation
- dnaa-05-rida-ddah-dars
- dnaa-06-seqa-sequestration
- dnaa-07-cooperativity
- dnaa-08-validation

at_a_glance:
- study: dnaa-00-stage1-baseline
  role: ABT minimal glycerol media (τ=150) + Stage 1 parameter overrides (C=70, D=30, DnaA TE=1,
    DnaA stable, DARS/datA locations). Prerequisite for Study 1.
- study: dnaa-01-expression-dynamics
  role: dnaA transcription + mRNA + translation + protein-abundance dynamics (new mechanism on
    top of Study 0's baseline). Active phase once Study 0 closes.
- study: dnaa-02-atp-hydrolysis
  role: DnaA-ATP intrinsic hydrolysis at 0.046 /min. Boesen 2024 ratio check (0.2-0.5).
- study: dnaa-03-box-binding
  role: 307 chromosomal DnaA boxes + oriC + dnaAp. Two-step oriC fill prediction.
- study: dnaa-04-mechanistic-initiation
  role: Replaces inherited Donachie/initiation-mass trigger with mechanism. Targets the failed
    cycle-time acceptance criterion.
- study: dnaa-05-rida-ddah-dars
  role: Extrinsic DnaA-ATP/ADP conversion. RIDA, DDAH, DARS1+DARS2. Knockout sweep + synchrony.
- study: dnaa-06-seqa-sequestration
  role: SeqA cooperative binding at oriC + dnaAp. Eclipse-period regulator.
- study: dnaa-07-cooperativity
  role: Broadens cooperativity treatment beyond SeqA. DnaA-DnaA filament + box cooperativity.
- study: dnaa-08-validation
  role: End-to-end validation across growth rates + perturbations.

