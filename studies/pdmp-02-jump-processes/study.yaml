tests:
- name: jump-process-likelihood-closed-form
  classification: primary
  description: 'Continuous-time jump-process replacement for v2ecoli''s discrete-time transcription/translation loop emits
    a closed-form likelihood: the joint log-likelihood of an observed event sequence is the sum of log(exponential waiting
    time) + log(jump-kernel) terms. Numerically verified against a reference Gillespie SSA implementation.'
  measure:
    source: v2ecoli.processes.jump_transcription
    observable: log p(event_sequence | theta) under our jump-process vs reference SSA
    reduce: '|delta_log_lik| / |log_lik|'
    units: fraction
  pass_if:
    operator: less-than
    threshold: 0.001
    field: rel_logli_error
  requires_simulation: jump-process-likelihood-test
  cites:
  - gillespie1977
- name: anderson-darling-jump-distribution
  classification: primary
  description: Single-cell inter-event waiting times produced by our jump-process pass the Anderson–Darling test for exponentiality
    (A² statistic < 2.5, equivalent to p > 0.05). Confirms the rates are computed correctly — otherwise the continuous-time
    formulation is broken.
  measure:
    source: v2ecoli.composites.jump_transcription_pilot
    observable: inter_event_waiting_times
    reduce: Anderson-Darling A² statistic
    units: statistic (dimensionless)
  pass_if:
    operator: less-than
    threshold: 2.5
    field: AD_statistic
  requires_simulation: jump-process-AD-test
  cites:
  - anderson1954
- name: multi-gen-inheritance-binomial
  classification: primary
  description: Across ≥100 cell divisions, the daughter1−daughter2 copy-number difference for a tracked protein is consistent
    with binomial partition (variance ≈ mother_count/2, mean ≈ 0). χ² goodness-of-fit p > 0.05. Multi-generation validation
    that the jump-process inheritance machinery is faithful.
  measure:
    source: v2ecoli.composites.jump_multigen
    observable: daughter copy-number difference per division event
    reduce: chi-squared GOF p-value vs binomial(mother, 0.5)
  pass_if:
    operator: greater-than
    threshold: 0.05
    field: chi2_p_value
  requires_simulation: jump-multigen-100-divisions
  cites:
  - huh2011
- name: tau-leap-speedup-correctness
  classification: supporting
  description: Cao+ τ-leap (with adaptive τ-selection) achieves > 5× speedup over naive Gillespie SSA for the same trajectory,
    with W₁ distance < 5% of mean trajectory magnitude. Required for Phase 2 to be wall-clock viable on whole-cell event rates
    spanning 10⁻³–10² /s.
  measure:
    source: scripts/benchmark_tauleap_vs_ssa.py
    observable: wall_seconds_tau_leap, W1(tau_leap_traj, ssa_traj)
    reduce: speedup_ratio AND max_W1_normalized
  pass_if:
    operator: all-of
    conditions:
    - field: speedup_ratio
      operator: greater-than
      threshold: 5.0
    - field: max_W1_normalized
      operator: less-than
      threshold: 0.05
  requires_simulation: tauleap-benchmark
  cites:
  - cao2006
