name: pdmp-02-jump-processes
title: 'Phase 2 — Jump Process Layer: Discrete-Time → Continuous-Time Stochastic'
status: planned
phase: Design
topic: pdmp
tags:
- pdmp
- phase-2
- jump-processes
- transcription
