conclusion_logic:
  if_primary_tests_pass: |
    Mechanism A (runtime overwrite of dnaA's per-promoter init_prob) lands the
    dnaA mRNA initiation rate near the biological ≈1 event/min and holds the
    DnaA monomer pool cycle-mean in band [300,800] with a clean oriC cycle, so
    the succinate DnaA-expression foundation is established and downstream
    mechanism / box-binding / extrinsic studies can be designed on top.
    REALIZED: PASS at the canonical V=1.7e-3 (cycle-mean 665–710, CV 2.3%,
    oriC clean; peak excursion above 800 is the intrinsic per-cycle doubling).
  if_primary_tests_fail: |
    Sweep the per-promoter init_prob in [1e-3, 5e-3] to land the rate near
    target; if the pool cannot be held in band with a clean cell cycle,
    document the structural difference from the PDF setup (cache, initial
    condition, or regulation) rather than forcing the value.

