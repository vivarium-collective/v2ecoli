# Top-level success criteria. FLAT LIST (dashboard renderer expects
# `.map`-iterable; the prior nested {investigation_terminal,per_study_gating}
# shape broke report generation).
#
# Per chris_feedback_2026_05_26 §1: each entry is tagged with `gating:` to
# preserve Chris's distinction between criteria that gate "investigation
# complete" (gating: investigation_terminal — mbp-06's terminal checks,
# which subsume mbp-01..05 having shipped) and criteria that gate only
# their owning study's impl PR (gating: per_study).
#
# Investigation success definition: "comparison harness built and applied;
# structured gap inventory produced," NOT "Palsson benchmark achieved"
# (mbp-05 was reframed to an evaluation phase — see
# chris_feedback_2026_05_26 §10). The three `investigation_terminal`
# entries below are the load-bearing ones; the rest are per_study.
acceptance_criteria:
  # ─── investigation_terminal (gate investigation complete) ───
  - {study: mbp-06-gap-analysis,             behavior: all-five-axes-covered,                        gating: investigation_terminal}
  - {study: mbp-06-gap-analysis,             behavior: every-gap-has-candidate-resolution,           gating: investigation_terminal}
  - {study: mbp-05-palsson-benchmark,        behavior: divergences-categorized-in-report-card,       gating: investigation_terminal}

  # ─── per_study_gating (gate the owning study's impl PR only) ───
  - {study: mbp-01-time-varying-environment, behavior: external_glucose_updates_propagate_within_one_step, gating: per_study}
  - {study: mbp-01-time-varying-environment, behavior: cumulative-mass-balance-closes,               gating: per_study}
