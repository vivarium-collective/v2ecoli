schema_version: 3
name: dnaa-05-rida-ddah-dars
created: '2026-05-16'
status: planned
phase: Design   # Design | Build | Simulate | Evaluate | Decide

baseline:
- name: baseline-extrinsic
  composite: v2ecoli.composites.baseline.baseline
  params: {seed: 0, cache_dir: out/cache}


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Does adding the three extrinsic DnaA-ATP/ADP conversion pathways
    (RIDA replisome-coupled hydrolysis, DDAH datA-dependent hydrolysis,
    DARS1/DARS2 reactivation) produce DnaA-ATP-fraction oscillations
    through the cell cycle and tighten the inter-initiation timing
    distribution vs intrinsic-only (dnaa-02)?
  mechanism: |
    Add three new Processes: RIDA (rate ∝ replisome count), DDAH
    (rate ∝ datA copy number), DARS1 + DARS2 (rate ∝ each locus's
    copy number). Each modulates the existing DnaA-ATP / ADP species
    introduced in dnaa-02.
  expected_outcome: |
    Cell-cycle ATP-fraction swing of ≥0.15 peak-to-trough. Inter-
    initiation CV narrows by ≥30% vs the dnaa-02 intrinsic-only
    baseline. Single-knockout phenotypes: no-DDAH = earlier initiation,
    no-DARS = ATP-fraction fails to recover.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
pipeline_gate:
  prerequisites:
    - dnaa-02-atp-hydrolysis           # need the ATP/ADP/apo split
    - dnaa-04-initiation-mechanism     # need replisome events
  enables: []                          # leaf of the main pipeline
  proceed_condition: |
    Primary tests pass. dnaa-04 already has a working mechanism baseline
    that this can compare against.


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
simulation_set:

- name: full-cycle-with-extrinsic
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: null
  condition: M9-minimal-glucose
  duration_min: 240
  seeds: [0, 1, 2, 3, 4, 5]
  readouts:
    - dnaA_atp_fraction
    - rida_flux
    - ddah_flux
    - dars1_flux
    - dars2_flux
    - replisome_count
    - initiation_events
  applies_tests:
    - dnaa-atp-fraction-oscillates
    - inter-initiation-cv-narrows-vs-intrinsic-only
    - dnaa-atp-anti-correlated-with-replisomes
  status: gated
  blocked_by_requirements: [req-1-rida, req-2-ddah, req-3-dars]

- name: knockout-DDAH
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: {ddah_rate_per_min_per_data: 0.0}
  condition: M9-minimal-glucose
  duration_min: 240
  seeds: [0, 1, 2, 3, 4]
  readouts: [initiation_mass, dnaA_atp_fraction, ddah_flux]
  applies_tests: [no-DDAH-early-initiation]
  status: gated
  blocked_by_requirements: [req-2-ddah]

- name: knockout-DARS
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dars1_rate_per_min_per_locus: 0.0
    dars2_rate_per_min_per_locus: 0.0
  condition: M9-minimal-glucose
  duration_min: 240
  seeds: [0, 1, 2]
  readouts: [dnaA_atp_fraction, dars1_flux, dars2_flux]
  applies_tests: [no-DARS-fails-to-recover-atp]
  status: gated
  blocked_by_requirements: [req-3-dars]

- name: single-pathway-knockouts-comparison
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    sweep:
      - {rida_rate_per_min_per_fork: 0.0}
      - {dars1_rate_per_min_per_locus: 0.0}
      - {dars2_rate_per_min_per_locus: 0.0}
  condition: sweep
  duration_min: 240
  seeds: [0, 1, 2]
  readouts: [dnaA_atp_fraction, rida_flux, dars1_flux, dars2_flux]
  applies_tests: []      # visualization-driven
  status: gated
  blocked_by_requirements: [req-1-rida, req-3-dars]


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
model_change:
  base_model: v2ecoli.composites.baseline.baseline
  new_processes:
    - {name: DnaaRIDA,  kind: Step, requirement_id: req-1-rida}
    - {name: DnaaDDAH,  kind: Step, requirement_id: req-2-ddah}
    - {name: DnaaDARS1, kind: Step, requirement_id: req-3-dars}
    - {name: DnaaDARS2, kind: Step, requirement_id: req-3-dars}
  new_parameters:
    - {name: rida_rate_per_min_per_fork}
    - {name: ddah_rate_per_min_per_data}
    - {name: dars1_rate_per_min_per_locus}
    - {name: dars2_rate_per_min_per_locus}
  new_listeners:
    - {name: dnaA_cycle, emits: ["listeners.dnaA_cycle.{rida_flux,ddah_flux,dars1_flux,dars2_flux}"]}


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
key_assumptions:
  - "RIDA activity ∝ replisome count (β-clamp residence on lagging strand)."
  - "DDAH activity ∝ datA copy number; IHF saturating (not rate-limiting)."
  - "DARS1 < DARS2 in vivo (Kasho 2014 NAR)."
  - "DARS2 IHF + Fis cell-cycle modulation modeled as continuous rate modifier (not a hard gate)."


# ─── 5. READOUTS + BEHAVIOR TESTS ──────────────────────────────────────────

readouts:

- name: dnaA_atp_fraction
  store_path: agents.0.listeners.dnaA_cycle.atp_fraction
  units: fraction
  status: derived-needed

- name: rida_flux
  store_path: agents.0.listeners.dnaA_cycle.rida_flux
  units: molecules/min
  status: derived-needed
  blocked_by_requirements: [req-1-rida]

- name: ddah_flux
  store_path: agents.0.listeners.dnaA_cycle.ddah_flux
  units: molecules/min
  status: derived-needed
  blocked_by_requirements: [req-2-ddah]

- name: dars1_flux
  store_path: agents.0.listeners.dnaA_cycle.dars1_flux
  units: molecules/min
  status: derived-needed
  blocked_by_requirements: [req-3-dars]

- name: dars2_flux
  store_path: agents.0.listeners.dnaA_cycle.dars2_flux
  units: molecules/min
  status: derived-needed
  blocked_by_requirements: [req-3-dars]

- name: replisome_count
  store_path: agents.0.listeners.replication.replisome_count
  units: forks/cell
  status: available

- name: initiation_events
  store_path: agents.0.listeners.replication.initiation_events
  units: events
  status: derived-needed


behavior_tests:

- name: dnaa-atp-fraction-oscillates
  classification: primary
  description: "Peak-to-trough swing of DnaA-ATP fraction ≥ 0.15 across the cycle."
  measure: {kind: listener_path, path: "listeners.dnaA_cycle.atp_fraction", reduce: series, window: full}
  pass_if: {op: oscillation_amplitude_at_least, value: 0.15}
  units: fraction
  requires_simulation: full-cycle-with-extrinsic
  cites: [Katayama2017Frontiers, Riber2016FrontMolBiosci, Boesen2024PNAS]

- name: inter-initiation-cv-narrows-vs-intrinsic-only
  classification: primary
  description: "Inter-initiation timing CV ≤ 70% of the dnaa-02 intrinsic-only baseline."
  measure:
    kind: cross_run_cv_ratio
    path: "listeners.replication.interinitiation_min"
    compare_to: dnaa-02-baseline
  pass_if: {op: at_most, value: 0.70}
  units: ratio
  requires_simulation: full-cycle-with-extrinsic
  cites: [Riber2016FrontMolBiosci, Berger2022NatCommun]

- name: dnaa-atp-anti-correlated-with-replisomes
  classification: supporting
  description: "During active replication, DnaA-ATP and replisome count Pearson r ≤ -0.3 (RIDA signature)."
  measure:
    kind: xy_correlation
    x: {kind: listener_path, path: "listeners.dnaA_cycle.atp_fraction"}
    y: {kind: listener_path, path: "listeners.replication.replisome_count"}
    window: replication_active
  pass_if: {op: pearson_at_most, threshold: -0.3}
  units: dimensionless r
  requires_simulation: full-cycle-with-extrinsic
  cites: [Katayama2017Frontiers, Riber2016FrontMolBiosci]

- name: no-DDAH-early-initiation
  classification: diagnostic
  description: "Knock out DDAH → mean initiation mass drops ≥ 10% (delta-datA phenotype)."
  measure:
    kind: cross_run_ratio
    series: {kind: listener_path, path: "listeners.replication.initiation_mass"}
    reduce: mean
  pass_if: {op: at_most, value: 0.90}
  units: ratio
  requires_simulation: knockout-DDAH
  cites: [Katayama2017Frontiers, Hansen2018DnaATale]

- name: no-DARS-fails-to-recover-atp
  classification: diagnostic
  description: "Post-initiation, DnaA-ATP fraction drops below 0.05 and doesn't recover."
  measure:
    kind: listener_path
    path: "listeners.dnaA_cycle.atp_fraction"
    reduce: post_event_min
    event: replication_initiation
    window: full
  pass_if: {op: at_most, value: 0.05}
  units: fraction
  requires_simulation: knockout-DARS
  cites: [Fujimitsu2009GenesDev, Kasho2014NAR]


# ─── 6. CONCLUSION LOGIC ───────────────────────────────────────────────────
conclusion_logic:
  if_primary_tests_pass:
    implementation_status: "Full DnaA cycle (RIDA + DDAH + DARS) is functional; ATP-fraction oscillates with the cell cycle."
    biological_validation: "Reproduces Katayama 2017's cycle picture + Riber 2016's narrowing-CV prediction."
    pipeline_unblocks:
      - "Investigation completion (dnaa-05 is a leaf in the main chain)."
  if_primary_tests_fail:
    diagnose:
      - "No oscillation: pathway rates wrong or all balance out — check rida_flux vs dars2_flux time series."
      - "CV doesn't narrow: dnaa-02 intrinsic-only baseline may already be tightly bounded for the wrong reason (e.g., box-saturation noise dominates)."
      - "RIDA anti-correlation absent: RIDA rate too slow or replisome count too small."
    block_downstream: "Investigation acceptance criterion 'inter-initiation-cv-narrows-vs-intrinsic-only' requires this."


# ─── 7. LIMITATIONS ────────────────────────────────────────────────────────
limitations:
  - "Hda complex modeled as part of RIDA rate; not tracked as separate molecular species."
  - "IHF saturating assumption — at very high DnaA-ATP, DDAH could be IHF-limited."
  - "DARS2 IHF + Fis cell-cycle modulation is a continuous modifier, not a hard cell-cycle gate."
  - "Slow growth only; multi-fork (rich-media) regime not validated."


# ─── 8. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
implementation_requirements:

- id: req-1-rida
  kind: process
  title: DnaaRIDA Step (replisome-coupled hydrolysis)
  effort: M
  description: |
    Step reading listeners.replication.replisome_count + DnaA-ATP count;
    applies hydrolysis flux ∝ fork count.
  steps:
    - "Create v2ecoli/processes/dnaa_rida.py."
    - "Composite param rida_rate_per_min_per_fork: float (tune to literature)."
    - "Wire after intrinsic hydrolysis Step (from dnaa-02)."
    - "Validate: no-RIDA → DnaA-ATP doesn't drop during C-period."
  unblocks:
    - simulation_set.full-cycle-with-extrinsic
    - dnaa-atp-fraction-oscillates, dnaa-atp-anti-correlated-with-replisomes

- id: req-2-ddah
  kind: process
  title: DnaaDDAH Step (datA-dependent hydrolysis)
  effort: M
  description: |
    Step reading datA copy number from chromosome_structure +
    DnaA-ATP count; applies hydrolysis flux ∝ datA copy count.
  steps:
    - "Catalog datA position (~94.7 min, 4.39 Mbp)."
    - "Read copy number from unique.gene where gene_id='datA'."
    - "Composite param ddah_rate_per_min_per_data: float."
    - "Validate: no-DDAH → earlier initiation."
  unblocks:
    - no-DDAH-early-initiation

- id: req-3-dars
  kind: process
  title: DnaaDARS1 + DnaaDARS2 Steps (ADP-DnaA reactivation)
  effort: M
  description: |
    Two Steps reading copy_number_<dars1|dars2> + DnaA-ADP count.
    Convert DnaA-ADP → apo-DnaA, which re-binds ATP via the existing
    nucleotide-binding equilibrium.
  steps:
    - "Catalog DARS1, DARS2 positions on the chromosome."
    - "Composite params dars1_rate_per_min_per_locus, dars2_rate_per_min_per_locus."
    - "Optionally: DARS2 IHF + Fis modifier (cell-cycle phase function)."
  unblocks:
    - no-DARS-fails-to-recover-atp


bibliography:
  expert: [replication_initiation_molecular_info]
  bib_keys: [Katayama2017Frontiers, Hansen2018DnaATale, Riber2016FrontMolBiosci, Fujimitsu2009GenesDev, Kasho2014NAR, Boesen2024PNAS, Berger2022NatCommun]


runs: []
conclusion: null
parent_studies:
  - {study: dnaa-02-atp-hydrolysis,      condition: tests-passed}
  - {study: dnaa-04-initiation-mechanism, condition: ran}

tests:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
