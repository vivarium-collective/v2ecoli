schema_version: 2
name: v2ecoli-pdmp
title: v2ecoli → PDMP Whole-Cell Model Reformulation
created: '2026-05-24'
status: in_progress
# Phase 1 closed via PR #72 (merged 2026-05-30 as 3af8bb5): MillardPDMPMetabolism
# Process, JAX/Diffrax backend wired (in-WCM debug pending, task #20),
# consumption_matched ref-growth driver closing the cell_mass + dry_mass W₂
# gap to Phase-0 ensemble within ±σ at t=600 s on M9-glucose. Investigation
# resumes off main with Phase 2 (discrete-time → continuous-time jump
# processes for transcription / translation / replication) as the next
# acceptance gate; tracking issues #14 (pbg wiring quirk) and #20 (in-WCM
# JAX failure) remain open from Phase 1.
phase: 2
question: 'Can v2ecoli''s hybrid algorithmic whole-cell model be incrementally

  transformed into a piecewise-deterministic Markov process (PDMP)

  suitable for likelihood-based inference and causal discovery, without

  discarding the biological knowledge encoded in the current WCM, and

  while maintaining viable E. coli growth at every phase boundary?

  '
hypothesis: 'A six-phase incremental replacement — (0) Markov-blanket

  characterization, (1) v2ecoli''s multi-objective FBA → kinetic ODE

  metabolism, (2) discrete-time → continuous-time jump processes,

  (3) observation-likelihood and

  Bayesian-interface infrastructure, (4) compiled column-centric runtime,

  (5) Bayesian gene-function annotation — yields a PDMP-class WCM that

  (a) reproduces Phase-0 interface statistics within tolerance at every

  later phase, (b) admits well-formed process likelihoods at Phase 3,

  (c) achieves ≥10³ parallel single-cell trajectories with near-zero

  marshalling overhead at Phase 4, and (d) recovers known E. coli gene

  functions with credible intervals on a benchmark set at Phase 5.

  '
lead: '**What this is:** This report is a roadmap for turning v2ecoli from a successful but algorithmically assembled whole-cell
  simulation into a cleaner mathematical model. The goal is not to replace the biology, but to preserve what v2ecoli already
  knows while making the model easier to analyze, fit to data, compile, and use for causal inference.


  v2ecoli is currently the most comprehensive mechanistic E. coli

  whole-cell model in production, but as the DUF final report

  ([[duf-final-report]]) documents, it is best characterized as a hybrid

  algorithmic simulator rather than a numerical integrator of a

  mathematically defined dynamical system. This is the load-bearing

  obstacle to Bayesian parameter inference and computational causal

  discovery in WCMs. The v2ecoli → PDMP roadmap

  ([[v2ecoli-pdmp-roadmap]]) prescribes an incremental replacement —

  one WCM component per phase — that converges on a piecewise-

  deterministic Markov process while preserving viability at every

  boundary.

  '
executive:
  what_is_this: 'A six-phase investigation that incrementally transforms v2ecoli from

    a hybrid algorithmic WCM into a piecewise-deterministic Markov

    process. Each phase replaces one component of the WCM (metabolism,

    stochastics, likelihoods, runtime, inference layer) while leaving

    the rest intact.

    '
  verdict: 'Phase 1 closed (PR #72, merged 2026-05-30). Phase 2
    controller-tuning closeout: cell_mass is the wrong observable for
    jump-process variance — the consumption_matched homeostat washes
    per-tick variance out by construction (sprints 1–9). Phase 3
    inference infrastructure fully closed (13 sprints, PR #100): per-
    process Poisson likelihoods, aggregate LikelihoodCollector,
    XArrayEmitter persistence, calibrated mean-to-mean ε, SMC sequential
    refinement, 2D multi-parameter sweep, architectural pivot from
    self-calibrated log-likelihoods to count-based ABC distances giving
    100× sharper Ts identification, and combined count vector reaching
    3.06× truth-vs-next-nearest separation as the Phase-3-canonical ABC
    distance. Phase 4 architectural direction validated and closed via
    6 sprints (also on PR #100): real per-tick compute profile showed
    76% framework overhead (sprint 1), function-level hotspots
    identified 13,817 isinstance + 4,213 __array_finalize__ + 52
    process_update calls per tick as the marshalling dominant cost
    (sprint 2), column-centric prototypes demonstrated constant-in-N
    per-trajectory wall + 1.5×–3× per-tick speedup depending on
    workload (sprints 3, 4, 6), real WCM benchmark + projection: pbg
    sequential at N=10³ × 30 ticks = 26 minutes, column-centric
    parallel projects to ~1 sec = ~1500× total speedup (sprints 5, 6).
    Architectural answer is the column-centric runtime, NOT per-Process
    Catalyst.jl JIT — framework marshalling dominates over per-Process
    compute and per-Process compilation buys at most ~10% of per-tick
    time. Phase 4 implementation work remaining is engineering, not
    investigation. See reports/figures/pdmp-03/abc_count_metric.html
    and reports/figures/pdmp-04/wcm_baseline_projection.html for the
    headline findings; investigations/v2ecoli-pdmp/reports/ for the
    sprint narratives.

    '
  verdict_status: in-progress
  decisions_needed:
  - 'RESOLVED — Phase 3 inference anchors on count-level listeners. Closeout finding from Phase 2 sprints 6–9 confirmed
    by Phase 3 sprints 12-13: count-based ABC distance gives 100× sharper Ts identification than aggregate log-likelihood.
    Combined count vector is the Phase-3-canonical distance.'
  - 'RESOLVED — Phase 4 architectural direction is column-centric runtime, NOT Catalyst.jl per-Process JIT. Sprint 1-2
    profile shows ~76% framework overhead and ~14K isinstance/tick + 4K __array_finalize__/tick dominate, so per-Process
    compilation buys at most ~10% of per-tick time. Sprints 3-4-6 prototypes validate 1.5× per-tick × N-way parallel
    lockstep = ~1500× total speedup at N=10³.'
  - 'OPEN — Phase 5 (Bayesian gene-function annotation) gate. Depends on Phase 4 implementation; per-particle wall budget
    must drop to <0.05 sec/tick before ABC-SMC at the gene-function scale is tractable.'
  - 'OPEN — Task #14 root-cause fix for the pbg scalar-pruning quirk. Worked around in Phase 3 sprints 1 and 13 via
    pin-via-consumer declarations; real fix lives at the pbg merger layer.'
  - 'OPEN — Task #20 in-WCM JAX backend failure. Works standalone, fails inside the WCM composite. Phase 1 perf #4
    follow-up.'
scientific_argument:
  main_claim: 'The PDMP class — ODE segments interrupted by discrete jump events —

    is the right mathematical model class for a next-generation E. coli

    WCM: it has process likelihoods by construction, enforces an

    explicit causal/teleonomic parameter partition, and aligns with the

    causal-modelling literature for dynamical systems.

    '
  evidence_for:
  - DUF final report Sec. 4.1.2 identifies PDMPs (a.k.a. jump-ODEs) as the suitable model class for reformulating v2ecoli;
    [[duf-final-report]].
  - Millard et al. 2017 demonstrate that metabolic regulation in E. coli central carbon and energy metabolism is sufficient
    for coordinated glucose uptake, growth, and energy production via an ODE-only kinetic model — providing the foundational
    substrate for the Phase-1 reformulation; [[millard2017]].
  - Vivarium's algebraic-effect interpretation (DUF Sec. 4.2.2) opens a path to extending it into a probabilistic programming
    language for observe / intervene effects in Phase 3.
  - 'Phase 1 empirical — MillardPDMPMetabolism + JAX/Diffrax + consumption_matched ref-growth driver close the W₂ cell_mass
    + dry_mass gap to the Phase-0 ensemble within ±σ at t=600 s on M9-glucose. PR #72 merged 2026-05-30.'
  - 'Phase 2 empirical — per-promoter and per-protein Poisson tau-leap landed in `poisson` mode. Jump-process variance
    reaches the listener level: peak |Δcm| = 150 fg at the rnap_data listener at t=600 s (sprint 4).'
  - 'Phase 3 pipeline empirical — emission → LikelihoodCollector → XArrayEmitter zarr → xarray.Dataset(replicate × time
    × channel) readback → mean-to-mean ε calibration → SMC sequential refinement → posterior collapses to {truth} at p25/p05.'
  - 'Phase 3 architectural finding (sprints 11-13) — pipeline emits self-calibrated `log P(simulated | simulated_param)`,
    not the ABC-correct `log P(observed | proposed)`. Switching to count-based ABC distances is the architectural fix.'
  - 'Phase 3 identifiability win — combined count vector `sqrt(d_rna² + d_ribosome²)` reaches 3.06× truth-vs-next-nearest
    separation (vs 2.39× for aggregate log-likelihood). The Phase-3-canonical ABC distance.'
  - 'Phase 3 transcript-count signal — `total_rna_init` alone gives ~150× row-separation along the Ts axis (truth row at
    27K vs off-truth rows at 3.8M). Confirms the count metric identifies the parameter channel it''s causally linked to.'
  - 'Phase 3 anti-diagonal ridge (sprint 10) — 2D (Ts, Ps) sweep under aggregate log-likelihood: reducing transcription
    while raising translation partially cancels (fewer mRNAs × more activations per mRNA → similar total log P/tick).
    Per-channel distance breaks the ridge.'
  - 'Phase 4 hot-path empirical — production composite per-tick wall = 52 ms (sprint 5) / 74 ms (sprint 1 single-tick).
    76% lives in framework overhead (Python internals + numpy + v2ecoli library + other site-packages).'
  - 'Phase 4 marshalling hotspots (sprint 2) — 13,817 `isinstance` + 4,213 `__array_finalize__` + 52 `process_update`
    calls per tick. Marshalling dominates over per-Process compute.'
  - 'Phase 4 column-centric speedup (sprints 3-4-6) — 3.1× on pure-Poisson toy, 2.8× on 3-step toy, 1.5× on realistic
    TranscriptInitiation-shaped workload. Honest calibration after the recalibration: 1.5× per-tick.'
  - 'Phase 4 architectural answer — column-centric runtime × N-way parallel lockstep gives ~1500× total speedup at N=10³
    × 30 ticks vs pbg sequential. Per-Process Catalyst.jl JIT buys ≤10% — wrong attack.'
  evidence_against:
  - 'v2ecoli''s current FBA metabolism (multi-objective: biomass + homeostatic + kinetic-constraint, via `wholecell.utils.modular_fba`)
    is tightly coupled to the rest of the WCM — enzyme abundances feed the kinetic-constraint bounds, doubling-time feeds
    the homeostatic concentration targets, and ppGpp couples to transcriptional regulation. ODE substitution must reconstruct
    all three coupling channels before interface statistics will match (Phase 1 risk).'
  - Continuous-time jump propensities require measured kinetic constants for transcription/translation/division that may not
    exist at the necessary precision (Phase 2 risk).
  key_figures:
  - chart: investigations/v2ecoli-pdmp/reports/pdmp-02-jump-processes.html
    caption: 'Phase 2 closeout report — cell_mass is the wrong observable for jump-process variance.'
  - chart: investigations/v2ecoli-pdmp/reports/pdmp-03-inference.html
