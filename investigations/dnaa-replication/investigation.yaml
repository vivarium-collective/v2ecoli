  decisions_needed:
  - question: 'Round 3 τ-gap: dnaa-00 cell divides at 83 min, not the declared 150 min. UPDATED
      2026-05-29 with the root-cause trace AND the fix landing: τ-gap was a CODE-PATH BUG, not
      a kinetics problem. Concrete fix landed (3-line patch); D-period is now enforced; emergent
      τ shifts 83 → 113 min (Δ = 30 min, exactly D_period). Remaining 36.8-min gap to Haochen''s
      declared 150 min is the effective C-period (~83 vs 70 min) plus initiation-timing-from-t=0
      — separate concerns. Haochen options (a) (accept emergent), (b) (REFUTED 2026-05-28), and
      (c) (deeper ParCa rebuild — was the WRONG instrument) are now mostly moot.'
    context: 'EXPERIMENT 2026-05-28 (option-b test): built out/cache-stage1-glycerol-tau150 with
      dry_mass_inc[minimal_glycerol] hand-tuned 81.67 fg → 144 fg and ran dnaa_00_baseline_with_dnaa_readout
      on it for 12000 s alongside the baseline. BOTH divided at exactly t=4989s ≈ 83 min with
      byte-identical DnaA + cell_mass trajectories (script: scripts/run_dnaa00_tau_compare.py;
      outputs: studies/dnaa-00-parameter-foundation/sims/tau-compare/{optionA-baseline,optionB-handtuned}.json).
      Mass-threshold tuning has no effect on division time.

      TRACE 2026-05-29 (root cause): the τ-gap is a wiring bug, not a kinetics problem.
      C-period IS honored: v2ecoli/library/sim_data.py:725-734 computes basal_elongation_rate from
      c_period_minutes (replichore_length / (C × 60)) and the chromosome-replication step reads it —
      verified by the cache manifest (basal_elongation_rate=554 nt/s → C ≈ 69.94 min on the
      2.32 Mbp replichore ✓).
      D-period is COMPUTED but UNENFORCED: v2ecoli/processes/chromosome_replication.py:568 correctly
      sets `division_time = global_time + D_period` on each new full_chromosome record at
      replication-termination; v2ecoli/steps/division.py MarkDPeriod step (lines 24-71) correctly
      detects `global_time >= division_time` and writes `divide=True` to cell_state. But the
      Division step (v2ecoli/steps/division.py:74-238) does NOT include `divide` in its input topology
      (v2ecoli/composites/_helpers.py:1046-1056) — nothing reads the flag. Division.next_update gates
      on `dry_mass >= threshold AND n_chromosomes >= 2` only; the D-period is dead code.
      So the cell divides as soon as both mass and chromosome-count are met, ignoring the D-period
      delay (83 min in our run = C ≈ 70 min + ~13 min for mass-threshold to catch up, with no D-period
      contribution).

      CONCRETE FIX LANDED 2026-05-29 (replaced the vague "deeper ParCa rebuild" option (c)):
      patched two files —
        v2ecoli/steps/division.py: added `"divide": Overwrite()` to Division.inputs() and
          extended Division.next_update''s gate from `dry_mass >= threshold AND n_chromosomes >= 2`
          to ALSO require `divide == True` (the flag MarkDPeriod already sets at
          chromosome_complete + D_period).
        v2ecoli/composites/_helpers.py:1046: added `''divide'': (''divide'',)` to Division''s
          topology dict so the step actually receives the flag.
      Verified by re-running dnaa_00_baseline_with_dnaa_readout on the UNCHANGED
      out/cache-stage1-glycerol cache (output: studies/dnaa-00-parameter-foundation/sims/
      dperiod-fix-2026-05-29/post-fix.json): DIVISION at t=6789s = 113.2 min (up from 83.2 min
      pre-fix; print line confirms d_period_elapsed=True). +30-min shift exactly matches
      D_period=30 min. The fix is small, well-scoped, and observably correct.

      Residual gap to Haochen''s declared 150 min: 36.8 min. Decomposes as (a) effective
      C-period is ~83 min on this cache, not the declared 70 — separate trace; (b) the
      initiation event happens partway through t=0..division, so chromosome completion is
      offset from declared C. Both are separate concerns from this D-period landing.'
  - question: 'Round 3 DnaA concentration drop: count/mass falls 3× over one cycle (1.03 → 0.42 → 0.33 mol/fg).
      Real biology (glycerol-fit synthesis can''t keep pace with mass growth) or artifact (translation_efficiency
