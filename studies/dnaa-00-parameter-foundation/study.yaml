# dnaa-00: Composite foundation
#
# Every investigation starts here. dnaa-00 establishes the canonical
# starting composites the downstream studies (dnaa-01..04) calibrate
# perturbations against:
#
#   baseline                 v2ecoli baseline composite at default
#                            ParCa parameters — the "what v2ecoli does
#                            out of the box" reference.
#
#   baseline-stage1-modified v2ecoli baseline composite with parameters
#                            pinned to the Fu/Xiao/Jun (2023) Stage 1
#                            heuristic-values table. The same v2ecoli
#                            code, retuned to the published anchors.
#
#   itv2-reference           Optional analytical comparator — the
#                            Fu/Xiao/Jun mean-field model running
#                            standalone. Surfaces in dnaa-00 only when
#                            an apples-to-apples external check is
#                            useful; the standalone ITv2 is also
#                            available via dnaa-05 for the dedicated
#                            validation study.
#
# The Stage 1 parameter table (workspace.yaml expert_docs:
# wcm_stage1_parameters) is the single source of truth for what
# "Stage 1" means. Every row's literature anchor + v2ecoli wiring
# status is captured in assumptions[] below.

schema_version: 4
name: dnaa-00-parameter-foundation
created: '2026-05-18'

# ─── QUESTION ───────────────────────────────────────────────────────────
question: |
  What baseline does the dnaa-replication investigation calibrate
  against, and how does the same v2ecoli code respond when its key
  parameters are pinned to the Fu/Xiao/Jun (2023) Stage 1 heuristic
  values? This is the parameter-foundation study — every downstream
  study (dnaa-01..04) starts from one of the two composites declared
  here. An optional ITv2 analytical comparator surfaces when an
  external mean-field reference helps interpret the v2ecoli traces.

# ─── ASSUMPTIONS ────────────────────────────────────────────────────────
# Each Stage 1 parameter row is encoded with its literature anchor +
# v2ecoli wiring status. wcm_stage1_parameters is the canonical
# expert doc — see workspace.yaml.expert_docs.
assumptions:
- text: Cell birth volume is 1 µm³ in slow steady growth (M9-glucose, MG1655).
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: true
- text: Mass-doubling time τ is 150 min in ABT minimal-glycerol (non-overlapping cell cycle).
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: v2ecoli's τ is implicit in the media composition, not a single surfaced parameter.
- text: C period (replication duration) is 70 min — sets replication speed at ≈ 66.31 kbp/min.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: Buried in chromosome_replication.replication_speed; not surfaced today.
- text: D period (termination → division delay) is 30 min.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
- text: dnaA transcription rate is 1.5 mRNA/min/gene (constitutive expression at Stage 1).
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: Would need a ParCa cache override.
- text: DnaA translation efficiency is 1 protein/mRNA (Hansen & Atlung 2018 estimate).
  cites: [wcm_stage1_parameters, Hansen2018DnaATale]
  verified_in_v2ecoli: true
  note: Surfaced via dnaa-01 model_settings.translation_efficiency_eg10235_scale.
- text: DnaA is fully stable — degradation rate = 0.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: true
- text: DnaA-ATP dissociation constant is 30 nM (Sekimizu 1987 / Kawakami 2006).
  cites: [wcm_stage1_parameters, Sekimizu1991]
  verified_in_v2ecoli: false
  note: Encoded inside the MONOMER0-160_RXN equilibrium reaction; not surfaced.
- text: DnaA-ADP dissociation constant is 100 nM.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
- text: DnaA-ATP intrinsic hydrolysis rate is 0.046 /min (Sekimizu 1987).
  cites: [wcm_stage1_parameters, Sekimizu1991]
  verified_in_v2ecoli: true
  note: Surfaced via dnaa-02 model_settings.hydrolysis_rate_per_min.
- text: Consensus chromosomal DnaA-box Kd is 1 nM (ATP- or ADP-bound).
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: true
  note: Surfaced via dnaa-03 model_settings.kd_high_nM.
- text: 8 low-affinity DnaA-ATP-only boxes in oriC, cooperative Kd 50 → 1 nM.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: v2ecoli ships 7 oriC sites (not 8) with single Kd. Cooperativity is dnaa-03-EQ-02.
- text: Hda (RIDA) hydrolyses DnaA-ATP at 40 /min per replication-fork pair.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: dnaa-rida-v0 Step exists; default rate (4.6) is ~10× below Stage 1's 40. Variant overrides.
- text: datA (DDAH) hydrolyses DnaA-ATP at 12 /min per locus. Artificial heuristic.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: datA Step doesn't exist yet — deferred to follow-on investigation.
- text: DARS1 reactivates DnaA-ADP → DnaA-ATP at 5 /min per locus.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: DARS Step doesn't exist yet — deferred.
- text: DARS2 reactivates DnaA-ADP → DnaA-ATP at 10 /min per locus.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: false
  note: DARS Step doesn't exist yet — deferred.
- text: SeqA sequestration time is 0 min — origin sequestration not modelled at Stage 1.
  cites: [wcm_stage1_parameters]
  verified_in_v2ecoli: true
  note: dnaa-04 ships SeqA_v0 fixed-timer stand-in; set refractory_seconds = 0 to recover Stage 1.

# ── Molecule + reaction catalog (from v2ecoli_replication_initiation_report) ──
# The May 2026 prior-art report enumerated every relevant species and
# reaction by ID. Captured here so downstream studies have one place
# to look up "what is X in v2ecoli?".
- text: apo-DnaA monomer = bulk ID PD03831[c] — newly translated, not yet nucleotide-bound.
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: true
- text: DnaA-ATP (active, initiation-competent) = bulk ID MONOMER0-160[c].
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: true
- text: DnaA-ADP (inactive, cannot bind oriC weak boxes) = bulk ID MONOMER0-4565[c].
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: true
- text: apo-DnaA + ATP ⇌ DnaA-ATP equilibrium runs through reaction MONOMER0-160_RXN (mass-action driven, ParCa-fitted Kd ≈ 30 nM).
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: true
- text: apo-DnaA + ADP ⇌ DnaA-ADP equilibrium runs through reaction MONOMER0-4565_RXN (mass-action driven, ParCa-fitted Kd ≈ 100 nM).
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: true
- text: RIDA (DnaA-ATP → DnaA-ADP, replisome-coupled) is encoded in v2ecoli's metabolism as reaction RXN0-7444. Flux is currently zero (not wired through dnaa-02f); dnaa-rida-v0 Step is the workaround.
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: false
  note: Reaction exists in flat data and FBA, but no flux until dnaa-rida-v0 fires.
- text: 307 consensus chromosomal DnaA boxes are partitioned by a region classifier into chromosomal-titration / oriC / dnaAp / datA / DARS regions.
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: true
  note: Box catalog at v2ecoli/data/dnaa_box_catalog.py; region partitioning matches the report's classifier.
- text: oriC carries 11 DnaA boxes — 3 high-affinity + 8 low-affinity (cooperative). DnaA-ATP only binds the 8 low-affinity sites; both ATP- and ADP-forms can bind the 3 high-affinity sites.
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: false
  note: v2ecoli's catalog ships 7 (not 8) oriC low-affinity boxes today.
- text: DDAH (DnaA-ATP hydrolysis at datA) is gated by IHF binding at the datA locus — not currently represented in v2ecoli.
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: false
- text: DARS1 + DARS2 reactivate DnaA-ADP → apo → DnaA-ATP (nucleotide release at the DARS loci, with DARS2 additionally modulated by IHF + Fis). Not yet represented.
  cites: [v2ecoli_replication_initiation_report]
  verified_in_v2ecoli: false

# ─── CONDITIONS ─────────────────────────────────────────────────────────
# Foundation composites. Every downstream study calibrates perturbations
# against one of these. The optional ITv2 variant provides an external
# analytical comparator when the v2ecoli traces need a sanity check.
conditions:
  baseline:
    composite: v2ecoli.composites.baseline.baseline
    params:
      seed: 0
      cache_dir: out/cache
      # Run length in sim-seconds. v2ecoli ticks at ~1s; 3600 = one
      # hour of cell-cycle time. Long enough for the slow-growth
      # baseline to complete a doubling and emit a meaningful trace
      # of listeners.dnaA_cycle.atp_fraction + listeners.monomer_counts.
      n_steps: 3600

  variants:
    # The same v2ecoli code as `baseline`, but with the dnaa-04
    # composite's wired parameters pinned to their Stage 1 heuristic
    # values. Uses dnaa_04_with_dnaa_initiation_trigger because it
    # surfaces the most parameter knobs (hydrolysis, RIDA rate, oriC
    # box affinities, oriC threshold, refractory period). Parameters
    # that are NOT yet surfaced (τ, C/D, ATP/ADP Kds, DDAH/DARS) stay
    # at v2ecoli defaults — see assumptions[] for the gap list.
    - name: baseline-stage1-modified
      composite: v2ecoli.composites.baseline_recipes.dnaa_04_with_dnaa_initiation_trigger
      description: |
        v2ecoli baseline + dnaa-04 mechanism, with the surfaced parameters
        pinned to the Fu/Xiao/Jun (2023) Stage 1 heuristic table:
          hydrolysis_rate_per_min = 0.046  (Sekimizu 1987)
          rida_rate_per_min       = 40.0   (Hda heuristic)
          kd_high_nM              = 1.0    (consensus chromosomal Kd)
          kd_low_nM               = 50.0   (oriC weak-box upper end)
          atp_fraction_clamp_*    = null   (no clamp — let RIDA do the work)
          oric_high_threshold     = 0.8    (~80 % saturation gates firing)
          refractory_seconds      = 0.0    (Stage 1 disables SeqA)
          initial_dnaA_count_per_cell = 300  (anchor to literature band)
      params:
        seed: 0
        n_steps: 3600   # one hour of sim time, same as the baseline
        mechanism: rida-v0
        hydrolysis_rate_per_min: 0.046
        rida_rate_per_min: 40.0
        atp_fraction_clamp_low: null
        atp_fraction_clamp_high: null
        kd_high_nM: 1.0
        kd_low_nM: 50.0
        enable_oric_binding: true
        enable_dnaap_binding: true
        oric_high_threshold: 0.8
        atp_fraction_threshold: 0.5
        refractory_seconds: 0.0
        initial_dnaA_count_per_cell: 300

    # Optional analytical comparator. The Fu/Xiao/Jun (2023) mean-field
    # model running standalone with paper canonical values — useful as
    # a "what does the analytics predict here?" reference next to the
    # two v2ecoli traces. dnaa-05 is the dedicated ITv2-vs-v2ecoli
    # validation study; here it's a side tool.
    - name: itv2-reference
      composite: v2ecoli.composites.initiator_titration_v2.initiator_titration_v2
      description: |
        Fu/Xiao/Jun (2023) mean-field initiator-titration model v2 as an
        analytical comparator. Wild-type defaults — slow growth, RIDA
        active. Surfaces alongside the two v2ecoli composites so the
        evaluator can sanity-check the v2ecoli traces against the paper's
        analytical predictions in one place.
      params:
        seed: 0
        n_steps: 3600   # one hour of sim time — long enough for a full cycle

  # Model settings — Stage 1 canonical values mirrored here for
  # downstream studies to inherit if they want.
  model_settings:
  - name: tau_min_stage1
    description: "Mass-doubling time τ at Stage 1: 150 min (ABT minimal-glycerol)."
    type: number
    default: 150.0
    current: 150.0
    gate: optional
    cites: [wcm_stage1_parameters]
  - name: c_period_min_stage1
    description: "Replication period C at Stage 1: 70 min."
    type: number
    default: 70.0
    current: 70.0
    gate: optional
    cites: [wcm_stage1_parameters]
  - name: d_period_min_stage1
    description: "Termination → division delay D at Stage 1: 30 min."
    type: number
    default: 30.0
    current: 30.0
    gate: optional
    cites: [wcm_stage1_parameters]
  - name: dnaa_intrinsic_hydrolysis_per_min_stage1
    description: "DnaA-ATP intrinsic hydrolysis rate (Sekimizu 1987): 0.046/min."
    type: number
    default: 0.046
    current: 0.046
    gate: optional
    cites: [wcm_stage1_parameters, Sekimizu1991]
  - name: chromosomal_dnaa_box_kd_nM_stage1
    description: "Consensus chromosomal DnaA-box Kd: 1 nM."
    type: number
    default: 1.0
    current: 1.0
    gate: optional
    cites: [wcm_stage1_parameters]
  - name: hda_rida_rate_per_min_per_fork_pair_stage1
    description: "Hda / RIDA hydrolysis rate: 40/min per fork pair (artificial heuristic)."
    type: number
    default: 40.0
    current: 40.0
    gate: optional
    cites: [wcm_stage1_parameters]

# ─── TESTS ──────────────────────────────────────────────────────────────
tests:
- name: baseline-produces-cell-cycle
  classification: primary
  question: Does the v2ecoli baseline complete a full cell cycle (division event triggers within max_duration_s)?
  measure:
    kind: listener_max
    path: listeners.replication_data.n_division_events
    window: full_run
  pass_if:
    op: at_least
    value: 1
  status: pending-first-run
  cites: [wcm_stage1_parameters]
  run_ids: []

- name: stage1-variant-dnaa-fraction-in-band
  classification: primary
  question: Does the Stage 1-parameterised variant maintain DnaA-ATP fraction inside Boesen 2024's [0.2, 0.5] band?
  measure:
    kind: listener_median
    path: listeners.dnaA_cycle.atp_fraction
    window: second_half
  pass_if:
    op: in_range
    low: 0.2
    high: 0.5
  status: pending-first-run
  cites: [wcm_stage1_parameters, Boesen2024PNAS]
  run_ids: []

- name: stage1-parameters-catalogued
  classification: secondary
  question: Have all 17+ Stage 1 parameter rows been catalogued with their literature anchor + v2ecoli wiring status?
  measure:
    kind: count_assumptions
  pass_if:
    op: at_least
    value: 17
  status: pass
  cites: [wcm_stage1_parameters]
  run_ids: []

# ─── COMPARATIVE VISUALIZATIONS ─────────────────────────────────────────
comparative_visualizations:
  - name: dnaa-atp-fraction-foundation
    title: DnaA-ATP fraction over time — baseline vs Stage 1 modified
    observable_path: listeners.dnaA_cycle.atp_fraction
    y_label: DnaA-ATP / total
    target_band: [0.2, 0.5]
    target_band_label: physiological band (Boesen 2024)
    runs:
      - {sim_name: dnaa-00-parameter-foundation, label: Baseline (v2ecoli default)}
      - {sim_name: baseline-stage1-modified,      label: Baseline + Stage 1 params}
      - {sim_name: itv2-reference,                label: ITv2 reference (FXJ 2023)}

  - name: dnaa-monomer-count-foundation
    title: Total DnaA monomer count over time
    observable_path: listeners.monomer_counts
    observable_index: 3861
    y_label: DnaA (molecules / cell)
    target_band: [300, 800]
    target_band_label: literature band (Schmidt 2016 / Mori 2021)
    runs:
      - {sim_name: dnaa-00-parameter-foundation, label: Baseline (v2ecoli default)}
      - {sim_name: baseline-stage1-modified,      label: Baseline + Stage 1 params}

# ─── STATUS ─────────────────────────────────────────────────────────────
status: planning-not-yet-run
phase: Foundation

# ─── REFERENCES ────────────────────────────────────────────────────────
parent_studies: []  # root: every other study calibrates against this foundation
expert_docs:
- wcm_stage1_parameters
- replication_initiation_molecular_info
- v2ecoli_replication_initiation_report

bibliography:
  bib_keys:
  - FuXiaoJun2023
  - Sekimizu1991
  - Hansen2018DnaATale
  - Katayama2017Frontiers
  - Boesen2024PNAS
  - Schmidt2016
  - Mori2021

# ─── BIOLOGICAL CONTEXT ────────────────────────────────────────────────
biological_summary: |
  This is the parameter-foundation study for the dnaa-replication
  investigation. It establishes the two composites every downstream
  study calibrates against:

    1. baseline                 — v2ecoli's default whole-cell composite
                                  at ParCa-fitted parameters (no overrides).
    2. baseline-stage1-modified — the same v2ecoli code with the surfaced
                                  parameters pinned to the Fu/Xiao/Jun
                                  (2023) Stage 1 heuristic-values table.

  An optional itv2-reference variant runs the analytical Fu/Xiao/Jun
  mean-field model standalone, for an apples-to-apples external check.

  The Stage 1 parameter table is the single source of truth for what
  "Stage 1" means. 17+ parameter rows are catalogued in assumptions[]
  with their literature anchor (Sekimizu 1987, Kawakami 2006, Hansen
  & Atlung 2018) or "artificial setup" flag for the heuristic
  placeholders (Hda, datA, DARS). Each downstream study (dnaa-01
  expression, dnaa-02 hydrolysis, dnaa-03 box-binding, dnaa-04
  initiation-mechanism) calibrates a subset of these; dnaa-00 surfaces
  the spec-vs-model gap centrally.

  Going forward, every investigation should start with a study-00 of
  this shape: the canonical foundation composites + a parameter
  catalog + an optional external analytical comparator. Downstream
  studies are perturbations over this baseline.
