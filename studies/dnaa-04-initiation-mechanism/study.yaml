  condition: tests-passed
tests_config:
  auto_discover: true
  data_source: latest_run
  pytest_args: []
  last_results: null
biological_role: Replaces the legacy "cell mass per oriC ≥ critical mass" heuristic with the actual DnaA-driven
  mechanism. Initiation fires when at least 4 of the 8 cooperative low-affinity oriC boxes are loaded with DnaA-ATP
  (≈ "right-arm filament assembled" per the Katayama / Kasho papers).
dependency_rationale: Capstone of the mechanism chain — needs dnaa-01 (pool), dnaa-02 (nucleotide cycle), and dnaa-03
  (oriC box binding) all working first. The mass-per-oriC heuristic is removed only after this gate is validated.
mechanism_replaced: Removes mass-per-oriC heuristic. Replaces with a DnaA-occupancy gate reading listeners.dnaA_binding.oric.low_affinity_occupied
  and firing when occupancy ≥ 4/8 cooperative low-affinity oriC boxes.
primary_claim: DnaA-occupancy-driven initiation fires in the same mass window as the heuristic baseline (within
  ±5%) AND with the same once-per-generation cadence. The mechanism reproduces the heuristic's phenomenology from
  real molecular signal.
primary_visualization: 'Chromosome state timeline (5 timepoints across cycle) with the initiation gate signal panel
  below: oriC low-affinity occupancy trajectory, red dashed line at the 4/8 firing threshold, red dashed verticals
  at initiation events. Adjacent: heuristic-baseline overlay to confirm the ±5% mass-window match.'
scope_boundary: DnaA-occupancy gate only. SeqA sequestration window is a fixed-timer stand-in (10 min refractory)
  at the gate level; not a true methylation-state model.
deferred_biology: True SeqA hemimethylation-state sequestration (currently a refractory timer). DnaB helicase loading
  kinetics (currently instantaneous). IHF-mediated oriC bending. DUE opening kinetics. Autorepression feedback on
  dnaA transcription rate (open from dnaa-01).

# The dnaa-04 hero comparison: mechanism trigger (baseline) vs heuristic-
# only control vs legacy monkey-patch — all three overlaid on the same
# oriC-count trace. number_of_oric step-ups (2→4) ARE the initiation
# events; comparing the timing across variants is the head-to-head visual
# of "is the new mechanism doing what the heuristic used to do, and how
# similar do they look in practice." Multi-gen (9000 ticks) shows whether
# each variant fires reliably across cycles.
