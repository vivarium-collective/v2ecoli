schema_version: 3
name: colonies-01-hpc-readiness
title: HPC scaling readiness for the colony composite
description: |
  Build phase fixed daughter-process hydration so structural _add
  instantiates daughter EcoliWCMs through the engine. Decide phase
  N-sweep (N ∈ {1,2,4,8}) on one machine measured per-tick wall,
  per-cell cost, peak RSS, and pymunk step — extrapolated to a
  cells-per-HPC-node budget and identified the GIL as the dominant
  bottleneck. Output: 384 cells/node sweet spot on 64-core/256GB.
topic: scaling
tags: [colony, multi-cell, hpc, perf, scaling, requires-pymunk, requires-viva-munk]
created: '2026-05-16'
last_run: '2026-05-16T22:30Z'

# Legacy single-axis status kept for back-compat with older dashboard
# renderers; the six axes below are authoritative for new tooling.
status: ran
phase: Decide

design_status: approved
implementation_status: complete
simulation_status: ran
evaluation_status: evaluated
gate_status: passed
expert_review_status: not_requested

# Visualizations rendered on the Study Detail / Visualizations tab.
# The colony GIF is generated by sims/make_gif.py and embedded by the
# dashboard's render_study_charts when found next to the legacy
# runs.db. The 4 perf-scaling SVGs were auto-generated from runs.db's
# ticks table by the same renderer.
#
# MIGRATION NOTE (2026-05-27): sims/run.py now writes parquet
# (runs/{runs,ticks}.parquet — workspace-default emitter parity per
# workspace.yaml.runtime.default_emitter and chris's mbp-* alignment).
# The dashboard's render_study_charts at vivarium_dashboard/lib/study_charts.py:988
# still reads the sqlite runs+ticks shape; the dashboard-side migration
# is a separate follow-up. Until it lands, the dashboard chart renderer
# returns empty live_charts for new parquet runs. Workaround mirrors
# the mbp-02 pattern: render perf SVGs locally via a helper script +
# drop into studies/colonies-01-hpc-readiness/charts/ where
# discover_static_study_charts picks them up (also pending — see
# follow-up below).
visualizations:
- name: colony-animation
  address: gif:colony.gif
  description: |
    Animated GIF of a pure-WC N=2 colony, force-divided after warmup
    into 4 daughters. Each capsule = one cell; colour encodes lineage
    (daughters are hue-shifted variants of the mother). Regenerate via
    `python studies/colonies-01-hpc-readiness/sims/make_gif.py`.
- name: perf-tick-wall-vs-n
  address: dashboard:study_charts
  description: |
    Per-tick wall time vs N (steady-state). Linear scaling = HPC-ready;
    any super-linear bend would mean GIL contention or O(N²) physics.
- name: perf-per-cell-vs-n
  address: dashboard:study_charts
  description: |
    Per-cell wall time vs N. The per-cell-cost-within-2x-reference test
    passes when this stays flat (≤ 2× the N=1 value).
- name: perf-rss-vs-n
  address: dashboard:study_charts
  description: |
    Peak RSS vs N. Slope sets the per-node cell ceiling on HPC.
- name: perf-tick-trace-largest
  address: dashboard:study_charts
  description: |
    Per-tick wall trace for the largest-N run — exposes warmup,
    division spikes, and steady-state variance.

baseline:
- name: colony-pure-wc
  composite: v2ecoli.composites.colony.colony
  params:
    seed: 0
    cache_dir: out/cache
    n_cells: 2
    env_size: 30
    physics_interval: 1.0
    ecoli_interval: 1.0

purpose:
  question: |
    Is the pure whole-cell colony composite ready to scale on HPC?
    Specifically: can N parallel EcoliWCMs grow and divide cleanly for
    ≥2 generations inside one composite, and how does wall-time / RAM /
    per-tick cost scale with N on a single machine — well enough that
    we can confidently project a cells-per-HPC-node budget?
  mechanism: |
    The `colony` composite generator (v2ecoli/composites/colony.py)
    wires N copies of EcoliWCM (v2ecoli/bridge.py) into a pymunk 2D
    physics environment. Each EcoliWCM holds an internal Composite
    of the 55-process baseline. At cell division the bridge returns
    a structural update (_remove mother, _add two daughter EcoliWCMs)
    that the outer composite engine must hydrate. We sweep N ∈ {1,2,4,8}
    and instrument per-tick costs.
  expected_outcome: |
    After the Build phase fix, a pure-WC N=2 colony runs past first
    division to 4 ticking cells without the manual-hydration workaround
    in reports/colony_report.py. In the N-sweep, per-cell wall time
    stays within ~2× of the N=1 cost (i.e. no super-linear blow-up
    from coupling/contention), peak RSS scales close to linear, and
    we can name the dominant bottleneck (likely GIL, pymunk serial
    step, or RAM-per-cell).

pipeline_gate:
  prerequisites: []
  enables:
  - colonies-02-hpc-deployment
  proceed_condition: |
    Build-phase acceptance test passes (N=2 pure-WC → 4 daughters,
    no manual hydration) AND the N-sweep completes for at least
    N ∈ {1,2,4}. N=8 is best-effort on a laptop and may be deferred
    to the HPC follow-up.
  blocks_until_resolved: |
    If daughter EcoliWCMs cannot be hydrated through the composite
    engine's structural _add path, the colonies-02 HPC deployment
    study should NOT start — there is no point sizing nodes for a
    composite that loses cells at every division. Resolution choices:
    (a) fix the bridge's structural-update emission so the engine
    hydrates daughters natively, (b) fix the engine's _add handling
    for process nodes, or (c) accept the manual-driving pattern
    and re-design the HPC plan around per-cell processes outside
    the composite.

simulation_set:
- name: build-smoke-n2
  base_model: v2ecoli.composites.colony.colony
  perturbation: null
  condition: pure-WC, 2 cells, env_size=30
  duration_min: 90
  seeds: [0]
  readouts:
  - colony_cell_count
  - per_cell_dry_mass
  - division_events
  - wall_seconds
  applies_tests:
  - daughters-hydrated
  - two-generations-complete
  status: ready

- name: nsweep-n1
  base_model: v2ecoli.composites.colony.colony
  perturbation: {n_cells: 1}
  condition: pure-WC, single cell, baseline reference
  duration_min: 90
  seeds: [0]
  readouts:
  - wall_seconds
  - peak_rss_mb
  - per_tick_latency_ms
  - per_cell_update_ms
  - pymunk_step_ms
  applies_tests:
  - reference-perf-recorded
  status: gated
  blocked_by_requirements:
  - req-1-perf-harness

- name: nsweep-n2
  base_model: v2ecoli.composites.colony.colony
  perturbation: {n_cells: 2}
  condition: pure-WC, 2 cells
  duration_min: 90
  seeds: [0]
  readouts:
  - wall_seconds
  - peak_rss_mb
  - per_tick_latency_ms
  - per_cell_update_ms
  - pymunk_step_ms
  applies_tests:
  - per-cell-cost-within-2x-reference
  status: gated
  blocked_by_requirements:
  - req-1-perf-harness
  - req-2-daughter-hydration-fix

- name: nsweep-n4
  base_model: v2ecoli.composites.colony.colony
  perturbation: {n_cells: 4}
  condition: pure-WC, 4 cells
  duration_min: 90
  seeds: [0]
  readouts:
  - wall_seconds
  - peak_rss_mb
  - per_tick_latency_ms
  - per_cell_update_ms
  - pymunk_step_ms
  applies_tests:
  - per-cell-cost-within-2x-reference
  status: gated
  blocked_by_requirements:
  - req-1-perf-harness
  - req-2-daughter-hydration-fix

- name: nsweep-n8
  base_model: v2ecoli.composites.colony.colony
  perturbation: {n_cells: 8}
  condition: pure-WC, 8 cells — best-effort on laptop
  duration_min: 90
  seeds: [0]
  readouts:
  - wall_seconds
  - peak_rss_mb
  - per_tick_latency_ms
  - per_cell_update_ms
  - pymunk_step_ms
  applies_tests:
  - per-cell-cost-within-2x-reference
  status: gated
  blocked_by_requirements:
  - req-1-perf-harness
  - req-2-daughter-hydration-fix

- name: bio-1cell-natural-division
  base_model: v2ecoli.composites.colony.colony
  perturbation: {n_cells: 1}
  condition: pure-WC, 1 cell, run past one natural division
  # ~3000s sim = one cell cycle; extra 1500s observes the 2-daughter regime.
  # No --force-divide: division happens via EcoliWCM._handle_division when the
  # internal WCM signals divide.
  duration_min: 75
  seeds: [0]
  readouts:
  - colony_cell_count
  - per_cell_dry_mass
  - division_events
  - wall_seconds
  - per_tick_latency_ms
  - per_cell_update_ms
  - pymunk_step_ms
  - peak_rss_mb
  applies_tests:
  - daughters-hydrated
  - per-cell-cost-within-2x-reference
  status: ready

model_change:
  base_model: v2ecoli.composites.colony.colony
  new_processes: []
  new_state_variables: []
  new_parameters: []
  modified_processes:
  - name: EcoliWCM._handle_division
    why: |
      Current emission of {agents: {_remove, _add}} does not appear to
      hydrate daughter EcoliWCMs through the outer composite engine
      (reports/colony_report.py works around this by manually building
      standalone EcoliWCMs for daughter IDs). Fix is required for Build
      acceptance.
    status: required
    requirement_id: req-2-daughter-hydration-fix
  new_listeners: []
  notes: |
    No biological model changes. The only code work is (a) fix daughter
    hydration in the colony composite, (b) build the perf harness as a
    sim driver under sims/.

key_assumptions:
- Pure-WC colony at N=2 is feasible to run past 2 generations within ~90 min sim
  time on a developer laptop (40-min doubling × 2 + slack).
- The dominant per-tick cost is the inner EcoliWCM update, not pymunk integration
  (validated by per-tick split in the harness).
- Peak RSS measured with psutil after each run captures the steady-state RAM cost
  per cell accurately enough for HPC extrapolation (±20%).
- Single-machine N-sweep extrapolates monotonically to per-node HPC sizing — i.e.
  no surprise breakdowns from network or filesystem at HPC scale that aren't
  visible here. (This is the assumption colonies-02 will test directly.)

readouts:
- name: colony_cell_count
  description: |
    Number of live agents in the colony at each tick (live cell IDs in
    state['cells'] or state['agents'] — depends on the composite's wiring).
  store_path: cells
  reduce:
    kind: dict_size
  units: cells
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

- name: per_cell_dry_mass
  description: |
    Per-cell dry mass series, from each cell's `mass` store driven by
    EcoliWCM._read_outputs.
  store_path: cells.<id>.mass
  units: fg
  status: available

- name: division_events
  description: |
    Per-cell wall-clock + sim-time stamps of division events, recorded
    by the perf harness when it observes the {_remove, _add} structural
    update on the cells map.
  store_path: derived
  units: events
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

- name: wall_seconds
  description: End-to-end wall time of the run.
  store_path: derived
  units: seconds
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

- name: peak_rss_mb
  description: Peak resident set size of the run process, via psutil.
  store_path: derived
  units: megabytes
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

- name: per_tick_latency_ms
  description: |
    Distribution of wall-time per composite tick (one row per tick in
    runs.db). Reduced to {p50, p95, p99, max} in the Decide report.
  store_path: derived
  units: milliseconds
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

- name: per_cell_update_ms
  description: |
    Time spent inside each EcoliWCM.update() per tick, summed over cells.
    Captured by monkey-patching EcoliWCM.update in the harness, or by a
    lightweight timing decorator.
  store_path: derived
  units: milliseconds
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

- name: pymunk_step_ms
  description: |
    Time spent inside the pymunk physics step per tick. Same instrumentation
    pattern as per_cell_update_ms but on the multibody process.
  store_path: derived
  units: milliseconds
  status: derived-needed
  blocked_by_requirements:
  - req-1-perf-harness

behavior_tests:
- name: daughters-hydrated
  classification: primary
  description: |
    After the first division event in the build-smoke-n2 run, both
    daughter agent IDs appear in the cells map AND both continue to
    advance (mass changes, EcoliWCM.update called) on subsequent ticks
    without the manual standalone-WCM workaround that exists in
    reports/colony_report.py.
  measure:
    kind: post_division_advance
    cells_path: cells
    advance_signal: mass_delta_nonzero
    window: post_first_division
  pass_if:
    op: all_daughters_advance
  units: bool
  requires_simulation: build-smoke-n2

- name: two-generations-complete
  classification: primary
  description: |
    Pure-WC N=2 colony reaches ≥4 live cells by end of run (both
    mothers divided), with all four cells advancing on the final tick.
  measure:
    kind: live_cell_count
    cells_path: cells
    advance_signal: mass_delta_nonzero
    window: final_tick
  pass_if:
    op: at_least
    threshold: 4
  units: cells
  requires_simulation: build-smoke-n2

- name: reference-perf-recorded
  classification: supporting
  description: |
    The N=1 reference run completed and recorded wall_seconds + peak_rss_mb
    + per_tick_latency series — i.e. the perf harness is wired and writing
    rows into runs.db.
  measure:
    kind: harness_row_present
    table: runs
    sim_name: nsweep-n1
  pass_if:
    op: row_exists
  units: bool
  requires_simulation: nsweep-n1

- name: per-cell-cost-within-2x-reference
  classification: primary
  description: |
    For each N>1 sweep run, the per-cell wall-time (wall_seconds / N_cells_at_end)
    is at most 2× the N=1 reference per-cell wall-time. Catches super-linear
    blow-up that would block HPC scaling.
  measure:
    kind: per_cell_wall_ratio
    reference_sim: nsweep-n1
    window: full
  pass_if:
    op: ratio_at_most
    ratio: 2.0
  units: dimensionless ratio
  requires_simulation: nsweep-n2

conclusion_logic:
  if_primary_tests_pass:
    implementation_status: |
      colony composite is HPC-ready: daughter hydration works through
      the engine, per-cell cost stays bounded as N grows on one machine.
    pipeline_unblocks:
    - colonies-02-hpc-deployment can size HPC nodes from the recorded
      peak_rss_mb and per_cell_update_ms numbers.
  if_primary_tests_fail:
    diagnose:
    - "If daughters-hydrated FAILS, the engine's structural-update path
      for nested processes is the root issue. Look at how `_add` is
      consumed and whether the daughter's `address: local:EcoliWCM`
      gets instantiated."
    - If per-cell-cost-within-2x-reference FAILS, profile which timer
      grew super-linearly (per_cell_update_ms — GIL contention; pymunk_step_ms
      — O(N²) physics broadphase; total wall but not per-cell — scheduler
      overhead).
    block_downstream: colonies-02 should not start.

limitations:
- Single-machine only; cross-node HPC scaling is colonies-02's job.
- 90 min sim window is one full doubling + a buffer for the second division,
  not an N-generation run.
- Per-cell EcoliWCM internal cache is shared (cache_dir is the same path).
  RAM extrapolation may UNDERESTIMATE HPC RAM if HPC runs use per-cell caches.
- pymunk is single-threaded; GIL contention may dominate before any HPC-relevant
  bottleneck shows up. The Decide report must call this out explicitly.

implementation_requirements:
- id: req-1-perf-harness
  kind: harness
  title: studies/colonies-01-hpc-readiness/sims/run.py perf harness
  effort: M
  description: |
    A driver that takes (sim_name, n_cells, duration_min, seed), builds
    the colony composite, runs it tick-by-tick, and writes per-tick rows
    to studies/colonies-01-hpc-readiness/runs.db with these columns:
    tick, sim_time, wall_ms, per_cell_update_ms_sum, pymunk_step_ms,
    live_cell_count, rss_mb. Also writes one row to a `runs` table per
    completed run with totals.
  steps:
  - Decide DB schema (one ticks table, one runs table).
  - Wrap EcoliWCM.update + pymunk step with timing.
  - Use psutil for RSS sampling.
  - Add a --sim-name flag matching simulation_set entries.
  unblocks:
  - nsweep-* runs
  - all derived readouts

- id: req-2-daughter-hydration-fix
  kind: bridge_fix
  title: Hydrate daughter EcoliWCMs through the composite engine on structural _add
  effort: M
  description: |
    Today reports/colony_report.py manually instantiates standalone EcoliWCMs
    for daughter cell IDs (~lines 520-540) because the structural _add
    inside EcoliWCM._handle_division doesn't appear to make the engine run
    daughters as embedded processes. Fix the bridge OR the engine wiring
    so daughters tick normally after division.
  steps:
  - Reproduce the issue with a minimal pure-WC N=2 run and capture exactly
    what the engine does (or doesn't do) at the division tick.
  - Decide whether the fix is in EcoliWCM._handle_division (different
    update shape) or in how the colony document declares `cells` (must
    accept process nodes via _add).
  - Verify the fix unblocks `daughters-hydrated` test.
  unblocks:
  - daughters-hydrated test
  - two-generations-complete test
  - all nsweep-n{2,4,8} runs

