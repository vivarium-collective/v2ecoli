schema_version: 3
name: dnaa-01-expression-dynamics
created: '2026-05-16'
status: ran
phase: Decide   # Design | Build | Simulate | Evaluate | Decide
last_run: '2026-05-16T19:44Z'


# ─── Dashboard v3 compatibility shim ──────────────────────────────────────
# The dashboard's v3 validator requires `baseline:` as a non-empty list of
# composites. The new template's source-of-truth for execution plans is
# `simulation_set:` below; this `baseline:` list mirrors
# simulation_set[name=baseline-steady-state] for back-compat until the
# dashboard renderer is updated to consume simulation_set directly.
baseline:
- name: baseline-steady-state
  composite: v2ecoli.composites.baseline.baseline
  params:
    seed: 0
    cache_dir: out/cache


# ─── 1. PURPOSE ────────────────────────────────────────────────────────────
purpose:
  question: |
    Does the v2ecoli baseline produce a steady, realistic DnaA pool with
    working autorepression at the dnaA promoter?
  mechanism: |
    Uses the EXISTING v2ecoli transcript_initiation + tf_binding chain
    driven by the dnaA → EG10235_RNA fold change. No new processes added
    in this study — it certifies the layer-1 (total-pool) baseline that
    downstream studies build on.
  expected_outcome: |
    Steady DnaA monomer count within an order of magnitude of the
    Sekimizu / Schmidt / Mori mass-spec value (300-800/cell, target band);
    concentration coefficient-of-variation < 10% over the second half
    of one doubling time; bound DnaA at promoters anti-correlated with
    dnaA tx-init events.


# ─── 2. PIPELINE GATE ──────────────────────────────────────────────────────
# Each study is a model-building gate. It answers: "Can we safely build
# the next layer?"
pipeline_gate:
  prerequisites: []         # dnaa-01 is the root study.
  enables:
    - dnaa-02-atp-hydrolysis     # the nucleotide-state split
    - dnaa-03-box-binding        # via dnaa-02
  proceed_condition: |
    All primary tests pass; the supporting autorepression-correlation
    test passes; calibration discrepancies (if any) are annotated and
    expert-reviewed.
  blocks_until_resolved: |
    If the DnaA-count primary test fails because v2ecoli's simulated
    count is far outside the literature band, downstream studies should
    NOT start — dnaa-02's hydrolysis rates etc. are tuned against a
    realistic baseline pool. Resolution choices: (a) recalibrate
    translation_efficiency for dnaA, (b) widen the test band with
    expert sign-off, (c) reinterpret the test concept (free pool vs
    total).


# ─── 3. SIMULATION SET ─────────────────────────────────────────────────────
# Replaces variants + interventions. Each entry is a concrete run plan.
simulation_set:

- name: baseline-steady-state
  base_model: v2ecoli.composites.baseline.baseline
  perturbation: null
  condition: M9-minimal-glucose
  duration_min: 60         # one doubling
  seeds: [0, 1, 2, 3, 4]
  readouts:
    - dnaA_protein_count
    - dnaA_mrna_count
    - dnaA_tx_init_events
    - dnaA_bound_to_promoters
    - dnaa_atp_complex_bulk
  applies_tests:
    - dnaA-count-in-range
    - dnaA-concentration-stable
    - autorepression-correlation
  status: ready            # all readouts + tests resolve against existing baseline

- name: stop-dnaA-synthesis
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    translation_efficiency_override: {EG10235: 0.0}
  condition: M9-minimal-glucose
  duration_min: 60
  seeds: [0, 1, 2]
  readouts: [dnaA_protein_count]
  applies_tests:
    - stop-synthesis-30pct-drop
    - stop-synthesis-monotonic
  status: gated
  blocked_by_requirements: [req-2-translation-override-hook]

- name: gene-dosage-distal-promoter
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dnaA_locus_relative_to_oric: 0.5
  condition: M9-minimal-glucose
  duration_min: 120
  seeds: [0, 1, 2, 3, 4, 5]
  readouts: [dnaA_tx_init_events, dnaA_protein_count]
  applies_tests: [post-initiation-tx-spike]
  status: gated
  blocked_by_requirements: [req-4-locus-relocation, req-5-initiation-event-detector]

- name: autorepression-strength-sweep
  base_model: v2ecoli.composites.baseline.baseline
  perturbation:
    dnaap_autorepression_multiplier: [0.1, 1.0, 3.0]   # sweep
  condition: M9-minimal-glucose
  duration_min: 60
  seeds: [0, 1, 2]
  readouts: [dnaA_protein_count, dnaA_bound_to_promoters]
  applies_tests: []                # visualization-only; no quantitative test yet
  status: gated
  blocked_by_requirements: [req-3-autorepression-multiplier]


# ─── 4. MODEL CHANGE ───────────────────────────────────────────────────────
# Separates IMPLEMENTATION (what code changes) from BIOLOGICAL BACKGROUND
# (the next section). dnaa-01 deliberately changes nothing in the
# composite — it certifies the baseline as-is.
model_change:
  base_model: v2ecoli.composites.baseline.baseline
  new_processes: []
  new_state_variables: []
  new_parameters: []
  modified_processes: []
  new_listeners:
    - name: DnaaConcentrationListener
      emits:
        - "agents.<id>.listeners.dnaa.protein_uM"
        - "agents.<id>.listeners.dnaa.mrna_uM"
      status: optional       # needed only if concentration-stable test prefers uM
      requirement_id: req-1-concentration-listener
  notes: |
    All identifiers and listeners used here ALREADY exist in v2ecoli's
    baseline composite (verified 2026-05-16; see investigation
    walkthrough notes). This study is a no-code-change certification.


# ─── 4b. KEY ASSUMPTIONS ───────────────────────────────────────────────────
# Short biological context — keep this tight. Long-form lit review
# belongs in references/notes/<bib-key>.md, not here.
key_assumptions:
  - "Steady-state slow growth (M9-glucose, doubling time ~60 min)."
  - "Total DnaA pool is the right concept for this study; ATP/ADP/apo split is dnaa-02's job."
  - "Autorepression at dnaAp goes through tf_binding's existing dnaA→EG10235_RNA fold change."
  - "Cell-birth-to-division covers one doubling; pre-existing v2ecoli initial state seeds 124 DnaA monomers."


# ─── 5. TESTS + READOUTS ───────────────────────────────────────────────────
# `readouts:` declare what we collect from each simulation run.
# `tests:` apply pass/fail rules on top of readouts.

readouts:

- name: dnaA_protein_count
  description: |
    Aggregate DnaA monomer count via monomer_counts_listener
    (re-aggregates bulk + complexation_stoich; ≈ total DnaA in
    the cell). Index 3861 in monomer_ids = "PD03831[c]" = DnaA
    (467 aa, matches Schmidt 2016 protein length).
  store_path: agents.0.listeners.monomer_counts.monomerCounts
  index_by: {type: monomer_id, value: "PD03831[c]"}
  units: molecules/cell
  status: available

- name: dnaA_mrna_count
  description: |
    Aggregate dnaA mRNA count via RNA_counts_listener.
    EG10235_RNA is the transcript ID; idx = mRNA_TU_ids.index("EG10235_RNA").
  store_path: agents.0.listeners.rna_counts.mRNA_counts
  index_by: {type: rna_id, value: EG10235_RNA}
  units: molecules/cell
  status: available

- name: dnaA_tx_init_events
  description: |
    Per-step transcription-initiation events on EG10235_RNA from
    rnap_data listener. Sums to the total init events when reduced.
  store_path: agents.0.listeners.rnap_data.rna_init_event
  index_by: {type: tu_id, value: EG10235_RNA}
  units: events/step
  status: available

- name: dnaA_bound_to_promoters
  description: |
    DnaA molecules currently bound at promoters, via
    rna_synth_prob.n_bound_TF_per_TU (n_TU × n_TF matrix); sum over TUs
    along the DnaA-TF axis. Coarse autorepression proxy — broader than
    just dnaAp.
  store_path: agents.0.listeners.rna_synth_prob.n_bound_TF_per_TU
  index_by: {type: tf_axis_id, value: "PD03831[c]"}
  units: molecules
  status: derived-needed
  blocked_by_requirements: [req-6-tf-axis-aggregation]

- name: dnaa_atp_complex_bulk
  description: |
    Bulk count of MONOMER0-160[c] (the DnaA-ATP complex form in
    molecule_ids.py). Currently populated to ~100 at end of single
    cell sim. Will become a primary readout in dnaa-02 once the
    nucleotide-state split is in place.
  store_path: agents.0.bulk
  index_by: {type: bulk_id, value: "MONOMER0-160[c]"}
  units: molecules/cell
  status: available             # path resolves; semantic interpretation deferred to dnaa-02

- name: dnaA_protein_concentration
  description: |
    Volume-normalised DnaA in uM. Requires the DnaaConcentrationListener
    Step (req-1) — without it, the test falls back to count-based CV.
  store_path: agents.0.listeners.dnaa.protein_uM
  units: uM
  status: derived-needed
  blocked_by_requirements: [req-1-concentration-listener]


behavior_tests:

- name: dnaA-count-in-range
  classification: primary
  description: |
    Median DnaA monomer count over the second half of the run lies
    within the literature band [300, 800] reported by Sekimizu 1991,
    Schmidt 2016, Mori 2021, and Liu 2020.
  measure:
    kind: monomer_count
    id: "PD03831[c]"
    reduce: median
    window: second_half
  pass_if: {op: in_range, low: 300, high: 800}
  units: molecules/cell
  requires_simulation: baseline-steady-state
  calibration_anchor:
    v2ecoli_observed: 115           # median over second-half of 10-min seed-0 run
                                     # (2026-05-16, AFTER monomer_counts overwrite-merge fix)
    literature_target: 550          # midpoint of [300, 800]
    divergence_alarm_factor: 10     # > 10× divergence → calibration question
    divergence_observed: 4.8        # 550 / 115 — v2ecoli is too LOW by ~5×, not too high
    notes: |
      Two-stage finding from the 2026-05-16 walkthrough:

      STAGE 1 — Infrastructure bug (discovered + fixed):
      First 10-min run emitted monomer_counts[DnaA] = 51,781 (and ALL top
      monomers in the tens-of-millions). Root cause: the
      monomer_counts_listener's output type was declared as a plain
      `array[N,integer]` without an `overwrite[]` wrapper, so each timestep
      ADDED to the previous value instead of replacing it. Fixed by
      wrapping the output type. Re-run gave physiological values.
      (Sibling listeners rna_synth_prob / replication_data have the same
      pattern and likely the same bug — flagged for follow-up.)

      STAGE 2 — Real calibration finding:
      With the bug fixed, v2ecoli emits a stable median DnaA = 115 per
      cell over the second-half window. Literature target is [300, 800]
      (Sekimizu / Schmidt / Mori / Liu). So v2ecoli is ~5× too LOW, not
      300× too high. This is a tractable calibration question, not a
      concept mismatch. Likely causes — to evaluate with expert:
        (a) translation_efficiency for EG10235 is set too low in
            ParCa-cache for slow-growth media;
        (b) DnaA half-life / degradation rate is too short;
        (c) The literature numbers include chromosome-bound DnaA (DnaA
            boxes, replisome) which v2ecoli stores in `unique` and would
            need to be summed back in — but the listener already accounts
            for unique-molecule subunit contributions, so this is unlikely
            to explain a 5× gap.
      Recommend re-checking ParCa's translation_efficiency for EG10235
      before kicking off dnaa-02.
  cites: [Sekimizu1991JBacteriol, Schmidt2016NatBiotechnol, Mori2021MolSysBiol, Liu2020NatMicrobiol, Boesen2024PNAS]

- name: dnaA-concentration-stable
  classification: primary
  description: |
    DnaA count (proxy for concentration when uM listener unavailable)
    has rolling 5-step CV ≤ 10% over the second half. Confirms the
    homeostatic loop reached steady state.
  measure:
    kind: monomer_count
    id: "PD03831[c]"
    reduce: series
    window: second_half
  pass_if: {op: rolling_cv_at_most, window_steps: 5, threshold: 0.10}
  units: fraction
  requires_simulation: baseline-steady-state
  cites: [Hansen2018DnaATale, Hansen1999JBacteriol, Hansen2021FrontMolBiosci]

- name: autorepression-correlation
  classification: supporting
  description: |
    When DnaA bound-to-promoters is high, dnaA transcription init
    events are low — autorepression signature. Pearson r ≤ -0.3
    across the second-half window.
  measure:
    kind: xy_correlation
    x: {kind: listener_sum, path: "listeners.rna_synth_prob.n_bound_TF_per_TU"}
    y: {kind: listener_sum, path: "listeners.rnap_data.rna_init_event"}
    window: second_half
  pass_if: {op: pearson_at_most, threshold: -0.3}
  units: dimensionless r
  requires_simulation: baseline-steady-state
  cites: [Speck1999EMBO, Saggioro2013BiochemJ, Katayama2017Frontiers]

- name: stop-synthesis-30pct-drop
  classification: diagnostic
  description: |
    With translation_efficiency[EG10235] = 0, DnaA count at end of
    one doubling time ≤ 70% of initial count. Confirms the dilution
    + turnover balance.
  measure:
    kind: monomer_count
    id: "PD03831[c]"
    reduce: first_and_last
    window: full
  pass_if: {op: ratio_at_most, ratio: 0.70}
  units: ratio (last/first)
  requires_simulation: stop-dnaA-synthesis
  cites: [Li2014Cell, Hansen1999JBacteriol]

- name: stop-synthesis-monotonic
  classification: diagnostic
  description: |
    Stop-synthesis run shows monotonic DnaA decrease (allow ≤5% rebound
    for noise). Confirms there's no compensatory production mechanism.
  measure:
    kind: monomer_count
    id: "PD03831[c]"
    reduce: series
    window: full
  pass_if: {op: monotonic_decreasing, allow_rebound_pct: 5}
  units: monotonic check
  requires_simulation: stop-dnaA-synthesis

- name: post-initiation-tx-spike
  classification: diagnostic
  description: |
    Within 10 min after replication-initiation, dnaA transcription rate
    rises ≥50% (gene-dosage effect when EG10235 is duplicated).
  measure:
    kind: listener_sum
    path: "listeners.rnap_data.rna_init_event"
    reduce: pre_post_event_ratio
    window: post_initiation_10min
  pass_if: {op: ratio_at_least, ratio: 1.5}
  units: ratio (post/pre)
  requires_simulation: gene-dosage-distal-promoter
  blocked_by_requirements: [req-5-initiation-event-detector]
  cites: [Speck1999EMBO, Hansen2018DnaATale]


# ─── 6. CONCLUSION LOGIC ───────────────────────────────────────────────────
# Explicit if/then mapping. Separates implementation success from
# biological validation.
conclusion_logic:
  if_primary_tests_pass:
    implementation_status: "v2ecoli baseline is functional at the layer-1 (total DnaA pool) abstraction."
    biological_validation: |
      v2ecoli reproduces a STABLE DnaA pool — does NOT validate that
      the per-cell count matches mass-spec measurements. That's a
      separate calibration pass (compare median(dnaA_protein_count)
      to Schmidt2016's reported absolute count).
    pipeline_unblocks:
      - "dnaa-02 (DnaA-ATP/ADP/apo nucleotide-state split) becomes safe to start."
      - "Calibration_anchor.v2ecoli_observed gets locked in as the baseline reference for dnaa-02."

  if_primary_tests_fail:
    diagnose:
      - "If dnaA-count-in-range fails: check calibration_anchor.divergence_alarm_factor — likely concept mismatch (monomer_counts vs bulk vs complex form)."
      - "If dnaA-concentration-stable fails: check whether translation rate + dilution balance reached steady state in the time window (try multi-generation)."
      - "If autorepression-correlation fails: tf_binding wiring may be broken or fold-change too weak."
    block_downstream: "dnaa-02..06 should not start until primary failures are resolved."


# ─── 7. LIMITATIONS ────────────────────────────────────────────────────────
# What this study explicitly does NOT validate. Prevents overclaim from
# a passing test.
limitations:
  - "Single doubling time; multi-generation drift not validated (see dnaa-04 mechanism for that)."
  - "Total DnaA pool only; no ATP/ADP/apo split (dnaa-02)."
  - "Slow non-overlapping growth on M9; rich-media + fast growth not validated here."
  - "dnaAp-specific box-by-box occupancy NOT validated (dnaa-03 covers the box catalog)."
  - "Absolute DnaA count vs literature is a calibration question, not a test outcome — see calibration_anchor on dnaA-count-in-range."
  - "Coarse autorepression proxy sums TF binding across ALL DnaA TF targets, not just dnaAp."


# ─── 8. IMPLEMENTATION REQUIREMENTS ────────────────────────────────────────
# Concrete actionable items. Each generates a task.
implementation_requirements:

- id: req-1-concentration-listener
  kind: listener
  title: DnaaConcentrationListener Step
  effort: S
  description: |
    A Step that reads bulk[PD03831[c]] + (mRNA count via rna_counts) +
    cell_volume and emits at listeners.dnaa.{protein_uM, mrna_uM}.
    Converts via Avogadro + volume.
  steps:
    - "Create v2ecoli/steps/dnaa_concentration_listener.py."
    - "Wire into baseline composite layer after transcript / translation."
    - "Unit test: assert dnaA_protein_uM > 0 after one timestep."
  unblocks:
    - readouts.dnaA_protein_concentration
    - dnaA-concentration-stable test in uM units (preferred)

- id: req-2-translation-override-hook
  kind: parameter_hook
  title: translation_efficiency_override composite parameter
  effort: S
  description: |
    Composite-level param `translation_efficiency_override: dict[gene_id, float]`
    that patches sim_data.process.translation.translation_efficiency
    before instantiating polypeptide_initiation.
  steps:
    - "Add param to v2ecoli/composites/baseline.py."
    - "In build_composite body, deepcopy sim_data and patch."
    - "Behavior test: variant stop-dnaA-synthesis drives DnaA to <30% over one doubling."
  unblocks:
    - simulation_set.stop-dnaA-synthesis
    - tests.stop-synthesis-30pct-drop
    - tests.stop-synthesis-monotonic

- id: req-3-autorepression-multiplier
  kind: parameter_hook
  title: dnaap_autorepression_multiplier composite parameter
  effort: M
  description: |
    Composite-level param that scales the dnaA → EG10235_RNA fold change
    by a multiplier. Either by patching fold_changes.tsv values in sim_data
    at composite-build time, or via an intercepting Step.
  steps:
    - "Locate fold_changes.tsv (dnaA, EG10235_RNA) row."
    - "Patch sim_data at build time."
    - "Sanity: 0.1× → low DnaA; 3× → high DnaA."
  unblocks:
    - simulation_set.autorepression-strength-sweep

- id: req-4-locus-relocation
  kind: parameter_hook
  title: dnaA_locus_relative_to_oric override
  effort: L
  description: |
    Composite-level override of the EG10235 chromosomal coordinate.
    Complex because chromosome_replication models gene-dosage by fork
    position; needs care to keep replication mechanics consistent.
  steps:
    - "Audit chromosome_replication.py for the gene-dosage tracking."
    - "Override sim_data.process.replication.gene_data['EG10235']['coordinate']."
    - "Validation: replication still terminates correctly."
  defer_until: dnaa-04 (which already touches replication mechanism)
  unblocks:
    - simulation_set.gene-dosage-distal-promoter

- id: req-5-initiation-event-detector
  kind: listener
  title: replication_initiation_event listener
  effort: M
  description: |
    A listener that emits a per-step boolean (or a timestamped event)
    when chromosome_initiation fires. Used by tests that need to slice
    a window around the event (e.g., post-initiation gene-dosage spike).
  defer_until: dnaa-04 (initiation mechanism rebuild)
  unblocks:
    - tests.post-initiation-tx-spike

- id: req-6-tf-axis-aggregation
  kind: listener
  title: TF-axis sum on n_bound_TF_per_TU
  effort: XS
  description: |
    n_bound_TF_per_TU is (n_TU × n_TF). For dnaa-01's autorepression
    correlation we want a 1-D series: sum over TUs along the DnaA TF
    axis. Either add a derived listener or compute in the test
    evaluator.
  steps:
    - "Look up DnaA's TF axis index in tf_binding's config."
    - "Either add a derived Step emitting listeners.rna_synth_prob.dnaA_bound_total, or compute in _behaviors.py."
  unblocks:
    - readouts.dnaA_bound_to_promoters
    - tests.autorepression-correlation


