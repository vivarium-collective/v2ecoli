objective: |
  Background context — answer "why glycerol, why acetate?" in one place. This is a documentation
  study, not a research unit; no new mechanism, no parameter changes. It surfaces the existing
  v2ecoli media-condition landscape, the multi-fork-replication constraint that drove the
  Stage 1 PDF's choice of ABT minimal glycerol, and the reasoning behind using acetate as the
  v2ecoli ↔ vEcoli equivalence reference. Everything downstream (Studies 0-8) rests on this
  framing.
description: |
  Sits ahead of Study 0 in the investigation. A reader landing on the chromosome-cycle-calibration
  investigation should read THIS first — five minutes here will save twenty minutes of "wait,
  why are they running two different conditions?" later.

  Three things to take away:

  1. **v2ecoli ships with 5 canonical conditions, none of which are ABT glycerol.** The set —
     `with_aa` (τ=25 min), `basal` (τ=44 min), `succinate` (τ=82 min), `no_oxygen` (τ=100 min),
     `acetate` (τ=136 min). All share C=40 min (replication time) + D=20 min (eclipse), giving
     C+D=60 min globally. Any condition with τ < C+D = 60 min has overlapping replication cycles
     (multi-fork) — that's `with_aa` (and arguably `basal` near the boundary).

  2. **The Stage 1 PDF chose ABT minimal glycerol (MIX0-845, τ=150 min) deliberately.** From the
     PDF: "Growth condition is ABT minimal glycerol for wildtype MG1655. This is to guarantee
     non-overlapping cell cycle, which avoids synchronization issue." Multi-fork replication
     creates initiation events that overlap in time and chromosome dosage that's a function of
     where in the cycle each fork sits — both bury the signal the DnaA / replication-initiation
     arc is trying to study. Stage 1 also prescribes C=70 + D=30 (C+D=100 min), pushing the
     multi-fork threshold up too.

  3. **Acetate (τ=136) is the closest analog to glycerol in v2ecoli's existing set.** Both have
     1 oriC + 0 active forks at t=0 (non-multi-fork). Both are slow enough that C+D fits within
     τ. Critically — acetate has an established vEcoli implementation on the same kb_default
     simData, so we can run a side-by-side v2ecoli ↔ vEcoli match to verify the v2ecoli refactor
     is faithful. Glycerol doesn't have that reference (it's a NEW condition we added). Acetate
     is therefore the v2ecoli refactor's validation point; glycerol is the Stage 1 deliverable.

  The embedded HTML below carries the full per-condition observable table (τ observed,
  initial dry mass, mass-fold-change, oriC counts, fork counts, multi-fork yes/no) plus an
  animation of the 5 baseline simulations side-by-side. Use it to compare the conditions visually.
