schema_version: 4
name: dnaa-2-atp-hydrolysis
title: DnaA-ATP / DnaA-ADP nucleotide equilibria + intrinsic hydrolysis
created: '2026-05-30'
status: in-progress   # Steps 1-2 done (multiseed, mechanism ON, ~99.7% ATP confirmed); Step 3 blocked on Haochen

question: |
  Starting from dnaa-1's V-tuned succinate lineage (total DnaA in [300, 800],
  clean cell cycle), how does the DnaA pool partition across forms
  (apo-DnaA / DnaA-ATP / DnaA-ADP) under (1) the current equilibria alone,
  and (2) Haochen's nucleotide-binding equilibria + DnaA-ATP intrinsic
  hydrolysis? Does the DnaA-ATP fraction land in the biological [0.2, 0.5]
  band, and if not, which parameter (K_d, cellular [ATP]:[ADP], or the
  expected fraction) is inconsistent?

runtime:
  subprocess_timeout_s: 7200
  max_generations: 7
  single_daughters: true

# Reactions & parameters (Haochen's set) — for reference; the equilibria
# already exist in v2ecoli's baseline `ecoli-equilibrium` step:
#   apo-DnaA + ATP ⇌ DnaA-ATP   K_d ≈ 29-30 nM   (MONOMER0-160_RXN)
#   apo-DnaA + ADP ⇌ DnaA-ADP   K_d ≈ 100 nM     (MONOMER0-4565_RXN)
#   DnaA-ATP → DnaA-ADP intrinsic hydrolysis, k = 0.046/min  (to be ADDED in Step 2)
# Bulk species: PD03831[c] apo · MONOMER0-160[c] DnaA-ATP · MONOMER0-4565[c] DnaA-ADP
#               ATP[c] / ADP[c] cellular pools.

report:
  title: dnaa-2 — DnaA nucleotide-state partitioning (succinate)
  verdict: in-progress
  confidence: pending
  evidence_quality: empirical

  objective: |
    Add the DnaA nucleotide-binding equilibria and DnaA-ATP intrinsic
    hydrolysis to the V-tuned succinate lineage and observe how the DnaA
    pool partitions across forms. Acceptance is biological: DnaA-ATP
    fraction in [0.2, 0.5], stable across the lineage, with total DnaA still
    in [300, 800], a clean cell cycle (oriC 1↔2, never 4), and DnaA
    concentration CV < 10%.

  main_insight: |
    The DnaA nucleotide-binding equilibria ALREADY exist in v2ecoli's
    baseline (that is why DnaA-ATP is non-zero under V-only tuning). The
    question is the steady-state partitioning. ⚠ Per the instructions, at
    Haochen's K_d values and v2ecoli's current cellular [ATP]:[ADP], the
    thermodynamic equilibrium is expected to push the DnaA-ATP fraction
    well ABOVE the biological [0.2, 0.5] band — one of {K_d, [ATP]:[ADP],
    expected fraction} is inconsistent with the other two. Flag for
    Haochen before tuning his stated K_d's.

  result: |
    STEP 1 — baseline DnaA-form distribution under V-only tuning (no
    mechanism change), read from the dnaa-1 pristine lineage's per-generation
    cell states (out/dnaa1-mechA-7gen-pristine-2026-05-30/gen_dills/gen{1..7}):

      gen   apo  DnaA-ATP  DnaA-ADP  total  %DnaA-ATP  ATP[c]:ADP[c]
        1     0       478         1    479    0.998        20.3
        2     0       908         1    909    0.999        20.3
        3     0      1020         1   1021    0.999        20.3
        4     0       863         1    864    0.999        20.3
        5     1      1083         1   1085    0.998        20.3
        6     0       972         1    973    0.999        20.3
        7     0       870         1    871    0.999        20.3

    Findings:
      - The DnaA pool is ~99.8-99.9% DnaA-ATP across EVERY generation —
        essentially no apo-DnaA (free pool ≈ 0) and ~1 DnaA-ADP. This is
        FAR above the Boesen 2024 biological band [0.2, 0.5].
      - ⚠ INCONSISTENCY (as the instructions predicted): with K_d(ATP)≈30 nM,
        K_d(ADP)≈100 nM, and v2ecoli's [ATP]:[ADP] ≈ 20.3, the equilibrium
        ATP:ADP-bound ratio ≈ ([ATP]:[ADP])·(K_d,ADP/K_d,ATP) ≈ 20.3·3.3 ≈
        68, and [ATP] ≫ K_d,ATP leaves almost no apo → ~99.8% DnaA-ATP. The
        three stated quantities (K_d, [ATP]:[ADP], expected 0.2-0.5 fraction)
        cannot all be right. FLAG FOR HAOCHEN which to revise.
      - NOTE: monomer_counts[3861] (PD03831[c]) used in dnaa-0/dnaa-1 is the
        TOTAL DnaA across forms (the listener aggregates apo + DnaA-ATP +
        DnaA-ADP), NOT the free apo pool — confirmed: bulk PD03831[c] (free
        apo) ≈ 0 while monomer_counts[3861] ≈ total ≈ 480-1080. So the
        dnaa-1 "[300, 800]" result is total DnaA, which is correct.
    STEP 2 — MECHANISM ON, MULTISEED (DnaaIntrinsicHydrolysis k=0.046/min +
    DnaaCycleListener wired as the opt-in `dnaa_nucleotide` baseline feature;
    run via the v2ecoli workflow framework — variants×seeds×generations
    meta-composite — 4 seeds × 4 gens, resumed from dnaa-0's succinate
    steady-state init under the mechA cache. Run:
    studies/dnaa-2-atp-hydrolysis/parquet-runs/dnaa2-multiseed/).

    DnaA-ATP fraction per (seed, gen), mean over each generation:
      seed   gen0    gen1    gen2    gen3
        0   0.9964  0.9972  0.9974  0.9974
        1   0.9965  0.9971  0.9973   (—)
        2   0.9965  0.9971  0.9972   (—)
        3   0.9965  0.9973  0.9975  0.9976
      across-seed, gens 0-2 (12 complete lineage-gens): 0.9970 ± 0.0039
      (within-gen CV < 0.7%; across-seed spread per gen ±0.0001)

    Findings:
      - Mechanism ON changes NOTHING: %DnaA-ATP holds at ~0.997 across all 4
        seeds and every generation — identical to the Step-1 V-only baseline.
        Intrinsic hydrolysis fires (3-6 events/gen) but the equilibrium
        re-binds ATP far faster than k=0.046/min drains it, so DnaA-ADP never
        accumulates (~0.3-1.9 counts) and free apo stays ~0.3-0.4. CONFIRMED,
        not a single-seed coincidence: the ~99.7%-ATP pin is robust.
      - Cell cycle is clean & periodic: 10 divisions across the seeds,
        chromosomes=2 at each, fold-change ~1.8-2.0/gen (proper doubling),
        doubling time 84 ± 12 min (gens 0-2). Total DnaA climbs gen-over-gen
        (gen0 ~230 → gen2 ~630, cycle-mean), straddling the [300,800] band;
        gen-0 birth values dip low (post-resume transient) as expected.
      - RUN NOTE: the 4-seed sweep was OOM-killed during finalize after seeds
        0,3 completed 4 gens and seeds 1,2 completed 3 (one cell hit an FBA
        GLP_NOFEAS retry storm). summary.json + analysis.json were
        reconstructed from the complete history parquet; cycle-stability
        claims rest on the 12 COMPLETE gens (gens 0-2, all seeds). gen-3 for
        seeds 0,3 is truncated and excluded from cycle stats. A hardened
        re-run (one workflow subprocess PER seed, concurrency 2) is in
        progress to complete gen-3 for all seeds without the single-process
        OOM (dnaa2-multiseed-v2/).
      - ⚠ CONCENTRATION DRIFT (6-panel trajectory, charts/dnaa2_step2_six
        panel_seed{0,3}.svg): DnaA total and DnaA/cell-mass concentration
        climb gen-over-gen (concentration ~0.3 → ~1.3 counts/fg over 4 gens;
        total ~200 → ~1000), rather than holding a flat steady state. The
        lineage has NOT fully equilibrated from the resume-from-gen3 init
        under the mechA cache — it is still accumulating DnaA. The DnaA-ATP
        FRACTION is unaffected (~0.997 throughout), but the "DnaA
        concentration CV < 10%" acceptance criterion is NOT met on this
        4-gen window. Needs either more generations to asymptote or a re-
        equilibrated init; flag alongside the K_d inconsistency.

  interpretation: |
    Steps 1 AND 2 agree across 4 seeds: the baseline equilibrium pins DnaA at
    ~99.7% ATP-bound, not 0.2-0.5, and adding Haochen's intrinsic hydrolysis
    UNTUNED does not move it. The deviation from the Boesen [0.2,0.5] band is
    therefore a robust property of the stated parameter set, not noise or a
    single-seed artifact. The resolution (Step 3) requires deciding WHICH of
    K_d / [ATP]:[ADP] / expected-fraction to revise — Haochen's call.

  next_action: |
    Step 3 (BLOCKED on Haochen): the multiseed Step-2 result confirms the
    ~99.7%-ATP pin is robust, so reaching [0.2,0.5] requires changing a
    stated parameter, not just re-running. Present the inconsistency to
    Haochen; once he picks the lever (K_d, cellular [ATP]:[ADP], or the
    expected fraction), surface it as a tunable composite param and sweep it
    to land the fraction in band. (Optional: re-run the sweep with per-branch
    subprocess isolation to avoid the single-process OOM, and complete gen-3
    for all seeds.)

  decisions_needed:
    - question: Which of {K_d(ATP/ADP), cellular [ATP]:[ADP], expected
        DnaA-ATP fraction [0.2,0.5]} should be revised to reconcile the
        ~99.8%-ATP baseline? (Haochen's input.)

assumptions:
  - text: |
      The DnaA nucleotide-binding equilibria are already present in the
      baseline ecoli-equilibrium step at the current ParCa-fit K_d's
      (≈29-30 nM ATP, ≈100 nM ADP); Step 1 only OBSERVES them, no change.
    cites:
      - claude-instructions-dnaa-hydrolysis-study.md
    verified_in_v2ecoli: true
  - text: |
      DnaA-form counts read from bulk: PD03831[c] (apo), MONOMER0-160[c]
      (DnaA-ATP), MONOMER0-4565[c] (DnaA-ADP); cellular pools ATP[c], ADP[c].
    cites:
      - claude-instructions-dnaa-hydrolysis-study.md
    verified_in_v2ecoli: true

conditions:
  baseline:
    composite: v2ecoli.composites.baseline.baseline
    params:
      seed: 0
      cache_dir: out/cache-succinate-mechA-2e-3
      single_daughters: true
      max_generations: 7
      # Step 1: V-only (Mechanism A) — no hydrolysis added yet.
      perturbations:
        "TU00259[c]": 2.0e-3
  # Step 2 (to be run) will add a variant:
  #   intrinsic-hydrolysis-0.046 → DnaaIntrinsicHydrolysis(0.046/min) + DnaaCycleListener
  variants: []
  model_settings: []

visualizations:
  - name: dnaa_forms_baseline
    address: local:DnaaFormsVisualization
    config:
      title: dnaa-2 Step 1 — DnaA-form distribution (V-only baseline)
      atp_band_low: 0.2
      atp_band_high: 0.5

tests:
  - name: dnaa-atp-fraction-in-band-0.2-0.5
    classification: primary
    question: Is the DnaA-ATP fraction in [0.2, 0.5], stable across the lineage?
    measure:
      kind: range_check_per_generation
      path: DnaA-ATP / (apo + DnaA-ATP + DnaA-ADP)
    pass_if:
      op: in_range_every_generation
      low: 0.2
      high: 0.5
    status: failed
    result: |
      0.9970 ± 0.0039 across 4 seeds × gens 0-2 (Step-2 multiseed, mechanism
      ON); 0.998 Step-1 baseline. Both far above band.
    notes: |
      FAILS the band at BOTH steps and across ALL 4 seeds: the equilibrium
      pins DnaA at ~99.7% ATP-bound, and Haochen's intrinsic hydrolysis
      (untuned) does not move it (within-gen CV <0.7%, across-seed ±0.0001).
      This is the flagged inconsistency, robustly confirmed — not noise, not
      a single-seed artifact, not a tuning miss yet. Step 3 / Haochen decides
      which of {K_d, [ATP]:[ADP], expected fraction} to revise.

  - name: total-dnaa-in-band-300-800
    classification: secondary
    question: Does total DnaA stay in [300, 800] (dnaa-1 result preserved)?
    measure:
      kind: range_check_per_generation
      path: apo + DnaA-ATP + DnaA-ADP
    pass_if:
      op: in_range_every_generation
      low: 300
      high: 800
    status: partial
    notes: |
      Per-gen totals 479/909/1021/864/1085/973/871 — gens 3,5 slightly
      exceed 800 at the birth snapshot (these are single-point birth states,
      not cycle means; dnaa-1's cycle-mean result stands). Re-confirm on the
      Step-2 trajectory.

